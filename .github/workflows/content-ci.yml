name: Content CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validation tools
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: markdownlint "**/*.md" --ignore node_modules || true

      - name: Check for broken internal links
        run: |
          # Find all markdown files and check for broken relative links
          find . -name "*.md" -o -name "*.mdx" | while read file; do
            dir=$(dirname "$file")
            grep -oE '\[.*\]\(\./[^)]+\)' "$file" 2>/dev/null | while read link; do
              target=$(echo "$link" | sed 's/.*(\.\///' | sed 's/).*//')
              if [ ! -e "$dir/$target" ]; then
                echo "Broken link in $file: $target"
              fi
            done
          done

  # Require a CHANGELOG.md update for every artifact touched in this change set
  # (mirrors the local `changelog-guard` Lefthook hook). Keeps a per-course
  # history of what changed and when.
  changelog-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check each touched artifact updated its CHANGELOG
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$PUSH_HEAD_SHA"
          fi
          # Fall back to the previous commit if the base is empty/unknown (e.g. first push).
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$head^"
          fi

          changed=$(git diff --name-only "$base" "$head")

          # Artifact roots (courses/<slug>) with any changed file.
          roots=$(printf '%s\n' "$changed" \
            | grep -E '^courses/[^/]+/' \
            | cut -d/ -f1-2 | sort -u || true)

          missing=0
          while IFS= read -r root; do
            [ -n "$root" ] || continue
            if ! printf '%s\n' "$changed" | grep -Fqx "$root/CHANGELOG.md"; then
              echo "✗ $root changed but $root/CHANGELOG.md was not updated"
              missing=1
            fi
          done <<EOF
          $roots
          EOF

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Every change to an artifact must record an entry in that artifact's CHANGELOG.md."
            exit 1
          fi
          echo "All touched artifacts updated their CHANGELOG.md."

  # Validate every lesson MDX body actually compiles as MDX/JSX (mirrors the
  # local `mdx-syntax` Lefthook hook). Catches parser-desyncing authoring
  # mistakes — most commonly a backslash-escaped double quote inside a plain
  # JSX attribute (e.g. note="...\"...") — which JSX doesn't treat as an
  # escape. Without this, a malformed lesson lands on main clean and only
  # fails later when apps/web runs Velite, which silently drops it from the
  # catalog (404 at runtime) instead of failing the build. See PR #9
  # (tailwind-from-scratch lessons 22 + 23).
  validate-mdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MDX compiler
        run: npm install --no-save @mdx-js/mdx remark-directive

      - name: Validate lesson MDX syntax
        run: node scripts/check-mdx-syntax.mjs

  # Validate code samples can at least be parsed
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate Python syntax
        run: |
          find . -name "*.py" -exec python -m py_compile {} \;

      - name: Validate Java projects compile
        run: |
          for pom in $(find . -name "pom.xml" -path "*/code/*"); do
            dir=$(dirname "$pom")
            echo "Validating $dir"
            cd "$dir"
            mvn compile -q || echo "Warning: $dir failed to compile"
            cd - > /dev/null
          done
