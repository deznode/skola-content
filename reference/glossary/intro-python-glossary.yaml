- term: programming language
  category: General
  translations:
    kea:
      local_term: linguajen di programasan
      definition: >-
        Un sistema di palavras i regras ki nu ta uza pa skrebe instrusons ki un komputador pode
        kompriende i kore.
  slug: programming-language
  context: intro-python
- term: MVP
  category: General
  translations:
    kea:
      local_term: MVP
      definition: >-
        Minimum Viable Product — primeru versan simples di un produtu, ku só funsionalidadis
        esensial, pa testa un ideia rápidu ku poku sforsu.
  slug: mvp
  context: intro-python
- term: virtual environment
  category: General
  translations:
    kea:
      local_term: virtual environment
      definition: >-
        Un espasu izoladu pa un projetu Python, ku si própriu kópia di Python i si próprius pakotis
        — pa un projetu ka kebra otu.
  related_terms: package
  slug: virtual-environment
  context: intro-python
- term: package
  category: General
  translations:
    kea:
      local_term: pakoti
      definition: >-
        Un biblioteka di kódiku reutilizável ki otus dezenvolvedoris skrebe i partilha, pa bu
        instala ku `pip` i uza na bu projetu.
  related_terms: virtual-environment
  slug: package
  context: intro-python
- term: traceback
  category: General
  translations:
    kea:
      local_term: traceback
      definition: >-
        Relatóriu ki Python ta mostra kuandu un programa para ku eru — ta lista unde i pamodi el
        fadja, di baxu (tipu di eru) pa riba.
  related_terms: semantics
  code_example: |
    numeros = [1, 2, 3]
    print(numeros[5])   # IndexError — Python ta mostra un traceback
  code_language: py
  slug: traceback
  context: intro-python
- term: syntax
  category: Coding
  translations:
    kea:
      local_term: syntax
      definition: >-
        Regras di kumo bu skrebe kódiku — a 'gramátika' di Python. Un eru di syntax ta para programa
        antis di kore.
  related_terms: semantics
  code_example: |
    print("Ola"   # eru di syntax — para programa antis di kore
  code_language: py
  slug: syntax
  context: intro-python
- term: semantics
  category: Coding
  translations:
    kea:
      local_term: semantics
      definition: >-
        Signifikadu di kódiku — o ki el ta faze kuandu ta kore. Kódiku pode ten syntax koretu ma
        semantics eradu (un eru di lójika).
  related_terms: syntax, traceback
  code_example: |
    # syntax koretu, ma semantics eradu (un eru di lójika)
    idadi = 20
    ta_pode_vota = idadi < 18
  code_language: py
  slug: semantics
  context: intro-python
- term: dynamic typing
  category: Coding
  translations:
    kea:
      local_term: tipu dinámiku
      definition: >-
        Un sistema unde tipu di un variável é diskubridu na momentu di izekusan i pode muda kuandu
        bu atribui un valor novu — ka presiza deklara-l antis.
  code_example: |
    valor = 5        # tipu: int
    valor = "sinku"  # tipu muda pa str — ka presiza deklara-l antis
  code_language: py
  slug: dynamic-typing
  context: intro-python
- term: condition
  category: Coding
  translations:
    kea:
      local_term: kondisan
      definition: >-
        Un expresan ki Python ta avalia kumo `True` ou `False` — pa izemplu idadi >= 18. É o ki un
        if ta verifika antis di disidi.
  related_terms: boolean
  code_example: |
    idadi = 20
    si idadi >= 18:
        print("Bu pode vota")
  code_language: py
  slug: condition
  context: intro-python
- term: boolean
  category: Coding
  translations:
    kea:
      local_term: boolean
      definition: >-
        Tipu di dadu ku dos valor só: True ou False. Tudu komparasan (==, >, <...) ta produzi un
        boolean.
  related_terms: condition
  code_example: |
    idadi = 20
    kondisan = idadi >= 18   # kondisan ta un boolean: True
  code_language: py
  slug: boolean
  context: intro-python
- term: iteration
  category: Coding
  translations:
    kea:
      local_term: iterasan
      definition: >-
        Un volta úniku di un loop — un pasaji pa bloku di kódiku ki ta repeti. Un loop ku 5 voltas
        ta faze 5 iterasons.
  related_terms: index
  code_example: |
    for i in range(5):
        print(i)   # 5 volta = 5 iterasons
  code_language: py
  slug: iteration
  context: intro-python
- term: index
  category: Coding
  translations:
    kea:
      local_term: índisi
      definition: >-
        Pozisan numérika di un elementu na un sekuénsia, ki ta kumesa na 0. Na ["a", "b"], "a" tene
        índisi 0 i "b" índisi 1.
  related_terms: iteration
  code_example: |
    letras = ["a", "b", "c"]
    print(letras[0])   # índisi 0
  code_language: py
  slug: index
  context: intro-python
- term: array
  category: Coding
  translations:
    kea:
      local_term: array
      definition: >-
        Un estrutura di dadus ki ta guarda un sekuénsia di objetus di mesmu tipu — kriadu ku módulu
        `array`, ku índisi i iterasan kumo un lista.
      body: >-
        Na Python, un **array** é un estrutura di dadus ki ta guarda un sekuénsia di objetus di
        mesmu tipu. Array ta pirmiti bu referensia múltiplu valoris ku un só variável, i es pode ser
        asesadu pa índisi i iteradu.


        Array é útil kuandu bu meste guarda un kuantidadi grandi di elementus di mesmu tipu, tal
        kumo `integers` ou `floats`, i meste faze operasons riba es di manera rápidu.


        Módulu `array` ta forni un funsan `array()` pa kria un array. Bu pode spesifika tipu di dadu
        ki array ta guarda dandu un kódiku di tipu, tal kumo `"i"` pa integers ou `"f"` pa floats.
        Kel-li ta garanti ki tudu elementu na array é di tipu spesifikadu, ki pode leva a operasons
        más rápidu.


        ## Example


        ```python

        import array


        # Kria un array di integers

        numeros = array.array("i", [1, 2, 3, 4, 5])

        print(numeros[0])           # 1


        numeros[1] = 7

        print(numeros)               # array('i', [1, 7, 3, 4, 5])


        numeros.append(6)

        print(numeros)               # array('i', [1, 7, 3, 4, 5, 6])


        numeros.remove(3)

        print(numeros)               # array('i', [1, 7, 4, 5, 6])

        ```
  related_terms: index, iteration
  code_example: |
    import array

    numeros = array.array("i", [1, 2, 3])
    numeros.append(4)   # array('i', [1, 2, 3, 4])
  code_language: py
  slug: array
  context: intro-python
