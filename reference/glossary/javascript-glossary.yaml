- term: Promise
  category: Frontend
  translations:
    kea:
      local_term: Promesa
      definition: Objetu ki ta reprezenta un operason asíkrunu ki inda ka kaba — pode resolvi ou falha
        más tardi.
      body: |
        Un **promise** (na kea, **promesa**) é un objetu di JavaScript ki ta reprezenta un operason **asíkrunu** — kel dizer, un operason ki ka ta kaba na mésmu momentu, tipu buska dadus na un servidor ou lei un fitxeru grandi. Un promesa ta reprezenta un valor ki inda ka izisti, ma ki ta prometi txiga más tardi: ou el ta **resolvi** ku susesu, ou el ta **rejeta** ku un eru.

        Antis di promise izisti, kódiku asíkrunu na JavaScript rasa ta uza *callbacks* aninhadu, ki fásilmenti fika difísil di lei ("callback hell"). Promise ta rezolvi kel problema ku dós métudu prinsipal: `.then()` pa trata kazu di susesu, i `.catch()` pa trata eru.

        Oji, sintaxi más moderna pa trabadja ku promise é `async`/`await`, ki ta permiti skrebe kódiku asíkrunu ki ta lei parsidu ku kódiku sikrunu normal — sen tantu `.then()` enkadeadu.

        Promise é sentral na JavaScript moderna pamodi txeu operason — buska dadus di un API, lei fitxeru, ou spera un tenpu — é naturalmenti asíkrunu.

        ## Example

        ```js
        fetch("/api/dadus")
          .then((r) => r.json())
          .then((d) => console.log(d))
          .catch((eru) => console.error(eru));
        ```
  related_terms: function
  code_example: |
    fetch('/api/dadus')
      .then(r => r.json())
      .then(d => console.log(d));
  code_language: js
  tags:
  - lang:JavaScript
  - topic:Asikronu
  - type:Konseitu
