- term: Loop
  category: Coding
  translations:
    kea:
      local_term: Siklu
      definition: Strutura ki ta ripiti un bloku di kódiku várias bes, sen bu skrebe-l ripitidu.
      body: |
        Un **loop** (na kea, **siklu**) é un strutura di kontrolu ki ta ripiti un bloku di kódiku várias bes, sen bu meste skrebe kel mésmu kódiku manualmenti pa kada ripitison. Loop é asi ki programador ta trata tarefa repetitivu — tipu percorre tudu elementu di un `array`, ou kontinua faze algu ti un kondison ser satisfeitu.

        Dós tipu di loop más uzadu na JavaScript é `for` i `while`. `for` é bon kantu bu dja sabe kuantu vês bu meste ripiti (ou kuantu elementu bu meste percorre); `while` é bon kantu bu ka sabe di antimon kuantu vês — el ta kontinua ti kondison fika `false`. Ezisti tanbê `for...of`, ki é un forma más limpu pa percorre kada elementu di un array diretamenti.

        Loop é un di es konseitu más fundamental na programason — kuazi tudu programa ki ta trata arrays, tabelas ou dadus repetitivu ta uza loop na algun momentu.

        ## Example

        ```js
        const frutas = ["banana", "manga", "koku"];

        for (const f of frutas) {
          console.log(f);
        }
        ```
  related_terms: array-javascript,function
  code_example: |
    for (const f of frutas) {
      console.log(f);
    }
  code_language: js
