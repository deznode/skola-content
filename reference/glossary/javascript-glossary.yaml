- term: Array
  category: Coding
  context: javascript
  translations:
    kea:
      local_term: array
      definition: Un koleson ordenadu di valoris, gardadu na un só variável i asesadu pa índisi (0, 1,
        2…).
      body: |
        Un **array** é un strutura di dadus ki ta guarda vários valoris djuntu, dentu di un só variável, na un ordi spesífiku. Kada valor dentu di un array ten un pozison ki ta txomadu **índisi**, i índisi ta kumesa na `0` — kel dizer ki primeru elementu di un array ta na índisi `0`, sigundu na índisi `1`, i asi pa diante.

        Array é un di es strutura di dadus más uzadu na programason, pamodi el ta permiti-bu organiza txeu informason relasionadu — tipu un lista di nomis, un lista di présus, ou un lista di rezultadu — sen bu meste kria un variável separadu pa kada un. Bu pode adisiona, tira, ou troka elementus dentu di un array, i bu pode percorre-l ku un `loop` pa trata kada elementu un pa un.

        Na JavaScript, array é flexível — el pode guarda vários tipu di dadu junto (número, testu, boolean) na mésmu array, i se tamanhu pode muda duranti o programa ta kore.

        ## Example

        ```js
        const frutas = ["banana", "manga", "koku"];
        console.log(frutas[0]); // "banana"
        frutas.push("papaia");   // adisiona un elementu novu
        console.log(frutas.length); // 4
        ```
  related_terms: loop,function
  code_example: |
    const frutas = ["banana", "manga", "koku"];
    console.log(frutas[0]); // "banana"
  code_language: js
  tags:
