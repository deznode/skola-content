  - topic:Strutura di Dadus
  - type:Konseitu
- term: Boolean
  category: Coding
  context: javascript
  translations:
    kea:
      local_term: boolean
      definition: 'Tipu di dadu ku dós valoris só: true (verdadi) ou false (falsu). Bazi di tudu lójika
        kondisional.'
      body: |
        Un **boolean** é un tipu di dadu ki sô pode ten dós valoris: `true` (verdadi) ou `false` (falsu). Nomi "boolean" ben di matemátiku George Boole, ki dizenvolve un sistema di lójika baziadu na kel dós valoris.

        Boolean é fundamental na programason pamodi el é kel ki ta permiti un programa toma disizon. Kada bes ki bu ta skrebe un kondison — tipu "si idadi é mas ki 18" — kel kondison ta ser avaliadu i ta volta un boolean: `true` ou `false`. Es valor ta uzadu dipos pa disidi ki kaminhu o programa debe sigui, tipiku dentu di un `if` ou un `loop`.

        Boolean ta ben tanbê di operason di komparason (`==`, `>`, `<`, `!=`) i di operadoris lójiku (`&&` pa "i", `||` pa "ou", `!` pa "ka"). Es operadoris ta kombina múltiplu kondison pa kria lójika más konplexu, tipu "si txobe I é fin di simana".

        ## Example

        ```js
        let txobe = true;
        let idadi = 20;
        let podeVota = idadi >= 18; // true

        if (txobe && podeVota) {
          console.log("Lebar gardachuba i bai vota");
        }
        ```
  related_terms: conditional
  code_example: |
    let txobe = true;
    if (txobe) { console.log("Lebar gardachuba"); }
  code_language: js
  tags:
  - lang:JavaScript
  - topic:Strutura di Dadus
  - type:Konseitu
- term: Conditional
  category: Coding
  translations:
    kea:
      local_term: Kondisional
      definition: Strutura (if / else) ki ta kore kódiku diferenti dipendi di un kondison ser verdadi
        ou falsu.
      body: |
        Un **conditional** (na kea, **kondisional**) é un strutura di kontrolu ki ta permiti un programa toma disizon — el ta kore un bloku di kódiku si un kondison é `true`, i (opsional) un otu bloku si kel kondison é `false`. Sen kondisional, tudu programa ta sô pode kore linha pa linha, sen nunka muda kaminhu.

        Forma más simples é `if`: "si es kondison é verdadi, kore es kódiku li". Bu pode adisiona `else` pa kobri kazu kontráriu, ou `else if` pa testa vários kondison na sekuénsia, un dipos di otu, ti ki un delis ser verdadi.

        Kondisional ta trabadja djuntu ku **boolean** — kada kondison dentu di un `if` ta ser avaliadu i ta volta `true` ou `false`. É pur isu ki kombinason di operadoris lójiku (`&&`, `||`, `!`) é asi importanti: es ta permiti bu skrebe kondison más riku, tipu "si tenpu sta bon I é fin di simana".

        Kondisional ta uzadu na kuazi tudu programa — di validason di formuláriu ti lójika di jogu ou sistema di rekomendason.

        ## Example

        ```js
        const idadi = 20;

        if (idadi >= 18) {
          console.log("Adultu");
        } else if (idadi >= 13) {
          console.log("Adolesenti");
        } else {
          console.log("Mininu");
        }
        ```
  related_terms: boolean-javascript
  code_example: |
    if (idadi >= 18) {
      console.log("Adultu");
    } else {
      console.log("Mininu");
    }
  code_language: js
  tags:
  - lang:JavaScript
  - topic:Fluxu di Kontrolu
  - type:Sintaxi
- term: Function
  category: Coding
  translations:
    kea:
      local_term: Funson
      definition: Bloku di kódiku reutilizável ki ta resebe entrada (argumentus) i pode volta un saída.
      body: |
        Un **function** (na kea, **funson**) é un bloku di kódiku ku un nomi, ki bu ta skrebe un bes sô i pode txoma quantu bes bu meste, sen bu meste ripiti kel mésmu kódiku txeu vês. Funson é un di es ferramenta más importanti pa manti kódiku organizadu i fásil di manti.

        Un funson pode resebe **argumentus** (ou **parámetrus**) — valoris di entrada ki el ta uza pa trabadja — i pode `return` un valor komu saída. Pur izemplu, un funson `soma(a, b)` ta resebe dós número i ta volta se soma, sen bu meste skrebe kel operason di novu kada bes ki bu meste soma dós kuza.

        Uza funson ta trazi txeu vantajen: kódiku fika más kurtu, más fásil di lei, i si bu meste troka komo un kálkulu ta funsiona, bu sô meste troka na un lugar — dentu di funson — en vez di kada lugar undi kel lójika ta ripiti.

        Na JavaScript, funson pode ser skrebedu di vários manera: `function soma(a, b) { ... }`, ou na forma más kurtu ku *arrow function*: `(a, b) => a + b`.

        ## Example

        ```js
        function soma(a, b) {
          return a + b;
        }

        console.log(soma(2, 3)); // 5
        ```
  related_terms: array-javascript,loop
  code_example: |
    function soma(a, b) {
      return a + b;
    }
    soma(2, 3); // 5
  code_language: js
