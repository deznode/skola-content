- term: floor division
  category: Coding
  translations:
    kea:
      local_term: divisan interu
      definition: Operador `//` ki ta faze divisan ma ta korta parti desimal — `7 // 2` é `3`, ka `3.5`.
      body: >-
        Divisan interu é un operasan aritmétika ki ta uza operador `//` (dos barras) pa faze
        divisan, mas ta tira parti desimal di rezultadu. Enves di ba dá un númeru ku pontu desimal
        kumo `/` normal, `//` ta guarda só parti interu — kel kosienti ki bu ta prende na skola
        primaria.


        Pur izemplu, `7 // 2` ta da `3` (ka `3.5`), i `10 // 3` ta da tanbe `3`. Es é diferenti di
        divisan normal ku `/`, ki senpri ta retorna un float — `10 / 5` ta da `2.0`, mas `10 // 5`
        ta da `2` (un interu).


        Es operador é útil kuandu bu meste sabi "kuantas vezis un valor ta kabi dentu di otu", sen
        bu importa ku sobra. Pur izemplu, pa kalkula kuantas notas di 100 ECV ta kabi na un troku,
        ou pa dividi un grupu di pesoas na ekipas iguais. Ten un dutalhu importante: ku númerus
        negativus, `//` ta aredonda pa **baxu**, ka pa zeru — `-7 // 2` ta da `-4`, ka `-3`.


        ## Izemplu


        ```python

        # Kalkula kuantas notas di 100 ECV ku sobra

        troku = 250

        notas_100 = troku // 100   # 2 notas di 100

        restu = troku % 100        # 50 ECV sobra

        print(f"{notas_100} nota(s) di 100 ECV i {restu} ECV na moeda")


        # Kompara ku divisan normal

        print(7 // 2)    # 3   (tira desimal)

        print(7 / 2)     # 3.5 (senpri float)

        print(-7 // 2)   # -4  (aredonda pa BAXU, ka pa zeru!)

        ```
  slug: floor-division
  context: intro-python
  provenance: suggested
