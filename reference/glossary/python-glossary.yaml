- term: __eq__
  category: Coding
  translations:
    kea:
      local_term: __eq__
      definition: >-
        Metodu majiku ki ta defini konportamentu di `==` — sen el, Python ta kompara pa identidadi
        (mesmu objetu na memória), ka pa valor.
      body: >-
        `__eq__` é un **metodu majiku** (ou *dunder*, di "double underscore") ki ta defini o ki ta
        kontise kuandu bo uza operador `==` ku objetis di bu klasi. Kuandu bo skrebe `a == b`,
        Python na verdadi ta txoma `a.__eq__(b)` pa trás di ceña. Sen es metodu, Python ka sabe kumo
        kompara dos objetis di un klasi personalizadu pa **valor**, entaun el ta uza konportamentu
        di *default*: kompara pa **identidadi** — istu é, verifika si é literalmenti *mesmu objetu*
        na memória.


        Es diferensa entri identidadi i igualdadi é fundamental. Dos pontus `Pontu(2, 3)` i
        `Pontu(2, 3)` tene *mesmu valor*, ma es é objetis diferenti na memória — kada `Pontu(...)`
        ta kria un novu objetu. Pa Python trata-s komu iguais, bo ten ki xina-l o ki "igual"
        signifika pa bu tipu, definindu `__eq__`. Normalmenti, bo ta kompara os atributus ki ta
        importa: pa un `Pontu`, é `x` i `y`; pa un `Dineru`, é `montanti`; pa un `Utilizador`,
        talvez seria `id` ou `email`.


        Un boa prátika é verifika tipu ku `isinstance()` antis di kompara, i retorna
        `NotImplemented` (ka konfundi ku `NotImplementedError`) si tipu ka é kompatível. Es ta
        permiti Python tenta operasan na otru ladu antis di disidi ki dos objetis é diferenti.
        Tanbe, kuandu bo defini `__eq__`, é kustumi bon defini `__hash__` tanbe si bu ken uza bu
        objetis komu txabis di dicionáriu ou dentu di `set` — si ka, Python ta faze bu klasi
        *unhashable* automátikamenti.


        ## Example


        Sen `__eq__`, Python ta kompara pa identidadi:


        ```python

        class Pontu:
            def __init__(self, x, y):
                self.x = x
                self.y = y

        p1 = Pontu(2, 3)

        p2 = Pontu(2, 3)


        print(p1 == p2)   # False — é objetis diferenti na memória

        print(p1 == p1)   # True — mesmu objetu

        ```


        Ku `__eq__`, nu ta xina Python kompara pa valor:


        ```python

        class Pontu:
            def __init__(self, x, y):
                self.x = x
                self.y = y

            def __eq__(self, otru):
                if not isinstance(otru, Pontu):
                    return NotImplemented
                return self.x == otru.x and self.y == otru.y

        p1 = Pontu(2, 3)

        p2 = Pontu(2, 3)

        p3 = Pontu(5, 5)


        print(p1 == p2)          # True — mesmu valor

        print(p1 == p3)          # False

        print(p1 == "Pontu(2,3)") # False — Python ta trata ku NotImplemented

        ```


        Un vantaji óktima: `__eq__` ta faze `in` funsiona ku listas tanbe, purki `list.__contains__`
        ta uza `==` pa trás:


        ```python

        pontus = [Pontu(1, 1), Pontu(2, 3), Pontu(4, 5)]

        print(Pontu(2, 3) in pontus)   # True — sen __eq__, seria False

        ```
  slug: eq
  context: intro-python
  provenance: suggested
- term: NotImplemented
  category: Coding
  translations:
    kea:
      local_term: NotImplemented
      definition: >-
        Valor spesial ki un metodu majiku pode retorna pa dizi Python 'ka sabe faze es operasan',
        permitindu ki Python tenta otu alternativa.
      body: >-
        `NotImplemented` é un valór spesial di Python — un konstante úniku, sima `None` ou `True` —
        ki metodus majiku di operadoris (sima `__add__`, `__eq__`, `__lt__`) pode retorna pa dizi
        Python: "nha ka sabe faze es operasan ku es tipu di objetu". Ka é un eru nen un exception —
        é un sinal ki Python ta uza pa disidi si deve tenta un alternativa antis di dizisti.


        Kuandu bu skrebe `a + b`, Python primeru ta txoma `a.__add__(b)`. Si es metodu retorna
        `NotImplemented`, Python ka ta paniká — es ta tenta `b.__radd__(a)` (adisan reversu). Si es
        dos retorna `NotImplemented`, sí Python ta lansa un `TypeError` automátikamenti ku un
        mensajen klaru. Es mekanismu ta permiti ki tipus diferenti kolabora: pur izemplu, si bu
        klasi `Dineru` ka sabe soma ku un string, es pode dizi "nha ka sabe" en ves di lansa un eru
        diretamenti, i Python ta trata restu.


        É importanti ka konfundi `NotImplemented` (valór ki bu ta **retorna**) ku
        `NotImplementedError` (exception ki bu ta **lansa** kuandu un metodu abstratu inda ka foi
        implementadu). Es dos tene nomis parizidu ma finalidadis totalmenti diferenti. Tanbe,
        **nunka** uza `raise NotImplemented` — es ka é un exception i ta kausa konfuzan. Uza-l
        sempri ku `return`.


        Un bon prátika é: na metodus majiku, verifika tipu ku `isinstance()`, i si tipu ka é
        kompatível, retorna `NotImplemented`. Es ta faze bu klasi konporta sima tipus di Python —
        flexível i previzível.


        ## Izemplu


        Kumesa ku un vershon ki ka uza `NotImplemented` — funsiona, ma ta lansa eru konfuzu:


        ```python

        class Dineru:
            def __init__(self, montanti):
                self.montanti = montanti

            def __add__(self, otru):
                # Ka verifika tipu — asumi ki otru sempri tene .montanti
                return Dineru(self.montanti + otru.montanti)

        presu = Dineru(500)

        print(presu + "grogu")

        # AttributeError: 'str' object has no attribute 'montanti'

        # ↑ Eru konfuzu — ka ta splika ki problema é di tipu inkompatível

        ```


        Gosi ku `NotImplemented`, Python ta dá un eru más klaru i útil:


        ```python

        class Dineru:
            def __init__(self, montanti):
                self.montanti = montanti

            def __add__(self, otru):
                if isinstance(otru, Dineru):
                    return Dineru(self.montanti + otru.montanti)
                return NotImplemented  # "Nha ka sabe soma ku es tipu"

        presu = Dineru(500)

        print(presu + "grogu")

        # TypeError: unsupported operand type(s) for +: 'Dineru' and 'str'

        # ↑ Mensajen klaru — Python ta splika o ki sta mal

        ```


        I atenson: ka konfundi ku `raise`. Es é eru komun:


        ```python

        def __add__(self, otru):
            if not isinstance(otru, Dineru):
                raise NotImplemented  # ❌ ERADU! NotImplemented ka é exception
            return Dineru(self.montanti + otru.montanti)

        # Forma korretu:

        def __add__(self, otru):
            if not isinstance(otru, Dineru):
                return NotImplemented  # ✅ Retorna, ka lansa
            return Dineru(self.montanti + otru.montanti)
        ```
  slug: notimplemented
  context: intro-python
  provenance: suggested
- term: '@dataclass'
  category: Coding
  translations:
    kea:
      local_term: '@dataclass'
      definition: >-
        Dekorador di Python ki ta jera automátikamenti `__init__`, `__repr__` i `__eq__` pa klasis
        ki prinsipal objetivu é garda dadus.
      body: >-
        `@dataclass` é un dekorador ki ben na módulu `dataclasses` di biblioteka padrón di Python
        (dizde versan 3.7). Kuandu bu ponha-l na riba di un klasi, Python ta jera automátikamenti
        metodus komuns kuma `__init__`, `__repr__` i `__eq__` baziadu na anotasons di tipu ki bu
        diklara pa kada kanpu. Isu ta livra-bu di skrebe kódiku repetitivu (boilerplate) tudu bes ki
        bu kria un klasi ki prinsipal funson é simplismenti garda dadus.


        Prátikamenti, `@dataclass` ta lé kada atributu ki bu diklara na korpu di klasi ku un
        anotason di tipu (kuma `nomi: str`) i ta uza es pa konstrui un konstrutor ki ta aseita es
        kanpus na mesmu órdi, un `__repr__` ki ta mostra tudu es valoris di forma legível, i un
        `__eq__` ki ta kompara duz objetu pa valór di ses kanpus (i ka pa identidadi na memória). Es
        é útil sobretudu pa klasis di modelu di dadus — kuma un `Estudanti`, `Produtu`, `Kontatu` ou
        `Koordenada` — undi bu ta kre trata objetus más kuma "registus" di ki kuma máquinas ku
        lójika kompleksu.


        O dekorador ta aseita várius opsons ki ta konfigura ses konportamentu. `frozen=True` ta faze
        o objetu imutável (ka bu pode muda ses kanpus dipos di kriason, o ki ta permite tanbe uza-l
        na `set` ou kuma txabi di `dict`). `order=True` ta jera metodus di komparason (`<`, `<=`,
        `>`, `>=`) baziadu na órdi di kanpus, o ki ta permite `sorted()` funsiona diretamenti. Pa
        kanpus ku valoris padrón mutável (kuma listas ou disionárius), bu ten ki uza
        `field(default_factory=list)` en vez di `= []`, pamodi Python ta partilha o mesmu objetu
        entri tudu instánsias si bu uza un valór padrón mutável diretamenti.


        Un ponto inportanti: `@dataclass` ka ta limita-bu. Bu pode adisiona bu propriu metodus
        normalmenti, i mesmu sobreskrebe metodus jeradu (kuma `__str__` ou `__eq__`) simplismenti
        diklarandu-s manualmenti na klasi. Pa klasis ku mutu lójika kompleksu, un klasi tradisionál
        pode ser más klaru; mas pa modelus di dadus, `@dataclass` é kuazi senpri o kaminhu más
        limpu.


        ## Examples


        Uzu báziku — trés linha ta substitui dúzia di linhas di boilerplate:


        ```python

        from dataclasses import dataclass


        @dataclass

        class Produtu:
            nomi: str
            presu: float
            kuantidadi: int = 1

        katxupa = Produtu("Katxupa", 350)

        print(katxupa)              # Produtu(nomi='Katxupa', presu=350, kuantidadi=1)

        print(katxupa == Produtu("Katxupa", 350))  # True

        ```


        Un eru komun é uza un lista (ou otru objetu mutável) diretamenti kuma valór padrón:


        ```python

        from dataclasses import dataclass


        @dataclass

        class Karrinhu:
            itens: list = []   # ❌ ValueError: mutable default...
        ```


        O Python ta rejeita es kódiku pa evita un bug súbtil undi tudu instánsias partilhaba o mesmu
        lista. A solusan é uza `field(default_factory=...)`:


        ```python

        from dataclasses import dataclass, field


        @dataclass

        class Karrinhu:
            itens: list = field(default_factory=list)

        k1 = Karrinhu()

        k2 = Karrinhu()

        k1.itens.append("pon")

        print(k1.itens)  # ['pon']

        print(k2.itens)  # []  — kada instánsia ten se propriu lista

        ```


        Finalmenti, `frozen=True` ta kria objetus imutável, ideal pa valoris kuma koordenadas ou
        konfigurason:


        ```python

        from dataclasses import dataclass


        @dataclass(frozen=True)

        class Koordenada:
            latitude: float
            longitude: float

        praia = Koordenada(14.9195, -23.5087)

        # praia.latitude = 0.0  # ❌ FrozenInstanceError

        ```
  slug: dataclass
  context: intro-python
  provenance: suggested
- term: frozen
  category: Coding
  translations:
    kea:
      local_term: frozen
      definition: >-
        Parámetru di `@dataclass` ki ta faze un dataclass imutável — atributus ka pode ser
        modifikadu dipos di kriasan.
      body: >-
        `frozen` é un parámetru di dekorador `@dataclass` ki, kandu bu meti-l komu `True`, ta
        transforma bu dataclass na un objetu **imutável** — kuma dizê, kandu instânsia ja é kriadu,
        ninhun di sê atributus ka pode ser modifikadu. Si algen tenta atribui un valor novu pa un
        kampu (ex: `objetu.kampu = valor`), Python ta lansa un `FrozenInstanceError` (ki é un
        subklasi di `AttributeError`).


        Es kunportamentu é útil kandu bu ta modela dadus ki, pa lójika di programa, ka deve muda
        dipos di ser kriadu — kuma koordenadas jeográfiku, konfigurasons, txavis di autentikasan, ou
        kualker "valor" ki ta rapresenta un fatu fixu. Objetus imutável tene vantaji: es é más
        siguru na kódiku konkorrenti (multiplu threads ka pode korruptá-l), es é más fáxi di razuá
        sobri (bu ta sabe ki valor ka ta muda), i es ta funsiona ben komu txavi di disionáriu ou
        elementu di `set`, pamodi Python ta jera un `__hash__` automátiku pa dataclass frozen (o ki
        ka ta kontise ku dataclass normal).


        Ten un nuansa importanti: `frozen=True` ta previne **rebinding** di atributus, ma si un
        kampu ta konté un objetu mutável (kuma un lista ou disionáriu), o kontiudu di es objetu
        ainda pode ser modifikadu. Imutabilidadi é "sobri" a dataclass, ka é rekursivu. Pa ten un
        imutabilidadi kompletu, uza tipus imutável kuma `tuple` ou `frozenset` pa es kampus.


        ## Ezemplus


        Uzu bázisu — kria un koordenada ki ka pode muda:


        ```python

        from dataclasses import dataclass


        @dataclass(frozen=True)

        class Koordenada:
            latitude: float
            longitude: float

        praia = Koordenada(14.9195, -23.5087)

        print(praia)  # Koordenada(latitude=14.9195, longitude=-23.5087)

        ```


        Si bu tenta modifiká-l, Python ta lansa un eru:


        ```python

        praia.latitude = 0.0

        # dataclasses.FrozenInstanceError: cannot assign to field 'latitude'

        ```


        Un vantaji di objetus frozen é ki es pode ser uzadu komu txavi di disionáriu ou elementu di
        `set`, pamodi es ten un hash konsistenti:


        ```python

        lokalizasons = {
            Koordenada(14.9195, -23.5087): "Praia",
            Koordenada(16.8901, -24.9821): "Mindelo",
        }

        print(lokalizasons[Koordenada(14.9195, -23.5087)])  # Praia

        ```


        Kuidadu ku kampus mutável — imutabilidadi ka é rekursivu:


        ```python

        @dataclass(frozen=True)

        class Perfil:
            nomi: str
            tags: list  # ⚠️ lista é mutável!

        p = Perfil("Maria", ["python", "web"])

        # p.nomi = "Ana"        # ❌ Eru — frozen ta bloki

        p.tags.append("ai")     # ✅ Funsiona — ta muda kontiudu di lista

        print(p.tags)           # ['python', 'web', 'ai']

        ```


        Pa evita es problema, uza `tuple` na lugar di `list`:


        ```python

        @dataclass(frozen=True)

        class Perfil:
            nomi: str
            tags: tuple = ()

        p = Perfil("Maria", ("python", "web"))

        # Gosi kontiudu tanben ka pode muda — tuple é imutável.

        ```
  slug: frozen
  context: intro-python
  provenance: suggested
