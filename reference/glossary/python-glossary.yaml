- term: range()
  category: Coding
  translations:
    kea:
      local_term: range()
      definition: >-
        Funsan built-in ki ta jera un sekuénsia di númerus — `range(start, stop, step)`; `stop` ka é
        inkluidu.
      body: >-
        `range()` é un funsan inkorporadu di Python ki ta jera un sekuénsia di númerus. El é uzadu
        txeu ves djuntu ku `for` loop pa repeti un bloku di kódiku un kuantidadi spesífiku di bez.
        En bez di skrebe kada númeru un pa un, bu ta pidi Python jera-s pa bo.


        Sintaxi kompletu é `range(start, stop, step)`, i el ta aséita 1, 2 ou 3 argumentus. Ku un
        argumentu (`range(5)`), el ta kumesa senpri na `0`. Ku dos (`range(1, 6)`), primeru é undi
        ki ta kumesa i segundu é undi ki ta para. Ku tres, terseru é **step** (saltu) — kuantu ki ta
        pula di kada bes, i el pode ser negativu pa konta pa trás.


        Un koza importanti pa lembra: valor di `stop` **ka** ta entra na sekuénsia. Pur izemplu,
        `range(1, 5)` ta dá `1, 2, 3, 4` — nunka `5`. Es é un eru komun (off-by-one): pa inklui `5`,
        bu ten ki skrebe `range(1, 6)`.


        ## Example


        ```python

        # range(stop) — kumesa senpri na 0

        for i in range(5):
            print(i)          # 0, 1, 2, 3, 4

        # range(start, stop)

        for i in range(1, 6):
            print(i)          # 1, 2, 3, 4, 5

        # range(start, stop, step)

        for i in range(0, 10, 2):
            print(i)          # 0, 2, 4, 6, 8

        # Kontajen disendenti (step negativu)

        for i in range(10, 0, -1):
            print(i)          # 10, 9, ... , 1
        ```
  slug: range
  context: intro-python
  provenance: suggested
- term: break
  category: Coding
  translations:
    kea:
      local_term: break
      definition: Instruson ki ta termina un loop imediatamenti, mesmu si kondisan ainda é `True`.
      body: >-
        `break` é un instruson di kontrolu di fluxu ki ta termina un loop imediatamenti. Kuandu
        Python ta enkontra `break` dentu di un loop, el ta sai di kel loop na ora, mesmu si kondisan
        di `while` ainda é `True` ou si ainda tene más elementus pa itera nun `for`.


        Es instruson é útil kuandu bu atxa kel ki bu sta buska ou kuandu bu ka presiza kontinua
        repetison. Por izemplu, na un `while True:` (loop ki ta pareseba infinitu), `break` é kel
        forma di sai kuandu un kondisan spesífiku ta akontesi.


        Kuandu bu uza `break` dentu di loops aninhadu, el ta sai só di loop más internu — loop di
        fora ta kontinua normalmenti. Tanbe, si un `for` loop termina ku `break`, un bloku `else`
        ligadu na kel loop **ka** ta kore — es é utilizadu na padruns di buska.


        ## Example


        ```python

        # Buska primeru numeru divisível pa 7

        for i in range(1, 100):
            if i % 7 == 0:
                print(f"Primeru divisível pa 7: {i}")
                break
        # Saída: Primeru divisível pa 7: 7

        ```
  slug: break
  context: intro-python
  provenance: suggested
- term: continue
  category: Coding
  translations:
    kea:
      local_term: continue
      definition: Instruson ki ta pula restu di iterasan atual di un loop i ta bai pa próksima iterasan.
      body: >-
        `continue` é un instruson di kontrolu di fluxu ki ta uzadu dentu di loops (`for` ou
        `while`). Kuandu Python ta topa ku `continue`, el ta **pula restu di kódiku di iterasan
        atual** i ta salta dirétamenti pa próksima iterasan di loop. Loop ka ta para — el ta
        simplesmenti ignora liñas ki ben dipos di `continue` na kel volta.


        Kel li é diferenti di `break`, ki ta termina loop kompletamenti. Ku `continue`, loop ta
        kontinua ta kore normalmenti, ma kel iterasan spesífiku ta ser "pulada" apartir di ponta
        undi `continue` sta. É útil kuandu bu kre ignora sertus valoris (pur izemplu, numerus par)
        sen preja kontinuason di loop.


        Uzu típiku é djuntu ku un `if`: si kondisan é verdadi, `continue` ta pula pa próksimu
        elementu, senan kódiku ki ben dipos ta kore normalmenti.


        ## Example


        ```python

        # Mostra só numerus ímpar di 1 a 10

        for i in range(1, 11):
            if i % 2 == 0:
                continue       # Pula numerus par
            print(i)
        # Saída: 1, 3, 5, 7, 9

        ```


        Na es izemplu, kuandu `i` é par, `continue` ta pula `print(i)` i ta bai dirétamenti pa
        próksima iterasan — nton só numerus ímpar ta ser mostradu.
  slug: continue
  context: intro-python
  provenance: suggested
- term: enumerate()
  category: Coding
  translations:
    kea:
      local_term: enumerate()
      definition: >-
        Funsan built-in ki ta itera sobri un sekuénsia i ta da índisi + valor djuntu — más Pythonic
        ki `range(len(lista))`.
      body: >-
        `enumerate()` é un funsan built-in di Python ki ta iterá sobri un sekuénsia (kumo un lista)
        i, na kada volta, ta da dos koizas djuntu: **índisi** (pozisan) i **valor**. Es é xeiu más
        Pythonic ki uza `range(len(lista))` kuandu bu meste sabé tantu pozisan komu konteúdu.


        Na lisan di strings, `enumerate()` ta aparese nun izemplu prátiku pa numera itens di un
        lista di kompras. Repara ma bu pode pasa un segundu argumentu — un númeru — pa ndika di undi
        ki kontaji ta kumesa (padran é 0, ma xeiu di bez bu kre kumesa na 1 pa mostra pa
        utilizador).


        Es funsan ta ben aprofundadu na Lisan 18; na kontestu di strings i formatasan, so meste
        kompriende ma `for i, iten in enumerate(itens, 1)` ta da bo dos variáveis na kada volta: `i`
        ku poziban i `iten` ku valor.


        ## Example


        ```python

        kompras = input("Skrebe bo lista di kompras (separadu pa vírgula): ")

        itens = kompras.split(",")


        print("Bo lista di kompras:")

        for i, iten in enumerate(itens, 1):
            print(f"  {i}. {iten.strip()}")
        ```
  slug: enumerate
  context: intro-python
  provenance: suggested
- term: list
  category: Coding
  translations:
    kea:
      local_term: list
      definition: Un kolesan ordenadu i mutável ki ta guarda kualker tipu di dadus, definidu ku kolxetis `[]`.
      body: >-
        Na Python, un **list** é un kolesan ordenadu di itens ki nu ta guarda djuntu drentu di
        kolxetis `[]`. Kada iten ta sipara ku vírgula, i list pode ten kualker tipu di dadus — textu
        (strings), númerus, ou mesmu otus lists.


        Kuze ki ta faze list spesial é ki el é **ordenadu** (kada iten ten un pozison fixu) i
        **mutável** (bu pode adisiona, tira, ou muda itens dipos ki bu kria-l). Es é razan ki lists
        é un di ferramentas más uzadu na Python pa organiza dadus.


        Na kontextu di prugramas real, list ta sirbi pa guarda kuzas kumo un lista di nomis, un
        lista di presus, ou un lista di turistas ki ta xiga na un ilha — kualker koleksan di valoris
        ki ta pertense djuntu.


        ## Example


        ```python

        turistas = ["Ana", "Pedro", "Carla"]

        ilha = "Sal"


        for turista in turistas:
            print(f"Ben-vindu a {ilha}, {turista}! Morabeza!")
        ```


        Na es izemplu, `turistas` é un list ku trê strings. Ku kolxetis `[]` nu ta kria list-la, i
        dipos nu pode pasa pa kada iten un pa un.
  slug: list
  context: intro-python
  provenance: suggested
- term: mutable
  category: Coding
  translations:
    kea:
      local_term: mutável
      definition: >-
        Un objetu ki pode ser modifikadu dipos di kriadu — listas, disionárius i konjuntus é
        mutável.
      body: >-
        Na Python, un objetu **mutável** é un ki bu pode modifiká dipos ki bu kriá-l — sen presizá
        kriá un novu. Izemplu di tipus mutável na Python é listas, disionárius i konjuntus: bu pode
        adisiona, tira ou muda elementus dentu deles sen problema.


        Ma atenson: **string ka é mutável** — string é *imutável*. Kel-li é un ponto importanti ki
        ta konfundi mutu prinsipianti. Kuandu bu ta uza métodus di string kumo `.upper()`,
        `.strip()` ou `.replace()`, es NUNKA ta muda string original — es ta retorna un string novu.
        Si bu kre guarda kel novu valor, bu ten ki atribuí-l a un variável.


        Es distinson entri mutável i imutável é fundamental na Python: ta afeta kumo bu ta trabadja
        ku dadus, o ki bu pode muda diretamenti, i o ki bu ten ki reatribuí.


        ## Example


        ```python

        # String é IMUTÁVEL — metodu ka ta muda original

        saudasan = "ola mundu"

        saudasan.upper()        # retorna "OLA MUNDU" ma ka ta guarda

        print(saudasan)         # "ola mundu" — mesmu koisa!


        # Pa guarda mudansa, bo ten ki atribui:

        saudasan = saudasan.upper()

        print(saudasan)         # "OLA MUNDU"

        ```
  slug: mutable
  context: intro-python
  provenance: suggested
- term: list comprehension
  category: Coding
  translations:
    kea:
      local_term: list comprehension
      definition: Sintaxi konpakta pa kria un lista nova ku `[espresan for item in iterável if kondisan]`.
      body: >-
        List comprehension é un sintaxi konpaktu di Python ki ta permiti kria un lista nova a partir
        di un otu iterável (lista, `range`, string, etc.) na un só linia. Formatu jeral é `[espresan
        for item in iterável if kondisan]`: `item` ta toma kada valor di iterável, `espresan` ta
        difini o ki ta entra na lista nova, i `if kondisan` (opsional) ta filtra kuais elementus ki
        ta pasa.


        E é ekivalenti a un loop `for` ki ta usa `.append()`, ma más kurtu i más lejível kuandu bu
        meste **transforma** ou **filtra** dadus. Alen di menus liñas, comprehension ta ser tanbe un
        poku más rápidu ki loop tradisional na maior parti di kazu, pamodi Python ta otimiza-l
        internamenti. E ta ser úzadu txeu na kódigu real: konverti tipus, extrai kanpus di un lista
        di disionárius, aplika un funsan a kada elementu, ó fika só ku elementus ki satisfaz un
        kondisan.


        Nuansi inportanti: comprehension ta senpri kria un **lista nova** — e ka ta muda o iterável
        orijinal. Si bu kondisan é kunplikadu ó bu ten txeu loops aninhadu dentu, tradisional loop
        `for` normalmenti ta ser más klaru — usa comprehension kuandu e ta kaba ta ser lejível, ka
        pa mostra ki bu sabi. Ten tanbe primus di comprehension pa otus estruturas: `{...}` pa
        set/dict comprehension i `(...)` pa un generator, ki ta segi mesmu ideia.


        ## Ezemplus


        Kumesa ku o pardran básiku — transforma kada elementu:


        ```python

        # Kuadradu di kada númeru di 1 a 5

        kuadradus = [n ** 2 for n in range(1, 6)]

        print(kuadradus)  # [1, 4, 9, 16, 25]

        ```


        Aumenta un filtru ku `if` pa fika só ku o ki bu kre:


        ```python

        notis = [85, 62, 78, 95, 55, 88]


        # Só notis >= 70, konvertidu pa string ku "%"

        aprovadus = [f"{n}%" for n in notis if n >= 70]

        print(aprovadus)  # ['85%', '78%', '95%', '88%']

        ```


        Un eru kumun é troka orden di `if` ku `for` — Python ta izigi `for` promeru, dipos `if`:


        ```python

        # ERADU — SyntaxError

        # pares = [n if n % 2 == 0 for n in range(10)]


        # KORETU — filtru na fin

        pares = [n for n in range(10) if n % 2 == 0]

        print(pares)  # [0, 2, 4, 6, 8]

        ```


        Nota: `n if kondisan else otu` **é** válidu, ma na parti di **espresan** (na inísiu), ka
        kumo filtru. Ezenplu: `[n if n % 2 == 0 else 0 for n in range(5)]` ta da `[0, 0, 2, 0, 4]` —
        li ta troka valoris ínpar pa `0` en vez di filtra-s fora.
  slug: list-comprehension
  context: intro-python
  provenance: suggested
- term: tuple
  category: Coding
  translations:
    kea:
      local_term: tuple
      definition: >-
        Un kolesan ordenadu i imutável ki ta guarda kualker tipu di dadus, definidu ku paréntesis
        `()`.
      body: >-
        Un **tuple** é un kolesan ordenadu di elementus, similar ku un lista, ma ku un diferensa
        importanti: é **imutável** — kel ki ta signifika ki dipos di bu kria un tuple, bu ka pode
        muda se elementus, ka pode adisiona nen ka pode remove.


        Diferenti di listas ki ta uza kolxetis `[]`, tuples ta uza paréntesis `()`. El pode guarda
        kualker tipu di dadu — strings, númerus, booleans, ó mistura di tudu.


        Na lisan di listas, tuples ta parese kumo un ponto di kontrasti: listas é mutável (bu pode
        muda dipos di kria), ma tuples, sima strings, é imutável. Kel li ta faze tuples útil kuandu
        bu kre garanti ki un kolesan di valoris ka ta muda duranti bu prugrama.
  slug: tuple
  context: intro-python
  provenance: suggested
- term: packing
  category: Coding
  translations:
    kea:
      local_term: packing
      definition: >-
        Kriasan otomátika di un tuple kuandu bu separa valores ku vírgula — `p = "Ana", 25` ta kria
        un tuple.
      body: >-
        **Packing** é un fitura di Python ki ta permiti kria un tuple otomátikamenti só ku separa
        valores ku vírgula, sen presiza di paréntesis. Kuandu Python odja múltiplus valores separadu
        ku vírgula na un atribuison, el ta "enpakota" es tudu djuntu na un tuple.


        Kel-li ta torna kódigu más limpu i más legível, prinsipalmenti kuandu bu ten ki djunta
        poukus valores relasionadu ou retorna múltiplus valores di un funson. Na verdadi, tudu bez
        ki un funson python ta retorna "múltiplus valores", el ta uza packing pa metede-s tudu na un
        tuple.


        Packing ta traba djuntu ku se opostu, **unpacking**, pa forma un di padrons más elegantis di
        Python pa traba ku múltiplus valores di un bez.


        ## Example


        ```python

        # Python ta kria tuple automátikamente kuandu bo separa valores ku vírgula

        pessoa = "Cesária", 78, "São Vicente"

        print(pessoa)        # ('Cesária', 78, 'São Vicente')

        print(type(pessoa))  # <class 'tuple'>


        # Funson ta retorna múltiplus valores (na verdadi é tuple!)

        def kalkula_estatistika(notas):
            return min(notas), max(notas), sum(notas) / len(notas)

        resultado = kalkula_estatistika([85, 92, 78, 95, 88])

        print(resultado)  # (78, 95, 87.6)

        ```
  slug: packing
  context: intro-python
  provenance: suggested
- term: unpacking
  category: Coding
  translations:
    kea:
      local_term: unpacking
      definition: >-
        Atribuisan di kada elementu di un tuple ou lista a variáveis separadu — `nomi, idadi =
        pesoa`.
      body: >-
        **Unpacking** é un manera eleganti di ta atribui kada elementu di un tuple (ou lista) a
        variáveis separadu, tudu na un só linha. Envés di asesa elementus un pa un ku índisis
        (`pessoa[0]`, `pessoa[1]`...), Python ta permiti-nu "dezenpakota" tudu di un bez, dandu nomi
        klaru a kada valor.


        Kel-la ta funsiona kuandu bu tene ki mesmu kantidadi di variáveis na eskerda kumu ten
        elementus na tuple na direta. Kada variável ta pega valor na su pozisan korrespondenti. Ta
        uza-du txeu kuandu un funsan ta retorna múltiplus valores, ou pa troka valores di dos
        variáveis sen presiza di un variável temporáriu (`a, b = b, a`).


        Ten tanbe un versan más flexível: **star unpacking** ku `*`, ki ta permiti pega un "restu"
        di elementus kumu lista, kuandu bu ka sabi ezatamenti kantus valores tene ou kuandu bu só
        interesa na alguns pozisons spesífiku.


        ## Example


        ```python

        # Atribui kada elementu a un variável separadu

        pessoa = ("João", 25, "Praia")

        nomi, idadi, sidadi = pessoa

        print(nomi)    # João

        print(idadi)   # 25

        print(sidadi)  # Praia


        # Troka valores sen variável temporáriu

        a = "Praia"

        b = "Mindelo"

        a, b = b, a

        print(a)  # Mindelo

        print(b)  # Praia


        # Star unpacking — pega "restu" kumu lista

        numeros = (1, 2, 3, 4, 5, 6, 7, 8)

        primeiru, *meiu, ultimu = numeros

        print(primeiru)  # 1

        print(meiu)      # [2, 3, 4, 5, 6, 7]

        print(ultimu)    # 8

        ```
  slug: unpacking
  context: intro-python
  provenance: suggested
- term: star unpacking
  category: Coding
  translations:
    kea:
      local_term: star unpacking
      definition: >-
        Uzu di `*` pa apanha vários elementus kumo un lista duranti unpacking — `primeru, *restu =
        numeros`.
      body: >-
        Star unpacking é un funsionalidadi di Python ki ta permiti-u uza `*` na frenti di un
        variável duranti unpacking pa apanha "restu" di elementus kumo un lista. Isu é útil kuandu
        bu ka sabe ezatamenti kantu elementus tuple ou lista ta tene, ma bu kre separa alguns
        elementus spesífikus di restu.


        Kuandu bu poi `*` na frenti di un nomi di variável na un atribuisan, kel variável ta reseve
        **tudu elementus ki sobra** kumo un lista (ka un tuple, mesmu ki oríjen sedu un tuple). Bu
        pode poi kel `*` na komesu, na meiu, ou na fin — Python ta descubri sózin kal elementus ta
        pertense a kada variável.


        Isu ta faze kódigu más flexível i más limpu, prinsipalmenti kuandu bu ta prosesa dadus ki
        ten un strutura konxidu na komesu ou fin, ma un kantidadi variável di elementus na meiu.


        ## Example


        ```python

        numeros = (1, 2, 3, 4, 5, 6, 7, 8)


        # Primeiru i restu

        primeiru, *restu = numeros

        print(primeiru)  # 1

        print(restu)     # [2, 3, 4, 5, 6, 7, 8] (nota: é lista!)


        # Primeiru, últimu, i meiu

        primeiru, *meiu, ultimu = numeros

        print(primeiru)  # 1

        print(meiu)      # [2, 3, 4, 5, 6, 7]

        print(ultimu)    # 8


        # Ezemplu prátiku: Prosesa dados di estudanti

        rejistru = ("Edna", "edna@email.cv", 85, 92, 78, 95, 88)

        nomi, email, *notas = rejistru

        print(f"Estudanti: {nomi}")

        print(f"Notas: {notas}")

        print(f"Média: {sum(notas) / len(notas):.1f}")

        ```
  slug: star-unpacking
  context: intro-python
  provenance: suggested
- term: dictionary
  category: Coding
  translations:
    kea:
      local_term: disionáriu
      definition: >-
        Un kolesan mutável di pares xavi-valor (`key: value`), definidu ku txaves `{}` — xavis ten
        ki ser úniku i imutável.
      body: >-
        Un **disionáriu** é un tipu di kolesan na Python ki ta guarda dadus na forma di pares
        *xavi-valor* (`key: value`). En vez di uza pozison (kumo na un lista), bu ta uza un xavi pa
        asesa o valor korespondenti. Kel-li ta faze disionárius ideais pa reprezenta informason ki
        ten estrutura, kumo dadus di un pesoa, konfiguransons di un programa, ou kualker kuza ki
        tene "etiketa" i "kontiudu".


        Na Python, un disionáriu é definidu ku txaves `{}`, ku kada par separadu pa un dus pontus
        (`:`) i kada entrada separadu pa vírgula. Xavis ten ki ser **úniku** (ka pode ripiti) i
        **imutável** (kumo strings ou númerus), ma valoris pode ser di kualker tipu. Alen di kel-li,
        disionárius é **mutável** — bu pode adisiona, altera, ou removi entradas dipos di kria-l.


        Na es kursu, nu ta prende disionárius na Módulu 2, undi nu ta splora estruturas di dadus na
        Python (listas, tuplas, disionárius, i konjuntus).
  slug: dictionary
  context: intro-python
  provenance: suggested
- term: .get()
  category: Coding
  translations:
    kea:
      local_term: .get()
      definition: >-
        Metodu di disionáriu ki ta retorna valor di un xavi, ou un valor padrón (ou `None`) si xavi
        ka ezisti — más seguru ki `[]`.
      body: >-
        Metudu `.get()` é un manera **seguru** di asesa valoris na un disionáriu. Envês di uza
        `disionariu["xavi"]` — ki ta lansa un `KeyError` si xavi ka ezisti — `.get()` ta retorna
        `None` (ou un valor padrón ki bu skodji) kuandu xavi ka sta la.


        Es ta faze `.get()` un ferramenta importanti pa evita erus di tipu `KeyError`, sobritudu
        kuandu bu ka tene serteza si un xavi ta ezisti na disionáriu. Bu pode txoma-l ku un
        argumentu (só xavi) ou ku dos argumentus (xavi i valor padrón ki ta retornadu si xavi ka
        ezisti).


        Es é un padran kumun pa skrebe kódiku más robustu, pamodi bu programa ka ta para ku eru — el
        ta kontinua ku un valor razuável.


        ## Example


        ```python

        estudanti = {"nomi": "Kelvin", "idadi": 22}


        # Manera seguru — retorna None si ka ezisti

        nota = estudanti.get("nota")

        print(nota)  # None


        # Manera seguru ku valór padran

        nota = estudanti.get("nota", "Sen nota")

        print(nota)  # Sen nota

        ```
  slug: get
  context: intro-python
  provenance: suggested
- term: dict comprehension
  category: Coding
  translations:
    kea:
      local_term: dict comprehension
      definition: >-
        Sintaxi konpakta pa kria un disionáriu novu ku `{key: valor for item in iterável if
        kondisan}`.
      body: >-
        **Dict comprehension** é un forma konpakta di kria un disionáriu novu na un só linia, uzandu
        un padrón `for` similar a list comprehension. En bez di kumesa ku un disionáriu vaziu i
        inxi-l ku un lop, bu ta ispresá tudu na un espreson.


        Sintaxi báziku é: `{key_expr: value_expr for item in iterável}`. Bu pode tanbe adisiona un
        kondisan opsional ku `if` pa filtra kuais itens ta entra na rezultadu final: `{key: valor
        for item in iterável if kondisan}`.


        Dict comprehension é útil pa **transforma** dadus (ex: konverti presus di un moeda pa otu),
        pa **filtra** un disionáriu izistenti (ex: fika só ku estudantis aprovadu), ó pa **kria** un
        mapeamentu novu a partir di un lista.


        ## Example


        ```python

        # Sen dict comprehension

        quadradus = {}

        for n in range(1, 6):
            quadradus[n] = n ** 2
        # {1: 1, 2: 4, 3: 9, 4: 16, 5: 25}


        # Ku dict comprehension — 1 linia

        quadradus = {n: n ** 2 for n in range(1, 6)}


        # Ku kondisan: só estudantis ku nota >= 80

        notas = {"Djina": 85, "Nilton": 72, "Edna": 95, "Kelvin": 65, "Lara": 91}

        aprovadus = {nomi: nota for nomi, nota in notas.items() if nota >= 80}

        print(aprovadus)  # {'Djina': 85, 'Edna': 95, 'Lara': 91}

        ```
  slug: dict-comprehension
  context: intro-python
  provenance: suggested
- term: set
  category: Coding
  translations:
    kea:
      local_term: set
      definition: >-
        Un kolesan mutável di elementus úniku sen orden, definidu ku txaves `{}` ou `set()` — ta
        faze auto-deduplikasan.
  slug: set
  context: intro-python
  provenance: suggested
- term: membership testing
  category: Coding
  translations:
    kea:
      local_term: membership testing
      definition: >-
        Verifikasan si un elementu ta perténse a un kolesan ku operador `in` — na sets é O(1), na
        listas é O(n).
      body: >-
        **Membership testing** é verifikasan si un elementu ta perténse a un kolesan. Na Python, nu
        ta uza operador `in` (ou `not in`) pa faze kel pergunta li: "Kel valor li sta déntu di kel
        kolesan?" Rezultadu é senpri `True` ou `False`.


        Kel operasan li ta funsiona ku lista, tupla, disionáriu, i set — má velosidadi é diferenti.
        Na un **set**, membership testing é O(1): ka ta importa si set ten 10 ou 10 milhons di
        elementus, verifikasan é kuazi instantánea. Na un **lista**, é O(n): Python ten ki perkore
        lista elementu pa elementu ti nkontra (ou ti kaba). Pa poku dadus é indiferenti, ma pa
        muitus dadus kel diferensa ta kunta.


        Pur isu, kuandu bu ta faze muitas verifikasons di pertensa — pur izemplu, "kel emali li dja
        fu vistu?" ou "kel klienti li sta na loja B tanbé?" — konverti kolesan na set primeru é un
        ótimu prátika.


        ## Example


        ```python

        # Na lista: verifika si tarefa dja sta na lista

        tarefas = ["Studu Python", "Kunpra material", "Manda emali"]

        tarefa_feitu = "Kunpra material"

        if tarefa_feitu in tarefas:      # membership testing na lista (O(n))
            tarefas.remove(tarefa_feitu)

        # Na set: padrun "vistu" pa tira duplikadus, mantendu órdin

        kontatus = ["maria@email.cv", "joao@email.cv", "maria@email.cv", "ana@email.cv"]

        vistu = set()

        kontatus_limpu = []

        for emali in kontatus:
            if emali not in vistu:       # membership testing na set (O(1))
                vistu.add(emali)
                kontatus_limpu.append(emali)

        # Na set: kompara klientis di duas lojas

        klients_praia = {"Maria", "João", "Ana", "Nilton"}

        klients_mindelo = {"Pedro", "Ana", "Nilton", "Lara"}

        print("Ana" in klients_praia)     # True

        print("Pedro" in klients_praia)   # False

        ```
  slug: membership-testing
  context: intro-python
  provenance: suggested
- term: union
  category: Coding
  translations:
    kea:
      local_term: union
      definition: Operasan di konjuntus `|` ki ta djunta tudu elementus úniku di dos sets.
      body: >-
        Na matematika, kuandu nu tene dos konjuntu, **union** é operasan ki ta djunta tudu elementu
        di ambos, sen repetisan. Na Python, sets ta suporta ezatamenti kel-la operasan atravez di
        operadór `|` (ou di metudu `.union()`).


        Kel rezultadu di un union ta konten kada elementu úniku ki aparesi na primeru set, na
        sugundu set, ou na dos. Si un elementu ta ezisti na ambos, el ta aparesi un bez só na
        rezultadu — pamodi sets nunka ka ten elementu repetidu.


        Es operasan é útil kuandu bu presiza kombina dos kolesan sen preokupa ku duplikadus. Pur
        izemplu, si bu tene lista di estudantis di dos kursu diferenti i bu krê sabe tudu estudanti
        (sen konta ninguen dos bez), union é ferramenta serta.


        ## Example


        ```python

        # Estudantis na kursus di Python i di JavaScript

        python_estudantis = {"Maria", "João", "Ana", "Pedro", "Carla"}

        javascript_estudantis = {"Ana", "Nilton", "Pedro", "Kelvin", "Edna"}


        # UNION (|) -- tudu estudanti (di ambos kursus)

        tudus = python_estudantis | javascript_estudantis

        print(f"Union: {tudus}")

        # {'Maria', 'João', 'Ana', 'Pedro', 'Carla', 'Nilton', 'Kelvin', 'Edna'}


        # Alternativa ku metudu .union()

        a = {1, 2, 3, 4}

        b = {3, 4, 5, 6}

        print(a.union(b))  # {1, 2, 3, 4, 5, 6} -- igual a a | b

        ```


        Repara ma "Ana" i "Pedro" ta aparesi na dos sets orijinal, ma na rezultadu di union es ta
        aparesi un bez só.
  slug: union
  context: intro-python
  provenance: suggested
- term: intersection
  category: Coding
  translations:
    kea:
      local_term: intersection
      definition: Operasan di konjuntus `&` ki ta retorna só elementus ki sta na ambos sets.
      body: >-
        **Intersection** é un operasan di konjuntus ki ta retorna un set novu ku só kes elementus ki
        ta parse na **ambos** sets. Na Python, nu ta uza operador `&` entri dos set, ou métodu
        `.intersection()`. É un maneira rápidu i klaru di diskubri o ki dos grupu di dadus tene na
        komun.


        Imagina ki bu tene dos lista di estudanti — un pa un kursu di Python i otu pa un kursu di
        JavaScript. Ku intersection, na un linha só bu ta diskubri kal estudantis sta matrikulado na
        **dos** kursus na mesmu tempu. Es operasan ta funsiona igual na matemátika: dadu dos
        konjuntu A i B, A ∩ B é o konjuntu di elementus ki sta na A **i** tanbén na B.


        Kumo sets ka tene órdin, resultadu di un intersection tanbén é un set sen órdin garantidu —
        ma tudu elementus ta ser úniku, sen repetisan.


        ## Example


        ```python

        # Estudantis na kursus di Python i di JavaScript

        python_estudantis = {"Maria", "João", "Ana", "Pedro", "Carla"}

        javascript_estudantis = {"Ana", "Nilton", "Pedro", "Kelvin", "Edna"}


        # INTERSECTION (&) -- estudantis na AMBOS kursus

        ambos = python_estudantis & javascript_estudantis

        print(f"Na ambos kursus: {ambos}")  # {'Ana', 'Pedro'}


        # Alternativa: métodu .intersection()

        print(python_estudantis.intersection(javascript_estudantis))  # {'Ana', 'Pedro'}

        ```
  slug: intersection
  context: intro-python
  provenance: suggested
- term: difference
  category: Coding
  translations:
    kea:
      local_term: difference
      definition: Operasan di konjuntus `-` ki ta retorna elementus ki sta nun set ma ka na otru.
      body: >-
        Na matématika, kuandu bu tene dos konjuntu i bu krê sabe ki elementus sta na primeru ma
        **ka** sta na sugundu, bu ta faze un **difference**. Na Python, es operasan é reprezentada
        pa operadór `-` entre dos set, ou pa métodu `.difference()`. Rezultadu é sénpri un set novu
        ku só es elementus ki é ezklusivu di primeru konjuntu.


        Difference é útil kuandu bu krê kompara dos grupu di dadus i sabe ki elementus sta di un
        ladu ma ka di otu. Pur ezénplu, kuadru bu tene lista di estudantis na dos kursu diferenti,
        `a - b` ta mostra-u kenha ki sta matrikuladu na kursu `a` ma **ka** na kursu `b`. Notasan é
        inportanti: `a - b` **ka é** igual a `b - a` — órdi ta inporta.


        Ta izisti tanbe un varianti txomadu **symmetric difference**, ku operadór `^`, ki ta retorna
        elementus ki sta na un konjuntu ou na otu, ma **ka** na dos. Es é diferenti di difference
        normal, ki só ta odja pa un ladu.


        ## Example


        ```python

        # Estudantis na kursus di Python i di JavaScript

        python_estudantis = {"Maria", "João", "Ana", "Pedro", "Carla"}

        javascript_estudantis = {"Ana", "Nilton", "Pedro", "Kelvin", "Edna"}


        # DIFFERENCE (-) -- só na Python, NAU na JavaScript

        so_python = python_estudantis - javascript_estudantis

        print(f"Só Python: {so_python}")  # {'Maria', 'João', 'Carla'}


        # Alternativa ku métodu .difference()

        print(python_estudantis.difference(javascript_estudantis))  # {'Maria', 'João', 'Carla'}

        ```
  slug: difference
  context: intro-python
  provenance: suggested
- term: hashable
  category: Coding
  translations:
    kea:
      local_term: hashable
      definition: >-
        Karakterístika di un objetu imutável ki pode ser uzadu kumo xavi di disionáriu ou elementu
        di set — númerus, strings i tuplas é hashable.
      body: >-
        Na Python, un valór é **hashable** kuandu el pode ser konvertidu pa un número fixu (un
        "hash") ki Python ta uza pa lokaliza-l rápidu na memória. Só valoris **imutável** — ki ka
        pode ser modifikadu dipos ki é kriadu — é hashable. Kel-li ta inklui números (int, float),
        strings, i tuplas ki só ten elementus imutável dentu.


        Kel karakterístika é importanti pamodi sets i disionárius só ta aseita elementus hashable.
        Un set ta uza kel hash pa garanti ki ka ten repetisan i pa fazi buska `in` na tempu O(1).
        Listas i disionárius, komu es é mutável (bu pode djunta ou tira elementu), **ka é** hashable
        — es ka pode ser postu dentu di un set nen uzadu kumo xavi di un disionáriu.


        Si bu tenta kria un set ku un elementu ki ka é hashable, Python ta da un eru: `TypeError:
        unhashable type`.


        ## Example


        ```python

        # Kel li ta funsiona -- tudu elementu é imutável (hashable)

        validu = {1, "hello", (1, 2, 3), 3.14}


        # Kel li ta da eru!

        # invalidu = {[1, 2], {"a": 1}}  # TypeError: unhashable type: 'list'

        ```
  slug: hashable
  context: intro-python
  provenance: suggested
- term: def
  category: Coding
  translations:
    kea:
      local_term: def
      definition: Keyword di Python ki ta defini un funsan — `def nomi_funsan(parámetrus):`.
      body: >-
        `def` é un **keyword** (palavra-xavi) di Python ki ta uzadu pa **defini un funsan**. Kantu
        bu skrebe `def`, bu ta dizi pa Python: "Es li é un bloku di kódiku ki N krê da un nomi, pa N
        pode uza-l dipos kantu N kre."


        Sintaxi báziku ta ben asin: `def nomi_funsan(parámetrus):`. Dipos di dus pontus, bu ta
        skrebe linhas indentadu ku kódiku ki funsan ta kore kantu el ser txomadu. Ku `def`, bu pode
        organiza bu kódiku na pesas reutilizável — envez di repeti mesmu linhas várias bez, bu ta
        txoma funsan.


        Na Python, funsan é un di ferramentas más importanti pa strutura programas. Módulu 3 di es
        kursu ta dediká txeu tenpu pa funsan, ma pa gosi só ten na kabesa: `def` é kumesu di kualker
        funsan ki bu ta kria.
  slug: def
  context: intro-python
  provenance: suggested
- term: return
  category: Coding
  translations:
    kea:
      local_term: return
      definition: >-
        Instruson ki ta faze un funsan devolvi un valor pa kel ki txoma-l — sen `return`, funsan ta
        retorna `None`.
      body: >-
        Instruson `return` ta uzadu déntu di un funsan pa mandá un valor di volta pa kel kódiku ki
        txoma funsan. Kuandu Python atxa un `return`, el ta para di ezekuta funsan i ta devolvi kel
        valor pa kem ki pidi-l. Es é manera ki funsons ta "responde" ku un rezultadu ki bu pode
        guarda na un variável ou uza na otu spresons.


        Si un funsan ka tene `return`, Python ta devolvi automatikamenti `None` — kel signifika
        "nada". Pur isu, kuandu bu ta kria un funsan ki ta kalkula ou produzi un rezultadu, é
        importanti uza `return` pa manda kel valor pa fora di funsan.


        Na lisan-li, `return` ta parese déntu di un funsan ki ta kalkula média di un lista di notas:
        dipus di kalkula, el ta uza `return` pa devolvi kel média pa linha ki txoma funsan.


        ## Izemplu


        ```python

        def kalkula_media(notas):
            total = sum(notas)
            media = total / len(notas)
            return media

        rezultadu = kalkula_media([10, 15, 20])

        print(rezultadu)

        ```
  slug: return
  context: intro-python
  provenance: suggested
- term: parameter
  category: Coding
  translations:
    kea:
      local_term: parámetru
      definition: Variável definidu na asinatura di un funsan ki ta reseb un valor kuandu funsan é txomadu.
      body: >-
        Un **parámetru** é un variável ki bu ta skrebe dentu di paréntesis di un funsan na momentu
        ki bu ta defini-l. El ta funsiona kumo un "kaxa vaziu" ki ta spera un valor — kel valor ta
        txiga kuandu algen ta txoma funsan. Sen parámetrus, un funsan ta faze senpri e mesmu koza;
        ku parámetrus, mesmu funsan pode trabadja ku dadus diferenti kada bez ki é txomadu.


        É importanti distingi parámetru di argumentu: **parámetru** é nomi ki ta parse na definisan
        di funsan, i **argumentu** é valor konkretu ki ta pasadu na txomada. Pur izemplu, na `def
        apresenta(nomi, ilha)`, `nomi` i `ilha` é parámetrus; kuandu bu txoma `apresenta("Maria",
        "Santiago")`, kes strings é argumentus.


        Un parámetru pode tanbê tene un valor predefinidu (default), ki ta uzadu si ningen ka pasa
        argumentu pa el. Regra importanti: parámetrus ku valor predefinidu senpri ten ki ben dipos
        di kes sen valor predefinidu, sinon Python ta da eru.


        ## Example


        ```python

        # 'nomi' i 'ilha' é PARÁMETRUS (na definisan)

        def apresenta(nomi, ilha):
            print(f"Nha nomi é {nomi}, N é di {ilha}.")

        # "Maria" i "Santiago" é ARGUMENTUS (na txomada)

        apresenta("Maria", "Santiago")    # Nha nomi é Maria, N é di Santiago.

        apresenta("João", "São Vicente")  # Nha nomi é João, N é di São Vicente.


        # Parámetru ku valor predefinidu

        def saudasan(nomi="Vizitanti"):
            print(f"Bon dia, {nomi}! Ben-vindu!")

        saudasan("Ana")   # Bon dia, Ana! Ben-vindu!

        saudasan()        # Bon dia, Vizitanti! Ben-vindu!

        ```
  slug: parameter
  context: intro-python
  provenance: suggested
- term: argument
  category: Coding
  translations:
    kea:
      local_term: argumentu
      definition: Valor konkretu ki bu ta pasa pa un funsan kuandu bu ta txoma-l.
      body: >-
        Na Python, un **argumentu** é un valor konkretu ki bu ta pasa pa un funsan na momentu ki bu
        ta txoma-l. É diferenti di un parâmetru — parâmetru é nomi ki funsan ta uza internamenti pa
        risebe valor, i argumentu é valor real ki bu ta manda.


        Kuandu bu ta txoma un funsan, bu ta pui argumentus déntu di parêntesis. Kada argumentu ta
        korisponde a un parâmetru ki funsan sta spera. Si bu manda argumentu di tipu eradu, ou
        númeru eradu di argumentus, Python ta lansa un eru — txeu bez un `TypeError`.


        Pa izemplu, na un txomada di funsan komu `kalkula_media(notas_di_ana)`, `notas_di_ana` é
        argumentu ki bu sta pasa pa funsan `kalkula_media`. Kel valor ki sta déntu di variável
        `notas_di_ana` é ki funsan ta uza pa faze se trabadju.


        ## Izemplu


        ```python

        def kalkula_media(notas):
            total = sum(notas)
            media = total / len(notas)
            return media

        notas_di_ana = [15, 12, 18]

        rezultadu = kalkula_media(notas_di_ana)  # notas_di_ana é argumentu

        print(f"Média: {rezultadu}")

        ```


        Na linha `kalkula_media(notas_di_ana)`, `notas_di_ana` é **argumentu** ki sta ser pasadu pa
        funsan. Déntu di funsan, kel mesmu valor ta ser risebedu pa parâmetru txomadu `notas`.
  slug: argument
  context: intro-python
  provenance: suggested
- term: '*args'
  category: Coding
  translations:
    kea:
      local_term: '*args'
      definition: >-
        Sintaxi ki ta permiti un funsan reseb un númeru variável di argumentus pozisionál, ki ta
        xega kumo un tuple.
      body: >-
        `*args` é un sintaxi spesial di Python ki ta permiti bo defini un funsan ki ta seta un
        númeru variável di argumentus pozisionais. En vês di bo obriga ki kel ki ta txoma funsan
        pasa un kuantidadi fixu di argumentus, ku `*args` bu pode manda un, dos, dês, ou nenhun —
        Python ta agrupa tudu na un tuple ki bu pode iterá dentu di funsan.


        Nomi `args` é só un konvensan (ta ben di "arguments") — o ki é realmenti importanti é
        astrisku `*`. Bu podia txoma-l `*numeros`, `*ítens`, ou kualker otu nomi, ma tradisan na
        komunidadi Python é uza `*args` pa kódiku fika más legível pa otu programadoris.


        Kuandu bu ta kombina `*args` ku parámetrus normais i `**kwargs`, orden é senpri: parámetrus
        normais primeru, dipos `*args`, dipos `**kwargs`. Nunka inverte kel orden aki, sinon Python
        ta da eru di sintaxi.


        ## Example


        ```python

        def soma_tudu(*numeros):
            """Soma kuantu nùmeru ki bo manda."""
            total = 0
            for n in numeros:
                total += n
            return total

        print(soma_tudu(10, 20))           # 30

        print(soma_tudu(100, 200, 300))    # 600

        print(soma_tudu(5, 10, 15, 20))    # 50

        ```
  slug: args
  context: intro-python
  provenance: suggested
- term: '**kwargs'
  category: Coding
  translations:
    kea:
      local_term: '**kwargs'
      definition: >-
        Sintaxi ki ta permiti un funsan reseb un númeru variável di argumentus nomiadu, ki ta xega
        kumo un disionáriu.
      body: >-
        `**kwargs` é un sintaxi spesiál di Python ki ta permiti un funsan resebe un númeru variável
        di argumentus **nomiadu** (kel dizê, argumentus ku formatu `xave=valor`). Tudu kes
        argumentus ki bu pasa ta xega dentu di funsan kumo un disionáriu (dict), undi kada xave é
        nomi di argumentu i kada valor é kel ki bu pasa.


        Nomi `kwargs` ta ben di "keyword arguments" (argumentus ku palavra-xave). Kel ki ta faze el
        spesiál é kel duas asteriskus `**` — es ki ta dize Python pa el djunta tudu argumentus
        nomiadu extras dentu di un úniku disionáriu. Bu pode usa nomi ki bu kre dipos di `**`, ma
        konvensan é uza `kwargs`.


        Ora bu ta kombina parámetrus normais, `*args` i `**kwargs` na mesmu funsan, orden ten ki ser
        senpri: parámetrus normais primeru, dipos `*args`, i finalmenti `**kwargs`. Nunka inverte
        kel orden, sinon Python ta da eru.


        ## Example


        ```python

        def fixa_perfil(**dados):
            """Mostra perfil ku kuantu dados ki entra."""
            print("=== Perfil ===")
            for xave, valor in dados.items():
                print(f"  {xave}: {valor}")

        fixa_perfil(nomi="Cesária", ilha="São Vicente", profisan="Kantora")

        # === Perfil ===

        #   nomi: Cesária

        #   ilha: São Vicente

        #   profisan: Kantora

        ```
  slug: kwargs
  context: intro-python
  provenance: suggested
- term: docstring
  category: Coding
  translations:
    kea:
      local_term: docstring
      definition: >-
        String di dokumentasan na inísiu di un funsan, klasi ou módulu ki ta splika o ki el ta faze
        — asesível ku `help()`.
      body: >-
        Un **docstring** é un string di dokumentasan ki bu ta poi logo na inísiu di un funsan pa
        splika kel ki el ta faze. El ta skrebedu ku aspas triplus (`"""..."""`) i ta serbi kumo un
        manual kurtu pa ken ki ta uza bu funsan — inklui bo mesmu, kuandu bu volta pa kódigu dipos
        di algun tempu.


        Un bon docstring ta splika o ki funsan ta faze, ki argumentus el ta resebe (Args), i o ki el
        ta retorna (Returns). Es dokumentasan ka é só pa ler na kódigu — Python ta guarda-l, i bu
        pode asesí-l na kualker altura ku funsan `help()`.


        Uza docstrings ta ajuda bo skrebe kódigu más limpu i profisionál. Kuandu otu algen (ou bo
        mesmu) ta txoma `help(nomi_di_funsan)`, Python ta mostra kel docstring, splikandu direitu
        kumo funsan ta funsiona sen ten ki abri kódigu.


        ## Example


        ```python

        def verifica_senha(senha):
            """Verifica si un senha é forti.

            Un senha forti ten ki tene:
            - Pelo menus 8 karáteris
            - Pelo menus un nùmeru
            - Pelo menus un letra maiúskula
            - Pelo menus un karáter spesiál

            Args:
                senha: String ku senha pa verifica.

            Returns:
                True si senha é forti, False si ka é.
            """
            if len(senha) < 8:
                return False
            return True

        # Asei dokumentasan

        help(verifica_senha)

        ```
