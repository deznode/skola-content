  provenance: suggested
- term: multiple inheritance
  category: Coding
  translations:
    kea:
      local_term: eransa múltiplu
      definition: >-
        Kapasidadi di un klasi erda di más ki un klasi pai na mesmu tempu — `class Filhu(Pai1,
        Pai2):`.
      body: >-
        **Eransa múltiplu** é un konseitu na programasan objetu-orientadu undi un klasi filhu pode
        erda di **más ki un klasi pai** na mesmu tempu. En vez di ten un só pai, kel klasi filhu ta
        erda atributus i metodus di dos ou más klasis, kombinandu funsionalidadis di kada un dês.


        Na sintaxi Python, bu ta indika tudu klasis pai dentu di paréntesis, separadus pa vírgula:
        `class Filhu(Pai1, Pai2):`. Asin, `Filhu` ta erda tudu o ki `Pai1` i `Pai2` ta oferese.


        Na lisan di eransa simples, nu foka na erda di **un só** pai ku `super()`. Eransa múltiplu é
        un tópiku más avansadu — kandu un klasi tene vários pai, Python ta uza un regra txomadu
        **MRO** (Method Resolution Order) pa disidi ki versan di un metodu ta ser txomadu. Pa gosi,
        é sufisienti sabe ki es kapasidadi ezisti; nu ta ba más lonji dipos ki bu domina eransa
        simples.
  slug: multiple-inheritance
  context: intro-python
  provenance: suggested
- term: issubclass()
  category: Coding
  translations:
    kea:
      local_term: issubclass()
      definition: >-
        Funsan built-in ki ta verifika si un klasi é subklasi (filhu diretu ou indiretu) di otu
        klasi.
      body: >-
        `issubclass()` é un funsan built-in di Python ki ta verifika si un klasi é subklasi (filhu
        diretu ou indiretu) di otu klasi. El ta retorna `True` si es relasan di eransa izisti, i
        `False` na kontráriu. Diferenti di `isinstance()` — ki ta trabadja ku objetus —
        `issubclass()` ta trabadja **entri klasis** diretamenti.


        Sintaksi é simplis: `issubclass(Filhu, Pai)`. Un detalhi importanti: un klasi é senpri
        sub­klasi di si mesmu, entãu `issubclass(Viatúra, Viatúra)` ta retorna `True`. El tanbe ta
        funsiona ku eransa indireta — si `C` erda di `B`, i `B` erda di `A`, entãu `issubclass(C,
        A)` é `True`.


        Es funsan é útil pa verifika ierárkias di klasis antis di fazi operasons ki ta dipende di
        eransa, ou pa validar ki un klasi rasebedu na un funsan é kunpativel ku un tipu spetadu.


        ## Example


        ```python

        class Viatúra:
            pass

        class Taxi(Viatúra):
            pass

        class Autokaru(Viatúra):
            pass

        # issubclass() — verifica si un klasi é filhu di otru

        print(issubclass(Taxi, Viatúra))       # True — Taxi é filhu di Viatúra

        print(issubclass(Autokaru, Viatúra))   # True — Autokaru é filhu di Viatúra

        print(issubclass(Taxi, Autokaru))      # False — Taxi ka é filhu di Autokaru

        print(issubclass(Viatúra, Viatúra))    # True — klasi é subklasi di si mesmu

        ```
  slug: issubclass
  context: intro-python
  provenance: suggested
- term: polymorphism
  category: Coding
  translations:
    kea:
      local_term: polimorfismu
      definition: >-
        Konseitu OOP unde mesmu metodu tene konportamentu diferenti dependendu di klasi — 'txeu
        formas'.
      body: >-
        Polimorfismu é un konseitu fundamental na Programasan Orientadu a Objetu (OOP) — un di kes
        pilares ki nu ta prende na Módulu 4 di es kursu, djuntu ku klasis i eransa. Palavra
        "polimorfismu" ta ben di gregu i ta signifika "txeu formas".


        Na prátika, polimorfismu ta permiti ki mesmu metudu (mesmu nomi di funsan) tene
        konportamentu diferenti dependendu di klasi ki sta uza-l. Pur izemplu, un metudu txomadu
        `fala()` pode konporta di manera diferenti si el sta na klasi `Katxor` (ta lati) ou na klasi
        `Gatu` (ta miau) — mesmu nomi, formas diferenti.


        Es konseitu ta faze kódiku más flexível i más faxi di manti, pamodi bu pode trata objetus
        diferenti di manera uniformi, ma kada un ta responde na se manera própi. Na es kursu,
        polimorfismu é un di kes tópikus final ki nu ta atinji na Módulu 4, dipos di dja bu tene un
        fundasan sólidu na Python.
  slug: polymorphism
  context: intro-python
  provenance: suggested
- term: duck typing
  category: Coding
  translations:
    kea:
      local_term: duck typing
      definition: >-
        Filosofia di Python: si un objetu tene metodus nesesáriu, el ta funsiona — ka presiza ser di
        un tipu spesifiku.
      body: >-
        **Duck typing** é un filozofia di Python ki ta dize: "Si un objetu ta anda kumo patu i ta
        faze kuak kumo patu, entun el é patu." Na prátika, isu signifika ki Python ka ta liga pa
        **tipu** konkretu di un objetu — el só ta liga si objetu tene **metodus nesesáriu** pa faze
        trabadju.


        Isu é diferenti di otus linguajen di programasan ki ta esiji ki objetu seja di un tipu
        spesífiku (ou ki el erda di un klasi spesífika). Na Python, si un objetu tene metodu
        `toka()`, entun el pode ser txomadu sen problema — ka importa si el é di klasi `Morna`,
        `Funana`, ou `Batuku`. Kada un ta funsiona, i kada un ta toka di si manera.


        Un konsekuénsia importanti di duck typing é ki **polimorfismu ka presiza eransa** na Python.
        Bu ka meste kria un klasi pai kumun pa ki bu klasis pode ser uzadu di mesmu manera — es só
        presiza konpartilha mesmu interfasi (mesmus nomi di metodus).


        ## Example


        ```python

        class Morna:
            def toka(self):
                return "🎵 Sodadi, sodadi... (morna suavi)"

        class Funana:
            def toka(self):
                return "🥁 Tum-tum-taka-taka! (funana animadu)"

        class Batuku:
            def toka(self):
                return "👏 Pam-pam-pam! (batuku tradisionál)"

        # Tudu tene metodu toka(), ma nenhun ka erda di klasi kumun

        morna = Morna()

        funana = Funana()

        batuku = Batuku()


        for muzikanti in [morna, funana, batuku]:
            print(muzikanti.toka())
        ```


        Kada objetu é di un klasi diferenti, sen eransa entri es, ma tudu ta funsiona djuntu pamodi
        tudu tene metodu `toka()`. Isu é duck typing na asan.
  slug: duck-typing
  context: intro-python
  provenance: suggested
- term: '@abstractmethod'
  category: Coding
  translations:
    kea:
      local_term: '@abstractmethod'
      definition: >-
        Dekorador ki ta marka un metodu di un klasi ABC kumo obrigatóriu — kualker filhu konkretu
        ten ki implementa-l.
      body: >-
        `@abstractmethod` é un **dekorador** di módulu `abc` di Python ki ta marka un metodu di un
        klasi abstratu kumo **obrigatóriu**. Kuandu bu poi es dekorador riba di un metodu, bu sta
        dize: "Kualker klasi fidju ki ta erda di mi TEN KI implementa es metodu li — sen isu, ka ta
        funsiona."


        Pa uza `@abstractmethod`, klasi pai ten ki erda di `ABC` (Abstract Base Class). Metodu
        abstratu normalmenti só tene `pass` na si korpu, pamodi el ka sta la pa faze nada — el sta
        la só pa **defini un kontratu**. Si un klasi fidju skise implementa pelo menus un metodu
        abstratu, Python ta lansa un `TypeError` na momentu ki bu tenta kria un objetu del.


        Bu pode mistra metodus abstratu ku metodus konkretu (normal) na mesmu klasi abstratu.
        Metodus konkretu ta ser erdadu normalmenti pa tudu fidju, i metodus abstratu ta obriga kada
        fidju a da si própia implementasan.


        ## Example


        ```python

        from abc import ABC, abstractmethod


        class Forma(ABC):
            """Klasi abstratu — ka pode kria Forma() diretu."""

            def __init__(self, nomi):
                self.nomi = nomi

            @abstractmethod
            def area(self):
                """Kada forma TEN KI implementa si própia área."""
                pass

            @abstractmethod
            def perimetru(self):
                """Kada forma TEN KI implementa si própiu perímetru."""
                pass

            def deskrebe(self):
                """Metodu konkretu — tudu fidju ta erda isu."""
                return f"{self.nomi}: área={self.area():.2f}m², perímetru={self.perimetru():.2f}m"


        class Retangulu(Forma):
            def __init__(self, largura, konprimentu):
                super().__init__("Retángulu")
                self.largura = largura
                self.konprimentu = konprimentu

            def area(self):
                return self.largura * self.konprimentu

            def perimetru(self):
                return 2 * (self.largura + self.konprimentu)


        # Si bo skise implementa un metodu abstratu — ERU!

        class FormaInkompleta(Forma):
            def __init__(self):
                super().__init__("Inkompleta")

            def area(self):
                return 0
            # Skise perimetru()!

        # f = FormaInkompleta()

        # TypeError: Can't instantiate abstract class FormaInkompleta

        #            with abstract method perimetru

        ```
  slug: abstractmethod
  context: intro-python
  provenance: suggested
- term: encapsulation
  category: Coding
  translations:
    kea:
      local_term: enkapsolamentu
      definition: >-
        Prinsípiu OOP di eskonde detalhis internus di un objetu i kontrola asésu ku niveis públiku,
        protejidu i privadu.
      body: >-
        Enkapsolamentu é un di kuatru prinsípius fundamental di programasan orientadu pa objetu
        (OOP). Ideia sentrál é **kontrola ken ki pode asésa i modifika dadus di un objetu**. En bez
        di dexa tudu abertu pa kualker parti di kódigu mexi ku atributus, bu ta eskonde partis
        sensíveis i ta fornese maneiras kontroladu di interaji ku es.


        Pensa na un kuzinha di restoranti: klientis ta odjá menu (públiku), garsons ta entra na
        kuzinha (protejidu), ma reseita sekretu di xefi só el ta sabi (privadu). Na Python,
        enkapsolamentu ta funsiona ku trés niveis, bazadu na konvensan di nomi: `self.nomi` é
        públiku (kualker un pode asésa), `self._nomi` é protejidu (só konvensan — "ka toka sen
        motivo"), i `self.__nomi` é privadu (Python ta transforma nomi ku *name mangling* pa proteje
        kontra eru asidentál).


        Enkapsolamentu ta traze benefísius importanti: bu pode djunta **validasan** kuandu algen
        tenta muda un atributu, bu pode expon un interfasi limpu ku `@property` (asésa kumo
        atributu, ma ku funsan pa trás), i bu pode fazi *defensive copies* pa evita ki algen
        modifika strutura interna di fora. Asin, dadus di objetu ta fika sénpri konsistenti i
        seguru.


        ## Example


        ```python

        class KontaBankaria:
            def __init__(self, titular, saldu_inisiál=0):
                self.__titular = titular
                self.__saldu = 0
                if saldu_inisiál > 0:
                    self.deposita(saldu_inisiál)

            @property
            def titular(self):
                """Nomi di titular — só leitura."""
                return self.__titular

            @property
            def saldu(self):
                """Saldu atuál — só leitura (ka pode seta diretamenti)."""
                return self.__saldu

            def deposita(self, montanti):
                if not isinstance(montanti, (int, float)):
                    raise TypeError("Montanti ten ki ser un nùmeru!")
                if montanti <= 0:
                    raise ValueError("Montanti ten ki ser positivu!")
                self.__saldu += montanti


        konta = KontaBankaria("Nilton", 100_000)

        print(konta.saldu)       # 100000 ✅

        # konta.saldu = 999_999  # AttributeError — protejidu!

        # print(konta.__saldu)   # AttributeError — privadu!

        ```
  slug: encapsulation
  context: intro-python
  provenance: suggested
- term: name mangling
  category: Coding
  translations:
    kea:
      local_term: name mangling
      definition: >-
        Mekanismu di Python ki ta transforma nomis privadu (`__var`) internamenti pa `_Klasi__var`,
        protejendu-s di asésu asidentál.
      body: >-
        **Name mangling** é un mekanismu di Python ki ta transforma automatikamenti nomis di
        atributus ki ta kumesa ku dôs underscores (`__`). Kuandu bu skrebe `self.__saldu` déntu di
        un klasi txomadu `KontaBankaria`, Python ta muda kel nomi internamenti pa
        `_KontaBankaria__saldu`. Isu ta kontise "pa trás di panu" — bu ka ten ki faze nada spesial
        pa ativa-l.


        Objetivu di name mangling é **proteje atributus privadu di asésu asidentál**. Si algen tenta
        skrebe `konta.__saldu` di fora di klasi, Python ta lansa un `AttributeError`, pamodi kel
        nomi `__saldu` ka ta izisti mas — el foi transformadu. Isu ta ajuda a evita ki programadoris
        toka na dadus sensíveis sen kereba.


        Ma é importanti intende ki name mangling **ka é seguránsa real**. Si un algen mesmu kre
        asésa atributu, el pode uza nomi transformadu diretamenti (por izemplu,
        `konta._KontaBankaria__saldu`). Kel li ta funsiona, ma nunka debe ser fetu — mensajen di
        klasi é klaru: "kel atributu li é privadu, ka toka nel!"


        ## Example


        ```python

        class KontaBankaria:
            def __init__(self, titular, saldu):
                self.titular = titular      # Públiku
                self.__saldu = saldu        # Privadu

        konta = KontaBankaria("João", 50_000)


        # Tenta asésa diretu — ERU

        # print(konta.__saldu)  # AttributeError!


        # Python ka ta eskonde totalmenti — el ta muda nomi

        # __saldu ta vira _KontaBankaria__saldu

        print(konta._KontaBankaria__saldu)  # 50000 ⚠️ (funsiona, ma NUNKA faze isu!)


        # Uza dir() pa odjá nomi transformadu

        print([attr for attr in dir(konta) if "saldu" in attr])

        # ['_KontaBankaria__saldu']

        ```
  slug: name-mangling
  context: intro-python
  provenance: suggested
- term: '@property'
  category: Coding
  translations:
    kea:
      local_term: '@property'
      definition: >-
        Dekorador ki ta transforma un metodu na un atributu di só-leitura — utilizador ta asesa-l
        sen paréntesis.
      body: >-
        Na Python, `@property` é un dekorador ki ta pirmiti bu difini un metodu ki ta funsiona kumo
        si el fose un atributu. En bez di txoma-l ku paréntesis (`obj.metodu()`), utilizador ta
        asesa-l diretamenti (`obj.atributu`). Isu ta da bo un interfasi limpu i naturál pa kes ki ta
        uza bu klasi, ma ku vantajen di tene un funsan ki ta kore pa trás — undi bu pode faze
        validasan, kálkulu, ou proteje dadus internu.


        Un uzu komun di `@property` é pa kria **getters** pa atributus privadu (kes ki ta kumesa ku
        `__`). Bu ta guarda valor real na un atributu privadu, i ta ekspoi-l pa mundu di fora via un
        property. Sen un setter korrespondenti (`@nomi.setter`), kel property ta fika **só-leitura**
        — utilizador pode ler, ma ka pode muda. Isu é útil pa proteje dadus sensível kumo saldu di
        konta, ou pa garanti ki serti valóris ka ta ser altéradu diretamenti.


        Otru uzu ta forti di `@property` é pa kria **valóris kalkuladu** — atributus ki ta depende
        di otrus atributus i ki ta rekalkulá otomatikamenti tudu vez ki bu asesa-l. Pur izemplu,
        área di un retángulu, idadi baziadu na data di naximentu, ou temperatura konvertidu di
        Celsius pa Fahrenheit. Kumo ka tene un valor guardadu, el ta sta senpri atualizadu.


        Kompara ku maneira tradisionál di getters/setters (kumo na Java), `@property` é más
        "Pythonic" — kódiku ta fika más kurtu, más limpu, i más natural di uza. Ademais, bu pode
        kumesa ku un atributu públiku simples i **más tardi** transforma-l nun property sen kebra
        kódiku di kes ki ta uza bu klasi, pamodi sintaxi di asésu ta fika mesmu.


        ## Izemplus


        Un property simples só-leitura:


        ```python

        class Sirkulu:
            def __init__(self, raiu):
                self.__raiu = raiu

            @property
            def raiu(self):
                return self.__raiu

            @property
            def area(self):
                """Property kalkuladu — ta depende di raiu."""
                return 3.14159 * self.__raiu ** 2

        s = Sirkulu(5)

        print(s.raiu)   # 5  (sen paréntesis!)

        print(s.area)   # 78.53975

        ```


        Nota ki `s.area` ka ten paréntesis, mesmu ki é un metodu pa trás. Agora, si bu tenta muda un
        property sen setter, Python ta da eru:


        ```python

        s.raiu = 10

        # AttributeError: property 'raiu' of 'Sirkulu' object has no setter

        ```


        Pa pirmiti mudansa ku validasan, bu ta djunta un setter ku `@raiu.setter`:


        ```python

        class Sirkulu:
            def __init__(self, raiu):
                self.raiu = raiu  # Ta uza setter — validasan ta kore!

            @property
            def raiu(self):
                return self.__raiu

            @raiu.setter
            def raiu(self, valor):
                if valor <= 0:
                    raise ValueError("Raiu ten ki ser positivu!")
                self.__raiu = valor

            @property
            def area(self):
                return 3.14159 * self.__raiu ** 2

        s = Sirkulu(5)

        s.raiu = 10           # Funsiona — validasan ta pasa

        print(s.area)         # 314.159 (rekalkula otomatikamenti!)


        s.raiu = -3           # ValueError: Raiu ten ki ser positivu!

        ```


        Repara kumo `area` ka presiza di setter — el ta rekalkulá senpri ki bu asesa-l, uzandu valor
        atuál di `__raiu`. Kel-li é forsa di property kalkuladu: valor ta sta **senpri konsistenti**
        ku restu di objetu.
  slug: property
  context: intro-python
  provenance: suggested
- term: getter
  category: Coding
  translations:
    kea:
      local_term: getter
      definition: >-
        Un metodu ki ta retorna valor di un atributu privadu — na Python moderno, uzadu ku dekorador
        `@property`.
      body: >-
        Un **getter** é un metodu spesiál ki ta serbi pa **ler valor di un atributu privadu** di un
        objetu. Na en bez di dexa un atributu abertu pa kualker un asésa i modifika diretamenti, bu
        ta skonde-l ku `__` (privadu) i ta ofrese un getter kumu portan kontroladu pa ler kel valor.


        Na Python modernu, getters ta skrebedu ku dekorador `@property`. Isu ta transforma un metodu
        na algu ki ta parse un atributu normal — utilizador ta txoma-l sen paréntesis (`obj.presu`
        en bez di `obj.get_presu()`), ma pa trás tene un funsan ki ta roda. Isu ta da un interfasi
        limpu i "Pythonic", diferenti di maneira tradisionál di linguajis kumu Java, undi ta uzadu
        metodus kumu `get_nomi()` i `set_nomi()`.


        Vantajen prinsipál di un getter é ki bu ta kontrola kumo dadus ta ser lidu: bu pode retorna
        un valor maskáru (pa privasidadi), un kópia (pa proteje lista interna), ou un valor
        kalkuladu ki ta depende di otru atributus.


        ## Example


        ```python

        class Produtu:
            def __init__(self, nomi, presu):
                self.__nomi = nomi
                self.__presu = presu

            @property
            def nomi(self):
                """Getter — asésa komu atributu, nau komu funsan."""
                return self.__nomi

            @property
            def presu(self):
                """Getter pa presu."""
                return self.__presu

        # Uza — limpu i eleganti!

        kaxtelu = Produtu("Kaxtelu di Fera", 250)


        # Asésa kumo atributu (sen paréntesis!)

        print(kaxtelu.nomi)    # Kaxtelu di Fera

        print(kaxtelu.presu)   # 250

        ```


        Nota ki, sen un setter korrespondenti, un getter feitu ku `@property` ta kria un atributu di
        **só-leitura** — tentativa di skrebe (`kaxtelu.presu = 300`) ta ba da `AttributeError`. Isu
        é útil pa proteje valóris ki ka debe muda di fora di klasi.
  slug: getter
  context: intro-python
  provenance: suggested
- term: setter
  category: Coding
  translations:
    kea:
      local_term: setter
      definition: >-
        Un metodu ki ta modifika valor di un atributu privadu, txeu bez ku validasan — uzadu ku
        `@nomi.setter`.
      body: >-
        Un **setter** é un metudu spesial ki ta permiti bo modifika valor di un atributu privadu di
        un objetu, kuazi senpri djuntu ku validasan. Na Python, bu ta kria-l uzandu dekorador
        `@nomi.setter`, undi `nomi` é nomi di property ki bu dja difini antis ku `@property`.


        Difrensa entri un setter i un atribuisan diretu é ki setter ta roda un funsan pa trás di
        siniru. Isu ta permiti bo verifika si valor novu é válidu antis di seta-l — pur izemplu,
        garanti ki un presu ka é negativu, ou ki un idade é un nùmeru. Si valor ka pasa na
        validasan, bu pode lansa un `ValueError` ou `TypeError` pa proteje integridadi di objetu.


        Kel ki ta faze setter pursu pontu enkapsolamentu é ki, di fora, utilizador ta skrebe
        `obj.presu = 300` kumo si el fosse un atributu normal — limpu i naturál — ma pa trás bu ten
        kontrolu totál sobri kel ki ta konteseba. Si bu ka difini un setter pa un property, el ta
        fika só-leitura.


        ## Example


        ```python

        class Produtu:
            def __init__(self, nomi, presu):
                self.__nomi = nomi
                self.presu = presu  # ta uza setter pa validasan

            @property
            def presu(self):
                return self.__presu

            @presu.setter
            def presu(self, valor):
                if not isinstance(valor, (int, float)):
                    raise TypeError("Presu ten ki ser un nùmeru!")
                if valor < 0:
                    raise ValueError("Presu ka pode ser negativu!")
                self.__presu = valor

        grogu = Produtu("Grogu di Santo Antão", 1_500)

        grogu.presu = 1_800      # setter ta roda ku validasan ✅

        # grogu.presu = -500     # ValueError: Presu ka pode ser negativu!

        ```
  slug: setter
  context: intro-python
  provenance: suggested
- term: __repr__
  category: Coding
  translations:
    kea:
      local_term: __repr__
      definition: >-
        Metodu majiku ki ta defini vizun teknika di un objetu pa programador — ideal pa rekria
        objetu di se representasan.
      body: >-
        `__repr__` é un metodu majiku (dunder method) ki ta defini kumo un objetu debe ser
        representadu di forma **teknika**, pensadu pa programador — ka pa uzuáriu final. Diferenti
        di `__str__`, ki ta produzi un textu bonitu i amigável, `__repr__` ta debe mostra informasan
        sufisienti pa **rekria** objetu. Un bon `__repr__` ta parese ku kódiku Python ki bu pode
        kopia i kola pa konstrui un objetu igual.


        Python ta txoma `__repr__` automátikamenti na várius situasan: kuandu bu skrebe nomi di un
        variável na shell interativu sen `print()`, kuandu bu txoma `repr(obj)`, i — muitu
        importanti — kuandu un objetu sta dentu di un lista i bu imprime es lista. Pa isu, si un
        klasi ka tene `__repr__`, Python ta mostra un textu feiu ku enderésu di memória tipu
        `<__main__.Estudanti object at 0x7f3b2c1a5e90>`.


        Un regra di oru: si bu só ta implementa un metodu di representasan, implementa `__repr__`.
        Python ta uza-l kumu fallback kuandu `__str__` ka izisti, i tanbe é el ki lista i otu
        koleksons ta uza pa se elementus. Nunka inventa dunder nomis próprius — `__nomi__` é
        reservadu pa Python.


        ## Example


        ```python

        class Estudanti:
            def __init__(self, nomi, kursu):
                self.nomi = nomi
                self.kursu = kursu

            def __str__(self):
                return f"{self.nomi} — Kursu: {self.kursu}"

            def __repr__(self):
                return f"Estudanti(nomi='{self.nomi}', kursu='{self.kursu}')"


        alunu = Estudanti("João", "Data Science")


        # print() ta uza __str__

        print(alunu)        # João — Kursu: Data Science


        # repr() ta uza __repr__

        print(repr(alunu))  # Estudanti(nomi='João', kursu='Data Science')


        # Dentu di un lista, Python ta uza __repr__ di kada elementu

        alunus = [Estudanti("Maria", "Python"), Estudanti("Ana", "AI")]

        print(alunus)

        # [Estudanti(nomi='Maria', kursu='Python'), Estudanti(nomi='Ana', kursu='AI')]

        ```
  slug: repr
  context: intro-python
  provenance: suggested
- term: dir()
  category: Coding
  translations:
    kea:
      local_term: dir()
      definition: Funsan built-in ki ta lista tudu atributus i metodus di un objetu ou klasi.
      body: >-
        `dir()` é un funsan built-in di Python ki ta lista tudu atributus i metodus disponível di un
        objetu ou klasi. Kel-li ta inklui atributus públikus, protejidu, i mesmu atributus privadu
        ki Python ta transforma ku *name mangling*.


        Kel-li ta faze `dir()` un ferramenta útil pa **eksplora objetus**, sobretudu kuandu bu kre
        odjá kel ki sta "skondidu" pa trás di un klasi. Pur izemplu, na kontestu di enkapsolamentu,
        `dir()` ta mostra bo ki un atributu privadu kumu `__saldu` na verdadi ta izisti internamenti
        ku nomi transformadu `_KontaBankaria__saldu`.


        Normalmenti bu ta uza `dir()` djuntu ku un filtru (kumu list comprehension) pa buska só
        atributus ki ta interesa bo, en vez di odjá tudu lista longu ki funsan ta retorna.


        ## Example


        ```python

        class KontaBankaria:
            def __init__(self, titular, saldu):
                self.titular = titular      # Públiku
                self.__saldu = saldu        # Privadu

        konta = KontaBankaria("João", 50_000)


        # Uza dir() pa odjá tudu atributus (inklusindu nomi transformadu)

        print([attr for attr in dir(konta) if "saldu" in attr])

        # ['_KontaBankaria__saldu']

        ```
  slug: dir
  context: intro-python
  provenance: suggested
- term: operator overloading
  category: Coding
  translations:
    kea:
      local_term: sobrekarga di operador
      definition: >-
        Definir metodus majiku (`__add__`, `__eq__`, etc.) pa dexa operadoris kumo `+`, `-`, `==`
        funsiona ku bu klasi personalizadu.
      body: >-
        **Sobrekarga di operador** é un tékunika di Python ki ta dexa-bu enxina lingua o ki
        operadoris komuns kumo `+`, `-`, `*`, `==` ou `<` deve faze ku klasis ki bo mê kria. Kuandu
        bo skrebe `3 + 5`, Python sabe kumo soma numerus, ma si bo kria un klasi `Vetor` ou
        `Dineru`, Python ka sabe o ki `+` signifika pa es tipu — ates di bo enxina-l.


        Kada operador ten un **metodu majiku** (tanbe txomadu dunder) korispondenti: `+` ta txoma
        `__add__`, `==` ta txoma `__eq__`, `<` ta txoma `__lt__`, i asin pa dianti. Na verdadi, `a +
        b` i `a.__add__(b)` é ezatamenti mesmu kuza. Kuandu bo defini es metodus na bo klasi, bu ta
        "sobrekarga" operador — da-l un novu signifikadu pa bo tipu.


        Un regra di oru importanti: metodus kumo `__add__`, `__sub__` i `__mul__` deve senpri
        retorna un **novu** objetu, ka muda `self`. Mesmu forma ki `3 + 5` ka ta muda valór di `3`,
        `v1 + v2` ka deve muda `v1`. Ku `__eq__` i `__lt__` definidu, funsons kumo `sorted()`,
        `min()` i `max()` ta funsiona automátikamenti ku bu objetis.


        ## Izemplu


        ```python

        class Pontu:
            def __init__(self, x, y):
                self.x = x
                self.y = y

            def __add__(self, otru):
                return Pontu(self.x + otru.x, self.y + otru.y)

            def __eq__(self, otru):
                return self.x == otru.x and self.y == otru.y

            def __repr__(self):
                return f"Pontu({self.x}, {self.y})"


        p1 = Pontu(2, 3)

        p2 = Pontu(5, 7)


        print(p1 + p2)              # Pontu(7, 10) — txoma p1.__add__(p2)

        print(p1 == Pontu(2, 3))    # True — kompara pa valór, ka pa identidadi

        ```
  slug: operator-overloading
  context: intro-python
  provenance: suggested
- term: __add__
  category: Coding
  translations:
    kea:
      local_term: __add__
      definition: >-
        Metodu majiku ki Python ta txoma kuandu bu uza operador `+` num objetu — debe retorna un
        objetu novu.
  slug: add
  context: intro-python
  provenance: suggested
- term: __eq__
  category: Coding
  translations:
    kea:
      local_term: __eq__
      definition: >-
        Metodu majiku ki ta defini konportamentu di `==` — sen el, Python ta kompara pa identidadi
        (mesmu objetu na memória), ka pa valor.
      body: >-
        `__eq__` é un metodu majiku (dunder) di Python ki ta defini o ki ta kontise kuandu bu skrebe
        `==` entre dos objetis di bu klasi. Sen el, kuandu bo faze `p1 == p2`, Python ka sabe
        kompara valoris internu di bu objetu — el ta kompara **identidadi**, o ki ke dizi si é
        literalmenti mesmu objetu na memória. Kel-li kaza pa dos objetis ku ezatamenti mesmu valoris
        ta parse "diferenti" pa Python.


        Kuandu bo defini `__eq__(self, otru)`, bo sta enxina Python komu kompara dos objetis pa
        **valor** — ta dizi kuais atributu ta importa pa dos objetis konsidera igual. Método debe
        retorna `True` ou `False`.


        É bon prátika, kuandu bo defini `__eq__`, defini tanbe `__lt__` (menor ki). Ku es dos
        djuntadu, funsons kumu `sorted()`, `min()` i `max()` ta funsiona automátikamenti ku bu
        objetis.


        ## Example


        ```python

        class Pontu:
            def __init__(self, x, y):
                self.x = x
                self.y = y

            def __eq__(self, otru):
                """Dos pontus é igual si x i y é igual"""
                return self.x == otru.x and self.y == otru.y

        p1 = Pontu(2, 3)

        p2 = Pontu(2, 3)

        p3 = Pontu(10, 10)


        print(p1 == p2)    # True — ta kompara pa valor

        print(p1 == p3)    # False

        ```


        Sen `__eq__`, `p1 == p2` ta retorna `False`, mesmu ku `x` i `y` igual — pamodi es é dos
        objetis diferenti na memória. Ku `__eq__` definidu, Python ta uza bu regra di komparasan.
  slug: eq
  context: intro-python
  provenance: suggested
- term: NotImplemented
  category: Coding
  translations:
    kea:
      local_term: NotImplemented
      definition: >-
        Valor spesial ki un metodu majiku pode retorna pa dizi Python 'ka sabe faze es operasan',
        permitindu ki Python tenta otu alternativa.
      body: >-
        `NotImplemented` é un valor spesial na Python ki un metodu majiku (dunder) pode retorna pa
        dizi Python: "nha ka sabe faze es operasan ku es tipu di objetu". Ka é un eru — é un sinal
        ki Python ta uza pa disidi o ki ta faze na seguida.


        Kuandu bu skrebe algu tipu `a + b`, Python ta txoma `a.__add__(b)`. Si es metodu retorna
        `NotImplemented`, Python ta tenta un alternativa — pur izemplu, txoma `b.__radd__(a)`. Si
        nenhun ladu sabe faze operasan, aí sin Python ta lansa un `TypeError` automátikamenti. Sin
        bu ka ten ki preokupa ku lansa erus na mon — bo só ta indika ki es operasan ka é suportadu
        pa aquel tipu, i Python ta trata di restu.


        Es é un boa prátika kuandu bo ta sobrekarga operadoris ku `isinstance()`: si tipu di otru
        argumentu ka é kompatível ku bo klasi, retorna `NotImplemented` en vez di forsa un rezultadu
        eradu ou lansa un eru diretamenti.


        ## Example


        ```python

        class Dineru:
            def __init__(self, montanti):
                self.montanti = round(montanti, 2)

            def __add__(self, otru):
                if isinstance(otru, Dineru):
                    return Dineru(self.montanti + otru.montanti)
                return NotImplemented  # Si ka é Dineru, Python ta tenta otru forma

            def __mul__(self, fator):
                if isinstance(fator, (int, float)):
                    return Dineru(self.montanti * fator)
                return NotImplemented
        ```


        Na es izemplu, si algen tenta soma `Dineru(500) + "ola"`, `__add__` ta retorna
        `NotImplemented`, i Python ta lansa `TypeError` sózin — sen presiza di skrebe `raise` na
        mon.
  slug: notimplemented
  context: intro-python
  provenance: suggested
- term: '@dataclass'
  category: Coding
  translations:
    kea:
      local_term: '@dataclass'
      definition: >-
        Dekorador di Python ki ta jera automátikamenti `__init__`, `__repr__` i `__eq__` pa klasis
        ki prinsipal objetivu é garda dadus.
      body: >-
        `@dataclass` é un **dekorador** di Python ki ta bin di módulu `dataclasses`. El ta uzadu pa
        kria klasis ki prinsipal objetivu é **garda dadus** — kuma Estudanti, Produtu ou Kontatu —
        sen ki bu tenha ki skrebe tudu kódiku repetitivu ki normalmente ta akonpanha un klasi.


        Kuandu bu adisiona `@dataclass` na sima di un klasi, Python ta jera automátikamenti trés
        metodu importanti: `__init__` (konstrutor), `__repr__` (representasan pa `print`) i `__eq__`
        (komparasan ku `==`). Asin, un klasi ki normalmente ta leba 12 linha ou más, ta pasa pa só
        trés ou kuatru linha.


        `@dataclass` tanbê ta seta opsons útil: valoris padrón pa atributus (kuma `kuantidadi: int =
        1`), `frozen=True` pa kria objetu ki ka pode muda dipos di kriadu, i `order=True` pa permiti
        komparasan ku `sorted()`. Es ka ta limita-bu — bu pode senpri adisiona bu própriu metodu ou
        sobreskrebe metodus jeradu kuma `__str__`.


        ## Example


        ```python

        from dataclasses import dataclass


        @dataclass

        class Estudanti:
            nomi: str
            idadi: int
            kursu: str

        # Kria objetu — __init__ jeradu automátikamenti

        maria = Estudanti("Maria", 22, "Python")


        # __repr__ jeradu automátikamenti

        print(maria)  # Estudanti(nomi='Maria', idadi=22, kursu='Python')


        # __eq__ jeradu automátikamenti

        maria2 = Estudanti("Maria", 22, "Python")

        print(maria == maria2)  # True — kompara pa valór!

        ```
  slug: dataclass
  context: intro-python
  provenance: suggested
- term: frozen
  category: Coding
  translations:
    kea:
      local_term: frozen
      definition: >-
        Parámetru di `@dataclass` ki ta faze un dataclass imutável — atributus ka pode ser
        modifikadu dipos di kriasan.
      body: >-
        `frozen` é un parámetru di dekoradór `@dataclass` ki, kuandu ta seta pa `True`, ta faze ku o
        objetu kriadu di kel klasi ser **imutável** — ó seja, dipos di kria-l, bu ka pode muda
        ninhun di se atributus.


        Es kumportamentu é útil pa reprezenta valoris ki, pa se natureza, ka deve muda dipos di ser
        kriadu — kumo koordenadas geográfikas, konfigurasons, ó otus valoris ki dizen "es é es i
        pronto". Si algen tenta atribui un novu valór pa un atributu di un dataclass frozen, Python
        ta lansa un `AttributeError`.


        Pa uza-l, bu ta pasa `frozen=True` kumo argumentu pa `@dataclass`, na lugar di uza-l sen
        parêntezis.


        ## Example


        ```python

        from dataclasses import dataclass


        @dataclass(frozen=True)

        class Koordenada:
            latitude: float
            longitude: float

        # Koordenadas di Praia

        praia = Koordenada(14.9195, -23.5087)

        print(praia)  # Koordenada(latitude=14.9195, longitude=-23.5087)


        # Ka pode muda!

        try:
            praia.latitude = 0.0
        except AttributeError as e:
            print(f"Eru: {e}")  # Eru: cannot assign to field 'latitude'
        ```
  slug: frozen
  context: intro-python
  provenance: suggested
