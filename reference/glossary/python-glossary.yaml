      local_term: str
      definition: Tipu di dadu di Python pa textu — sekuénsia di karakteris dentu di aspas simples ou dublu.
      body: >-
        Na Python, `str` é tipu di dadu ki nu ta uza pa reprezenta **textu** — ki dizer, kualker
        sekuénsia di karakteris kumo letras, númerus, spasus ou símbulus. Sempri ki bu skrebe algu
        dentu di aspas simples (`'...'`) ou aspas dublu (`"..."`), Python ta trata-l kumo un `str`.


        Textu é un di kes tipus más uzadu na programasan, pamodi nu ta presiza-l pa mostra mensajens
        na tela, guarda nomis, imprimi rezultadus, ou konstrui kumunikasan ku uzuáriu. Na primeru
        izemplu di es lisan, mensajen `"Ola! Ben-vindu a Python!"` é un `str` — un textu simples ki
        ta mostradu ku funsan `print()`.


        Strings pode ser kurtu (kumo un só palavra) ou longu (un frazi kompletu). Kel ki ta importa
        é ki es sta sempri dentu di aspas, pa Python sabi ki é textu i ka otu tipu di dadu.


        ## Example


        ```python

        # Nha primeru programa na Python

        print("Ola! Ben-vindu a Python!")

        ```
  slug: str
