- term: float
  category: Coding
  translations:
    kea:
      local_term: float
      definition: Tipu di dadu di Python pa númerus ku puntu desimal — pa izemplu 3.14, 350.50.
      body: >-
        Na Python, `float` é tipu di dadu ki ta reprezenta númerus ku puntu desimal — pa izemplu
        `3.14`, `350.50` ou `59.0`. Kel palavra "float" ta ben di *floating-point*, ki é forma ki
        komputador ta guarda kel tipu di númerus.


        Difrente di `int` (númerus interus sen puntu desimal), `float` ta permiti trabadja ku
        valoris fraksionáriu — kumu rezultadu di un divizan ou un média. Na Python, kualker vez ki
        bu dividi ku operador `/`, rezultadu ta ser un `float`, mesmu ki númerus originais ser
        interus.


        Ku **dynamic typing** di Python, bu ka meste deklara ki un variável é `float` — Python ta
        diskubri automatikamenti kuandu bu skrebe un númeru ku puntu desimal. Bu pode uza funsan
        `type()` pa konfirma.


        ## Izemplu


        ```python

        valor = 3.14

        print(type(valor))  # <class 'float'>


        # Divizan ku / ta produzi senpri un float

        nota1 = 85

        nota2 = 92

        media = (nota1 + nota2) / 2

        print(media)         # 88.5

        print(type(media))   # <class 'float'>

        ```
  slug: float
  context: intro-python
  provenance: suggested
- term: str
  category: Coding
  translations:
