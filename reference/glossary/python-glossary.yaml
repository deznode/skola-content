  provenance: suggested
- term: generator
  category: Coding
  translations:
    kea:
      local_term: generator
      definition: >-
        Un objetu Python ki ta produzi valores un pa un só kuandu es é pididu, sen guarda tudu na
        memória.
      body: >-
        Un **generator** é un objetu Python ki ta produz valoris un pa un só kuandu es é pididu, sen
        guarda tudu na memória di un bez. En bez di kria un koleksan kompleta (kumo un lista) i po
        tudu na memória, un generator ta uza un téknika ki ta txoma-si **lazy evaluation** —
        "avaliason preguisozu" — undi kada valor só é kalkuladu na momentu ki el é pididu.


        Ten dos manera prinsipal di kria un generator na Python. Primeru, ku un **generator
        expression**, ki ta pareseba ku un list comprehension ma ku paréntesis `()` en bez di
        brackets `[]`. Segundu, ku un **generator function** ki ta uza a palavra-txabi `yield` en
        bez di `return`. Diferensa importanti é ki `yield` ka ta termina funsan — el ta **pauza**
        funsan i lenbra unde el para, i na prósimu txamada di `next()` funsan ta kontinua di kel
        mesmu ponto.


        Jeneradorus é ideal pa trabadja ku dadus grandi (ficheru pesadu, base di dadus, stream di
        rede), pa sekuénsias infinitas (kumo Fibonacci), ou senpri ki bo só presiza pasa pa dadus un
        bez. Bu debe uza un lista kuandu bo presiza asesu aleatoriu ku índisi, kuandu bo presiza
        `len()`, ou kuandu bo presiza itera múltiplas vezes — pamodi un generator só ta funsiona
        **un bez só**: dipos di kunsumidu, el sta vazio i pa itera di nóvu bu ten ki kria un nóvu.


        ## Izemplus


        Kumesa ku un komparason simples entri un list comprehension i un generator expression:


        ```python

        # Lista: tudu 1 milhan di elementus na memória

        kuadradus_lista = [x ** 2 for x in range(1_000_000)]


        # Generator: só un elementu di kada bez

        kuadradus_gen = (x ** 2 for x in range(1_000_000))


        # Dos ta funsiona igual dentu di un for loop

        for valor in kuadradus_gen:
            if valor > 100:
                break
            print(valor, end=" ")
        # 0 1 4 9 16 25 36 49 64 81 100

        ```


        Un errú komun é tenta uza un generator más ki un bez:


        ```python

        gen = (x * 2 for x in range(4))


        soma = sum(gen)

        print(soma)  # 12


        # Tenta uza gen di nóvu -- el ja sta vazio!

        lista = list(gen)

        print(lista)  # [] -- vazio, sen errú, ma sen valoris tanbe

        ```


        Solusan é kria un generator function ki bo pode txoma di nóvu kada bez ki bo presiza:


        ```python

        def dobra(n):
            """Generator ki ta produz dobru di kada numeru te n."""
            for x in range(n):
                yield x * 2

        # Kada txamada di dobra(4) ta kria un novu generator

        print(sum(dobra(4)))       # 12

        print(list(dobra(4)))      # [0, 2, 4, 6] -- funsiona!

        print(max(dobra(4)))       # 6

        ```


        Repara ma na `sum(dobra(4))` i `max(dobra(4))` ka ten paréntesis extru — kuandu un generator
        expression é úniku argumentu di un funsan, bu pode skrebe `sum(x * 2 for x in range(4))` sen
        `[]` nen `()` adisional.
  slug: generator
  context: intro-python
  provenance: suggested
- term: yield
  category: Coding
  translations:
    kea:
      local_term: yield
      definition: >-
        Keyword ki ta transforma un funsan nun generator — el ta pausa funsan i ta devolvi un valor,
        mantendu stadu pa próksimu txomada.
      body: >-
        Na Python, `yield` é un palavra-txavi ki ta transforma un funsan normal nun **generator
        function**. Kuandu Python ta odja `yield` dentu di un funsan, el ka ta trata-l más kumo
        funsan normal — en bez di izekuta korpu tudu di un bez i devolvi un rezultadu ku `return`,
        funsan ta vira un fábrika di valoris ki ta produz un valor di kada bez, i ta **pausa** entri
        kada un.


        Diferensa prinsipal entri `yield` i `return` sta na kumu funsan ta komporta. `return` ta
        termina funsan pa senpri — kada txomada nova ta konmesa di zeru, sen lenbra nada di antis.
        Já `yield` ta **suspende** funsan: el ta devolvi un valor pa kem ki txoma-l, ma ta guarda
        tudu stadu internu (variáveis lokal, posisan na loop, tudu). Na próksimu txomada di
        `next()`, funsan ta kontinua izatamenti undi el para, kumo si nunka el ka parou. Kel-li ta
        permiti produz sekuénsia longu — ó ti mésmu infinitu — sen okupa memória, pamodi só un valor
        sta prezenti di kada bez.


        `yield` é la base di **lazy evaluation** na Python: valoris ta ser kalkuladu só kuandu bu
        pidi-s. Kel-li ta faze jeneradorus ideal pa prosesa ficheru grandi, streams di dadus, ou
        sekuénsia matemátika infinita kumo Fibonacci. Bu pode uza-l múltiplas vezes na mésmu funsan
        — kada `yield` ta produz un valor nobu na sekuénsia — i loops kumo `for` ta trata parti
        final (`StopIteration`) automátiku pa bo.


        ## Examples


        Un generator simplis ki ta konta te un másimu, uzandu `yield` dentu di un loop:


        ```python

        def kontador(maximo):
            n = 1
            while n <= maximo:
                yield n      # pauza li, devolvi n
                n += 1       # kontinua di li na próksimu txomada

        for numeru in kontador(3):
            print(numeru)
        # 1

        # 2

        # 3

        ```


        Un érru kumun é pensa ki `yield` i `return` ta funsiona igual. Odja kel-li:


        ```python

        def kontador_erradu(maximo):
            n = 1
            while n <= maximo:
                return n     # ⚠️ ta termina funsan na primeru volta!
                n += 1

        for numeru in kontador_erradu(3):
            print(numeru)
        # 1   (só un valor -- funsan akaba)

        ```


        Ku `return`, funsan ta pára pa senpri dipos di primeru valor. Trokandu pa `yield`, funsan ta
        lenbra unde el para i ta kontinua:


        ```python

        def fibonacci():
            """Generator infinitu -- ta produz valor senpri ki bu pidi."""
            a, b = 0, 1
            while True:
                yield a
                a, b = b, a + b

        fib = fibonacci()

        for _ in range(7):
            print(next(fib), end=" ")
        # 0 1 1 2 3 5 8

        ```


        Repara ki `while True` ka ta trava programa: kada `yield` ta pauza funsan, i el só ta
        kontinua kuandu bu txoma `next()` di nobu. Asi bu pode trabadja ku sekuénsia infinita sen
        krasha komputador.
  slug: yield
  context: intro-python
  provenance: suggested
- term: generator expression
  category: Coding
  translations:
    kea:
      local_term: generator expression
      definition: >-
        Sintaxi tipu list comprehension ma ku paréntesis `()` ki ta kria un generator lazy en bez di
        un lista.
      body: >-
        Un **generator expression** é un manera kompaktu di kria un generator na Python, uzandu un
        sintaxi ki ta parse muitu ku list comprehension — ma ku paréntesis `()` en bez di brackets
        `[]`. En bez di produz un lista kompletu na memória, el ta kria un objetu ki ta ba gerandu
        kada valor **un pa un**, só kuandu bo pidi. Kel-li ta txoma **lazy evaluation** (avaliason
        preguisozu).


        Formatu bázicu é `(expresan for item in iterável)`, ku un `if` opsional pa filtra: `(x * 2
        for x in range(10) if x % 2 == 0)`. Kuandu Python ta xekuta kel liña, el **ka ta kalkula**
        valoris — el só ta prepara un generator objetu. Valoris ta ser kalkuladu só kuandu bo ta
        itera ku `for`, ou kuandu bo ta txoma `next()`, ou kuandu bo ta pasa el pa un funsan kumo
        `sum()`, `max()`, `min()`, ou `any()`.


        Un vantaji grandi é **efisiénsia di memória**: un lista ku 1 milhan di numeru pode gasta
        desénas di megabytes, ma un generator expression ekivalenti ta okupa só siéntus di bytes.
        Kel-li ta faze el idial pa dadus grandi, streams, ou kuandu bo só presiza pasa pa dadus un
        bez. Otu detalhi útil: kuandu un generator expression é ún argumentu di un funsan, bo pode
        omiti paréntesis extru — `sum(x**2 for x in range(10))` ta funsiona igual ki `sum((x**2 for
        x in range(10)))`.


        Ma ten limitasons ki bo ten ki tene na kabesa: un generator ta ser iteradu **un bez só**.
        Dipos ki bo pasa tudu valoris, el sta vazio — si bo tenta itera di nóvu, bo ka ta pega nada.
        Alén di isu, generator ka ten `len()` nen indexason (`gen[0]` ka ta funsiona). Si bo presiza
        kes kapasidadis, konverte pa lista ku `list(gen)` — ma nton bo ta perde vantaji di memória.


        ## Examples


        Kumesa ku diferénsa bázicu entri list comprehension i generator expression:


        ```python

        # List comprehension -- tudu na memória di un bez

        kuadradus_lista = [x ** 2 for x in range(5)]

        print(kuadradus_lista)  # [0, 1, 4, 9, 16]


        # Generator expression -- lazy, un pa un

        kuadradus_gen = (x ** 2 for x in range(5))

        print(kuadradus_gen)    # <generator object <genexpr> at 0x...>


        # Pa obter valoris, itera ku for ou uza next()

        for v in kuadradus_gen:
            print(v, end=" ")   # 0 1 4 9 16
        ```


        Un errú kumun é tenta uza un generator dos bezes. Dipos ki primeru loop kaba, generator sta
        ezauridu:


        ```python

        gen = (x * 2 for x in range(3))


        print(list(gen))  # [0, 2, 4]

        print(list(gen))  # [] -- vazio! Generator já foi konsumidu

        ```


        Solusan é kria un generator nobu kada bez ki bo presiza, ou uza un lista si bo ten ki itera
        múltiplas vezes:


        ```python

        def kria_gen():
            return (x * 2 for x in range(3))

        print(list(kria_gen()))  # [0, 2, 4]

        print(list(kria_gen()))  # [0, 2, 4] -- funsiona!


        # Ou, si dadus é pikininu, uza lista

        dadus = [x * 2 for x in range(3)]

        print(sum(dadus))   # 6

        print(max(dadus))   # 4 -- pode uza várias vezes

        ```


        Finalmenti, un uzu klássiku: pasa un generator expression diretu pa un funsan agregadór, sen
        paréntesis extru — kel-li é idiomátiku i muitu efisienti:


        ```python

        # Soma di kuadradus di 1 milhan sen kria lista intermédiu

        total = sum(x ** 2 for x in range(1_000_000))

        print(total)


        # Buska si existi algun numeru maior ki 100 na un iterável

        tem_grandi = any(x > 100 for x in [3, 45, 120, 7])

        print(tem_grandi)  # True

        ```
  slug: generator-expression
  context: intro-python
  provenance: suggested
- term: StopIteration
  category: Coding
  translations:
    kea:
      local_term: StopIteration
      definition: >-
        Ekseson interna ki un generator ta lansa kuandu ka tene más valores pa produzi — `for` loops
        ta trata-l automátikamenti.
      body: >-
        `StopIteration` é un ekseson interna di Python ki ta marka fin di un iterasan. Kuandu un
        generator (ou kualker iteradór) ka tene más valoris pa produzi, próximu txamada di `next()`
        ta lansa `StopIteration` — kel li é kumo Python ta "avisa" ki sekuénsia akaba.


        Na maioria di kazus, bu **ka ta odja** es ekseson diretamenti. Kel razon é pamodi `for` loop
        ta trata-l automatikamenti: internamenti, `for` ta txama `next()` te ki `StopIteration` sai,
        dipos el ta para loop en silénsiu. Só kuandu bu ta uza `next()` manualmenti é ki bu pode
        topa ku el kumu un erru vizivel.


        Un ponto importanti: dipos ki un generator lansa `StopIteration`, el sta **izgotadu**. Ka bo
        pode "rebobina-l" nen kontinua — si bo presiza itera di nóvu, bu ten ki kria un novu
        generator. Kel li é diferenti di un lista, ki bu pode perkorer kuantus bez bu kre.


        ## Ezemplus


        Ku `for`, `StopIteration` ta akonteci nos "bastidoris" — bu ka ta odja-l:


        ```python

        gen = (x * 2 for x in range(3))


        for valor in gen:
            print(valor)
        # 0

        # 2

        # 4

        # Loop ta para sen erru -- StopIteration foi tratadu automátiku

        ```


        Ma si bo txama `next()` manualmenti alén di fin, ekseson ta parsi:


        ```python

        gen = (x * 2 for x in range(3))


        print(next(gen))  # 0

        print(next(gen))  # 2

        print(next(gen))  # 4

        print(next(gen))  # Traceback: StopIteration

        ```


        Pa evita krash, bo pode da un **valor default** pa `next()` — el ta devolvi kel valor en bez
        di lansa ekseson:


        ```python

        gen = (x * 2 for x in range(3))


        print(next(gen, None))  # 0

        print(next(gen, None))  # 2

        print(next(gen, None))  # 4

        print(next(gen, None))  # None -- ka ten más valor, ma ka ten erru tanbé

        ```


        Ou, si bu ten razon pa trata-l ku `try`/`except`:


        ```python

        gen = (x for x in [10, 20])


        while True:
            try:
                valor = next(gen)
                print(valor)
            except StopIteration:
                print("Akaba!")
                break
        # 10

        # 20

        # Akaba!

        ```


        Na prátika, uza `for` sempri ki bu pode — el é más limpu i ta trata `StopIteration` pa bo.
  slug: stopiteration
  context: intro-python
  provenance: suggested
- term: module
  category: Coding
  translations:
    kea:
      local_term: módulu
      definition: >-
        Un ficheru Python (`.py`) ki kontene funsons, klasis ou variáveis, ki pode ser importadu pa
        uza na otu programa.
      body: >-
        Un **módulu** na Python é un ficheru ku extensan `.py` ki kontene kódiku Python — funsons,
        klasis, variáveis, ou até kódiku ki ta kore diretu. Ideia prinsipal é organiza kódiku na
        ficherus separadu, di manera ki bu pode reutiliza-l na otus programas sen presiza di kopia i
        kola. Envez di skrebe tudu na un só ficheru gigante, bu ta divide bu projetu na várius
        módulus, kada un ku un responsabilidadi klaru.


        Pa uza un módulu na otu programa, nu ta uza palavra-xavi `import`. Python ten un koleksan
        enormi di **módulus di biblioteka padran** ki ben instaladu ku el — pur izemplu, `math` pa
        operasons matemátiku, `random` pa números aleatóriu, ou `datetime` pa trabadja ku datas.
        Alen di kes, bu pode instala módulus di terseru (kumo `requests` ou `pandas`) atravez di
        ferramentas kumo `pip`, ou kria bu propi módulus.


        Konseitu di módulu é fundamental pa razons ki fazi Python tan popular: reutilizasan di
        kódiku, organizasan, i partilha ku otus programadoris. Un grupu di módulus rilasionadu ta
        forma un **pakoti** (package). Es é razan pamodi ta dize ki "kualker kuza ki bu presiza,
        provavelmenti algen dja kria un módulu pa kel".


        ## Izemplus


        Uza un módulu di biblioteka padran ku `import`:


        ```python

        import math


        raiz = math.sqrt(16)

        print(raiz)  # 4.0

        ```


        Bu pode tanbe importa só un parti spesífiku di un módulu ku `from ... import`:


        ```python

        from random import randint


        numeru = randint(1, 10)

        print(numeru)  # un númeru entri 1 i 10

        ```


        Kria bu propi módulu é simples — é só salva un ficheru `.py`. Imagina ki bu ten un ficheru
        `saudason.py`:


        ```python

        # saudason.py

        def ola(nomi):
            return f"Ola, {nomi}! Morabeza!"
        ```


        Na otu ficheru na mesmu pasta, bu pode importa-l:


        ```python

        # main.py

        import saudason


        print(saudason.ola("Ana"))  # Ola, Ana! Morabeza!

        ```


        Un eru komun é sinti ki Python ka ta atxa bu módulu:


        ```python

        import saudasan  # ModuleNotFoundError: No module named 'saudasan'

        ```


        Aki, nomi foi skrebedu mal (`saudasan` envez di `saudason`). Python é sensivel a maiúskulas
        i ortografia — nomi di módulu ten ki bate exatamenti ku nomi di ficheru (sen `.py`).
  slug: module
  context: intro-python
  provenance: suggested
- term: standard library
  category: General
  translations:
    kea:
      local_term: standard library
      definition: >-
        Konjuntu di módulus ki ta ben instaladu ku Python — `math`, `random`, `os`, `json`,
        `datetime`, etc.
      body: >-
        **Standard library** é konjuntu di módulus ki dja ta ben instaladu djuntu ku Python — bu ka
        meste faze `pip install` pa uza-s. Kel-li krê dizê ki, un bês ki bu tene Python na bu
        máquina, bu ta ten sentenas di ferramentas prontu pa importa i uza logu.


        Es módulus ta kobri área diferenti: kálkulu matemátiku (`math`), numerus aleatóriu
        (`random`), interasan ku sistema operativu (`os`), trabadja ku formatu JSON (`json`), data i
        ora (`datetime`), entri txeu más kuma `csv`, `re`, `pathlib`, i `sqlite3`. Kada un ta
        rezolve un tipu di problema komun sen bu tenê ki skrebe tudu di zeru.


        Pa uza kualker módulu di standard library, bu ta faze `import` na topu di bu ficheru i logu
        bu pode xama sê funsons. Kel-li ta faze Python sê un lingua ku "pilhas inkluídu" — dja ta
        ben ku txeu kusa pa bu kumesa trabadja logu.


        ## Example


        ```python

        import math

        import random

        from datetime import datetime


        # math — kálkulu matemátiku

        print(math.sqrt(16))    # 4.0

        print(math.pi)          # 3.141592653589793


        # random — numerus aleatóriu

        ilhas = ["Santiago", "Sal", "São Vicente", "Fogo", "Boa Vista"]

        print(random.choice(ilhas))


        # datetime — data i ora

        gosi = datetime.now()

        print(gosi.strftime('%d/%m/%Y %H:%M'))

        ```
  slug: standard-library
  context: intro-python
  provenance: suggested
- term: __name__ == "__main__"
  category: Coding
  translations:
    kea:
      local_term: __name__ == "__main__"
      definition: >-
        Padrun Python ki ta permiti kódiku só kore kuandu ficheru é izekutadu diretamenti, ka kuandu
        é importadu kumo módulu.
      body: >-
        Kuandu bu ta skrebe un ficheru Python, kel ficheru pode ser uzadu di dos manera: bu pode
        **izekuta-l diretamenti** (ku `python meu_ficheru.py`), ó bu pode **importa-l** di otu
        ficheru (ku `import meu_ficheru`). Padron `if __name__ == "__main__":` é un forma di
        distingi entri kes dos situason, i faze ku serton kódiku só ta kore na primeru kazu.


        Python ta define un variável spesial txomadu `__name__` na kada módulu. Kuandu bu ta izekuta
        un ficheru diretamenti, Python ta po `__name__` igual a string `"__main__"`. Ma si kel mesmu
        ficheru é importadu di otu ficheru, Python ta po `__name__` igual a nomi di módulu (p.ex.
        `"meu_ficheru"`). Purtantu, kualker kódiku ki bu ta po dentu di `if __name__ == "__main__":`
        só ta kore kuandu bu ta korê ficheru diretu — nunka na un import.


        Kel padron li é importanti pamodi el ta separa dos koizas: **definison** (funsons, klasis,
        konstantis ki otus ficherus pode reuza) di **ason** (kódiku ki ta faze algu, sima txoma
        funsons, imprimi rezultadus, ó pidi input a uzuáriu). Sen kel proteson, tudu kódiku na nível
        global ta kore kada bes ki bu ta importa módulu — kel ki pode kria efeitus ka spradu, sima
        imprimi mensajens ó pidi input kuandu bu só krê uza un funsan.


        Alen di kel, padron ta faze bu kódiku más profisional i más fáxi di testa: bu módulus fika
        **reutilizável** (pa outus ficherus importa) i **izekutável** (pa demonstrasan ó testu
        rápidu), tudu na mesmu ficheru.


        ## Ezemplus


        Purmeru, un ezemplu simples ku dos funsons i un bloku di testu:


        ```python

        # saudason.py

        def saudason(nomi):
            return f"Olá, {nomi}!"

        def dispedida(nomi):
            return f"Ti lógu, {nomi}!"

        if __name__ == "__main__":
            # Kel li só ta kore si bu izekuta: python saudason.py
            print(saudason("Maria"))
            print(dispedida("João"))
        ```


        Si bu korê `python saudason.py`, bu ta odja kes dos mensajens. Gosi, imagina ki bu krê uza
        kes funsons na otu ficheru:


        ```python

        # main.py

        from saudason import saudason


        print(saudason("Ana"))

        # Saída: Olá, Ana!

        ```


        Repara ki na import, kel bloku `if __name__ == "__main__":` **ka ta kore** — nu ka ta odja
        "Olá, Maria!" nen "Ti lógu, João!". Só funsan `saudason` foi importadu, i nada más ka foi
        izekutadu.


        Gosi, un ezemplu di **kal ki ta konteci si bu ka uza kel padron**:


        ```python

        # konfiguradu_mal.py

        def soma(a, b):
            return a + b

        # Sen proteson di __name__

        print("Testandu módulu...")

        print(soma(2, 3))

        ```


        Si bu faze `from konfiguradu_mal import soma` na otu ficheru, bu ta odja "Testandu
        módulu..." i "5" a parsi na terminal — mesmu ki bu só krê importa funsan. Solusan é senpri
        po kel tipu di kódiku dentu di `if __name__ == "__main__":`:


        ```python

        # konfiguradu_dretu.py

        def soma(a, b):
            return a + b

        if __name__ == "__main__":
            print("Testandu módulu...")
            print(soma(2, 3))
        ```


        Gosi módulu ta konporta dretu: silénsiu na import, ativu na izekuson diretu.
  slug: name-main
  context: intro-python
  provenance: suggested
- term: context manager
  category: Coding
  translations:
    kea:
      local_term: context manager
      definition: >-
        Un objetu Python ki ta jere abertura i fexamentu di rekursu automátikamenti — uzadu ku
        statement `with`.
      body: >-
        Un **context manager** é un objetu Python ki ta jere sikllu di vida di un rekursu — abri-l
        na kumesu di un bloku i fexa-l automátikamenti na fin, mesmu si un eru akontesi na meiu. Es
        padran ta uza-du ku statement `with`, i el é forma más siguru i rekomendadu di trabadja ku
        rekursus ki presiza limpeza, sima ficheru, konekson di rede, ou bloku di database.


        Kuandu bo skrebe `with open("dadus.txt", "r") as f:`, funson `open()` ta retorna un objetu
        ficheru ki é un context manager. Es objetu ten dos métodu spesial: `__enter__()` (ki ta
        korre kuandu bloku ta kumesa, i ta retorna rekursu — na kazu, ficheru) i `__exit__()` (ki ta
        korre kuandu bloku ta akaba, sesa normal ou por eru, i ta fexa rekursu). Es garantia é
        inportanti pamodi si bo skese di txoma `.close()` manualmenti, ficheru ta fika abertu na
        memória, i konteúdu ki bo skrebe pode ka fika gravadu na disku.


        Alen di ficheru, txeu otu partis di Python ta uza context manager: `threading.Lock()` pa
        jere bloku entri thread, konekson ku database, requests HTTP, i até ku módulu `contextlib`
        bo pode kria bu prósimu context manager. Es padran ta separa lójika di "abri i fexa" di
        lójika di "uza rekursu", i ta faze kódigu más limpu i menus propensu a bugs.


        ## Example


        Kumparason entri modu antigu (sen context manager) i modu modernu (ku `with`):


        ```python

        # Sen context manager — perigozu

        ficheru = open("notas.txt", "r")

        konteúdu = ficheru.read()

        # Si un eru akontesi li, .close() nunka ta korre!

        ficheru.close()

        ```


        Ku context manager, mesmu si un eru akontesi na meiu di bloku, ficheru ta fexá ben:


        ```python

        # Ku context manager — siguru

        with open("notas.txt", "r") as ficheru:
            konteúdu = ficheru.read()
            # Mesmu si un eru akontesi li, ficheru ta fexa automátikamenti
        # Li fora di bloku, ficheru dja stá fexadu

        ```


        Bo pode uza más ki un context manager na mesmu statement `with`, separadu ku vírgula:


        ```python

        # Dos ficheru abertu ao mesmu tenpu — dos ta fexadu automátikamenti

        with open("orijinal.txt", "r") as fonte, open("kopia.txt", "w") as destinu:
            for linha in fonte:
                destinu.write(linha)
        ```
  slug: context-manager
  context: intro-python
  provenance: suggested
- term: with
  category: Coding
  translations:
    kea:
      local_term: with
      definition: >-
        Statement di Python ki ta uza un context manager pa garanti ki un rekursu (kumo un ficheru)
        ta fitxa senpri, mesmu si un eru akontese.
      body: >-
        Statement `with` é un forma limpu i siguru di trabadja ku rekursus ki presiza di ser
        "abertu" i dipos "fitxadu" — kumo ficheru, konesons di redi, ou bases di dadus. Kuandu bu
        uza `with`, Python ta garanti ki, mesmu si un eru akontese dentu di bloku, o rekursu ta
        fitxadu korretamente. Es é o ki chama-se un **context manager**: un objetu ki sabe kumo ta
        "entra" i "sai" di un kontestu.


        Sen `with`, bu ten ki lembra di fitxa ficheru manualmente ku `.close()`. Si bo skese, ou si
        un eru akontese antis di `.close()`, o ficheru ta fika abertu — o ki pode kauza problemas
        kumo dadus perdidu ou memória disperdisadu. Ku `with`, Python ta trata di isu
        automátikamente, mesmu ki un exception dispara.


        Sintaxi báziku é `with <expresan> as <variável>:` sigidu di un bloku indentadu. Dentu di
        bloku, bu ta uza a variável (pur ezemplu, un ficheru abertu). Kuandu bloku termina — pa
        kualker rezan — o rekursu ta fitxadu. Es é o padran rekomendadu na Python moderno pa
        trabadja ku ficheru.


        ## Example


        Konpara duas manera di ler un ficheru — un sen `with` (frázil) i otu ku `with` (siguru):


        ```python

        # Sen `with` — bo ten ki fitxa manualmente

        ficheru = open("dadus.txt", "r")

        konteúdu = ficheru.read()

        ficheru.close()  # si un eru akontese antis di li, ficheru ta fika abertu!

        print(konteúdu)

        ```


        Ku `with`, o ficheru ta fitxa sozinhu, mesmu si un eru akontese:


        ```python

        # Ku `with` — siguru i limpu

        with open("dadus.txt", "r") as ficheru:
            konteúdu = ficheru.read()
            print(konteúdu)
        # Aki fora di bloku, ficheru dja sta fitxadu automátikamente

        ```


        Bu pode tanbe skrebe pa un ficheru di mesma manera:


        ```python

        # Skrebe nun ficheru ku `with`

        linhas = ["Santiago", "São Vicente", "Fogo"]


        with open("ilhas.txt", "w") as f:
            for ilha in linhas:
                f.write(f"{ilha}\n")
        # Ficheru ta fitxadu i dadus garantidamente gravadu

        ```
  slug: with
  context: intro-python
  provenance: suggested
- term: try/except
  category: Coding
  translations:
    kea:
      local_term: try/except
      definition: >-
        Estrutura di Python ki ta tenta izekuta un bloku i, si un ekseson akontese, ta kaptura-l num
        bloku `except` pa trata-l.
      body: >-
        `try/except` é un estrutura di Python ki ta pormete bu **tenta** izekuta un bloku di kódigu
        i, si algun eru (ekseson) akontese durantu es izekuson, kaptura-l nun bloku `except` invés
        di djá programa krasha. É un ferramenta fundamental pa skrebi programa robustu — kes ki ka
        ta para funsiona kuandu algu inesperadu akontese, sima un ficheru ki ka ezisti, un konexon
        di redi ki fadja, ou un utilizador ki djita un valor inválidu.


        Konseitu prinsipal é sikuinti: kódigu ki pode falha ta bai dentu di bloku `try`. Si un
        ekseson akontese, Python ta salta imediatamenti pa bloku `except` korrespondenti — sen
        izekuta restu di kódigu di `try`. Si nada da eru, bloku `except` ka ta korre. Es padron é
        útil na operasons ku ficheru (ki bu kaba di prende na lisan di riba), undi ki
        `FileNotFoundError` ta pode akontese si ficheru ka ezisti, ou `PermissionError` si bu ka ten
        aseson.


        Bu pode kaptura ekseson genériku (`except Exception:`) ou spesífiku (`except
        FileNotFoundError:`). Rekomendasan é **senpri kaptura tipu spesífiku** ki bu ta spera — asin
        bu ka ta skonde erus ki bu ka konta ku es. Ten tanbe kláusulas opsionais: `else` (ta korre
        si **ka** tevi eru) i `finally` (ta korre **senpri**, ku ou sen eru — útil pa limpeza, mésmu
        ki `with` ta rezolve maioria di kes kazu ku ficheru).


        ## Ezemplus


        Kumesa ku un tentativa di abri un ficheru ki ka ezisti — sen protesan, programa ta krasha:


        ```python

        # Sen try/except — programa ta para ku eru

        with open("vendas.txt", "r") as f:
            print(f.read())
        # FileNotFoundError: [Errno 2] No such file or directory: 'vendas.txt'

        ```


        Ku `try/except`, nu ta kaptura eru i da un mensajen amigável:


        ```python

        # Ku try/except — programa ta kontinua

        try:
            with open("vendas.txt", "r") as f:
                print(f.read())
        except FileNotFoundError:
            print("Ficheru inda ka foi kriadu. Ta kumesa di vaziu.")
        ```


        Bu pode kaptura múltiplu tipus di eru i uza `else` i `finally` pa organiza midjor:


        ```python

        try:
            with open("vendas.txt", "r") as f:
                konteúdu = f.read()
        except FileNotFoundError:
            print("Ficheru ka ezisti.")
        except PermissionError:
            print("Ka ten permison pa ler es ficheru.")
        else:
            # Só ta korre si ka tevi nenhun eru
            print(f"Ficheru lidu ku susesu: {len(konteúdu)} karátrus.")
        finally:
            # Ta korre senpri — ku eru ou sen eru
            print("Operasan di ficheru terminadu.")
        ```


        Un eru kumun é kaptura tudu ku `except:` sen espesifika tipu — es ta skonde bugs i ta fase
        debug difísil:


        ```python

        # Evita es padron — ta skonde tudu erus, mésmu kes ki bu ka spera

        try:
            numeru = int(input("Djita un númeru: "))
            rezultadu = 100 / numeru
        except:  # Muitu jeral!
            print("Algu deu eru.")

        # Midjor: seji spesífiku

        try:
            numeru = int(input("Djita un númeru: "))
            rezultadu = 100 / numeru
        except ValueError:
            print("Bu ka djita un númeru válidu.")
        except ZeroDivisionError:
            print("Ka pode dividi pa zero.")
        ```
  slug: try-except
  context: intro-python
  provenance: suggested
- term: finally
  category: Coding
  translations:
    kea:
      local_term: finally
      definition: >-
        Bloku di un `try/except` ki ta izekuta senpri — mesmu si tinha eru, mesmu si tinha `return`
        — perfeitu pa limpeza.
      body: >-
        Bloku `finally` é un parti opsional di un instrusan `try` ki ta izekuta **senpri**, sen
        inporta o ki akontese na `try`. Si kódiku na `try` korre ben, `finally` ta kore. Si un
        exsesan é lansadu — mesmu si el ka é kapturadu pa nenhun `except` — `finally` ta kore antis
        di kel exsesan propaga. Mesmu si `try`, `except`, ou `else` konten un `return`, `break`, ou
        `continue`, Python ta pára, ta kore `finally`, i dipos ta sigi.


        Es garantia ta faze `finally` perfeitu pa **limpeza di rekursus**: fexa ficherus, fexa
        koneksons di bazi di dadus, libera loks, ou reverti un stadu tenporáriu. Diferenti di un
        simplis linha di limpeza dipos di `try/except`, `finally` ta funsiona mesmu si algu
        inesperadu koreu mal — bo ka ta abandona un ficheru abertu ou un koneksan pendurada.


        Na Python modernu, pa ficherus i konteks similar, `with` é normalmenti más limpu ki
        `try/finally` — el ta trata fexamentu automatikamenti. Ma `finally` inda é útil kuandu bo
        ten limpeza más konplexu (loga un asan, restaura un variável global, notifika un otru
        sistema) ki ka ta kabe na un konteks manager.


        ## Izemplus


        Un uzu típiku: garanti ki un rekursu é liberadu, mesmu si teve eru.


        ```python

        def ler_ficheru(kaminhu):
            ficheru = open(kaminhu, "r")
            try:
                return ficheru.read()
            finally:
                ficheru.close()
                print("Ficheru fexadu.")
        ```


        Repara ki `finally` ta kore **antis** di funsan retorna, mesmu ku `return` na `try`. Es é
        xavi: `ficheru.close()` senpri ta izekuta.


        Un ponto ki ta konfundi txeu prinsipianti — `finally` ta kore mesmu si exsesan ka é
        kapturadu:


        ```python

        def dividi(a, b):
            try:
                return a / b
            finally:
                print("Terminadu tentativa di divizan.")

        dividi(10, 0)

        # Terminadu tentativa di divizan.

        # Traceback (most recent call last):

        #   ...

        # ZeroDivisionError: division by zero

        ```


        Mensajen "Terminadu…" ta parse antis di traceback — `finally` koreu, dipos exsesan propagau
        normalmenti. Si bo kre **trata** eru i inda tene limpeza, kombina `except` ku `finally`:


        ```python

        def dividi_seguru(a, b):
            try:
                return a / b
            except ZeroDivisionError:
                print("Ka pode dividi pa zero!")
                return None
            finally:
                print("Operason di divizan finalizadu.")

        dividi_seguru(10, 0)

        # Ka pode dividi pa zero!

        # Operason di divizan finalizadu.

        ```
  slug: finally
  context: intro-python
  provenance: suggested
- term: raise
  category: Coding
  translations:
    kea:
      local_term: raise
      definition: >-
        Keyword pa lansa un ekseson manualmenti — ta sinaliza un problema pa kódiku ki ta txoma bu
        funsan.
      body: >-
        Na Python, `raise` é un keyword ki ta permiti bu **lansa** un ekseson di forma manuál — pa
        parba ezekusan i sinaliza ki algu ka sta ben. Enkuantu `try/except` ta serví pa **kaptura**
        erus, `raise` ta serví pa **kria-s**: bu ta dizi pa Python "para tudu i aviza kemi ta txoma
        nha kódiku ki tenu un problema aki".


        Bu ta uza `raise` prinsipalmenti pa validasan di argumentus i pa infrasan di regras di
        negósiu. Si un funsan ta reseb un valór ki ka faze sentidu (un lista váziu, un idadi
        negativu, un montanti maior ki saldu), na lugar di kontinua i produzi un rezultadu eradu —
        ou pior, kraxa más tardi ku un mensajen konfusu — é melhor lansa un ekseson lógu ku un
        mensajen klaru. Sintaxi normál é `raise TipuDiEru("mensajen deskritivu")`, undi `TipuDiEru`
        normalmenti é un tipu embutidu di Python komu `ValueError` (valór inválidu) ou `TypeError`
        (tipu eradu), ou un klasi di ekseson personalizadu ki bu própriu difini.


        Un vantaji inportanti di `raise` é ki bu ka ta "engoli" problema — bu ta pasa el pa riba, pa
        kódiku ki ta txoma bu funsan disidí komu reagí. Kel kódiku pode kaptura el ku `try/except`,
        ou dexa el subí más pa riba. Es separasan entri **detetá** un problema (undi `raise` ta
        akontese) i **trata** el (undi `except` ta akontese) é un padran fundamentál pa skrebe
        kódiku robustu.


        ## Examples


        Uzu báziku pa validá argumentus di un funsan:


        ```python

        def kalkula_dexkontu(presu, persentaji):
            if presu < 0:
                raise ValueError("Presu ka pode ser negativu!")
            if not 0 <= persentaji <= 100:
                raise ValueError(f"Persentaji {persentaji} fora di rangu (0-100)!")
            return presu * (1 - persentaji / 100)

        print(kalkula_dexkontu(1000, 20))   # 800.0

        ```


        Kuandu argumentu é inválidu, `raise` ta para funsan lógu:


        ```python

        kalkula_dexkontu(-50, 20)

        # ValueError: Presu ka pode ser negativu!

        ```


        Un eru kumun é uza `raise` sen mensajen ou ku un tipu jenériku dimás — es ta fase debugging
        difísil:


        ```python

        # ERADU — mensajen váziu, tipu jenériku

        def levanta(saldu, montanti):
            if montanti > saldu:
                raise Exception  # Kal problema? Undi?

        # KORETU — tipu spesífiku ku mensajen klaru

        def levanta(saldu, montanti):
            if montanti > saldu:
                raise ValueError(
                    f"Saldu insufisienti: {saldu} ECV, pidiu {montanti} ECV"
                )
            return saldu - montanti
        ```


        Finalmenti, `raise` ta konbina naturalmenti ku `try/except` na kódiku ki ta txoma bu funsan
        — asin bu ta transforma un problema téknikú na un mensajen amigável pa uzuáriu:


        ```python

        try:
            novu_saldu = levanta(5000, 8000)
        except ValueError as e:
            print(f"Transferénsia ka pode ser feitu: {e}")
            # Transferénsia ka pode ser feitu: Saldu insufisienti: 5000 ECV, pidiu 8000 ECV
        ```
  slug: raise
  context: intro-python
  provenance: suggested
- term: type hints
  category: Coding
  translations:
    kea:
      local_term: type hints
      definition: >-
        Anotasons opsional na kódiku Python ki ta indika tipu di parámetrus, variáveis i retornu —
        sujestons pa umanus i ferramentas, ka reglas na runtime.
      body: >-
        **Type hints** é anotasons opsionais ki bu ta adisiona na kódiku Python pa indika ki tipu di
        dadus un variável, un parámetru di funsan, ou un valór di retornu ta espera. Sintaxi bázika
        é dos: pa parámetrus i variáveis, bu ta uza dos pontus dipos di nomi (`nomi: str`), i pa
        retornu di funsan bu ta uza un seta (`def soma(a: int, b: int) -> int:`). Es notasons é un
        forma di dokumenta diretamenti na kódiku o ki antis ta fika só na kumentárius ou na kabésa
        di kin ki skrebe funsan.


        Pontu más importanti — i o ki ta konfundi txeu jenti nobu na Python — é ki type hints **ka é
        verifikadu na runtime**. Python ta inora-s kuandu programa ta roda: bu pode passa un string
        pa un parámetru anotadu kumo `int` i Python ka ta reklama. Entun, pa ki é ki es ta sirbi?
        Trés kuza: (1) dokumentasan pa umanus ki ta ler kódiku, (2) autocomplete i detesan di eru na
        IDEs kumo VS Code, i (3) análizi statik ku ferramentas kumo `mypy`, ki ta le kódiku sen
        roda-l i ta aviza si bu ta uza un tipu eradu. É manera un etiketa na pratelera — ka ta muda
        konteúdu di produtu, ma ta ajuda tudu jenti atxa i intende o ki sta la dentu.


        Na Python modernu (3.9+), bu pode uza tipus di container diretamenti sen inporta nada:
        `list[str]`, `dict[str, int]`, `tuple[float, float]`, `set[int]`. I dezdi 3.10, sintaxi `|`
        ta permiti spresa ki un valór pode ser di más ki un tipu — más komun é `int | None` pa
        funsons ki ta retorna un rezultadu ou nada. Na prátika, kostumi é uza type hints senpri na
        sinatura di funsans (parámetrus i retornu), i só na variáveis kuandu tipu ka é óbviu di
        kontestu.


        ## Ezemplu


        Un funsan simples ku type hints ta mostra klaramenti ki tipu di dadus el ta espera i o ki el
        ta retorna:


        ```python

        def kalkula_média(notas: list[float]) -> float:
            if not notas:
                return 0.0
            return sum(notas) / len(notas)

        média = kalkula_média([15.5, 12.0, 18.3])

        print(média)  # 15.266666666666667

        ```


        Gosi, un ponto surprindenti: Python **ka ta da eru** si bu passa un tipu eradu, mesmu ku
        hints:


        ```python

        def soma(a: int, b: int) -> int:
            return a + b

        # Type hint ta dizi "int", ma Python ta aseita string:

        print(soma("Ola, ", "Mundu"))  # Ola, Mundu

        ```


        Es kódiku ta roda sen problema, pamodi `+` ta funsiona ku strings tanbe. Type hint é só
        sujestan — pa polísia (mypy) da multa, bu ta ten ki roda ferramenta separada:


        ```bash

        $ mypy nha_programa.py

        nha_programa.py:5: error: Argument 1 to "soma" has incompatible type "str"; expected "int"

        ```


        Ku `int | None`, bu pode dokumenta funsons ki ás vezes ka ten rezultadu:


        ```python

        def buska_nota(nomi: str, notas: dict[str, int]) -> int | None:
            return notas.get(nomi)

        rezultadu: int | None = buska_nota("Kelvin", {"Edna": 14})

        if rezultadu is None:
            print("Estudanti ka atxadu")
        else:
            print(f"Nota: {rezultadu}")
        ```


        Es padran ta obriga kin ki ta uza funsan pensa na kazu di `None` — un vantajen grandi pa
        evita erus.
  slug: type-hints
  context: intro-python
  provenance: suggested
- term: mypy
  category: General
  translations:
    kea:
      local_term: mypy
      definition: >-
        Ferramenta di análizi statika ki ta verifika type hints di Python sen kore programa,
        apontandu inkompatibilidadis di tipu.
      body: >-
        **mypy** é un ferramenta di análizi statika pa Python ki ta verifika si type hints na bu
        kódiku ta bate sertu, sen presiza di kore programa. El ta lê bu fitxeru `.py`, ta ulha
        annotasons di tipu (kumo `int`, `str`, `list[float]`, `int | None`) i ta apontá kes lugaris
        undi tipu di un valor ka bate ku o ki foi prometidu.


        Isu é importanti pamodi Python, na runtime, **ka ta verifika type hints** — el ta trata-s
        kumo sujestoens, ka regras. Entun un funsan ki ta espera `int` pode reseber un `str` sen
        Python da eru. É mypy ki, antis di bo kore programa, ta atxa kes inkompatibilidadi i ta
        aviza-bu.


        Pa uza-l, bu ta instala ku `pip` i ta kore-l na bu fitxeru. Si tudu tipus ta bate sertu, el
        ka ta dizi nada. Si atxa un problema, el ta imprimi mensajen di eru ku linha undi problema
        sta.


        ## Example


        ```bash

        pip install mypy

        mypy nha_programa.py

        ```


        ```python

        def soma(a: int, b: int) -> int:
            return a + b

        soma("ola", "mundu")  # mypy: error: Argument 1 has incompatible type "str"

        ```


        Nota ki es kódiku ta **kore normalmenti** na Python (el ta konkatena kes strings). Ma mypy
        ta detekta ki `soma` foi anotadu pa reseber `int`, i ta aviza-bu ki `"ola"` é un `str` — un
        eru ki, sen mypy, só ta parse más tardi ora ki lójika di programa faya.
  slug: mypy
  context: intro-python
  provenance: suggested
- term: pytest
  category: General
  translations:
    kea:
      local_term: pytest
      definition: >-
        Ferramenta popular di testu di Python ki ta diskubri i kore automátikamenti tudu funsons ku
        nomi ki kumesa ku `test_`.
      body: >-
        **pytest** é ferramenta di testu más popular na Python. El ta serbi pa verifika
        automátikamenti ki bu kódiku ta funsiona koretu, sen bu tene ki testa tudu manualmenti kada
        bez ki bu muda algun kuza.


        Kumo el ta funsiona? pytest ta diskubri sózin tudu ficheru ku nomi ki kumesa ku `test_` (ou
        ki akaba ku `_test.py`) i, dentu di es fichérus, el ta kore tudu funsan ki nomi ta kumesa ku
        `test_`. Pa kada testu ki pasa, el ta mostra un `.`; pa kada un ki fayo, un `F` ku splikason
        detalhadu di o ki spirava i o ki resebeu. Es feedback rápidu ta djuda diskubri bugs antis di
        ki uzuáriu atxa es.


        Pa uza pytest, primeru bu instala el ku `pip install pytest` na bu ambienti virtual. Dipos
        bu ta kria funsons di testu ki ta uza `assert` pa verifika konportamentu, i bu ta korê tudu
        ku un simples komandu `pytest` na terminal. Modu verbozu (`pytest -v`) ta mostra nomi di
        kada testu individualmenti.


        ## Example


        ```python

        # test_kalkuladora.py

        from kalkuladora import soma, dividi


        def test_soma_numerus_pozitivu():
            assert soma(2, 3) == 5

        def test_soma_ku_zero():
            assert soma(7, 0) == 7

        def test_dividi_por_zero():
            assert dividi(10, 0) is None
        ```


        ```bash

        pytest -v


        # test_kalkuladora.py::test_soma_numerus_pozitivu PASSED

        # test_kalkuladora.py::test_soma_ku_zero PASSED

        # test_kalkuladora.py::test_dividi_por_zero PASSED

        ```
  slug: pytest
  context: intro-python
  provenance: suggested
- term: assert
  category: Coding
  translations:
    kea:
      local_term: assert
      definition: >-
        Instruson di Python ki ta verifika si un kondisan é `True`; si ka é, ta lansa
        `AssertionError`. É bazi di testus.
      body: >-
        `assert` é un instruson di Python ki ta serbi pa verifika si un kondisan é verdadeiru.
        Sintaxi é simples: bu skrebe `assert` siginidu di un ispreson ki debe da `True`. Si kondisan
        é verdadeiru, Python ka ta faze nada i programa ta kontinua normal. Ma si kondisan é fálsu,
        Python ta lansa imediatamenti un `AssertionError` — un tipu di exseson ki ta para exekusan.


        Bu pode tanbê djunta un mensajen di eru pa splika o ki fayo. Sintaxi é `assert <kondisan>,
        <mensajen>`. Kel mensajen ta parsi na tela djuntu ku `AssertionError`, o ki ta djuda mutu
        debuga o ki ka ta funsiona koretu. Es forma é spesialmente útil na testus, undi bu kre sabi
        rápidu **kal** verifikason fayo.


        `assert` é bazi di kuazi tudu framework di testu na Python, inkluindu `pytest`. Kuandu bu
        skrebe un funsan di testu, kada `assert` ta reprezenta un espetativa sobre kumo bu kódiku
        debe konportá. Si tudu `assert` ta pasa, testu ta pasa; si un fayo, `pytest` ta mostra
        ezatamenti kal linha ki fayo, o ki es speraba, i o ki es resebeu. Es feedback detadjadu é un
        di razons pamodi `assert` é ferramenta prinsipal pa garanti kalidadi di kódiku.


        Un nota importanti: `assert` ka é pa uzá kumo mekanizmu di validason di dadus di uzuáriu na
        kódiku di produson, pamodi Python pode dizativa `assert` kuandu ta kore ku flag `-O`
        (otimizasan). Pa validason real (kumo verifika inputs), uza `if` ku `raise ValueError(...)`.
        `assert` é otimu pa **testus** i pa **verifikasons internu** ki ta konfirma suposisons di
        programador durante dizenvolvimentu.


        ## Examples


        Uzu bázik di `assert` na kondisons simples:


        ```python

        assert 2 + 2 == 4

        assert "kriolu".upper() == "KRIOLU"

        assert len([1, 2, 3]) == 3

        ```


        Kuandu kondisan é fálsu, `AssertionError` ta lansa. Bu pode djunta un mensajen pa splika:


        ```python

        idadi = -5

        assert idadi >= 0, f"Idadi ka pode ser negativu, ma resebi {idadi}"

        # AssertionError: Idadi ka pode ser negativu, ma resebi -5

        ```


        Na kontestu di testu ku `pytest`, kada funsan ta uza `assert` pa verifika komportamentu
        speradu:


        ```python

        def dobra(n: int) -> int:
            return n * 2

        def test_dobra_pozitivu():
            assert dobra(3) == 6

        def test_dobra_zero():
            assert dobra(0) == 0

        def test_dobra_negativu():
            assert dobra(-4) == -8
        ```


        Si algen muda `dobra` pa fazi otra kuza (por izemplu `return n + 2`), testus ta fayo
        imediatamenti i `pytest` ta mostra ezatamenti kal `assert` ka pasa i kal valór resebi versus
        o ki speraba.
  slug: assert
  context: intro-python
  provenance: suggested
- term: class
  category: Coding
  translations:
    kea:
      local_term: klasi
      definition: >-
        Un moldi ou reseta pa kria objetus na Python — ta defini atributus i metodus ki tudu objetu
        di es tipu ta tene.
      body: >-
        Na Python, un **klasi** é un moldi ou reseta ki nu ta uza pa kria objetus. Imajina un klasi
        kumo un planta di kaza: planta ka é kaza, ma el ta defini kumo kada kaza ki nu konstrui ku
        el ta ser — kuantu kuartu, unde é porta, ki kor di paredi. Di mesmu manera, un klasi ta
        defini ki **atributus** (dadus) i ki **metodus** (funsons) tudu objetu di kel tipu ta tene.


        Klasis é fundamentu di **Programasan Orientadu a Objetu (OOP)** — un manera di organiza
        kódiku ki nu ta studa na Módulu 4 di es kursu. En vez di ten dadus i funsons spadjadu na
        kódiku, nu ta gruapa-s djuntu na klasis. Pur izemplu, si bu ta kria un sistema pa jesta
        turistas na Sal, en vez di ten variáveis separadu pa nomi, idadi i nasionalidadi di kada
        turista, bu pode kria un klasi `Turista` ki ta agrupa tudu es informason i kes asons ki un
        turista pode fase.


        Kada bez ki nu ta uza un klasi pa kria un objetu novu, nu ta txoma kel objetu di
        **instánsia** di kel klasi. Un só klasi pode kria milhares di instánsias diferenti, kada un
        ku sus própriu valoris, ma tudu ta sigi mesmu strutura ki klasi ta defini. Es é purki klasis
        é tan poderozu: es ta permiti-nu skrebe kódiku un bes i reuza-l txeu bez.


        Na Python, nu ta uza palavra-xavi `class` pa defini un klasi novu. Nomi di klasi ta kumesa
        ku letra maiúskulu pur konvensan (pur izemplu `Turista`, `Karu`, `Kaza`).


        ## Izemplu


        Un klasi simples pa reprezenta un turista:


        ```python

        class Turista:
            def __init__(self, nomi, ilha):
                self.nomi = nomi
                self.ilha = ilha

            def kumprimenta(self):
                print(f"Ola, N é {self.nomi} i N sta na {self.ilha}!")

        # Kria dôs instánsias di klasi Turista

        turista1 = Turista("Ana", "Sal")

        turista2 = Turista("Pedro", "Boavista")


        turista1.kumprimenta()  # Ola, N é Ana i N sta na Sal!

        turista2.kumprimenta()  # Ola, N é Pedro i N sta na Boavista!

        ```


        Odja ki nu difini klasi **un só bez**, ma nu kria **dôs objetus diferenti** (`turista1` i
        `turista2`), kada un ku sus própriu dadus. Kel método spesial `__init__` ta kori
        automatikamenti kantu nu ta kria un objetu novu, i `self` ta referensia kel instánsia
        spesifiku ki sta ser kriadu.


        Un eru komun kantu nu ta kumesa é skese di `self` na definison di metodus:


        ```python

        class Turista:
            def __init__(nomi):  # Falta self!
                self.nomi = nomi

        turista = Turista("Ana")

        # TypeError: __init__() takes 1 positional argument but 2 were given

        ```


        Python ta pasa objetu automatikamenti kumo primeru argumentu di kualker método, nton nu
        **ten** ki ripe-l na definison. Korresan é simples:


        ```python

        class Turista:
            def __init__(self, nomi):  # Gosi ku self
                self.nomi = nomi

        turista = Turista("Ana")

        print(turista.nomi)  # Ana

        ```


        Klasis ta parse komplikadu na kumesu, ma es ta ben natural ku prátika — i es é un di kes
        ferramentas más poderozu ki Python ta ofrese.
  slug: class
  context: intro-python
  provenance: suggested
- term: object
  category: Coding
  translations:
    kea:
      local_term: objetu
      definition: Un instánsia konkretu di un klasi — kriadu ku `NomiKlasi()` i ku si própriu dadus.
      body: >-
        Na Python, un **objetu** é un instánsia konkretu di un klasi — un "koza" real na memória ku
        si própriu dadus i konportamentu. Kuandu bu ta skrebe `estudanti = {"nomi": "Djina",
        "idadi": 22}`, bu ta kria un objetu di klasi `dict`. Kuandu bu ta skrebe `nomi = "Djina"`,
        bu ta kria un objetu di klasi `str`. Na verdadi, **tudu** na Python é un objetu: númerus,
        strings, listas, disionárius, funsons, i até klasis.


        Kada objetu ten três kozas prinsipal: un **identidadi** (un enderesu úniku na memória, ki bu
        pode odja ku `id(objetu)`), un **tipu** (klasi ki el ta pertense, ki bu pode odja ku
        `type(objetu)`), i un **valor** (dadus ki el ta guarda). Dos variávis pode aponta pa mesmu
        objetu — kel é un konseitu inportanti pa intende pamodi ki `kopia = orijinal` ka ta kria un
        kópia nobu, má só un novu nomi pa mesmu objetu na memória.


        Objetus pode ser **mutável** (bu pode muda si dadus dipos di kriá-l, kumo listas i
        disionárius) ou **imutável** (bu ka pode muda, kumo strings, númerus, i tuplas). Kel
        diferensa é krítiku: kuandu bu ta pasa un objetu mutável pa un funson ó ta atribui-l ku `=`,
        kualker mudansa ta afeta tudu variávis ki ta aponta pa el.


        ## Ezemplu


        Odja kumo dos variávis pode partilha mesmu objetu, i kumo `.copy()` ta rezolvi kel problema:


        ```python

        # Dos nomi, mesmu objetu

        orijinal = {"nomi": "Nuno", "nota": 85}

        otru = orijinal  # Ka é kópia! Mesmu objetu na memória


        print(id(orijinal) == id(otru))  # True — mesmu identidadi


        otru["nota"] = 95

        print(orijinal["nota"])  # 95 — orijinal tanbe muda!

        ```


        Gosi ku `.copy()`, nu ta kria un objetu novu ku si própriu identidadi:


        ```python

        orijinal = {"nomi": "Nuno", "nota": 85}

        kopia = orijinal.copy()  # Objetu novu, dadus independenti


        print(id(orijinal) == id(kopia))  # False — objetus diferenti


        kopia["nota"] = 95

        print(orijinal["nota"])  # 85 — orijinal ka muda ✓

        print(kopia["nota"])     # 95

        ```


        Bu pode senpri verifika ki klasi un objetu ta pertense ku `type()`:


        ```python

        print(type(42))              # <class 'int'>

        print(type("morabeza"))      # <class 'str'>

        print(type([1, 2, 3]))       # <class 'list'>

        print(type({"a": 1}))        # <class 'dict'>

        ```


        Kada un di kes valores é un objetu diferenti, kriadu automátikamenti pa Python kuandu bu
        skrebe kel literal na kódigu.
  slug: object
  context: intro-python
  provenance: suggested
- term: __init__
  category: Coding
  translations:
    kea:
      local_term: __init__
      definition: >-
        Metodu spesial (konstrutor) ki Python ta kore automátikamenti kuandu un objetu novu é
        kriadu, pa inisializa se atributus.
      body: >-
        `__init__` é un **metodu spesial** di Python — el é kel ki ta xamadu di "konstrutor" — ki ta
        kore automátikamenti kada bes ki bu kria un objetu novu di un klasi. Se prinsipal trabadju é
        **inisializa** kel objetu: define se atributus inisial, prepara-l ku valoris ki ben di fóra,
        i garanti ma el ta nase na un stadu válidu. Bo ka ta xama `__init__` diretu — Python ta
        trata di kel kuandu bo skrebi algu tipu `Estudanti("Maria", 22)`.


        Nomi `__init__` ten kes dos underscore na prinsípiu i na fin — un konvensan di Python pa
        metodus spesial (tanbê txomadu "dunder methods", di "double underscore"). Kel primeru
        parametru é senpri `self`, ki ta reprezenta kel objetu novu ki sta ser kriadu. Depos di
        `self`, bu pode po kualker otu parametru ki bu presiza pa konfigura kel objetu. Dentu di
        `__init__`, bu ta uza `self.atributu = valor` pa gravali informasan na kel objetu.


        Un konfuzan komun é pensa ma `__init__` ta **kria** kel objetu — mas na verdadi el ka ta
        kria, el só ta **inisializa** un objetu ki Python dja kriou antis. Otu ponta importanti:
        `__init__` **ka debe retorna nada** (só `None` implísitu). Si bo tenta fazi `return` di
        algu, Python ta lansa un `TypeError`.


        Anbora `__init__` sta na kurríkulu di klasis (Módulu 4 di Python Orientadu a Objetus, ka na
        lisan di módulus i pakotis), bo ta enkontra el bástanti sedu, spesialmenti kuandu bo kumesa
        organiza bo kódiku. Un pakotu ta uza un ficheru xomadu `__init__.py` — kel é un **ficheru**,
        ka un metodu, ma partilha kel mesmu konvensan di nomi dunder pa marka algu spesial pa
        Python.


        ## Ezemplu


        Un klasi sinplis ku `__init__` pa inisializa atributus:


        ```python

        class Estudanti:
            def __init__(self, nomi, idadi, ilha):
                self.nomi = nomi
                self.idadi = idadi
                self.ilha = ilha
                self.notas = []  # lista vazia pa kada estudanti novu

        # Kria objetus — Python ta xama __init__ automátikamenti

        maria = Estudanti("Maria", 22, "Santiago")

        joao = Estudanti("João", 25, "Fogo")


        print(maria.nomi)   # Maria

        print(joao.ilha)    # Fogo

        ```


        Bo pode tanbê po valoris padron, pa alguns argumentus ser opsional:


        ```python

        class Livru:
            def __init__(self, titlu, autor, ano=2024):
                self.titlu = titlu
                self.autor = autor
                self.ano = ano

        l1 = Livru("Chiquinho", "Baltasar Lopes", 1947)

        l2 = Livru("Notas di Python", "Skola")  # ano ta uza 2024


        print(l2.ano)  # 2024

        ```


        Un eru komun é skese di po `self` kumo primeru parametru:


        ```python

        class Kontu:
            def __init__(saldu):   # ❌ Falta 'self'
                self.saldu = saldu

        k = Kontu(100)

        # TypeError: __init__() takes 1 positional argument but 2 were given

        ```


        Kel korreson é senpri po `self` primeru:


        ```python

        class Kontu:
            def __init__(self, saldu):   # ✅
                self.saldu = saldu

        k = Kontu(100)

        print(k.saldu)  # 100

        ```
  slug: init
  context: intro-python
  provenance: suggested
- term: self
  category: Coding
  translations:
    kea:
      local_term: self
      definition: >-
        Referénsia pa objetu atuál dentu di un metodu di klasi — senpri primeru parámetru di kada
        metodu di instánsia.
      body: >-
        Na Python, `self` é referénsia pa **objetu atuál** — kel instánsia di klasi ki ta ser kriadu
        ou usadu na kel momentu. Kuandu bu skrebe un metodu dentu di un klasi, `self` ten ki ser
        **senpri primeru parámetru**, pamodi Python ta pasa automatikamenti kel objetu ki ta txoma
        kel metodu. Un manera fásil di pensa: `self` signifika "**nha**" — kuandu bu skrebe
        `self.nomi = nomi`, é kumo dize "nha nomi é kel valór ki entra".


        `self` é fundamental pa **variáveis di instánsia** funsiona. Kada objetu ki bu kria a partir
        di un klasi tene si própriu kópia di atributus, i `self` é ki ta liga kada atributu ku si
        objetu spesífiku. Sen `self`, Python ka ta sabe si `nomi = "Maria"` é un variável lokál di
        funsan ou un atributu ki debe ser guardadu na objetu. Ku `self.nomi = "Maria"`, bu ta dizi
        klaramenti: "guarda esi nomi **na esi objetu aki**".


        Un koza inportanti: mesmu ki `self` é primeru parámetru na definisan di metodu, bu **ka ta
        pasa el** kuandu ta txoma metodu. Python ta faze isu automátikamenti. Si bu tene
        `maria.saudasan()`, Python ta traduzi es pa algu tipu `Klasi.saudasan(maria)` — el ta pasa
        `maria` kumo `self` pa ubo. Nomi `self` ka é un keyword di Python — é só konvensan ki tudu
        programador Python ta sigi. Teknikamenti bu podia txama el `este` ou `nha`, ma **ka faze
        isu** — otus programadoris ta konfundi.


        ## Izemplus


        Primeru, un uzu koretu di `self` pa distingi atributus di objetu di parámetrus di funsan:


        ```python

        class Karu:
            def __init__(self, marka, kor):
                self.marka = marka   # Guarda na objetu
                self.kor = kor       # Guarda na objetu

            def deskrebe(self):
                return f"{self.marka} di kor {self.kor}"

        karu1 = Karu("Toyota", "vermeju")

        karu2 = Karu("Honda", "azul")


        print(karu1.deskrebe())  # Toyota di kor vermeju

        print(karu2.deskrebe())  # Honda di kor azul

        ```


        Un eru kumun é skese di `self` na definisan di metodu:


        ```python

        class Karu:
            def __init__(self, marka):
                self.marka = marka

            def buzina():   # ← FALTA self!
                print("Piiii!")

        karu = Karu("Toyota")

        karu.buzina()

        # TypeError: buzina() takes 0 positional arguments but 1 was given

        ```


        Python ta reklama pamodi el pasa `karu` automátikamenti kumo primeru argumentu, ma metodu ka
        ten ondi resebe el. Solusan é senpri poi `self` kumo primeru parámetru:


        ```python

        class Karu:
            def __init__(self, marka):
                self.marka = marka

            def buzina(self):   # ← Agora ta funsiona
                print(f"{self.marka} ta buzina: Piiii!")

        karu = Karu("Toyota")

        karu.buzina()  # Toyota ta buzina: Piiii!

        ```


        Nota kumo, ku `self`, metodu `buzina` pode agora **aseder atributus di objetu** — kumo
        `self.marka`. Isu é verdaderu poder di `self`: el ta permiti ki metodus i atributus di mesmu
        objetu trabadja djuntu.
  slug: self
  context: intro-python
  provenance: suggested
- term: attribute
  category: Coding
  translations:
    kea:
      local_term: atributu
      definition: >-
        Un variável ki perténse a un objetu (`self.nomi`) ou a un klasi — ta guarda dadus di kel
        objetu.
      body: >-
        Na Python, un **atributu** é un pesa di dadu ki ta perténse a un objetu ou a un klasi. Si un
        objetu é tipu un "kaixa" ki ta guarda informason, atributus é kes kampu dentu di kaixa ki ta
        diskrivi-l — nomi, saldu, idadi, ou kualker otru propriedadi. Bu ta asesa un atributu ku
        sintaxi di pontu: `objetu.atributu`.


        Na un klasi, atributus ta ser normalmenti kriadu dentu di métodu `__init__` uzandu
        `self.nomi = valór`. Es tipu di atributu (chamadu **atributu di instánsia**) ta perténse só
        a kel objetu spesífiku — kada objetu ten se própriu kópia. Ma también ezisti **atributus di
        klasi**, ki é partiladu pa tudu instánsia di kel klasi. Anda ki nu ta uza mutu dicionáriu na
        kes primeru módulu (tipu `konta["saldu"]`), atributus di objetu ta oferese un manera más
        struturadu i legível di organiza dadus — un tópiku ki bu ta esplora fundu na Módulu 4.


        Un lugar undi bu ta odja atributus **gosi** é na tratamentu di eru. Kuandu bu ta kaptura un
        exsesan ku `except ValueError as e`, kel variável `e` é un objetu di eru — i el ten
        atributus. Pur izemplu, `e.args` ta konten argumentus ki foi pasadu pa kel exsesan, i
        `str(e)` ta da mensajen. Kuandu bu kria bu própriu klasis di exsesan, bu pode adisiona
        atributus personalizadu pa karrega más informason sobri kel problema.


        ## Example


        Un izemplu ki ta mostra atributus na un exsesan personalizadu — un padran ki bu ta odja na
        tratamentu di eru:


        ```python

        class SalduInsufisientiError(Exception):
            def __init__(self, saldu, montanti):
                self.saldu = saldu          # atributu di instánsia
                self.montanti = montanti    # atributu di instánsia
                self.falta = montanti - saldu
                super().__init__(f"Falta {self.falta} ECV")

        try:
            raise SalduInsufisientiError(saldu=5000, montanti=8000)
        except SalduInsufisientiError as e:
            # Asesa atributus ku sintaxi di pontu
            print(f"Mensajen: {e}")
            print(f"Saldu atual: {e.saldu} ECV")
            print(f"Ta tenta levanta: {e.montanti} ECV")
            print(f"Ta falta: {e.falta} ECV")
        ```


        Repara ki `e.saldu`, `e.montanti` i `e.falta` é tudu atributus — dadus ki ta perténse a kel
        objetu di eru spesífiku. Un eru kumun é tenta asesa un atributu ki ka ezisti:


        ```python

        try:
            numeru = int("abc")
        except ValueError as e:
            print(e.saldu)   # AttributeError: 'ValueError' object has no attribute 'saldu'
        ```


        Kel `ValueError` padran di Python ka ten un atributu `saldu` — só klasis ki bu difini ku kel
        atributu ta ten-l. Pa evita es tipu di eru, uza só atributus ki bu sabe ki ezisti na kel
        tipu di objetu, ou uza `hasattr(e, "saldu")` pa verifika primeru.
  slug: attribute
  context: intro-python
  provenance: suggested
- term: method
  category: Coding
  translations:
    kea:
      local_term: metodu
      definition: >-
        Un funsan definidu dentu di un klasi ki ta opera sobri dadus di un objetu — resebi senpri
        `self` kumo primeru parámetru.
      body: >-
        Un **metodu** é un funsan spesial ki ta vive dentu di un klasi i ki ta opera sobri dadus di
        un objetu spesífiku. Kuandu bu ta skrebe `nomi.upper()`, bu sta ta txoma metodu `.upper()`
        ki ta perteense a klasi `str`, i el ta atua sobri valor ki `nomi` ta guarda. Diferentimenti
        di un funsan normal ki bu ta txoma ku `funsan(argumentu)`, un metodu ta ser txomadu ku
        sintaxi di pontu: `objetu.metodu()`. Es sintaxi ta mostra klaru ki metodu **ta perteense** a
        kel objetu.


        Kada metodu ta resebe automátikamenti un primeru parámetru xamadu `self`, ki é referensia pa
        própi objetu ki txoma metodu. Bu ka ta pasa `self` manualmenti — Python ta faze-l pa bo. Pur
        izemplu, kuandu bu skrebe `"ola".upper()`, Python internamenti ta pasa string `"ola"` kumo
        `self` pa metodu. É pa isu ki metodu ta konsigi kunhese ku ki dadus ta trabadja.


        Python ten dezenas di metodus ja inkorporadu pa kada tipu di dadus: strings ten `.upper()`,
        `.strip()`, `.split()`, `.replace()`; listas ten `.append()`, `.sort()`; disionarius ten
        `.keys()`, `.values()`. Un ponto importanti é ki na tipus imutáveis (kumo string), metodus
        **nunka ta muda objetu original** — es ta retorna un valor novu. Pur isu bu ten ki guarda
        rezultadu nun variável si bu kre uza-l dipos.


        Más tardi, kuandu bu prende a kria bu própi klasis, bu ta pode difini bu própi metodus. Ma
        pa gosi, basta intende ki metodu é un funsan ki ta atua sobri un objetu, txomadu ku sintaxi
        di pontu.


        ## Example


        ```python

        # Metodus di string ta atua sobri string ki ta txoma-s

        nomi = "cesaria evora"


        # Aki, "cesaria evora" é self dentu di .title()

        print(nomi.title())   # "Cesaria Evora"


        # Aki, "cesaria evora" é self dentu di .split()

        print(nomi.split())   # ['cesaria', 'evora']

        ```


        Un eru kumun é skese ki metodus di string ka ta muda original:


        ```python

        mensaji = "  ola mundu  "

        mensaji.strip()          # ta retorna "ola mundu" ma ka guarda!

        print(mensaji)           # "  ola mundu  " — ka mudou!

        ```


        Solusan: guarda rezultadu di metodu nun variável (ou reatribui pa mesmu nomi).


        ```python

        mensaji = "  ola mundu  "

        mensaji = mensaji.strip()   # gora sin, guardadu

        print(mensaji)              # "ola mundu"

        ```
  slug: method
  context: intro-python
  provenance: suggested
- term: PascalCase
  category: General
  translations:
    kea:
      local_term: PascalCase
      definition: >-
        Konvensan di nomi unde primeiru letra di kada palavra é maiúskula, sen separador — uzadu pa
        nomis di klasis, pa izemplu `KontaBankaria`.
      body: >-
        **PascalCase** é un konvensan di nomeason unde primeru letra di kada palavra ta ser skritu
        ku maiúskula, sen nenhun separador entri palavras (sen spasu, sen underscore, sen hífen).
        Nomi ben di forma di skrebe ki ta parse ku "picos" di montanha — kada palavra ta kumesa
        altu.


        Na Python, PascalCase é konvensan padron pa **nomi di klasis**. Kuandu bu ta defini un klasi
        ku `class`, bu debe uza PascalCase pa distingi klasi di variáveis normais (ki ta uza
        snake_case). Es reglá ta djuda kualker un ki ta le kódigu a rekonhese lógu ki es é un klasi,
        i ka un funsan ou variável.


        Izemplus di nomi na PascalCase: `Pesoa`, `Estudanti`, `KontaBankáriu`, `Retángulu`,
        `Musiku`. Repara ma na `KontaBankáriu`, tantu "Konta" komu "Bankáriu" ta kumesa ku
        maiúskula, sen nada entri es.


        ## Example


        ```python

        class KontaBankáriu:
            def __init__(self, titulár, sáldu=0):
                self.titulár = titulár
                self.sáldu = sáldu

        class Estudanti:
            def __init__(self, nomi, ilha, nota):
                self.nomi = nomi
                self.ilha = ilha
                self.nota = nota
        ```
  slug: pascalcase
  context: intro-python
  provenance: suggested
- term: inheritance
  category: Coding
  translations:
    kea:
      local_term: eransa
      definition: >-
        Mekanismu unde un klasi filhu ta erda atributus i metodus di un klasi pai — `class
        Filhu(Pai):`.
      body: >-
        **Eransa** (en inglés *inheritance*) é un di kes pilar prinsipal di Programasan Orientadu a
        Objetu (OOP). É un mekanismu ki ta permiti un klasi novu — txomadu **klasi filhu** ou
        *subclass* — erda tudu atributus i metodus di un otu klasi ki dja izisti — txomadu **klasi
        pai** ou *superclass*. Na Python, nu ta faze kel-li ku sintaxi `class Filhu(Pai):`, unde
        nomi di klasi pai ta bai entri parêntesis.


        Pamodi es é útil? Imajina ki bu ta konstrui un sistema ki tene várius tipu di animal: kau,
        gatu, pasáru. Tudu eles tene kuzas en komun — nomi, idadi, kapasidadi di kume ou dormi. En
        vez di repeti kel mesmu kódiku na kada klasi, bu pode kria un klasi `Animal` ku es
        komportamentus komun, i dipos kada tipu spesífiku ta erda del. Kel-li ta evita repetison
        (prinsípiu DRY — *Don't Repeat Yourself*) i ta faze kódiku más faxi di manti.


        Un klasi filhu pode faze trés kuza importanti: **uza** metodus di pai sen mudansa,
        **adisiona** metodus novu ki só el tene, ou **sobrepoi** (override) un metodu di pai pa da-l
        un komportamentu diferenti. Ku funsan `super()`, un filhu pode inda txoma metodu di pai
        diretamenti — útil sobretudu na `__init__` pa iniсializa atributus erdadu. Python inda ta
        suporta *eransa múltiplu*, undi un klasi pode erda di más ki un pai, mas kel-li ta pidi
        kuidadu pamodi pode kria konfuzon.


        Na es kursu, eransa ta ben na Módulu 4, undi nu ta splora OOP en detadju. Pa gosi, é
        sufisienti kompriende ki eransa é forma di reutiliza kódiku i organiza klasis ku relason di
        tipu "X é un tipu di Y" (ex: "un Kau é un Animal").


        ## Examples


        Primeru, un izemplu simples di eransa básiku:


        ```python

        class Animal:
            def __init__(self, nomi):
                self.nomi = nomi

            def kume(self):
                print(f"{self.nomi} sta ta kume.")

        class Kau(Animal):
            def latí(self):
                print(f"{self.nomi} ta fla: Au au!")

        bobi = Kau("Bobi")

        bobi.kume()   # Erdadu di Animal → Bobi sta ta kume.

        bobi.latí()   # Definidu na Kau    → Bobi ta fla: Au au!

        ```


        Repara ki `Kau` ka presiza defini `__init__` nen `kume()` — el ta erda tudu di `Animal`. Ma
        i si nu kre adisiona un atributu novu na filhu, sen skese di iniсializa kes di pai? Nu ta
        uza `super()`:


        ```python

        class Kau(Animal):
            def __init__(self, nomi, rasa):
                super().__init__(nomi)  # Txoma __init__ di Animal
                self.rasa = rasa

            def latí(self):
                print(f"{self.nomi} ({self.rasa}) ta fla: Au au!")

        bobi = Kau("Bobi", "Labrador")

        bobi.latí()  # Bobi (Labrador) ta fla: Au au!

        ```


        Un eru komun é skese di txoma `super().__init__()` — nes kazu, atributu `self.nomi` ka ta
        izisti i bu ta risibi un `AttributeError` óra ki tenta uza-l. Sempri ki klasi pai tene un
        `__init__` ku parâmetrus, klasi filhu debe txoma-l ku `super()` pa garanti ki tudu ta
        iniсializadu koretamenti.
  slug: inheritance
  context: intro-python
  provenance: suggested
- term: super()
  category: Coding
  translations:
    kea:
      local_term: super()
      definition: >-
        Funsan Python ki ta permiti txoma metodus di klasi pai a partir di klasi filhu — komumenti
        uzadu na `__init__`.
      body: >-
        Na eransa, un klasi filhu ta erda tudu di klasi pai — má txeu bês, filhu tene atributus
        própriu ki pai ka konxe, ó kre faze algun kuza extra sen perde kel ki pai dja ta faze. É ali
        ki `super()` ta entra. `super()` é un funsan di Python ki ta da-u un referénsia pa klasi
        pai, i ta permiti-u txoma se metodus a partir di klasi filhu.


        Uzu más komun é dentu di `__init__` di klasi filhu: bu ta txoma `super().__init__(...)` pa
        deixa pai inisializa atributus ki é di el, i dipos bu ta adisiona atributus novu di filhu.
        Sen isu, si bu skrebe `self.marka = marka` di novu na filhu, bu ta sta ta repeti kódiku — i
        si un dia pai muda, filhu ta fika dizatualizadu. `super()` ta rizolvi isu: pai ta kontinua
        responsável di se atributus, filhu ta kuida di se parti.


        `super()` inda ta uti kantu bu ta **sobreskrebe** un metudu. Bu pode kria un nova versan di
        metudu na filhu i, dentu di el, txoma `super().nomi_di_metudu(...)` pa ka pardi lójika di
        pai — só adisiona ó ajusta. Kel-li ta manti kódiku DRY (sen repetisan) i ta faze ierárkia di
        klasis más fásil di manti.


        Un ponto téknikal: dentu di un metudu di klasi, bu ka nesesita pasa argumentu pa `super()` —
        Python ta rezolvi kel pai sozinhu. Fóra di un klasi, `super()` ka ta funsiona.


        ## Ezemplus


        Uzu bázik na `__init__`, ku filhu ta adisiona atributus própriu:


        ```python

        class Animal:
            def __init__(self, nomi, idadi):
                self.nomi = nomi
                self.idadi = idadi

        class Katxor(Animal):
            def __init__(self, nomi, idadi, rasa):
                super().__init__(nomi, idadi)  # Pai ta kuida di nomi i idadi
                self.rasa = rasa               # Filhu ta adisiona rasa

        k = Katxor("Rex", 3, "Labrador")

        print(k.nomi, k.idadi, k.rasa)  # Rex 3 Labrador

        ```


        Un eru komun: skese di txoma `super().__init__()`. Atributus di pai ka ta izisti:


        ```python

        class Katxor(Animal):
            def __init__(self, nomi, idadi, rasa):
                self.rasa = rasa   # Skese di super().__init__()!

        k = Katxor("Rex", 3, "Labrador")

        print(k.nomi)  # AttributeError: 'Katxor' object has no attribute 'nomi'

        ```


        Uzu di `super()` pa sobreskrebe un metudu sen pardi lójika di pai:


        ```python

        class Animal:
            def apresenta(self):
                return f"Nomi: {self.nomi}"

        class Katxor(Animal):
            def apresenta(self):
                bazi = super().apresenta()          # Txoma versan di pai
                return f"{bazi} — Rasa: {self.rasa}" # Adisiona informasan di filhu

        k = Katxor("Rex", 3, "Labrador")

        print(k.apresenta())  # Nomi: Rex — Rasa: Labrador

        ```
  slug: super
  context: intro-python
  provenance: suggested
- term: override
  category: Coding
  translations:
    kea:
      local_term: override
      definition: >-
        Kuandu un klasi filhu ta redefini un metodu ki dja ezisti na klasi pai, substituindu se
        konportamentu.
      body: >-
        Na programason orientadu a objetu, **override** (ô *sobreskrita*) ta akontese kuandu un
        klasi filhu ta define un metudu ku mesmu nomi ki un metudu ki dja ezisti na klasi pai. Kel
        versan novu na filhu ta **substitui** kel di pai kuandu bu ta txoma metudu num objetu di
        klasi filhu. Isu ta permiti ki kada filhu tene se propriu komportamentu, mesmu ki el ta erda
        strutura jerál di pai.


        Overriding é uma forma di **personalizason**. Klasi pai ta oferese un komportamentu jerál —
        bon pa maioria di kazus — mas alguns filhu ta prisiza di algu diferenti. En vez di kria un
        metudu ku nomi novu, bu ta redefini kel mesmu metudu na filhu, i Python ta uza
        otomátikamenti kel versan más spesífiku. Isu é un di pilaris di **polimorfismu**: mesmu
        txomada (`objetu.metudu()`) ta funsiona diferenti dipendendu di tipu di objetu.


        Un ponto inportanti: kuandu bu ta sobreskrebe un metudu, bu ka ta perde asesu a versan di
        pai. Ku `super().metudu()` bu pode **txoma versan orijinál di pai dentu di versan novu**, i
        dipos adisiona ô modifika algu. Isu é útil kuandu filhu kre **stende** komportamentu di pai,
        ka substitui-l totalmenti. Un ezemplu klásiku é `__init__`: filhu ta txoma
        `super().__init__(...)` pa pai inisializa se atributus, dipos filhu ta adisiona se atributus
        própriu.


        ## Ezemplu


        Primeru, un override simples ki ta substitui totalmenti komportamentu di pai:


        ```python

        class Animal:
            def fala(self):
                print("Algun son jenériku...")

        class Katxor(Animal):
            def fala(self):  # override
                print("Au au! 🐕")

        class Gatu(Animal):
            def fala(self):  # override
                print("Miau! 🐈")

        animais = [Animal(), Katxor(), Gatu()]

        for a in animais:
            a.fala()
        # Algun son jenériku...

        # Au au! 🐕

        # Miau! 🐈

        ```


        Kada filhu tene se propriu `fala()`, i Python ta skodje otomátikamenti versan sertu.


        Agora, un kazu undi filhu kre **stende** kel ki pai ta faze, ka substitui-l. Un eru komun é
        skise di txoma `super()`:


        ```python

        class Trabadjor:
            def __init__(self, nomi, saláriu):
                self.nomi = nomi
                self.saláriu = saláriu

        class Profesór(Trabadjor):
            def __init__(self, nomi, saláriu, matéria):
                # ❌ Skisi di txoma super().__init__() — nomi i saláriu ka ta ser inisializadu!
                self.matéria = matéria

        p = Profesór("Amilcar", 65000, "Matimátika")

        print(p.nomi)  # AttributeError: 'Profesór' object has no attribute 'nomi'

        ```


        Sertu é txoma `super().__init__()` pa pai faze se trabadju primeiru:


        ```python

        class Profesór(Trabadjor):
            def __init__(self, nomi, saláriu, matéria):
                super().__init__(nomi, saláriu)  # ✅ pai ta inisializa nomi i saláriu
                self.matéria = matéria           # dipos filhu ta adisiona se atributu

        p = Profesór("Amilcar", 65000, "Matimátika")

        print(p.nomi, p.saláriu, p.matéria)  # Amilcar 65000 Matimátika

        ```


        Kel mesmu padrãu ta funsiona pa kualker metudu: si filhu kre reuza lójika di pai i
        **djunta** algu novu, ta uza `super().nomi_di_metudu(...)` dentu di versan sobreskritu.
  slug: override
  context: intro-python
  provenance: suggested
- term: multiple inheritance
  category: Coding
  translations:
    kea:
      local_term: eransa múltiplu
      definition: >-
        Kapasidadi di un klasi erda di más ki un klasi pai na mesmu tempu — `class Filhu(Pai1,
        Pai2):`.
      body: >-
        **Eransa múltiplu** é un konseitu di programasan orientadu a objetu undi un klasi filhu ta
        erda di **más ki un klasi pai** na mesmu tempu. Na Python, bu ta skrebe isu simplismenti
        pundu tudu pais dentu di paréntesis, separadu pa vírgula: `class Filhu(Pai1, Pai2):`. Klasi
        filhu ta gañá tudu atributus i métudus di tudu se pais, konbinandu funsionalidadis di várias
        fontis nun só klasi.


        Na kontrasti ku **eransa simples** (undi un filhu ten un só pai — kel ki nu odja na lison di
        `Viatúra` i `Taxi`), eransa múltiplu ta permiti kombina komportamentus di klasis diferentis.
        Pur izemplu, si bu ten un klasi `Kanta` i un klasi `Dansa`, bu pode kria un klasi
        `Artista(Kanta, Dansa)` ki ta sabe faze tudu dos. Isu é útil pa kompo objetus ku
        "kapasidadis" di várias fontis sen presiza repeti kódiku.


        Ma eransa múltiplu ta traze un komplikason: si dos pais ten un métudu ku **mesmu nomi**, kal
        ki Python ta uza? Pa rizolvi isu, Python ta uza **MRO** (Method Resolution Order — Orden di
        Rezolusan di Métudus), ki é un algoritmu ki ta disidi ordi di buska di métudus na kadea di
        eransa. Bu pode odja MRO di un klasi ku `Klasi.__mro__` ou `Klasi.mro()`. Pa evita konfuzon,
        txoma `super()` na eransa múltiplu ta sigi es orden — ka ta txoma "tudu pais"
        automátikamenti; bu ten ki ntende bon komu MRO ta funsiona.


        Pamodi es komplexidadi, txeu linguajens (kumu Java) ka ta permiti eransa múltiplu. Python ta
        permiti-l, mas na prátika é más siguru uzá-l ku kuidadu — na mutus kazu, un padron txomadu
        **mixin** (klasis pikinoti ku funsionalidadi spesífiku pa "mistura" ku otus) é forma más
        limpa di uzá eransa múltiplu.


        ## Ezemplu


        Un kazu simplis ku dos pais indipendenti:


        ```python

        class Kanta:
            def kanta(self):
                print("🎤 Ta kantá un morna...")

        class Dansa:
            def dansa(self):
                print("💃 Ta dansá funaná...")

        # Artista ta erda di dos klasis

        class Artista(Kanta, Dansa):
            def __init__(self, nomi):
                self.nomi = nomi

        tito = Artista("Tito Paris")

        tito.kanta()   # 🎤 Ta kantá un morna...

        tito.dansa()   # 💃 Ta dansá funaná...

        ```


        Gósi un kazu undi dos pais ten un métudu ku mesmu nomi — MRO ta disidi kal ki ta ganha:


        ```python

        class Pai1:
            def salada(self):
                print("Olá di Pai1")

        class Pai2:
            def salada(self):
                print("Olá di Pai2")

        class Filhu(Pai1, Pai2):
            pass

        f = Filhu()

        f.salada()              # Olá di Pai1  (Pai1 ben primeru na lista)

        print(Filhu.__mro__)    # (Filhu, Pai1, Pai2, object)

        ```


        Python ta sigi orden ki bu skrebe pais: komu `Pai1` ben primeru, se `salada()` é kel ki ta
        ser txomadu. Si bu troka pa `class Filhu(Pai2, Pai1)`, gosi `Pai2` ta ganha. Pa txoma
        **konstrutoris di tudu pais** di forma seguru na eransa múltiplu, kada klasi divi uza
        `super().__init__(...)` — isu ta sigi MRO i ta garanti ki tudu inisializason ta korre na
        orden korretu.


        Pa gósi, na kursu, foka na eransa simples ku `super()` — kantu bu ntende bon kel ki, eransa
        múltiplu i MRO ta ben ser un pasu naturál di prósimu.
  slug: multiple-inheritance
  context: intro-python
  provenance: suggested
- term: issubclass()
  category: Coding
  translations:
    kea:
      local_term: issubclass()
      definition: >-
        Funsan built-in ki ta verifika si un klasi é subklasi (filhu diretu ou indiretu) di otu
        klasi.
      body: >-
        `issubclass()` é un funsan built-in di Python ki ta verifika si un klasi é subklasi (filhu
        diretu ou indiretu) di otu klasi. El ta rasebe dos argumentu — `issubclass(Filhu, Pai)` — i
        ta returna `True` si `Filhu` erda di `Pai` (direta ou pa via di un kadeia di eransa), ou
        `False` na kazu kontráriu. Ténpu ki `isinstance()` ta trabadja ku **objetis** (instánsias),
        `issubclass()` ta trabadja ku **klasis** — es é un distinsan inportanti.


        Un detalhi ki ta konfundi prinsipianti: tudu klasi é subklasi di si mesmu, entãu
        `issubclass(Viatúra, Viatúra)` ta returna `True`. Alén di kel-li, `issubclass()` ta konta ku
        eransa indireta — si `C` erda di `B`, i `B` erda di `A`, entãu `issubclass(C, A)` é `True`,
        mésmu ki `C` ka mensiona `A` diretamenti. Isu ta funsiona tanbe ku eransa múltiplu: si un
        klasi tene vários pai, el é subklasi di kada un di es.


        Bu pode tanbe pasa un **tuplu di klasis** komu sigundu argumentu, i `issubclass()` ta
        returna `True` si primeru klasi é subklasi di **kualker** un di es. Isu é útil kuandu bu kre
        aseta várias posibilidadis. Kuidadu: si primeru argumentu ka é un klasi (por izenplu, un
        objetu ou un string), Python ta lansa `TypeError`.


        ## Exemplos


        Uzu báziku ku eransa simples i múltiplu:


        ```python

        class Viatúra:
            pass

        class Taxi(Viatúra):
            pass

        class TaxiEletriku(Taxi):
            pass

        # Subklasi direta

        print(issubclass(Taxi, Viatúra))         # True


        # Subklasi indireta (via Taxi)

        print(issubclass(TaxiEletriku, Viatúra)) # True


        # Klasi é subklasi di si mesmu

        print(issubclass(Viatúra, Viatúra))      # True


        # Ka tene relasan

        print(issubclass(Viatúra, Taxi))         # False (pai ka é filhu)

        ```


        Ku un tuplu di klasis, pa aseta várias opsons di una bes:


        ```python

        class Kompozitor:
            pass

        class Artista:
            pass

        class MúzikuKompletu(Artista, Kompozitor):
            pass

        # É subklasi di kualker un?

        print(issubclass(MúzikuKompletu, (Artista, Kompozitor)))  # True

        print(issubclass(Taxi, (Artista, Kompozitor)))            # False

        ```


        Éru komun — pasa un **objetu** en bez di un **klasi**:


        ```python

        taxi = Taxi()

        print(issubclass(taxi, Viatúra))

        # TypeError: issubclass() arg 1 must be a class

        ```


        Pa verifika un objetu, uza `isinstance()`; pa verifika un klasi, uza `issubclass()`:


        ```python

        print(isinstance(taxi, Viatúra))    # True  — objetu vs klasi

        print(issubclass(Taxi, Viatúra))    # True  — klasi vs klasi

        ```
