  provenance: suggested
- term: polymorphism
  category: Coding
  translations:
    kea:
      local_term: polimorfismu
      definition: >-
        Konseitu OOP unde mesmu metodu tene konportamentu diferenti dependendu di klasi — 'txeu
        formas'.
      body: >-
        **Polimorfismu** é un konseitu fundamental di Programasan Orientadu a Objetu (OOP) ki ta
        permiti ki mesmu metudu ô operason tene komportamentu diferenti dependendu di klasi di
        objetu ki ta uza-l. Palavra "polimorfismu" ben di gregu i ta signifika literalmenti "txeu
        formas" — un só nomi, ma várius formas di funciona.


        Na prátika, polimorfismu ta permiti bu skrebe kódigu más flexível i reutilizável. Pur
        izemplu, si bu tene várius klasis di animais i tudu es tene un metudu txomadu `faze_son()`,
        kada klasi pode implementa kel metudu di se manera propi — un ka ta lati, un gatu ta miau,
        un vaka ta muge. Bu pode txoma `faze_son()` na kualker animal sen presiza sabi exatamenti ki
        tipu di animal é. Python ta rezolvi automatikamenti kal versan di metudu ki debi kore.


        Polimorfismu ta trabadja normalmenti djuntu ku **eransa**: klasis-fidju ta erda metudus di
        klasi-mai i podi **sobreskrebe** (override) es metudus pa da-s komportamentu spesífiku. Es é
        un di kes pilar prinsipal di OOP, djuntu ku enkapsulamentu, eransa, i abstrasan. Na Módulu 4
        di es kursu, nu ta splora polimorfismu na profundidadi.


        Un vantajen grandi di polimorfismu é ki bu kódigu ta fika **abertu pa extensan**: bu pode
        adisiona klasis novu ki ta funsiona ku kódigu ki dja skritu, sen presiza modifika-l. Isu ta
        faze programas más faxi di manti i kresi.


        ## Example


        Odja un izemplu ku klasis di animais:


        ```python

        class Animal:
            def faze_son(self):
                print("Es animal ta faze un son.")

        class Katxor(Animal):
            def faze_son(self):
                print("Au au!")

        class Gatu(Animal):
            def faze_son(self):
                print("Miau!")

        class Vaka(Animal):
            def faze_son(self):
                print("Muuu!")
        ```


        Kada klasi-fidju ta sobreskrebe metudu `faze_son()` ku se propi versan. Gosi nu pode trata
        tudu es animais di forma uniformi:


        ```python

        animais = [Katxor(), Gatu(), Vaka()]


        for animal in animais:
            animal.faze_son()
        ```


        Rezultadu:


        ```

        Au au!

        Miau!

        Muuu!

        ```


        Repara ki nu ka presiza verifika tipu di kada animal ku `if`/`else`. Python ta txoma
        automatikamenti versan sertu di `faze_son()` pa kada objetu — isu é polimorfismu na ason.


        Un izemplu más prátiku, konektadu ku Kabu Verdi: imagina un sistema di pagamentus pa un app
        di turismu:


        ```python

        class Pagamentu:
            def prosesa(self, valor):
                print(f"Prosesa {valor} ECV.")

        class PagamentuMpesa(Pagamentu):
            def prosesa(self, valor):
                print(f"Pagamentu di {valor} ECV via M-Pesa.")

        class PagamentuKartan(Pagamentu):
            def prosesa(self, valor):
                print(f"Pagamentu di {valor} ECV ku kartan di krédito.")

        # Un só funsan ki ta trabadja ku kualker tipu di pagamentu

        def finaliza_kompra(pagamentu, valor):
            pagamentu.prosesa(valor)

        finaliza_kompra(PagamentuMpesa(), 5000)

        finaliza_kompra(PagamentuKartan(), 12000)

        ```


        Funsan `finaliza_kompra()` ka ta importa ku tipu spesífiku di pagamentu — el ta funsiona ku
        kualker klasi ki tene metudu `prosesa()`. Si manhan bu kria un klasi novu `PagamentuPayPal`,
        kódigu izistenti ta kontinua funsiona sen mudansa. Es é forsa di polimorfismu.
  slug: polymorphism
  context: intro-python
  provenance: suggested
- term: duck typing
  category: Coding
  translations:
    kea:
      local_term: duck typing
      definition: >-
        Filosofia di Python: si un objetu tene metodus nesesáriu, el ta funsiona — ka presiza ser di
        un tipu spesifiku.
      body: >-
        Duck typing é un filozofia sentral di Python ki ta dize: **si un objetu tene metodus
        nesesáriu, el ta funsiona — ka presiza ser di un tipu spesífiku**. Nomi ben di un ditadu
        inglés: *"If it walks like a duck and quacks like a duck, then it is a duck"* — "Si el ta
        anda kumo patu i ta faze kuak kumo patu, entun el é patu." Signifika ki Python ka ta
        pergunta "Ki tipu bu é?" — el ta pergunta "Bu ta faze ki metodu ki N presiza?"


        Na otus linguajens (kumo Java ou C++), pa un funsan aseta un objetu, kel objetu ten ki ser
        di un tipu spesífiku ou erda di un klasi/interfasi konkretu. Na Python, isu ka é nesesáriu.
        Si bu funsan ta txoma `.toka()`, kualker objetu ku metodu `.toka()` ta funsiona — sen
        importa si el é `Morna`, `Funana`, `Batuku`, ou un klasi ki bu ainda ka kriá. Isu ta faze
        kódigu mutu más flexível i polimórfiku sen presiza di eransa.


        Duck typing é bazi di polimorfismu na Python. Kuandu bu skrebe un funsan ki ta prosesa un
        lista di objetus i ta txoma mesmu metodu na kada un, bu sta ta konfia ki tudu es tene kel
        metodu — sen verifika si es é di mesmu klasi. Isu ta permiti djunta klasis novu sen muda
        kódigu ki dja funsiona. Ma tanbén tene un riscu: si un objetu ka tene metodu speradu, bu ta
        risibi un `AttributeError` só na momentu di ezekusan (runtime), ka na momentu di skreve
        kódigu.


        ## Example


        Trés klasis diferenti, sen eransa entri es, ma tudu ku mesmu "interfasi" (metodu `toka()`):


        ```python

        class Morna:
            def toka(self):
                return "🎵 Sodadi, sodadi..."

        class Funana:
            def toka(self):
                return "🥁 Tum-tum-taka-taka!"

        class Batuku:
            def toka(self):
                return "👏 Pam-pam-pam!"

        def apresenta(muzikanti):
            # Ka ta importa ki tipu el é — dizde ki tene .toka()
            print(muzikanti.toka())

        for m in [Morna(), Funana(), Batuku()]:
            apresenta(m)
        ```


        Nota ki `Morna`, `Funana` i `Batuku` ka ta erda di klasi kumun. Funsan `apresenta()` ta
        funsiona ku kualker un — isu é duck typing na asan.


        Gosi un izemplu di kuandu ta da eru. Si N djunta un objetu ki **ka** tene `.toka()`:


        ```python

        class Kantador:
            def kanta(self):
                return "La la la!"

        apresenta(Kantador())

        # AttributeError: 'Kantador' object has no attribute 'toka'

        ```


        Python ka ta bloke-nu di pasa `Kantador` pa funsan — el só ta deskubri problema kuandu el
        tenta txoma `.toka()`. Solusan é sértifika ki tudu objetu ki bo ta pasa ta implementa
        metodus ki funsan ta uza:


        ```python

        class Kantador:
            def kanta(self):
                return "La la la!"

            def toka(self):  # Djunta metodu ki interfasi ta izigi
                return f"🎤 {self.kanta()}"

        apresenta(Kantador())  # 🎤 La la la!

        ```


        Pa kazus más rigorozu — kuandu bu kre **forsa** ki klasis fidju implementa sertus metodus —
        Python ta ofrese `ABC` ku `@abstractmethod`. Ma pa mutu kódigu di dia-a-dia, duck typing
        sinples ta bastá: si el ta faze kuak, é patu.
  slug: duck-typing
  context: intro-python
  provenance: suggested
- term: '@abstractmethod'
  category: Coding
  translations:
    kea:
      local_term: '@abstractmethod'
      definition: >-
        Dekorador ki ta marka un metodu di un klasi ABC kumo obrigatóriu — kualker filhu konkretu
        ten ki implementa-l.
      body: >-
        `@abstractmethod` é un **dekorador** ki ben di módulu `abc` (Abstract Base Classes) di
        Python. Bu ta uza-l pa marka un metodu di un klasi abstratu kumo **obrigatóriu** — kualker
        subklasi konkretu ki ta erda di kel klasi TEN KI implementa kel metodu, sinan Python ka ta
        dexa bo kria un objetu di kel subklasi.


        Pa `@abstractmethod` funsiona, klasi ten ki erda di `ABC` (ou uza `metaclass=ABCMeta`). Sen
        isu, dekorador ka ten efeitu — el ta ser inoradu i Python ka ta forsa nada. Kombinasan `ABC`
        + `@abstractmethod` é ki ta kria kontratu: `ABC` ta previni instansiasan direta di klasi
        pai, i `@abstractmethod` ta marka kais metodus ki subklasis ten ki di preencher.


        Vantajen prinsipál é ki bu ta apanha erus **sedu** — na momentu di kria objetu, ka más tardi
        kuandu algen ta txoma un metodu ki ka ta esisti ou ki ta retorna un valor sen sentidu. Isu
        ta funsiona djuntu ku polimorfismu: bu ta garanti ki tudu subklasi ten mesmu interfasi,
        entun funsons polimórfiku pode konfia ki metodu ta esisti sénpri. Nota ki bu pode mistura
        livrimenti metodus abstratu (`@abstractmethod`) ku metodus konkretu normal na mesmu klasi
        ABC — metodus konkretu ta ser erdadu diretu, i abstratus ten ki ser implementadu.


        ## Izemplu


        Uzu báziku — un klasi abstratu `Forma` ki ta obriga tudu fidju a implementa `area()`:


        ```python

        from abc import ABC, abstractmethod


        class Forma(ABC):
            @abstractmethod
            def area(self):
                pass

        class Sirkulu(Forma):
            def __init__(self, raiu):
                self.raiu = raiu

            def area(self):
                return 3.14159 * self.raiu ** 2

        s = Sirkulu(5)

        print(s.area())  # 78.53975

        ```


        Si bu tenta instansiar klasi abstratu diretu, Python ta rejeita:


        ```python

        f = Forma()

        # TypeError: Can't instantiate abstract class Forma

        # with abstract method area

        ```


        I si un subklasi **skise** di implementa un metodu abstratu, mesmu eru ta kontise — mesmu ki
        bu implementa otus metodus:


        ```python

        class Triangulu(Forma):
            def __init__(self, bazi, altura):
                self.bazi = bazi
                self.altura = altura
            # Skise implementa area()!

        t = Triangulu(3, 4)

        # TypeError: Can't instantiate abstract class Triangulu

        # with abstract method area

        ```


        Pa korrigi, bazta djunta implementasan ki falta:


        ```python

        class Triangulu(Forma):
            def __init__(self, bazi, altura):
                self.bazi = bazi
                self.altura = altura

            def area(self):
                return (self.bazi * self.altura) / 2

        t = Triangulu(3, 4)

        print(t.area())  # 6.0

        ```
  slug: abstractmethod
  context: intro-python
  provenance: suggested
- term: encapsulation
  category: Coding
  translations:
    kea:
      local_term: enkapsolamentu
      definition: >-
        Prinsípiu OOP di eskonde detalhis internus di un objetu i kontrola asésu ku niveis públiku,
        protejidu i privadu.
      body: >-
        Enkapsolamentu é un di kuatru prinsípius fundamentál di Programasan Orientadu a Objetu
        (djuntu ku heransa, polimorfismu i abstrasan). Ideia sentrál é simplis: **skonde detalhis
        internus di un objetu i kontrola ken ki pode ler ou modifika kes dadus**. En bez di dexa
        tudu abertu pa kualker un mexe, bu ta espone só interfasi ki ta faze sentidu, i bu ta
        proteje partis sensíveis. Kel-li ta faze kódigu más siguru, más fásil di manten, i más
        difísil di uza mal.


        Na Python, enkapsolamentu ta funsiona prinsipalmenti pa **konvensan di nomi**. Un atributu
        ku nomi normal (`self.saldu`) é públiku — kualker un pode ler i skrebe. Un atributu ku un
        underscore (`self._saldu`) é protejidu por konvensan — el ta funsiona igual, ma nomi ta
        avisa otrus programadoris ki es ka debe toka nel diretamenti. I un atributu ku dos
        underscore (`self.__saldu`) ta ativa **name mangling**: Python ta muda nomi internu pa
        `_NomiDaKlasi__saldu`, ki ta previni asésu asidentál i konflitus di nomi na heransa. Nota ki
        isu ka é seguránsa real — é protesan kontra erus, nau kontra ataki.


        Un uzu típiku di enkapsolamentu é enkorpora **validasan**: en bez di dexa algen faze
        `konta.saldu = -1_000_000`, bu ta guarda saldu nun atributu privadu i ta forsé pasajen pa un
        metodu ki ta verifika si valor é válidu. Maneira tradisionál di faze isu é ku metodus
        getter/setter (`get_saldu()`, `set_saldu(v)`), ma Python ta oferese un solusan más eleganti:
        dekorador `@property`.


        Ku `@property`, bu ta transforma un metodu nun atributu — utilizador ta skrebe `konta.saldu`
        (sen paréntesis) i Python ta txoma un funsan pa trás. Djuntandu `@saldu.setter`, bu pode
        interseta atribuisons (`konta.saldu = 500`) pa validá-s antis di grava. Kel-li ta da bo
        milhor di dos mundus: **interfasi simplis di atributu ku puder di un metodu**. Un padron
        relasionadu é kria **properties só-di-leitura** (sen setter) pa valoris kalkuladu, kumo un
        `area` ki ta multiplika largura ku altura na momentu di asésu.


        ## Izemplu


        Prumeru, un klasi sen enkapsolamentu — tudu abertu, sen protesan:


        ```python

        class Termometru:
            def __init__(self, celsius):
                self.celsius = celsius  # Públiku, sen validasan

        t = Termometru(25)

        t.celsius = -500   # Impossível na fízika (menor ki zero absolutu), ma Python ta seta!

        print(t.celsius)   # -500  😱

        ```


        Agora ku atributu privadu i `@property` ku validasan:


        ```python

        class Termometru:
            def __init__(self, celsius):
                self.celsius = celsius  # Ta pasa pa setter, ki ta validá

            @property
            def celsius(self):
                return self.__celsius

            @celsius.setter
            def celsius(self, valor):
                if valor < -273.15:
                    raise ValueError("Temperatura ka pode ser menor ki zero absolutu!")
                self.__celsius = valor

            @property
            def fahrenheit(self):
                """Property kalkuladu — só leitura."""
                return self.__celsius * 9/5 + 32

        t = Termometru(25)

        print(t.celsius)      # 25

        print(t.fahrenheit)   # 77.0  (kalkuladu automatikamenti)


        t.celsius = 30        # Funsiona — validasan ta pasa

        print(t.fahrenheit)   # 86.0  (rekalkula sózin!)

        ```


        I si algen tenta un valor inválidu, enkapsolamentu ta proteje objetu:


        ```python

        t.celsius = -1000

        # ValueError: Temperatura ka pode ser menor ki zero absolutu!


        t.fahrenheit = 100

        # AttributeError: property 'fahrenheit' of 'Termometru' object has no setter

        ```


        Nota kumo `fahrenheit` ka tene setter — el é un valor derivadu di `celsius`, entu ka faze
        sentidu setá-l diretamenti. Kel-li é un dizenhu limpu: klasi ta ekspõe só operasons ki ta
        faze sentidu, i ta rejeta tudu restu.
  slug: encapsulation
  context: intro-python
  provenance: suggested
- term: name mangling
  category: Coding
  translations:
    kea:
      local_term: name mangling
      definition: >-
        Mekanismu di Python ki ta transforma nomis privadu (`__var`) internamenti pa `_Klasi__var`,
        protejendu-s di asésu asidentál.
      body: >-
        **Name mangling** é un mekanismu automátiku di Python ki ta transforma nomi di atributus ki
        ta kumesa ku dos underscore (`__`) na inísiu — ma **sen** dos underscore na fin. Kuandu bu
        skrebe `self.__saldu` déntu di un klasi txomadu `KontaBankaria`, Python ta muda kel nomi
        internamenti pa `_KontaBankaria__saldu`. Isu ta kontise na momentu di kompilasan, sen bu
        presiza faze nada.


        Objetivu prinsipal di name mangling é **evita konflitus di nomi** entri klasi mai i klasi
        fidju na herénsia. Si un klasi mai tene un atributu `__dadus` i un klasi fidju tanbe kria
        `__dadus`, es ka ta kolidi — kada un ta ser transformadu ku nomi di se própiu klasi
        (`_Mai__dadus` i `_Fidju__dadus`). Alen di isu, name mangling ta serbi kumo un forma di
        **protesan kontra asésu asidentál**: si bu tenta `konta.__saldu` di fora di klasi, bu ta
        risibi `AttributeError`, pamodi kel atributu ka egziste ku kel nomi — el foi renomeadu.


        É importanti intende ki name mangling **ka é seguránsa real**. El é un konvensan reforsadu
        pa Python, ma si algen mesmu kre asésa atributu, el pode skrebe
        `konta._KontaBankaria__saldu` diretamenti i funsiona. Menságen ki name mangling ta manda é
        klaru: "Kel atributu li é un detali internu di implementasan, ka toka nel di fora". Pa dadus
        verdaderamenti seguru (kumo passwords ou tokens), bu ten ki uza otrus tékniku, kumo
        enkriptasan ou variavéis di ambienti.


        Na prátika, name mangling ta konbina txeu ben ku `@property`: bu ta guarda valor real na un
        atributu privadu (`self.__presu`) i ta ekspoi asésu kontroladu através di un property
        públiku (`self.presu`) ki pode inklui validasan.


        ## Example


        Un izemplu simples ki ta mostra transformasan:


        ```python

        class Estudanti:
            def __init__(self, nomi, nota):
                self.nomi = nomi       # públiku
                self.__nota = nota     # privadu — Python ta transforma nomi

        maria = Estudanti("Maria", 16)


        print(maria.nomi)              # Maria ✅

        # print(maria.__nota)          # AttributeError!

        ```


        Si bu uza `dir()` pa spia atributus di objetu, bu ta odjá nomi transformadu:


        ```python

        print([attr for attr in dir(maria) if "nota" in attr])

        # ['_Estudanti__nota']


        # Bu pode asésa ku nomi transformadu — ma NUNKA faze isu na kódiku real!

        print(maria._Estudanti__nota)  # 16 ⚠️

        ```


        Un vantajen inportanti di name mangling ta parsi na herénsia, undi el ta evita ki fidju
        "pisa" atributu privadu di mai sen keré:


        ```python

        class Mai:
            def __init__(self):
                self.__sekretu = "sekretu di mai"

            def mostra_mai(self):
                return self.__sekretu   # ta buska _Mai__sekretu

        class Fidju(Mai):
            def __init__(self):
                super().__init__()
                self.__sekretu = "sekretu di fidju"  # ta vira _Fidju__sekretu

            def mostra_fidju(self):
                return self.__sekretu

        f = Fidju()

        print(f.mostra_mai())    # sekretu di mai

        print(f.mostra_fidju())  # sekretu di fidju

        ```


        Sen name mangling, `__sekretu` di fidju ta subistitui `__sekretu` di mai i `mostra_mai()` ta
        retorna valor eradu. Ku name mangling, kada klasi tene se própiu "spasu" pa atributus
        privadu.
  slug: name-mangling
  context: intro-python
  provenance: suggested
- term: '@property'
  category: Coding
  translations:
    kea:
      local_term: '@property'
      definition: >-
        Dekorador ki ta transforma un metodu na un atributu di só-leitura — utilizador ta asesa-l
        sen paréntesis.
      body: >-
        Na Python, `@property` é un dekorador ki ta pirmiti bu difini un metodu ki ta funsiona kumo
        si el fose un atributu. En bez di txoma-l ku paréntesis (`obj.metodu()`), utilizador ta
        asesa-l diretamenti (`obj.atributu`). Isu ta da bo un interfasi limpu i naturál pa kes ki ta
        uza bu klasi, ma ku vantajen di tene un funsan ki ta kore pa trás — undi bu pode faze
        validasan, kálkulu, ou proteje dadus internu.


        Un uzu komun di `@property` é pa kria **getters** pa atributus privadu (kes ki ta kumesa ku
        `__`). Bu ta guarda valor real na un atributu privadu, i ta ekspoi-l pa mundu di fora via un
        property. Sen un setter korrespondenti (`@nomi.setter`), kel property ta fika **só-leitura**
        — utilizador pode ler, ma ka pode muda. Isu é útil pa proteje dadus sensível kumo saldu di
        konta, ou pa garanti ki serti valóris ka ta ser altéradu diretamenti.


        Otru uzu ta forti di `@property` é pa kria **valóris kalkuladu** — atributus ki ta depende
        di otrus atributus i ki ta rekalkulá otomatikamenti tudu vez ki bu asesa-l. Pur izemplu,
        área di un retángulu, idadi baziadu na data di naximentu, ou temperatura konvertidu di
        Celsius pa Fahrenheit. Kumo ka tene un valor guardadu, el ta sta senpri atualizadu.


        Kompara ku maneira tradisionál di getters/setters (kumo na Java), `@property` é más
        "Pythonic" — kódiku ta fika más kurtu, más limpu, i más natural di uza. Ademais, bu pode
        kumesa ku un atributu públiku simples i **más tardi** transforma-l nun property sen kebra
        kódiku di kes ki ta uza bu klasi, pamodi sintaxi di asésu ta fika mesmu.


        ## Izemplus


        Un property simples só-leitura:


        ```python

        class Sirkulu:
            def __init__(self, raiu):
                self.__raiu = raiu

            @property
            def raiu(self):
                return self.__raiu

            @property
            def area(self):
                """Property kalkuladu — ta depende di raiu."""
                return 3.14159 * self.__raiu ** 2

        s = Sirkulu(5)

        print(s.raiu)   # 5  (sen paréntesis!)

        print(s.area)   # 78.53975

        ```


        Nota ki `s.area` ka ten paréntesis, mesmu ki é un metodu pa trás. Agora, si bu tenta muda un
        property sen setter, Python ta da eru:


        ```python

        s.raiu = 10

        # AttributeError: property 'raiu' of 'Sirkulu' object has no setter

        ```


        Pa pirmiti mudansa ku validasan, bu ta djunta un setter ku `@raiu.setter`:


        ```python

        class Sirkulu:
            def __init__(self, raiu):
                self.raiu = raiu  # Ta uza setter — validasan ta kore!

            @property
            def raiu(self):
                return self.__raiu

            @raiu.setter
            def raiu(self, valor):
                if valor <= 0:
                    raise ValueError("Raiu ten ki ser positivu!")
                self.__raiu = valor

            @property
            def area(self):
                return 3.14159 * self.__raiu ** 2

        s = Sirkulu(5)

        s.raiu = 10           # Funsiona — validasan ta pasa

        print(s.area)         # 314.159 (rekalkula otomatikamenti!)


        s.raiu = -3           # ValueError: Raiu ten ki ser positivu!

        ```


        Repara kumo `area` ka presiza di setter — el ta rekalkulá senpri ki bu asesa-l, uzandu valor
        atuál di `__raiu`. Kel-li é forsa di property kalkuladu: valor ta sta **senpri konsistenti**
        ku restu di objetu.
  slug: property
  context: intro-python
  provenance: suggested
- term: getter
  category: Coding
  translations:
    kea:
      local_term: getter
      definition: >-
        Un metodu ki ta retorna valor di un atributu privadu — na Python moderno, uzadu ku dekorador
        `@property`.
      body: >-
        Na programason orientadu a objetu, un **getter** é un metodu ki tene un úniku trabadju:
        retorna valor di un atributu — normalmenti un atributu privadu (kumo `self.__saldu` ou
        `self.__nomi`) ki ka debe ser asesadu diretamenti di fora di klasi. Idéia é kontrola kumo
        dadus internu di un objetu ta ekspostu, en bez di dexa tudu abertu pa kualker un mexi.


        Na linguajis kumo Java ou C++, getters é metodus normal ku nomi kumo `get_presu()` ou
        `getSaldu()`, ki bu ten ki txoma ku paréntesis. Na Python modernu, es prátika ainda ta
        funsiona, ma é konsideradu ka-Pythonic (txeu kódiku pa un koza simples). Maneira idiomátiku
        é uza dekorador `@property`, ki ta transforma un metodu nun atributu virtual — bu ta asésa-l
        sen paréntesis, ma un funsan ta roda pa trás.


        Un getter ka ta serve só pa retorna valor "kru". El pode faze **transformasons** (kumo
        maskará un nùmeru di konta pa mostra só últimus 4 dígitus), retorna **valor kalkuladu** ki
        ta depende di otru atributus (kumo `area` di un retangulu), ou faze **defensive copy** di
        listas i disionárius pa evita ki algen modifika stadu internu di fora. Ku `@property` sen
        `@setter`, atributu ta vira **só leitura** — ideal pa valoris ki ka debe ser mudadu
        diretamenti.


        ## Izemplus


        Getter simples ku `@property` — asésa kumo atributu, ka kumo funsan:


        ```python

        class Produtu:
            def __init__(self, nomi, presu):
                self.__nomi = nomi
                self.__presu = presu

            @property
            def presu(self):
                """Getter — retorna presu privadu."""
                return self.__presu

        kaxupa = Produtu("Katxupa Rika", 800)

        print(kaxupa.presu)    # 800  — sen paréntesis!

        ```


        Getter ku transformason — maskará dadus sensível antis di retorna:


        ```python

        class KontaBankaria:
            def __init__(self, titular, numeru):
                self.__titular = titular
                self.__numeru = numeru

            @property
            def numeru_konta(self):
                """Mostra só últimus 4 dígitus pa seguránsa."""
                return f"***{self.__numeru[-4:]}"

        konta = KontaBankaria("Nilton", "BCA20261234")

        print(konta.numeru_konta)   # ***1234

        ```


        Getter pa property kalkuladu — valor ki ta depende di otru atributus, senpri atualizadu:


        ```python

        class Retangulu:
            def __init__(self, largura, altura):
                self.__largura = largura
                self.__altura = altura

            @property
            def area(self):
                """Property kalkuladu — sen setter, só leitura."""
                return self.__largura * self.__altura

        terrenu = Retangulu(30, 20)

        print(terrenu.area)   # 600


        # Tenta seta diretamenti — ERU!

        # terrenu.area = 999

        # AttributeError: property 'area' of 'Retangulu' object has no setter

        ```


        Kel últimu eru é di propózitu: sen un setter korespondenti, getter ta proteje valor kontra
        modifikason asidentál. Si bu kre permiti mudansa, bu ten ki djunta `@area.setter` — ma pa
        valoris kalkuladu, normalmenti é milhor dexa só-leitura pa el rekalkula sózin sempri ki
        `largura` ou `altura` muda.
  slug: getter
  context: intro-python
  provenance: suggested
- term: setter
  category: Coding
  translations:
    kea:
      local_term: setter
      definition: >-
        Un metodu ki ta modifika valor di un atributu privadu, txeu bez ku validasan — uzadu ku
        `@nomi.setter`.
      body: >-
        Un **setter** é un metudu spesial ki ta permiti modifika valor di un atributu privadu di un
        objetu, sima si el foseba un atributu normal — ma ku vantajen di poderba djunta lógika di
        validasan pa trás. Na Python, bu ta kria un setter uzandu dekorador `@nomi.setter`, undi
        `nomi` é nomi di un property ki bu dja definí antis. Isu ta parti di padron di
        **enkapsolamentu**: en bez di dexa dadus internu di un klasi abertu pa kualker un muda-l
        diretamenti, bu ta kontrola komu es pode ser modifikadu.


        Diferensa entri un setter i un simples atribuisan diretu é ki setter ta roda un funsan tudu
        bez ki algen faze `objetu.atributu = valor`. Isu ta permiti bo verifika si valor é di tipu
        korretu, si el sta dentu di un intervalu válidu, ou aplika kualker otru regra di negósiu
        antis di grava valor. Si validasan falha, bu pode lansa un `TypeError` ou `ValueError` pa
        avisa ki dadu é inválidu.


        Un property sen setter ta vira **só-leitura** — kualker tentativa di atribui-l ta da
        `AttributeError`. Isu é útil pa valoris kalkuladu (kumo `area` di un retangulu) ki debe ser
        derivadu di otru atributus, nau setadu diretamenti. Kel padron li ta djuda bo skrebe klasis
        más seguru, undi stadu internu di objetu ta permanese sempri konsistenti.


        ## Example


        Un klasi `Tenperatura` ki ta uza un setter pa impidi valoris fízikamenti inposível (abaxu di
        zeru absolutu, ki é -273.15 °C):


        ```python

        class Tenperatura:
            def __init__(self, celsius):
                self.celsius = celsius  # Ta txoma setter, nau atribuisan diretu!

            @property
            def celsius(self):
                return self.__celsius

            @celsius.setter
            def celsius(self, valor):
                if not isinstance(valor, (int, float)):
                    raise TypeError("Tenperatura ten ki ser un nùmeru!")
                if valor < -273.15:
                    raise ValueError("Ka pode ser abaxu di zeru absolutu!")
                self.__celsius = valor
        ```


        Agora bu pode uza-l naturalmenti, ku validasan a proteje bo pa trás:


        ```python

        t = Tenperatura(25)

        print(t.celsius)      # 25


        t.celsius = 30        # Setter ta roda — 30 é válidu ✅

        print(t.celsius)      # 30


        t.celsius = -300      # ValueError: Ka pode ser abaxu di zeru absolutu!

        ```


        Repara ki mesmu na `__init__`, kuandu nu ta faze `self.celsius = celsius`, Python ta txoma
        setter — ntãu validasan ta proteje objetu dizde momentu di kriasan. Si algen tenta kria
        `Tenperatura(-500)`, el ta falha imediatamenti en bez di kria un objetu ku stadu inválidu.
  slug: setter
  context: intro-python
  provenance: suggested
- term: __repr__
  category: Coding
  translations:
    kea:
      local_term: __repr__
      definition: >-
        Metodu majiku ki ta defini vizun teknika di un objetu pa programador — ideal pa rekria
        objetu di se representasan.
      body: >-
        `__repr__` é un metodu majiku (dunder) di Python ki ta defini **representasan teknika** di
        un objetu — un string ki ta deskrebe objetu di forma detalhadu, direktu pa programador.
        Diferenti di `__str__`, ki ta produzi un textu amigável pa uzuáriu final, `__repr__` tene un
        objetivu más spesífiku: se rezultadu debe ten informasan sufisienti pa **rekria** objetu,
        idealmenti ku un ekspresan válidu di Python ki pode ser kopiadu i koladu pa reproduzi mesmu
        valor.


        Python ta txoma `__repr__` automátikamenti na várius sitiu: kuandu bu skrebe un variável na
        shell interativu sen `print()`, kuandu bu ta uza funsan `repr()`, i — muitu importanti —
        kuandu bu objetu sta dentu di un lista, dicionáriu ô otu container ki ta imprimidu. Nes
        kazus, Python ka ta uza `__str__`; el ta uza sempri `__repr__` di kada elementu. Pa es
        razon, si un klasi só implementa un metodu di es dos, ta rekomendadu implementa `__repr__`,
        pamodi Python ta uza-l tanbe kumo *fallback* kuandu `__str__` ka izisti.


        Konvensan komun pa `__repr__` é retorna un string ku formatu `NomiDiKlasi(argumentu1=valor1,
        argumentu2=valor2)` — mesmu formatu ki bu ta uza pa kria objetu. Es prátika ta faze debug
        muitu más fásil: kuandu bu odja un lista di objetus na konsola, bu ta konsigi imediatamenti
        kompriende ki dadus kada un ten, sen ten ki inspesiona un pa un.


        ## Ezemplu


        Un implementasan tipiku ta segi konvensan di "kopia i kola":


        ```python

        class Produtu:
            def __init__(self, nomi, presu):
                self.nomi = nomi
                self.presu = presu

            def __repr__(self):
                return f"Produtu(nomi='{self.nomi}', presu={self.presu})"

        p = Produtu("Katxupa", 350)

        print(repr(p))   # Produtu(nomi='Katxupa', presu=350)

        p                # Na shell: Produtu(nomi='Katxupa', presu=350)

        ```


        Un errù komun é skese ki listas ta uza `__repr__`, ka `__str__`. Odja diferensa:


        ```python

        class Estudanti:
            def __init__(self, nomi):
                self.nomi = nomi

            def __str__(self):
                return f"Alunu {self.nomi}"

        turma = [Estudanti("Maria"), Estudanti("João")]

        print(turma)

        # [<__main__.Estudanti object at 0x...>, <__main__.Estudanti object at 0x...>]

        # feiu! __str__ ka ta ser uzadu dentu di lista

        ```


        Solusan é adisiona `__repr__`:


        ```python

        class Estudanti:
            def __init__(self, nomi):
                self.nomi = nomi

            def __str__(self):
                return f"Alunu {self.nomi}"

            def __repr__(self):
                return f"Estudanti(nomi='{self.nomi}')"

        turma = [Estudanti("Maria"), Estudanti("João")]

        print(turma)

        # [Estudanti(nomi='Maria'), Estudanti(nomi='João')]  ← limpu i útil pa debug

        ```
  slug: repr
  context: intro-python
  provenance: suggested
- term: dir()
  category: Coding
  translations:
    kea:
      local_term: dir()
      definition: Funsan built-in ki ta lista tudu atributus i metodus di un objetu ou klasi.
      body: >-
        `dir()` é un funsan built-in di Python ki ta debolvi un lista di tudu nomis (atributus,
        metodus, propriedadis) ki sta disponíveis nun objetu, klasi ou módulu. Kuandu bu txoma
        `dir()` sen argumentus, el ta mostra nomis di skopu atuál; ma kuandu bu pasa un objetu —
        sima `dir(minha_lista)` ou `dir(MinhaKlasi)` — el ta lista tudu ki bu pode faze ku kel
        objetu. É un ferramenta di **inspesan** (introspection) muitu útil pa deskubri kapasidadis
        di un objetu sen ki bu tene ki abri dokumentason.


        Na kontestu di enkapsolamentu, `dir()` ta ajuda-bu odjá kumo Python ta transforma nomis
        privadu ku **name mangling**. Kuandu bu deklara `self.__saldu` dentru di un klasi
        `KontaBankaria`, Python ta muda kel nomi internamenti pa `_KontaBankaria__saldu`. Ku `dir()`
        bu ta konfirma kel transformason ku bus própis odjus — é un maneira di intende ki "privadu"
        na Python ka é magia, é só un konvensan di nomi apliká automatikamenti.


        Lista ki `dir()` ta debolvi ta inklui tanbe txeu métodus spesial (dunder methods) sima
        `__init__`, `__str__`, `__len__`, i propriedadis definidu ku `@property`. Pa filtra
        rezultadus i konsentra só na ki interesa-bu, é komun uzá un list comprehension ku un
        kondison — pur izemplu, izikluí nomis ki ta kumesa ku `_` pa odjá só interfasi públiku.


        ## Example


        Un uzu simples ku un objetu di tipu string:


        ```python

        palavra = "Kabu Verdi"

        print(dir(palavra))

        # ['__add__', '__class__', ..., 'upper', 'lower', 'split', 'replace', ...]

        ```


        Djuntu ku enkapsolamentu, pa odjá nomi transformadu di un atributu privadu:


        ```python

        class KontaBankaria:
            def __init__(self, saldu):
                self.__saldu = saldu

        konta = KontaBankaria(50_000)


        # Filtra pa odjá só atributus ligadu a "saldu"

        print([attr for attr in dir(konta) if "saldu" in attr])

        # ['_KontaBankaria__saldu']

        ```


        I pa filtra fora nomis privadu/spesial i odjá só interfasi públiku di un klasi:


        ```python

        class Produtu:
            def __init__(self, nomi, presu):
                self.__nomi = nomi
                self.__presu = presu

            @property
            def presu(self):
                return self.__presu

        p = Produtu("Grogu", 1500)

        públiku = [attr for attr in dir(p) if not attr.startswith("_")]

        print(públiku)

        # ['presu']

        ```


        Sima bu ta odjá, `dir()` é un aliadu pa splora objetus — sobretudu kuandu bu sta aprendi un
        klasi nova ou bu kre konfirma kumo Python sta trata bus atributus privadu.
  slug: dir
  context: intro-python
  provenance: suggested
- term: operator overloading
  category: Coding
  translations:
    kea:
      local_term: sobrekarga di operador
      definition: >-
        Definir metodus majiku (`__add__`, `__eq__`, etc.) pa dexa operadoris kumo `+`, `-`, `==`
        funsiona ku bu klasi personalizadu.
      body: >-
        **Sobrekarga di operador** é un teknika di Python ki ta permiti-bu defini kumo operadoris
        komu `+`, `-`, `*`, `==`, `<`, i otus ta konporta ku objetis di bu própriu klasi. Pa faze
        isu, bu ta implementa **metodus majiku** (tanbé xamadu *dunder methods*, di *double
        underscore*) komu `__add__`, `__sub__`, `__eq__`, entri otus. Kuandu Python odja `a + b`, el
        ta txoma `a.__add__(b)` pa tras di sena — enton si bu defini es metodu na bu klasi, bu ta
        enxina Python o ki `+` signifika pa bu tipu.


        Es teknika ta faze kódigu más natural i legível. En vés di skrebe `p1.soma(p2)` ou
        `dineru.adisiona(otru)`, bu ta skrebe simplismenti `p1 + p2` ou `total + presu` — mesmu
        forma ki bu ta skrebe ku numerus. Es é spesialmenti útil pa klasis ki ta representa valoris
        matemátikus (vetoris, matrizis, numerus komplexus), kuantidadis di mundu reál (dineru,
        tenpu, distánsia), ou koleksons personalizadu.


        Un regra fundamental: metodus komu `__add__`, `__sub__` i `__mul__` deve retorna un **novu**
        objetu, sen muda `self`. Mesmu forma ki `3 + 5` ka ta muda valór di `3`, `v1 + v2` ka deve
        muda `v1`. Otu ponta importanti: si bu defini `__eq__`, é bon prátika defini tanbé `__lt__`
        — asin funsons komu `sorted()`, `min()` i `max()` ta funsiona automátikamenti ku bu objetis.
        Kuandu bu operador ta risebe un tipu ki el ka sabi manija, retorna `NotImplemented` (ka
        konfundi ku `NotImplementedError`) — asin Python ta tenta operasan na otu ladu, ou ta lansa
        `TypeError` sózin.


        ## Izemplus


        Un klasi simples ki ta soma dos pontus na un plánu:


        ```python

        class Pontu:
            def __init__(self, x, y):
                self.x = x
                self.y = y

            def __add__(self, otru):
                return Pontu(self.x + otru.x, self.y + otru.y)

            def __repr__(self):
                return f"Pontu({self.x}, {self.y})"

        p1 = Pontu(2, 3)

        p2 = Pontu(5, 7)

        print(p1 + p2)   # Pontu(7, 10)

        ```


        Sen `__eq__`, Python ta kompara pa **identidadi** (si é mesmu objetu na memória), ka pa
        valór — algu ki ta surprende txeu prinsipianti:


        ```python

        class Pontu:
            def __init__(self, x, y):
                self.x = x
                self.y = y

        p1 = Pontu(2, 3)

        p2 = Pontu(2, 3)

        print(p1 == p2)   # False — objetis diferenti na memória

        ```


        Pa korrigi, nu ta defini `__eq__` pa kompara pa valór:


        ```python

        class Pontu:
            def __init__(self, x, y):
                self.x = x
                self.y = y

            def __eq__(self, otru):
                if not isinstance(otru, Pontu):
                    return NotImplemented
                return self.x == otru.x and self.y == otru.y

        p1 = Pontu(2, 3)

        p2 = Pontu(2, 3)

        print(p1 == p2)   # True — gosi ta kompara pa valór

        ```


        Nota kumo `isinstance()` ta proteji operador — si algen tenta `p1 == "ola"`, Python ta
        risebe `NotImplemented` i ta lida ku isu di forma korretu, en vés di lansa un eru estranhu
        ou retorna un rezultadu falsu.
  slug: operator-overloading
  context: intro-python
  provenance: suggested
- term: __add__
  category: Coding
  translations:
    kea:
      local_term: __add__
      definition: >-
        Metodu majiku ki Python ta txoma kuandu bu uza operador `+` num objetu — debe retorna un
        objetu novu.
      body: >-
        `__add__` é un **metodu majiku** (dunder method) ki Python ta txoma automátikamenti kuandu
        bu uza operador `+` ku un objetu. Kuma nu odja na lisan di Metodus Majiku, dunder methods é
        funsons spesiál ku nomi na formatu `__nomi__` ki Python ta txoma pa bo na bakstage — bu ka
        txoma-s direitamenti. Kuandu bu skrebe `a + b`, o ki Python ta faze rialmenti é txoma
        `a.__add__(b)`.


        Purki é ki es é útil? Sen `__add__`, si bu tenta uza `+` ku bo própriu klasi, Python ta
        lansa un `TypeError` pamodi el ka sabe kuma ki dos objetu di bo klasi debe ser sumadu. Ma ku
        `__add__`, bu pode defini bo própriu regra — pur izemplu, suma preçus di dos produtus,
        kombina dos lista di alunus, ô junta dos vetor matemátiku. Es é un konseitu txomadu
        **operator overloading**: dá signifikadu novu pa operador `+` na kontestu di bo klasi.


        Un regra importanti: `__add__` **debe retorna un objetu novu**, ka modifika `self` nen
        `other`. Es ta segi kumportamentu di tipus nativu di Python — kuandu bu faze `3 + 5`, Python
        ka ta muda valor di `3`, el ta kria un valor novu `8`. Bo klasi debe kumporta mesmu manera
        pa evita surprezas. Si `__add__` retorna `NotImplemented` (ô ka ta izisti), Python ta tenta
        `__radd__` di objetu di direita antes di dezisti ku un erru.


        ## Izemplus


        Primeru, un klasi sen `__add__` — nota kuma Python ka sabe o ki faze:


        ```python

        class Presu:
            def __init__(self, valor):
                self.valor = valor

        p1 = Presu(100)

        p2 = Presu(250)

        total = p1 + p2  # TypeError: unsupported operand type(s) for +: 'Presu' and 'Presu'

        ```


        Gosi ku `__add__` implementadu, `+` ta funsiona i ta retorna un `Presu` novu:


        ```python

        class Presu:
            def __init__(self, valor):
                self.valor = valor

            def __add__(self, other):
                return Presu(self.valor + other.valor)

            def __str__(self):
                return f"{self.valor} ECV"

        katxupa = Presu(350)

        sumu = Presu(150)

        total = katxupa + sumu       # Python ta txoma katxupa.__add__(sumu)

        print(total)                 # 500 ECV

        print(type(total))           # <class '__main__.Presu'>

        ```


        Un izemplu más ritxu — kombina dos vetor 2D, ki é uzu klásiku di `__add__` na matemátika:


        ```python

        class Vetor:
            def __init__(self, x, y):
                self.x = x
                self.y = y

            def __add__(self, other):
                return Vetor(self.x + other.x, self.y + other.y)

            def __repr__(self):
                return f"Vetor({self.x}, {self.y})"

        v1 = Vetor(2, 3)

        v2 = Vetor(5, 1)

        print(v1 + v2)   # Vetor(7, 4)

        ```


        Nota kuma na tudu es izemplus, `__add__` ta kria i retorna un objetu **novu** — `v1` i `v2`
        ka muda. Es é kumportamentu ki uzuáriu di bo klasi ta spera.
  slug: add
