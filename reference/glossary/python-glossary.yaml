- term: if
  category: Coding
  translations:
    kea:
      local_term: if
      definition: Kondisional na Python ki ta izekuta un bloku di kódiku só si un kondisan é `True`.
      body: >-
        Na Python, `if` é un palavra-xavi ki ta permiti bu programa toma disizons. Ku `if`, bu pode
        dizê: "só faze es kuza si es kondisan é verdadi". Si kondisan é `True`, bloku di kódiku ta
        izekuta; si é `False`, Python ta salta kel bloku.


        `if` é parti di kategoria di **kondisionais** — un di kes fundamentus más importanti na
        programasan. Sen kondisionais, un programa ta faze senpri mesmu kuza. Ku `if`, bu programa
        pode reaji diferenti dipendi di dadus ki e ta risebe.


        Na kursu di Python, `if` é un di kes konseitus ki nu ta prende na Módulu 1, djuntu ku
        variáveis, tipos, operadores, i loops — tudu es kuzas é fundasan di programasan.
  slug: if
  context: intro-python
  provenance: suggested
- term: elif
  category: Coding
  translations:
    kea:
      local_term: elif
      definition: >-
        Abreviasan di 'else if' — ta permiti verifika várias kondisons na sekuénsia dipos di un
        `if`.
      body: >-
        Na Python, `elif` é abreviasan di "else if". El ta uzadu dipos di un `if` pa verifika mas
        kondisons na sekuénsia — só si primeru `if` da `False` é ki Python ta ba testa `elif`. Bu
        pode enkadea kantus `elif` bu kre, i normalmenti bu ta finaliza ku un `else` pa kapta tudu
        kes otu kazus.


        Es strutura é útil kuandu bu ten várias opsons pa klasifika ou dezidi entri. Envés di skrebe
        váriu `if` separadu, `elif` ta garantiI ki Python ta pára asin ki atxa un kondisan ki é
        `True` — kes otus `elif` ka ta ser testadu. Isu ta torna kódiku más ráidu i más klaru di
        ler.


        Na lisan-li, `elif` ta parse na un izemplu ki ta klasifika ficherus pa se extensan: pa kada
        nomi di ficheru, kódiku ta testa si el ta termina ku un extensan di imaji, dipos ku `.pdf`,
        dipos ku `.mp3`, i si nada da `True`, el ta kai na `else`.


        ## Example


        ```python

        nomis_ficheru = ["foto.jpg", "trabadjo.pdf", "musika.mp3", "nota.txt"]


        pa_kada = {"imaji": [], "dokumentu": [], "áudiu": [], "otru": []}


        for f in nomis_ficheru:
            if f.endswith((".jpg", ".png")):
                pa_kada["imaji"].append(f)
            elif f.endswith(".pdf"):
                pa_kada["dokumentu"].append(f)
            elif f.endswith(".mp3"):
                pa_kada["áudiu"].append(f)
            else:
                pa_kada["otru"].append(f)

        print(pa_kada)

        ```
  slug: elif
  context: intro-python
  provenance: suggested
- term: else
  category: Coding
  translations:
    kea:
      local_term: else
      definition: Bloku ki ta izekuta kuandu tudu kondisons anterioris di un `if`/`elif` é `False`.
      body: >-
        Na Python, `else` é un bloku ki ta izekuta so kuandu **tudu** kondisons anterioris di un
        `if` (i `elif`, si ten) da `False`. É kumo un "kaminhu di rezerva" — si ninhun di kondisons
        ki bu spesifika ka é verdadi, kódiku dentu di `else` ta kore.


        Diferenti di `if` i `elif`, `else` **ka ta leba un kondisan**. El ta kaptura tudu kes kazu
        ki ka foi kobridu pa kondisons anterioris. Pa kel motivu, `else` ta ben senpri na fin di un
        kadeia `if`/`elif`, i so pode aparesi un vez.


        `else` ta ajuda-nu skrebe kódiku más siguru, pamodi el ta garanti ki nu ten un rezposta pa
        tudu situason — inkluindu kes ki nu ka staba spera.


        ## Izemplu


        ```python

        ilhas = ["Santiago", "São Vicente", "Sal"]

        indisi = 3

        if indisi < len(ilhas):
            print(ilhas[indisi])
        else:
            print(f"Índisi {indisi} ka ezisti! Lista so tene {len(ilhas)} elementus.")
        ```


        Na izemplu-li, si `indisi` é menor ki tamañu di lista, Python ta mostra elementu. Ma si
        kondisan é `False` (kumo na kazu, pamodi 3 ka é menor ki 3), bloku `else` ta kore i ta
        mostra un mensajen di avizu na lugar di kauza un `IndexError`.
  slug: else
  context: intro-python
  provenance: suggested
- term: ternary operator
  category: Coding
  translations:
    kea:
      local_term: ternary operator
      definition: >-
        Sintaxi konpakta di Python pa un kondisional na un linha só: `valor_si_true if kondisan else
        valor_si_false`.
      body: >-
        Ternary operator é un sintaxi konpakta di Python ki ta permiti skrebe un kondisional simples
        na un linha só. En bez di uza un bloku `if/else` ku várias linhas, bu pode xpremi tudu na
        formatu: `valor_si_true if kondisan else valor_si_false`.


        Python ta avalia primeru kel kondisan. Si el é `True`, ta debolve kel primeru valor (kel ki
        ben antis di `if`). Si el é `False`, ta debolve kel valor ki ben dipos di `else`. Rezultadu
        ta pode ser guardadu na un variável ou uzadu diretu, pur izemplu na un `print()`.


        Es sintaxi li é útil pa kazus simples, tipu atribui un mensajen baseadu na idadi ô un stadu.
        Ma pa lójika más kompleksu, é midjór uza `if/elif/else` normal — sinon kódiku ta fika
        difísil di ler.


        ## Example


        ```python

        idadi = 20

        nomi = "Maria"

        saudasan = f"Bon dia, {nomi}!" if idadi >= 18 else f"Ola, {nomi}!"

        print(saudasan)

        ```
  slug: ternary-operator
  context: intro-python
  provenance: suggested
- term: match/case
  category: Coding
  translations:
    kea:
      local_term: match/case
      definition: >-
        Estrutura di Python 3.10+ ki ta permiti kompara un valor ku vários padrons — un alternativa
        eleganti pa kadeia longu di `if/elif`.
      body: >-
        `match/case` é un estrutura ki Python 3.10 traze pa faze kódiku más limpu kuandu bu ta
        kompara un valor ku vários opsan. En bez di skrebe un kadeia longu di `if`/`elif`/`else`, bu
        ta uza un padran ki ta parse ku "switch" di otus linguas — más eleganti i más fásil di ler.


        Bu ta kumesa ku palavra-txavi `match` sigidu di valor ki bu kre kompara. Dipos, kada `case`
        ta lista un opsan pusível. Si nenhun kaba, `case _` ta apanha tudu restu — el ta funsiona
        kumo un `else` final. Bu pode tanbe djunta múltiplus valóris nun sô `case` uzandu operador
        `|` (kumo "sigunda | tersa | kuarta").


        `match/case` é senpri opsional — `if`/`elif`/`else` ta funsiona bon pa kualker situasan. Ma
        kuandu bu tene txeu opsan pa kompara ku mesmu valor, `match/case` ta fika más limpu i más
        fásil di manti.


        ## Example


        ```python

        # Kalkuladora ku match/case (Python 3.10+)

        operasan = input("Operasan (+, -, *, /): ")


        match operasan:
            case "+":
                print("Adisan")
            case "-":
                print("Subtrasan")
            case "*":
                print("Multiplikasan")
            case "/":
                print("Divizan")
            case _:
                print("Operasan diskonxidu!")
        ```
  slug: match-case
  context: intro-python
  provenance: suggested
- term: for loop
  category: Coding
  translations:
    kea:
      local_term: for
      definition: >-
        Loop ki ta itera sobri un sekuénsia (lista, string, `range`) — uzadu kuandu bu sabe kuantas
        bez ta repeti.
      body: >-
        Un **for loop** é un manera di repeti un blóku di kódiku várias bez, un vez pa kada item di
        un sekuénsia — pode ser un lista di nomis, karateris di un string, ou númerus di un `range`.
        É perfetu pa kuandu bu dja sabe (ou Python pode diskubri) sobri kuze bu krê iterá.


        Idéia é simples: bu ta dizi a Python "pa kada item na es koleson, faze isti asaun". Python
        ta trata di pega kada item, un pa un, i ta kore kódiku ku el. Bu ka ten ki konta manualmente
        nen jere índisis.


        Na Kriolu, palavra-xavi é `for`, sigidu di un nomi tenporáriu (variável di loop) ki ta
        representa kada item, palavra `in`, i sekuénsia. Kódiku dentu di loop ta identado ku spasus.


        ## Example


        ```python

        turistas = ["Ana", "Pedro", "Carla"]

        ilha = "Sal"


        for turista in turistas:
            print(f"Ben-vindu a {ilha}, {turista}! Morabeza!")
        ```


        Na es izemplu, variável `turista` ta toma valor di kada nomi na lista `turistas`, un di kada
        vez. Pa kada volta, `print()` ta mostra un mensajen personalizadu. Ku pokus linhas, Python
        ta rezolvi un problema ki, sen loop, ta izijia repeti mesmu kódiku trez bez.
  slug: for-loop
  context: intro-python
  provenance: suggested
