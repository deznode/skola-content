        Na Python, `int` é tipu di dadu ki ta reprezenta **númerus interus** — kel dizer, númerus
        sen puntu desimal. Es pode ser pozitivu (kumu `5`, `100`), negativu (kumu `-3`, `-42`), ou
        zeru (`0`).


        Tipu `int` é un di kes tipus di dadu más báziku na Python, i bu ta uza-l tudu ora ki bu
        meste konta kuzas, reprezenta idadi, kuantidadi, ou kualker valor ki ka meste kaza dezimal.
        Diferenti di otus linguajens, na Python `int` ka ten limiti fixu di tamanhu — bu pode
        trabadja ku númerus mutu grandi sen preokupason.


        Bu pode kria un `int` diretamenti na kódiku, ó konverti otus tipus pa `int` uzandu funsan
        `int()`.
