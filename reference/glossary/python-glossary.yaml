      body: >-
        Na Python, `bool` é un tipu di dadu ki só ta tene **dos valor**: `True` ou `False`. Kel dos
        valor ta skrebe senpri ku primeru letra maiúskulu — `true` ou `false` (tudu minúskulu) ka ta
        funsiona, i Python ta da un `NameError`.


        Tipu `bool` ta uzadu pa reprezenta situasons di sin/nau — pur izemplu, si un utilizador sta
        ativu, si un pratu ten grogu, ou si un idadi ta pasa di sertu limiti. Kel é fundamental pa
        toma disizons na programa (ku `if`, pur izemplu).


        Bo pode konfirma ki un variável é di tipu `bool` ku funsan `type()`. Kumo Python ten
        **dynamic typing**, bu ka presiza deklara ki variável é `bool` — Python ta diskubri
        automatikamenti kuandu bu atribui `True` ou `False`.


        ## Example


        ```python

        ativo = True

        print(type(ativo))  # <class 'bool'>


        ten_grogu = True

        print(type(ten_grogu))  # <class 'bool'>


        # Atenson: T i F ten ki ser maiúskulu

        # ativo = true  # NameError: name 'true' is not defined

        ```
  slug: bool
  context: intro-python
  provenance: suggested
- term: isinstance()
  category: Coding
  translations:
    kea:
      local_term: isinstance()
      definition: >-
        Funsan built-in ki ta verifika si un valor é di un sertu tipu — mais profisional ki `type()
        ==` pamodi rekonxe subtipus (eransa).
      body: >-
        `isinstance()` é un funsan built-in di Python ki ta verifika si un valor é di un sertu tipu.
        El ta retorna `True` si valor é di kel tipu, i `False` si ka é. É un manera más profisional
        di verifika tipus di ki uza `type() ==`.


        Bu pode uza `isinstance()` pa verifika un tipu sósinhu, ou pasa un tuplu di tipus pa
        verifika si valor ta match kualker un di eles di un bez. Kel-li é útil, pur izemplu, kuandu
        bu kre seta ki un valor pode ser `int` ou `float`.


        Enbora pa gosi `type()` ta sirvi pa verifikasons simplis, `isinstance()` é kel manera
        rekomendadu pa futuru — spesialmenti kuandu bu ta lida ku sistemas más avansadus di Python.


        ## Example


        ```python

        valor = 42


        print(isinstance(valor, int))     # True

        print(isinstance(valor, float))   # False

        print(isinstance(valor, str))     # False


        # Verifica vários tipus di un bez

        print(isinstance(valor, (int, float)))  # True — é int ou float

        ```
  slug: isinstance
  context: intro-python
  provenance: suggested
- term: immutable
  category: Coding
  translations:
    kea:
      local_term: imutável
      definition: >-
        Un objetu ki ka pode ser modifikadu dipos di kriadu — strings, tuplas, númerus i booleans é
        imutável na Python.
      body: >-
        Na Python, **imutável** ta siginifika ma un objetu, dipos di kriadu, ka pode ser modifikadu.
        Kuandu bu txoma un metodu ki paresi ta "muda" el, na verdadi Python ta kria un objetu
        **novu** — el original ta kontinua igualzinhu.


        String é un izemplu klásiku di objetu imutável. Metodus kumo `.upper()`, `.lower()`,
        `.strip()` ou `.replace()` NUNKA ta muda string original — es ta senpri retorna un string
        novu. Si bu kre guarda mudansa, bu ten ki atribui rezultadu di volta pa un variável.


        Alen di strings, otus tipus imutável na Python é tuplas, númerus (int, float) i booleans. Es
        propriedadi ta ajuda a evita erus ki ta konteci kuandu vários partis di kódiku ta partilha
        mesmu dadus.


        ## Example


        ```python

        saudasan = "ola mundu"

        saudasan.upper()        # retorna "OLA MUNDU" ma ka ta guarda

        print(saudasan)         # "ola mundu" — mesmu koisa!


        # Pa guarda, bo ten ki atribui:

        saudasan = saudasan.upper()

        print(saudasan)         # "OLA MUNDU"

        ```
  slug: immutable
  context: intro-python
  provenance: suggested
- term: slicing
  category: Coding
  translations:
    kea:
      local_term: slicing
      definition: >-
        Operasan ki ta pega un pedasu di un sekuénsia (string, lista, tupla) ku sintaxi
        `[start:stop:step]`.
      body: >-
        Slicing é un operasan ki ta permiti bo pega un pedasu (un "fatia") di un string, igualzinhu
        ki bu ta korta un fatia di bolu. Sintaxi báziku é `s[start:stop:step]`, undi `start` é
        índisi undi ta kumesa, `stop` é undi ta para (ekskluzívu — ka ta inklui), i `step` é di
        kuantu en kuantu ta anda.


        Bu pode omiti kualker un di es tres partis. Si bu ka pui `start`, Python ta kumesa na índisi
        0. Si bu ka pui `stop`, ta bai t'o final di sekuénsia. Índisis negativus ta konta di final
        pa trás — pur izemplu, `[-4:]` ta pega últimus 4 karáteris. Un truki mutu uzadu é `[::-1]`,
        ki ta inverti string interu.


        Slicing ka ta funsiona só ku string — ta funsiona igual ku otus sekuénsia kumo lista i
        tupla. I, kumo string é imutável, slicing ta retorna senpri un string novu, sen muda
        original.


        ## Example


        ```python

        ilha = "Santiago"


        print(ilha[0])      # 'S'

        print(ilha[0:3])    # 'San'   — índisis 0, 1, 2 (stop ekskluzívu)

        print(ilha[3:])     # 'tiago' — di índisi 3 t'o final

        print(ilha[:4])     # 'Sant'  — di inísiu t'o índisi 4

        print(ilha[-4:])    # 'iago'  — últimus 4 karáteris


        # Ku step

        alfabet = "ABCDEFGHIJ"

        print(alfabet[::2])   # 'ACEGI' — kada 2 karáteris


        # Inverti string ku step negativu

        nomi = "Edna"

        print(nomi[::-1])     # 'andE'

        ```
  slug: slicing
  context: intro-python
  provenance: suggested
