- term: programming language
  category: General
  translations:
    kea:
      local_term: linguajen di programasan
      definition: >-
        Un sistema di palavras i regras ki nu ta uza pa skrebe instrusons ki un komputador pode
        kompriende i kore.
      body: >-
        Un **linguajen di programasan** é un sistema di palavras i regras ki nu ta uza pa skrebe
        instrusons ki un komputador pode kompriende i kore. É modi ki nu, kumo umanus, ta "papia" ku
        máquina — nu ta skrebe kódiku, i komputador ta sigui kes instrusons pa faze algu, sedja
        mostra un mensajen na tela, kalkula un konta, ou kria un website interu.


        Kada linguajen di programasan ten se própria sintaxi — kel dizer, se palavras spesial i se
        regras di komo linhas di kódiku debe ser organizadu. Python, pur izemplu, é un linguajen di
        programasan ki foi kriadu na 1991 pa Guido van Rossum, i el é konxedu pa se sintaxi simples
        ki ta paresi ku inglés natural. Otus linguajens komu JavaScript, Java ou C++ tanbe é
        linguajens di programasan, ma kada un ten se stilu i se regras.


        Ezisti txeu linguajens di programasan diferenti pamodi kada un foi dizeñadu pa rezolvi tipus
        di problemas diferenti. Alguns ta brilha na desenvolvimentu web, otus na siénsia di dadus, i
        otus na intelijensia artifisial. Sabe un linguajen di programasan komu Python ta abri portas
        pa bu pode kria websites, analiza dadus, konstrui AI, ou automatiza tarefas repetitivu.


        ## Example


        ```python

        # Nha primeru programa na Python

        print("Ola! Ben-vindu a Python!")

        ```


        Kel kódiku li, skrebedu na linguajen di programasan Python, ta mostra na tela: `Ola!
        Ben-vindu a Python!`. Sen símbulus komplikadu, sen pontu-i-vírgula — só instrusons klaru ki
        komputador ta kompriende i kore.
  slug: programming-language
  context: intro-python
  provenance: suggested
- term: MVP
  category: General
  translations:
    kea:
      local_term: MVP
      definition: >-
        Minimum Viable Product — primeru versan simples di un produtu, ku só funsionalidadis
        esensial, pa testa un ideia rápidu ku poku sforsu.
      body: >-
        **MVP** — sigla di *Minimum Viable Product*, ó sea, "produtu mínimu viável" — é primeru
        versan simples di un produtu, ku sô funsionalidadis esensial, ki ta sirbi pa testa un ideia
        rápidu ku poku sforsu. En vez di gasta mezis ó anus ta konstrui algu konpletu, bu ta faze un
        versan báziku ki dja ta funsiona, pa odja si bu ideia ta ten valor na mundu real.


        Na kontextu di startups i projetus di tek, MVP é un koseitu txeu importanti. El ta
        permiti-bu prende ku us utilizadores real, ajusta bu ideia, i evita gasta tenpu ku
        funsionalidadis ki ningen ka ta uza. Python é un linguajen perfetu pa konstrui un MVP,
        pamodi bu pode kria un protótipu rápidu ku poku linhas di kódiku.


        Izemplus di MVPs simples ki pode ser feitu ku Python inklui un app pa kontrola vendas di
        pexe na merkadu, un sistema pa jeri reservas di kaza aluguer na Boavista, ó un ferramenta pa
        analiza presu di produtus na Kabu Verdi. Kada un di es projetu ta kumesa simples, ku sô
        funsionalidadis esensial, i dipos pode kresi konformi nesesidadi.
  slug: mvp
  context: intro-python
  provenance: suggested
- term: virtual environment
  category: General
  translations:
    kea:
      local_term: virtual environment
      definition: >-
        Un espasu izoladu pa un projetu Python, ku si própriu kópia di Python i si próprius pakotis
        — pa un projetu ka kebra otu.
      body: >-
        Un **virtual environment** é un espasu izoladu pa un projetu Python, ku si própriu kópia di
        Python i si própriu pakotis. El ta funsiona sima un "mundu" separadu pa kada projetu — asin,
        un projetu ka ta kebra otu.


        Pamodi é importanti? Imajina ki bu tene dos projetus: **Projetu A** meste di un biblioteka
        na versan 1.0, ma **Projetu B** meste di mesmu biblioteka na versan 2.0. Sen un virtual
        environment, es dos versan ta entra na konflitu, pamodi es tudu ta ser instalado na mesmu
        lugar — na sistema interu. Ku un virtual environment pa kada projetu, kada un tene si
        própriu versan di kada pakoti, sen interferi ku otus.


        Na Python, konvensan é kria virtual environment na un pasta txomadu `.venv` dentu di
        projetu. Kuandu `.venv` ta ativu, bu ta odja `(.venv)` na kumesu di bu prompt — kel-la é
        sinal ki tudu pakoti ki bu instala ku `pip` ta bai pa kel projetu só, ka pa sistema interu.
        É un bon ábitu senpri verifika ki `(.venv)` ta na prompt antis di instala pakotis ou roda
        kódiku.


        ## Example


        ```bash

        # Kria virtual environment na pasta .venv

        python -m venv .venv


        # Ativa na macOS / Linux

        source .venv/bin/activate


        # Ativa na Windows (Command Prompt)

        .venv\Scripts\activate


        # Disativa kuandu bu kaba

        deactivate

        ```
  slug: virtual-environment
  context: intro-python
  provenance: suggested
- term: package
  category: General
  translations:
    kea:
      local_term: pakoti
      definition: >-
        Un biblioteka di kódiku reutilizável ki otus dezenvolvedoris skrebe i partilha, pa bu
        instala ku `pip` i uza na bu projetu.
      body: >-
        Na Python, un **pakoti** é un koleksan di kódiku ki otus dezenvolvedoris dja skrebe, testa,
        i partilha pa tudu mundu uza. En vez di skrebe tudu di zero, bu pode instala un pakoti ki
        dja ten funsionalidadi ki bu meste — kumo si fosi un "kaxa di ferramentas" pronta pa uza na
        bu projetu.


        Un di kuzas ki ta faze Python tan poderozu é kel ekosistema enormi di pakotis. Si bu meste
        analiza dadus, ten Pandas. Si bu meste konstrui un website, ten Django ô Flask. Si bu meste
        trabadja ku intelijensia artifisial, ten TensorFlow ô PyTorch. Kada un di kes é un pakoti ki
        algen dja kria pa bu ka ten ki reinventa roda.


        Es é un di razons pamodi Python é tan bon pa inisiantis i profisionais: pratikamenti pa
        kualker problema ki bu ten, provavelmenti dja ten un pakoti ki ta djuda-bu rezolvi-l.
  slug: package
  context: intro-python
  provenance: suggested
- term: traceback
  category: General
  translations:
    kea:
      local_term: traceback
      definition: >-
        Relatóriu ki Python ta mostra kuandu un programa para ku eru — ta lista unde i pamodi el
        fadja, di baxu (tipu di eru) pa riba.
      body: >-
        Un **traceback** é relatóriu ki Python ta imprimi na terminal kuandu bu programa para di
        funsiona pamodi un eru. El ta parese komplikadu na prinsípiu, ma na verdadi é un ferramenta
        ki ta djuda-u — el ta konta-u exatamenti *o ki* koreu mal i *unde* na bu kódiku.


        Regra di oru pa ler un traceback é senpri **kumesa di baxu pa riba**. Última linha ta tene
        informasan más importanti: **tipu di eru** (p.ex. `ZeroDivisionError`, `NameError`,
        `IndexError`) i un **mensajen** ki ta splika-l. Linhas di riba ta mostra fixeru, número di
        linha i funsan unde eru kontise, i kumo el foi txomadu.


        Dezdi Python 3.11, tracebacks ta ben ku un seta `^` (caret) ki ta aponta direitamenti pa
        parti exatu di kódiku ki ta kauza problema. Ku es informasan, bu pode sigi estratéjia di 3
        pasus: **Ler** última linha, **Atxa** lokalizasan, i **Pensa** pamodi Python ta pensa ki es
        é un problema.


        ## Example


        ```

        Traceback (most recent call last):
          File "kalkula.py", line 8, in <module>
            rezultadu = kalkula_media(notas_di_ana)
                        ~~~~~~~~~~~~~~~~~~~~~~~~~~~
          File "kalkula.py", line 4, in kalkula_media
            media = total / len(notas)
                    ~~~~~~^~~~~~~~~~~~
        ZeroDivisionError: division by zero

        ```


        Ta ler di baxu pa riba: última linha ta konta-u ki eru é `ZeroDivisionError: division by
        zero` — un divizan pa zero. Linha di sima ta mostra ki el kontise na fixeru `kalkula.py`,
        linha 4, na operasan `total / len(notas)` (seta `^` ta aponta direitamenti pa `/`). I riba,
        linha 8 é unde funsan foi txomadu inisialmenti.
  slug: traceback
  context: intro-python
  provenance: suggested
- term: syntax
  category: Coding
  translations:
    kea:
      local_term: syntax
      definition: >-
        Regras di kumo bu skrebe kódiku — a 'gramátika' di Python. Un eru di syntax ta para programa
        antis di kore.
      body: >-
        **Syntax** é regras di kumo bu ta skrebe kódiku na Python — el é kumu gramátika di un
        lingua. Si bo skrebe un frazi na kriolu ku palavras fora di orden, ningen ka ta intende.
        Mesmu kuza ta akontesi ku kódiku: si bu ka sigi regras di syntax di Python, el ta da eru
        antis di roda kualker kuza.


        Kuandu Python ta enkontra un problema di syntax, el ta lansa un **SyntaxError** i ta para
        programa antis di eksekuta un linha. Kel é diferenti di **semantics** (signifikadu di
        kódiku) — un programa pode ten syntax koretu ma inda faze algu diferenti di ki bu kre. Pa
        ilustra: skese un paréntesis di fitxa é un eru di syntax; dividi pa 3 en bez di 2 pa kalkula
        média é un eru di semantics.


        Alguns regras fundamentais di syntax di Python inklui: komentárius ta kumesa ku `#`, nomis é
        case sensitive (`nomi` ≠ `Nomi`), blokus di kódiku é definidu ku **indentasan** di 4 spasus
        (ka ku `{ }`), i linhas longas pode ser kebradu ku `\` ou dentu di paréntesis.


        ## Example


        ```python

        # Syntax koretu — Python ta intendi

        print("Ola, Mundu!")


        # Syntax INKORRETU — falta paréntesis di fitxa

        # print("Ola, Mundu!"   # SyntaxError


        # Syntax INKORRETU — falta indentasan

        # if True:

        # print("Ola")          # IndentationError


        # Syntax koretu ku indentasan di 4 spasus

        if True:
            print("Ola")
        ```
  slug: syntax
  context: intro-python
  provenance: suggested
- term: semantics
  category: Coding
  translations:
    kea:
      local_term: semantics
      definition: >-
        Signifikadu di kódiku — o ki el ta faze kuandu ta kore. Kódiku pode ten syntax koretu ma
        semantics eradu (un eru di lójika).
      body: >-
        Semantics é **signifikadu** di kódiku — o ki el ta faze di verdadi kuandu ta kore. É
        diferenti di syntax: syntax é regras di kumo bu skrebe kódiku (gramátika), enkuantu
        semantics é sentidu, rezultadu ki kódiku ta produzi.


        Un kódiku pode ten syntax perfeitamenti koretu — Python ta aseita el sen reklama — ma inda
        assin faze algu diferenti di ki bu kre. Kel é un **eru di lójika** (semantics eradu). Python
        ka ta deteta kel tipu di eru; é bo responsabilidadi pa testa bo kódiku i konfirma ki el ta
        funsiona kumo bu kre.


        Pensa assin: si bu skrebe un frazi na kriolu ku gramátika koretu ma sentidu eradu, ningen ta
        korrigi-u automatikamenti — frazi ta parse "bon", ma signifikadu sta eradu. Mesmu kuza ku
        semantics na kódiku.


        ## Example


        ```python

        # Syntax koretu, ma semantics eradu

        # Bu kre kalkula média, ma bu dividi pa 3 en bez di 2

        nota1 = 85

        nota2 = 92

        media = (nota1 + nota2) / 3  # Eru di lójika! Ten ki ser / 2

        print(media)  # 59.0 — rezultadu eradu, ma Python ka reklama

        ```


        Nes izemplu, tudu regras di syntax sta koretus: paréntesis fitxadu, variáveis ben skrebedu,
        operadoris ben uzadus. Ma semantics sta eradu — dividi pa 3 en bez di 2 ta da rezultadu
        inkorretu. Python ta kore programa sen erus, ma valor final ka ta korresponde ku o ki nu
        kria kalkula.
  slug: semantics
  context: intro-python
  provenance: suggested
- term: dynamic typing
  category: Coding
  translations:
    kea:
      local_term: tipu dinámiku
      definition: >-
        Un sistema unde tipu di un variável é diskubridu na momentu di izekusan i pode muda kuandu
        bu atribui un valor novu — ka presiza deklara-l antis.
      body: >-
        Na Python, bu ka ten ki fla ki tipu un variável ta ser antis di uza-l. Bu ta skrebe
        sinplismenti `nomi = "Amilcar"` ou `idadi = 25`, i Python sózin ta diskubri si é un string,
        un interu, ou un flotanti. Es komportamentu ta txoma-l **tipu dinámiku** (dynamic typing).


        Dinámiku signifika ki tipu di variável ka é fixu — el ta diskubridu na momentu di izekusan
        (kuandu programa ta roda), i el pode muda kuandu bu re-atribui un valor novu. Un variável ki
        gosi ta guarda un númeru, minutu dipos pode guarda un string, sen Python da eru. Es é
        diferenti di lingajen kumo Java ou C, unde bu ten ki deklara tipu antis i el ka ta muda.


        Pa verifika ki tipu un variável ten na kualker momentu, bu pode uza funsan `type()`. Es é
        útil, spesialmenti pa debugging, kuandu algu ka sta funsiona i bu kre konfirma si valor é di
        tipu ki bu spera.


        ## Example


        ```python

        # Python ta diskubri tipu sózin

        valor = 25

        print(type(valor))   # <class 'int'>


        valor = "Praia"

        print(type(valor))   # <class 'str'> — mesmu variável, tipu novu!


        valor = 3.14

        print(type(valor))   # <class 'float'>

        ```
  slug: dynamic-typing
  context: intro-python
  provenance: suggested
- term: condition
  category: Coding
  translations:
    kea:
      local_term: kondisan
      definition: >-
        Un expresan ki Python ta avalia kumo `True` ou `False` — pa izemplu idadi >= 18. É o ki un
        if ta verifika antis di disidi.
      body: >-
        Na Python, un **kondisan** é un expresan ki ta ser avaliadu kumo `True` ou `False`. É un
        pergunta ki bu ta faze na kódiku, i risposta é senpri sin ou nau — nada más. Kondisons é
        fundamentais pa toma disizons na programa: baseadu na risposta, kódiku ta sigi un kaminhu ou
        otu.


        Kondisons ta parse dipos di `if` i antis di `:`. Kel é undi Python ta avalia si algu é
        verdadi ou ka é. Si kondisan é `True`, bloku indentadu ta kore. Si é `False`, Python ta
        salta kel bloku.


        Un izemplu típiku é kompara idadi: `idadi >= 18` é un kondisan ki ta pergunta "idadi é maior
        ou igual a 18?". Si sin, risposta é `True`; si nau, `False`.


        ## Izemplu


        ```python

        idadi = 20


        if idadi >= 18:
            print("Bo é adultu")
            print("Bo pode vota")

        print("Programa termina")

        ```


        Ku `idadi = 20`, kondisan `idadi >= 18` ta avalia kumo `True`, entãu Python ta imprimi tudu
        tres linhas. Ma si bu muda pa `idadi = 15`, kel mesmu kondisan ta ben `False`, i Python ta
        salta bloku di dentu di `if` — so "Programa termina" ki ta parse.
  slug: condition
  context: intro-python
  provenance: suggested
- term: boolean
  category: Coding
  translations:
    kea:
      local_term: boolean
      definition: >-
        Tipu di dadu ku dos valor sô: True ou False. Tudu komparasan (==, >, <...) ta produzi un
        boolean.
      body: >-
        Un **boolean** (na Python, `bool`) é un tipu di dadu simples ma mutu importanti: el sô ten
        dos valor pusível — `True` (verdaderu) ou `False` (falsu). Es tipu ta uzadu pa reprezenta
        kualker kuza ki é sin-ou-nau: si un estudanti ta ativu, si un númeru é maior ki otu, si un
        kanpu sta vazi.


        Na Python, bu ta kria un boolean diretamenti atribuindu `True` ô `False` pa un variável —
        repara ki es palavras ten ki komesa ku letra maiúskulu. Bu pode verifika ki tipu é un
        boolean ku `type()`, ki ta mostra `<class 'bool'>`.


        Bu tanbe pode konverti otu valores pa boolean ku funsan `bool()`. Python ten regras simples:
        valores kumo `0`, `0.0`, string vazio `""`, i `None` ta vira `False` (nu ta txoma-s
        "falsy"). Kualker otu kuza — un númeru ki ka é zeru, un string ku kontiudu — ta vira `True`
        ("truthy").


        ## Example


        ```python

        estudanti = True

        ativa = False


        print(type(estudanti))  # <class 'bool'>


        # Konversan pa boolean

        print(bool(0))       # False

        print(bool(""))      # False (string vazio)

        print(bool(None))    # False

        print(bool(1))       # True

        print(bool(-5))      # True

        print(bool("Ola"))   # True

        ```
  slug: boolean
  context: intro-python
  provenance: suggested
- term: iteration
  category: Coding
  translations:
    kea:
      local_term: iterasan
      definition: >-
        Un volta úniku di un loop — un pasaji pa bloku di kódiku ki ta repeti. Un loop ku 5 voltas
        ta faze 5 iterasons.
      body: >-
        Na programason, un **iterasan** é un volta úniku di un loop — un pasaji kompletu pa bloku di
        kódiku ki ta repeti. Si un loop ta kore sinku bez, nu ta fla ma el fazi sinku iterasons.


        Kada bez ki Python ta entra na bloku di dentu di un `for` ou `while`, kel é un iterasan
        nobu. Pur izemplu, na un `for i in range(5)`, kada valor di `i` (0, 1, 2, 3, 4) ta
        korresponde a un iterasan diferenti — sinku iterasons na total.


        Nu pode kontrola iterasons ku instruson spesiál: `break` ta termina loop imediatamenti
        (nenhun iterasan más ka ta kore), i `continue` ta pula restu di iterasan atual i ta salta pa
        prósima.


        ## Example


        ```python

        # Kada volta di es loop é un iterasan

        for i in range(5):
            print(f"Iterasan numeru {i}")
        # Saída: 5 iterasons, di 0 té 4

        ```
  slug: iteration
  context: intro-python
  provenance: suggested
- term: index
  category: Coding
  translations:
    kea:
      local_term: índisi
      definition: >-
        Pozisan numérika di un elementu na un sekuénsia, ki ta kumesa na 0. Na ["a", "b"], "a" tene
        índisi 0 i "b" índisi 1.
      body: >-
        Na programason, **índisi** é un númeru ki ta indika pozison di un elementu déntu di un
        sekuénsia — pur izénplu, un lista di nomis, un string di karateris, ô kualker koleson
        urdenadu. Kada elementu na sekuénsia tene se própriu índisi, i é atravéz di kel númeru li ki
        nu pode aseder direta a kel elementu spesífiku.


        Na Python (i na majoria di linguajens di programason), índisi ta **kumesa na 0**, ka na 1.
        Kel-li kere dizê ki primeru elementu tene índisi 0, sugundu tene índisi 1, tirseru tene
        índisi 2, i asin sukusivamenti. Pa inisiantis kel-li pode paresi stranhu na prinsípiu, ma é
        un konvenson importanti pa ten na mente désdi kumésu.


        Na lison, nu odja un lista di turistas: `turistas = ["Ana", "Pedro", "Carla"]`. Na kel lista
        li, "Ana" tene índisi 0, "Pedro" tene índisi 1, i "Carla" tene índisi 2. Kel númeru ki ta
        identifika pozison di kada nomi é o ki nu ta txoma **índisi**.
  slug: index
  context: intro-python
  provenance: suggested
- term: PATH
  category: General
  translations:
    kea:
      local_term: PATH
      definition: >-
        Un lista di pastas unde sistema operasional ta buska programas pa izekuta. Sen Python na
        PATH, terminal ka ta atxa komandu `python`.
      body: >-
        PATH é un lista di pastas ki sistema operasional ta uza pa buska programas pa izekuta.
        Kuandu bu skrebe un komandu na terminal — sima `python` — sistema ka ta prokura na tudu bu
        diski. El ta odja só na pastas ki sta na PATH. Si programa ka sta la, terminal ta responde
        ku un eru tipu "komandu ka atxadu".


        Pa kel razan, óra ki bu ta instala Python na Windows, é super importanti marka txekbox
        **"Add python.exe to PATH"** na instalador. Sen kel pasu, mésmu ki Python sta instaladu na
        bu komputador, terminal ka ta atxa-l óra ki bu skrebe `python`. Si bu skise marka kel opsan,
        bu pode kore instalador otu bez, skodje "Modify" i marka "Add to PATH".


        Na macOS i Linux, instalador di python.org (o gestor di pakotis sima `apt`) ta konfigura
        PATH automatikamenti, ma la bu ta uza normalmenti komandu `python3` na lugar di `python`.
  slug: path
  context: intro-python
  provenance: suggested
- term: interpreter
  category: General
  translations:
    kea:
      local_term: interpreter
      definition: >-
        Programa ki ta ler i kore kódiku Python linha pa linha. Kuandu bu instala Python, bu ta
        instala un interpreter.
      body: >-
        Un **interpreter** é programa ki ta ler i ta kore bu kódiku Python, linha pa linha. El é kel
        motor ki ta transforma tekstu ki bu skrebe na un fixeru `.py` na un programa ki bu
        komputador ta izekuta di verdadi.


        Kuandu bu instala Python di [python.org](https://www.python.org/downloads/), bu ka sta
        instala só un linguaji — bu sta instala un interpreter. É por isu ki, dipos di instalasan,
        bu pode skrebe `python --version` (o `python3 --version` na macOS/Linux) na terminal i
        sistema ta responde ku versan ki sta instaladu.


        Más pa frenti, kuandu bu abri un projetu na VS Code, editor ta pergunta-bu kual interpreter
        pa uza. Normalmenti bu ta skodje kel ki sta dentu di bu `.venv` (virtual environment di
        projetu), pamodi asin kódiku ta kore ku pakotis izoladu di kel projetu, ka ku pakotis di
        sistema interu.
  slug: interpreter
  context: intro-python
  provenance: suggested
- term: pip
  category: General
  translations:
    kea:
      local_term: pip
      definition: >-
        Ferramenta ofisial di Python pa instala i jeri pakotis (bibliotekas) — `pip install
        <pakoti>` ta instala un pakoti dentu di ambienti ativu.
      body: >-
        `pip` é ferramenta ofisial di Python pa instala i jeri **pakotis** — bibliotekas di kódiku
        ki otus dezenvolvedoris skrebe i partilha pa bu uza na bu projetu. En vez di bu skrebe tudu
        kódiku di raiz, bu pode instala un pakoti ki dja rezolve prublema ki bu meste.


        Sintaxi báziku é `pip install <pakoti>`. Kuandu bu kore es komandu ku un **virtual
        environment** (`.venv`) ativu, pakoti ta bai instaladu só dentu di kel projetu, sen mistura
        ku otus projetus na bu sistema. Es izolamentu é importanti: si Projetu A meste di un
        biblioteka na versan 1.0 i Projetu B meste di mesma biblioteka na versan 2.0, kada un pode
        ten si própriu versan sen konflitu.


        Antis di uza `pip install`, senpri verifika ki `(.venv)` ta apareset na kumesu di bu prompt
        di terminal. Si ka ta apareset, pakoti ta bai instaladu pa sistema interu envés di pa
        projetu — i kel é un fónti kumun di erus.


        ## Example


        ```bash

        # Ativa .venv primeru (macOS / Linux)

        source .venv/bin/activate


        # Instala un pakoti dentu di .venv ativu

        pip install requests

        ```
  slug: pip
  context: intro-python
  provenance: suggested
- term: f-string
  category: Coding
  translations:
    kea:
      local_term: f-string
      definition: >-
        Un string ku prefixu `f` ki ta permiti inseri variáveis i espresons dentu di textu ku `{}` —
        pa izemplu `f"Ola {nomi}"`.
      body: >-
        Un **f-string** (kurtu di *formatted string literal*) é un tipu spesial di string na Python
        ki ta permiti-bu insere valoris di variáveis i rezultadus di espresons diretamenti dentu di
        un tekstu. Bu ta rekonhese-l pa letra `f` (o `F`) ki ta ben antis di aspras di abertura,
        sima na `f"Ola, {nomi}!"`. Kualker kuza ki bu po dentu di txavis `{}` ta ser avaliadu i
        kunvertidu pa tekstu na kel momentu ki string é kriadu.


        F-strings foi introduzidu na Python 3.6 i, oxi, es é manera más rekomendadu pa formata
        strings na Python — más lejível i más rápidu ki alternativas antigas sima `"Ola, " + nomi`
        (konkatenasan ku `+`) o `"Ola, {}".format(nomi)` (métudu `.format()`). Dentu di txavis, bu
        pode po un variável simples, ma tanbe un espresan matemátika, un txamada di funsan, o azesu
        a elementus di un lista o dicionáriu.


        Un vantajen adisional di f-strings é ki bu pode kontrola komu ki valoris ta aparese ku
        *format specifiers* dipos di dos pontus. Pur izemplu, `f"{presu:.2f}"` ta mostra númeru ku
        dos kazas dizimais, i `f"{nomi:>10}"` ta alinha tekstu pa direita ku 10 karateris di
        largura. Es dital ta faze f-strings útil ka só pa mensajens simples, ma tanbe pa relatóriu,
        tabelas, i saída formatadu.


        Un kuza importanti pa lembra: aspras dentu di f-string ten ki ser diferenti di aspras di
        fora, o senti Python ta konfundi undi ki string ta termina. Tanbe, si bu kre mostra un txavi
        literal `{` o `}` dentu di f-string, bu meste duplika-l: `{{` o `}}`.


        ## Izemplus


        Uzu báziku ku variáveis:


        ```python

        nomi = "Cesária"

        ilha = "São Vicente"

        print(f"Ola, {nomi}! Bo é di {ilha}.")

        # Saída: Ola, Cesária! Bo é di São Vicente.

        ```


        Bu pode tanbe po espresons i txamadas di funsan dentu di txavis:


        ```python

        idadi = 25

        presu = 1234.5678

        print(f"Na próximu anu bu ta tene {idadi + 1} anus.")

        print(f"Presu: {presu:.2f} skudus")

        print(f"Nomi na maiúskulas: {nomi.upper()}")

        # Saída:

        # Na próximu anu bu ta tene 26 anus.

        # Presu: 1234.57 skudus

        # Nomi na maiúskulas: CESÁRIA

        ```


        Un eru kumun é skese letra `f` — sen el, Python ka ta interpreta txavis, i tekstu ta aparese
        literalmenti:


        ```python

        nomi = "Ana"

        print("Ola, {nomi}!")    # Saída: Ola, {nomi}!   ❌

        print(f"Ola, {nomi}!")   # Saída: Ola, Ana!      ✅

        ```


        Otu erru frekuenti é uza mesmu tipu di aspras dentu i fora. Pa evita kel prublema, mistura
        aspras dublas ku sinplis:


        ```python

        frutu = "banana"

        print(f"Nha frutu favoritu é '{frutu}'.")

        # Saída: Nha frutu favoritu é 'banana'.

        ```
  slug: f-string
  context: intro-python
  provenance: suggested
- term: exception
  category: Coding
  translations:
    kea:
      local_term: exception
      definition: >-
        Un eru ki ta akontese kuandu programa ta kore i ki ta interrompe ezekusan si ka é tratadu —
        pa izemplu ZeroDivisionError ou KeyError.
      body: >-
        Un **exception** é un eru ki ta akontese kuandu bu programa sta na kore. Diferenti di un
        `SyntaxError` — ki Python ta atxa antis di kumesa ezekusan — un exception ta parese
        **duranti** ki programa sta rodadu. Si bu ka trata-l, programa ta para na kel momentu i
        Python ta mostra un traceback ku tipu di eru i un mensajen ki ta splika o ki koreu mal.


        Káda exception tene un **nomi** ki ta indika o ki é problema. Pa izemplu,
        `ZeroDivisionError` ta akontese kuandu bu ta tenta dividi un númeru pa zero; `KeyError` ta
        akontese kuandu bu ta buska un xavi ki ka ezisti na un disionáriu; `IndexError` ta akontese
        kuandu bu ta pidi un pozisan ki ka ezisti na un lista; i `TypeError` ta akontese kuandu bu
        ta mistura tipus inkompatível, tipu djunta un string ku un int.


        Konxe kes exceptions más kumun é un pasu importanti pa faze debug rápidu. Kuandu bu ta odja
        un traceback, última linha ta senpri mostra **tipu di exception** i un **mensajen** ku más
        detadju — es é primeru pista pa kompriende o ki tenxi rezolve.


        ## Example


        ```python

        estudanti = {"nomi": "Kelvin", "idadi": 22}

        print(estudanti["nota"])

        # KeyError: 'nota'


        # Manera seguru: uza .get() ku un valór padran

        nota = estudanti.get("nota", "Sen nota")

        print(nota)  # Sen nota

        ```
  slug: exception
  context: intro-python
  provenance: suggested
- term: SyntaxError
  category: Coding
  translations:
    kea:
      local_term: SyntaxError
      definition: >-
        Un eru ki Python ta lansa antis di kore programa kuandu gramátika di kódiku é eradu — pa
        izemplu falta di `:` ou paréntesis.
      body: >-
        `SyntaxError` é un tipu di eru ki Python ta lansa kuandu gramátika di bo kódiku é eradu.
        Kel-li signifika ki Python ka konsigi nen kompriende o ki bo skrebe — antis di programa
        kumesa kore, Python ta para lógu i ta mostra un mensajen di eru.


        Kes kauzas más kumun é: skise dos pontu `:` dipos di `if`, `for`, `while`, `def` ou `class`;
        skise fitxa un paréntesis `)`, brackets `]` ou braces `}`; ou uza `=` (atribuisan) na lugar
        di `==` (komparasan) na un kondisional.


        Un kuza importanti pa lembra: `SyntaxError` é úniku eru ki Python ta atxa **antis** di roda
        bo programa. Tudu otu erus (kumo `NameError`, `TypeError`, `IndexError`, `KeyError`) ta
        aparesi só kuandu programa ta kore. Es diferensa ta djuda-bu sabe kuandu problema é
        gramátika di kódiku i kuandu é lójika di ezekusan.


        ## Izemplu


        ```python

        # Skise ':' dipos di if

        idadi = 20

        if idadi > 18
            print("Adultu")
        ```


        Kuandu bu ta tenta kore es kódiku, Python ta mostra:


        ```
          File "testa.py", line 3
            if idadi > 18
                         ^
        SyntaxError: expected ':'

        ```


        Seta `^` ta aponta exatamenti pa unde falta kel `:`. Pa korreji, so djunta dos pontu na fin
        di linha: `if idadi > 18:`.
  slug: syntaxerror
  context: intro-python
  provenance: suggested
- term: NameError
  category: Coding
  translations:
    kea:
      local_term: NameError
      definition: >-
        Un eru ki ta akontese kuandu bu ta uza un variável ki inda ka foi difinidu, ou un nomi ku
        ortografia eradu.
      body: >-
        Un `NameError` ta akontese kuandu Python ta atxa un nomi — normalmenti un variável — ki inda
        ka foi difinidu na momentu ki bu ta tenta uza-l. Pa Python, kel nomi sinplismenti ka ezisti
        na memória, entãu el ka pode faze nada ku el i ta para programa ku un mensajen tipu
        `NameError: name 'mensajen' is not defined`.


        Duas kauza prinsipal ta leba pa es eru. Primeru: bu ta uza un variável ki nunka bu ka
        atribui — bu skese liña tipu `mensajen = "Ola"` antis di txoma `print(mensajen)`. Sugundu:
        eru di ortografia — bu ta difini `mensajen` ma dipos bu ta skrebe `mesnajen`, i pa Python es
        é dôs nomi diferenti.


        Pa rezolvi, verifika ki variável ta difinidu **antis** di ser uzadu, i konfirma ki
        ortografia é exatamenti igual na tudu lugar. Sinal `^` (na Python 3.11+) ta ponta direitu pa
        nomi ki ka ezisti, entãu é fásil di lokaliza problema.


        ## Example


        ```python

        print(mensajen)

        ```


        Es kódiku ta da:


        ```

        NameError: name 'mensajen' is not defined

        ```


        Koresan é difini variável antis di uza-l:


        ```python

        mensajen = "Ola, mundu!"

        print(mensajen)

        ```
  slug: nameerror
  context: intro-python
  provenance: suggested
- term: TypeError
  category: Coding
  translations:
    kea:
      local_term: TypeError
      definition: >-
        Un eru ki ta akontese kuandu bu ta mistura ou aplika operasan a tipus inkompatível — pa
        izemplu djunta string ku int.
      body: >-
        `TypeError` é un di kes erus más kumun na Python, i ta akontese kuandu bu ta tenta faze un
        operasan ku tipus di dadus ki ka é kompatível entri se. Pa izemplu, si bu tenta djunta un
        string (testu) ku un inteiru (númeru) uzandu operadór `+`, Python ka ta sabe kumo kombina
        kes dos, i el ta para programa ku un `TypeError`.


        Mensajen ta ben klaru: `TypeError: can only concatenate str (not "int") to str`. Kel-li kre
        dizi ki Python so pode djunta string ku otu string — el ka ta konverti inteiru
        automatikamenti. Na Python 3.11+, seta `^` ta aponta exatamenti pa parti di espresan ki ta
        kauza problema, o ki ta djuda-u atxa eru rápidu.


        Otus kauzas kumun di `TypeError` inklui: txoma algu ki ka é un funsan (p.ex. `x = 5; x()` ta
        da "'int' is not callable"), ou manda argumentus di tipu eradu pa un funsan. Soluson
        normalmenti é konverti tipus explisitamenti ku `str()` ou `int()`, ou uza un f-string.


        ## Example


        ```python

        idadi = 25

        mensajen = "Bu tene " + idadi + " anu"

        # TypeError: can only concatenate str (not "int") to str


        # Koresan: uza f-string

        mensajen = f"Bu tene {idadi} anu"

        print(mensajen)  # Bu tene 25 anu

        ```
  slug: typeerror
  context: intro-python
  provenance: suggested
- term: IndexError
  category: Coding
  translations:
    kea:
      local_term: IndexError
      definition: >-
        Un eru ki ta akontese kuandu bu ta tenta asesa un pozisan di lista ki ka ezisti (fora di
        rangu).
      body: >-
        `IndexError` é un di erus más kumun na Python. El ta akontese kuandu bu ta tenta asesa un
        pozisan (índisi) na un lista ki ka ezisti. Lembra ki índisis na Python ta kumesa na **0**,
        purtantu si un lista tene 3 elementus, índisis válidus é so 0, 1 i 2 — último índisi válidu
        é senpri `len(lista) - 1`.


        Kauzas kumun di `IndexError`:


        - Skise ki índisi ta kumesa na 0 (ka na 1).

        - Uza `len(lista)` diretamenti kumo índisi.

        - Tenta asesa un elementu na un lista váziu.


        Pa evita es eru, bu pode verifika tamañu di lista ku `len()` antis di asesa un pozisan, ou
        uza `range(len(lista))` kuandu bu ta itera ku índisis.


        ## Example


        ```python

        ilhas = ["Santiago", "São Vicente", "Sal"]

        print(ilhas[3])

        # IndexError: list index out of range


        # Koresan: verifika tamañu antis

        indisi = 3

        if indisi < len(ilhas):
            print(ilhas[indisi])
        else:
            print(f"Índisi {indisi} ka ezisti! Lista so tene {len(ilhas)} elementus.")
        ```
  slug: indexerror
  context: intro-python
  provenance: suggested
- term: KeyError
  category: Coding
  translations:
    kea:
      local_term: KeyError
      definition: Un eru ki ta akontese kuandu bu ta tenta asesa un xavi di disionáriu ki ka ezisti.
      body: >-
        `KeyError` é un di kes exceptions más kumuns kuandu bu ta trabadja ku **disionárius** na
        Python. El ta akontese kuandu bu ta tenta asesa un valór di disionáriu ku un xavi (key) ki
        ka ezisti. Python ka pode adivinha o ki bu kre, entãu el ta para programa i ta mostra
        mensajen di eru ku nomi di xavi ki ka foi atxadu.


        Es eru ta parese sobretudu na dos situasons: kuandu bu ta skrebe xavi ku eru di ortografia
        (p.ex. `"noti"` na lugar di `"nota"`), ou kuandu bu ka tene sertéza si un xavi sta prezenti
        na disionáriu. Ao kontráriu di listas — ki ta kauza `IndexError` — disionárius ta uza xavis
        (strings, númerus, ou otu tipus imutável) na lugar di pozisons numériku. Repara ki xavis ta
        faze distinsan di maiúskulas i minúskulas: `"Nomi"` i `"nomi"` é xavis diferentis.


        Pa evita `KeyError`, tene dos manera prinsipal. Primeru, uza métodu `.get()`, ki ta retorna
        `None` (ou un valór padran ki bu skodji) si xavi ka ezisti, sen kauza eru. Sigundu, verifika
        ku operadór `in` si xavi sta na disionáriu antis di asesa-l. Es dos abordajens ta faze bu
        kódiku más robustu.


        ## Izemplus


        Primeru, un izemplu ki ta kauza `KeyError`:


        ```python

        estudanti = {"nomi": "Kelvin", "idadi": 22}

        print(estudanti["nota"])

        ```


        Python ta mostra:


        ```

        Traceback (most recent call last):
          File "testa.py", line 2, in <module>
            print(estudanti["nota"])
                  ~~~~~~~~~^^^^^^^^
        KeyError: 'nota'

        ```


        Última linha ta konta-nu tudu: xavi `'nota'` ka ezisti na disionáriu `estudanti`.


        Gosi, koresan ku `.get()`, ki é manera más siguru:


        ```python

        estudanti = {"nomi": "Kelvin", "idadi": 22}


        # Retorna None si xavi ka ezisti — sen eru

        nota = estudanti.get("nota")

        print(nota)  # None


        # Ku valór padran

        nota = estudanti.get("nota", "Sen nota inda")

        print(nota)  # Sen nota inda

        ```


        Ou, si bu prifiri verifika antis ku `in`:


        ```python

        estudanti = {"nomi": "Kelvin", "idadi": 22}


        if "nota" in estudanti:
            print(estudanti["nota"])
        else:
            print("Es estudanti inda ka tene nota.")
        ```


        Kes dos padron ta faze parti di kódiku Python bon skrebedu — senpri pensa "i si xavi ka
        ezisti?" antis di asesa un disionáriu diretamenti ku `[]`.
  slug: keyerror
  context: intro-python
  provenance: suggested
- term: case sensitive
  category: Coding
  translations:
    kea:
      local_term: case sensitive
      definition: >-
        Karakterístika ki Python tene di distingi letras maiúskulas di minúskulas — `nomi`, `Nomi` i
        `NOMI` é trés variáveis diferenti.
      body: >-
        Na Python, **case sensitive** siginifika ki lingua ta distingi letras maiúskulas di
        minúskulas. Kel keri dizi ki `nomi`, `Nomi` i `NOMI` é **trés variáveis kompletamenti
        diferenti** pa Python — mesmu ki pa nos, komu pesoas, es ta parse mesmu palavra.


        Kel karakterístika-li aplika pa tudu na Python: nomis di variáveis, funsons built-in, i
        valoris spesiais. Pur izemplu, `print()` é funson ki ta imprimi, ma `Print()` ku "P"
        maiúskulu ka izisti — Python ta da un `NameError`. Mesmu kuza ku `True` i `False`: es meste
        ser skritu ku primeru letra maiúskula; `true` ou `false` ka ta funsiona.


        Na prátika, konvensan di Python (PEP 8) é skrebe variáveis senpri ku letras minúskulas — pur
        izemplu `nomi`, `idadi`, `nota_final`. Kel ta djuda evita konfuzon i erus kauzadu pa case
        sensitivity.


        ## Example


        ```python

        nomi = "Maria"

        Nomi = "João"

        NOMI = "Pedro"


        print(nomi)  # Maria

        print(Nomi)  # João

        print(NOMI)  # Pedro


        # print() funsiona — é funson built-in

        print("Ola!")


        # Print() ka funsiona — P maiúskulu

        # Print("Ola!")  # NameError: name 'Print' is not defined


        # True i False tene T i F maiúskulu

        ativo = True   # Koretu

        # ativo = true  # NameError: name 'true' is not defined

        ```
  slug: case-sensitive
  context: intro-python
  provenance: suggested
- term: indentation
  category: Coding
  translations:
    kea:
      local_term: indentasan
      definition: >-
        Espasus na kumesu di linha ki Python ta uza pa defini blokus di kódiku — konvensan é 4
        espasus pa kada nível.
      body: >-
        Indentasan é maneira ki Python ta uza pa organiza blokus di kódiku. En bez di uza txavis `{
        }` kumo otu linguajens (Java, C), Python ta konfia na **spasus na kumesu di linha** pa sabi
        ki linhas ta perteni a un bloku — sedja el di un `if`, un funsan, un lup, ou otu strutura.


        Konvensan (di guia PEP 8) é uza **4 spasus** pa kada nível di indentasan. Si bu skise
        indentasan ó si bu mistura spasus ku tabs, Python ta da un `IndentationError` i programa ka
        ta roda. Kel é diferenti di komentárius ó nomis di variávelis: indentasan ka é so estétika —
        el ten signifikadu real pa Python.


        Bu pode ten vários níveis di indentasan (4, 8, 12 spasus...) pa blokus dentu di blokus, sima
        kuandu bu ten un `if` dentu di otu `if`. Importanti é ser konsistenti: kada nível ta uza
        mesmu kantidadi di spasus.


        ## Example


        ```python

        idadi = 20


        if idadi >= 18:
            print("Bo é adultu")      # 4 spasus — dentu di if
            print("Bo pode vota")     # 4 spasus — inda dentu di if

        print("Programa termina")     # Sen indentasan — fora di if

        ```


        Ku indentasan a más di un nível:


        ```python

        nota = 85


        if nota >= 70:
            print("Bo pasa!")           # nível 1 (4 spasus)
            if nota >= 90:
                print("Exselenti!")     # nível 2 (8 spasus)
            else:
                print("Bon trabadjo!")  # nível 2 (8 spasus)
        ```
  slug: indentation
  context: intro-python
  provenance: suggested
- term: snake_case
  category: General
  translations:
    kea:
      local_term: snake_case
      definition: >-
        Konvensan di nomi na Python unde palavras é separadu pa underscore i tudu minúskulu — pa
        izemplu `nomi_kompletu`, `nota_final`.
      body: >-
        `snake_case` é un konvensan di nomi ki Python ta rekomenda pa variáveis i funsons. Na es
        stilu, tudu letras é minúskulu i palavras é separadu ku underscore (`_`). Pa izenplu, en vês
        di skrebe `NomiKompletu` ou `nomikompletu`, bu ta skrebe `nomi_kompletu` — asin nomi ta fika
        klaru i fáxi di ler.


        Es konvensan ta ben di **PEP 8**, guia ofisial di stilu di Python. El ta ajuda pa tudu
        programadoris skrebe kódiku di forma parsedu, i pa distingi variáveis di klasis (ki ta uza
        `CamelCase`) i di konstantis (ki ta uza `MAIÚSKULU_KU_UNDERSCORE`).


        Un bon nomi na `snake_case` tanbe debe ser **deskritivu**. `presu_katxupa` ta konta un
        stória midjór ki `x`, prinsipalmenti kuandu bu volta pa bo kódiku dipos di alguns mes.


        ## Example


        ```python

        # BON — snake_case pa variáveis

        nomi_kompletu = "Edna Lima"

        nota_final = 88.5

        total_di_estudantis = 45


        # KONSTANTI — MAIÚSKULU ku underscore

        TAXA_IVA = 0.15

        MAX_ESTUDANTIS = 30

        ```
  slug: snake-case
  context: intro-python
  provenance: suggested
- term: PEP 8
  category: General
  translations:
    kea:
      local_term: PEP 8
      definition: >-
        Guia ofisial di estilu di Python ki ta rekomenda konvensons di nomi, indentasan i formatasan
        pa kódiku ser konsistenti i lijível.
      body: >-
        PEP 8 é guia ofisial di estilu di Python — un dokumentu ki komunidadi di Python ta sigi pa
        skrebe kódiku ki é konsistenti i fásil di ler. El ta rekomenda konvensons pa nomi di
        variáveis, indentasan, spasus i formatasan jeral.


        Un di regras más konxidu di PEP 8 é ki indentasan meste ser di **4 spasus** pa kada nível —
        ka tabs. Importanti é ser konsistenti: nunka mistura tabs ku spasus na mesmu fixeru, pamodi
        Python ta da un `TabError`. Maioria di editoris kumo VS Code ta konverti Tab pa spasus
        automatikamenti.


        Otu konvensan di PEP 8 é uza letras minúskulas pa nomi di variáveis — `nomi`, `idadi`,
        `nota_final` — en bez di maiúskulas ou mistura konfuzu. Kel-li ta djuda mantén kódiku
        lijível i previzível pa kualker pesoa ki ta ler-l.


        ## Example


        ```python

        # Sigi PEP 8: nomis di variáveis en minúskula, 4 spasus di indentasan

        nomi = "Cesária"

        idadi = 20


        if idadi >= 18:
            print("Bo é adultu")
            print("Bo pode vota")
        ```
  slug: pep-8
  context: intro-python
  provenance: suggested
- term: input()
  category: Coding
  translations:
    kea:
      local_term: input()
      definition: >-
        Funsan built-in ki ta para programa i ta spera utilizador skrebe algu na terminal. Ta
        retorna senpri un string.
      body: >-
        `input()` é un funsan built-in di Python ki ta para bu programa i ta spera ki utilizador
        skrebe algu na terminal. Kuandu utilizador primi Enter, `input()` ta retorna kel ki el
        skrebi kumo un **string** (tekstu).


        Bu pode po un mensajen dentu di parêntesis pa gia utilizador — es ta txoma-l *prompt*. Pur
        izemplu, `input("Kumo é bu nomi? ")` ta mostra pergunta na terminal i ta spera resposta.
        Rezultadu ta ser guardadu normalmenti na un variável pa uza más tardi na programa.


        Djuntu ku `print()`, `input()` é un di primeru maneras di kria programas interativus — kes
        ki ta pergunta algu i ta responde ku baze na kel ki utilizador skrebi.


        ## Izemplu


        ```python

        nomi = input("Kumo é bu nomi? ")

        ilha = input("Bo é di kual ilha? ")


        print(f"Ola, {nomi}! Ben-vindu a Python!")

        print(f"{ilha} é un ilha sabi! Morabeza! 🇨🇻")

        ```
  slug: input
  context: intro-python
  provenance: suggested
- term: type casting
  category: Coding
  translations:
    kea:
      local_term: type casting
      definition: >-
        Konversan di un valor di un tipu pa otu (pa izemplu string pa int) ku funsons kumo `int()`,
        `float()`, `str()` ou `bool()`.
      body: >-
        **Type casting** ê prusesu di konverte un valor di un tipu di dadus pa un otu. Na Python,
        ténpu k'e ta trabadja ku informason ki ben di lokal defrenti — sima txeu bês un `input()` ki
        ta duna-nu senpri un string, ô un divizon ki ta produzi un `float` — nu meste transforma kel
        valor pa un tipu ki fase sentidu na kontestu. Es konversan ta feitu ku funsons di kunstruson
        kumo `int()`, `float()`, `str()` i `bool()`, ki ta rêsebe un valor i ta debolvê un nôbu
        valor di kel tipu piduidu.


        Ê inportanti odja ma type casting ka ta modifika valor original — e ta kria un nôbu valor.
        Alen di kel, ka tudu konversan ê pusivel: pratika-l tenta konverte un string ki ka ê numeru
        pa `int()` ta lansa un `ValueError`. Otu ponto sotil ê ma `int()` ta korta parti dizimal di
        un `float` (e ka ta arondia), i ma `bool()` ten regras spesifiku — valores kumo `0`, `0.0`,
        `""`, `[]` i `None` ta bira `False`, i kuazi tudu resto ta bira `True`.


        Na prátika, ê típiku uza type casting kantu bu ta lê dadus di teklado, di un ficheru ô di un
        API, i tanbê ora ki bu ta konkatena numerus ku strings pa monstra na ekran. Kestenpu bu ta
        duminia es funsons báziku, bu ta ivita txeu eru kumun na Python.


        ## Izemplus


        Konversan báziku entre tipus:


        ```python

        idadi_str = "25"

        idadi = int(idadi_str)

        print(idadi + 5)  # 30


        preso = float("9.99")

        print(preso * 2)  # 19.98


        numeru = 42

        mensaji = "Bu tem " + str(numeru) + " pontus"

        print(mensaji)  # Bu tem 42 pontus

        ```


        Un eru kumun ê skese di konverte kel input di utilizador, ki senpri ben kumo string:


        ```python

        idadi = input("Ki idadi bu ten? ")  # "20"

        print(idadi + 1)  # TypeError: can only concatenate str (not "int") to str

        ```


        Pa igual, nu ta uza `int()` pa konverte antis di fase kalkulu:


        ```python

        idadi = int(input("Ki idadi bu ten? "))  # 20

        print(idadi + 1)  # 21

        ```


        Repara tanbê ma `int()` ka ta arondia — e ta korta parti dizimal:


        ```python

        print(int(3.9))    # 3, ka 4

        print(round(3.9))  # 4, si bu krê arondia uza round()

        ```
  slug: type-casting
  context: intro-python
  provenance: suggested
- term: truthy
  category: Coding
  translations:
    kea:
      local_term: truthy
      definition: >-
        Un valor ki ta konverti pa `True` kuandu uza `bool()` — kualker númeru diferenti di zeru,
        string ku konteúdu, lista ku elementus, etc.
      body: >-
        Na Python, un valor **truthy** é kualker valor ki, kuandu bu ta konverti-l pa boolean ku
        funsan `bool()`, ta vira `True`. Es konseitu é inportanti pamodi Python ta uza-l na muitus
        situason — nomeadamenti kuandu bu ta testa kondison, mesmu si valor ka é diretamenti un
        `True` ou `False`.


        Regra é simples: kuazi tudu valor é truthy, sperandu un lista kurtu di valores ki é "falsy"
        (ki ta vira `False`). Valores falsy ta inklui `0`, `0.0`, string vazio `""`, i `None`. Tudu
        otu kuza — númerus diferenti di zeru (mesmu negativus ou muitu pikinoti komu `0.001`),
        strings ku konteúdu, i otu valores ku "algun kuza dentu" — é truthy.


        Es distinson entri truthy i falsy é útil pamodi ta permiti skrebe kódiku más limpu: en ves
        di kunpara diretamenti ku `True` ou verifika si un string é vazio, bu pode konfia na
        konversan automátiku ki Python ta faze pa boolean.


        ## Example


        ```python

        # Valores "truthy" (ta vira True)

        print(bool(1))       # True

        print(bool(-5))      # True

        print(bool("Ola"))   # True

        print(bool(0.001))   # True

        ```
  slug: truthy
  context: intro-python
  provenance: suggested
- term: falsy
  category: Coding
  translations:
    kea:
      local_term: falsy
      definition: >-
        Un valor ki ta konverti pa `False` kuandu uza `bool()` — 0, 0.0, string vazio, None, lista
        vazia.
      body: >-
        Na Python, un valor **falsy** é un valor ki, kuandu bu konverti-l pa boolean ku funsan
        `bool()`, ta vira `False`. É un forma di dizi ki kel valor ta representa "vazi", "zeru" ou
        "nada" — sen konteúdu real.


        Python ten un lista kurtu di valores ki é konsideradu falsy: número `0`, número desimal
        `0.0`, string vazio `""`, i valor spesial `None`. Tudu otu kuza — un número diferenti di
        zeru, un string ku algun letra dentu, ou un lista ku elementus — é **truthy**, ki ta vira
        `True`.


        Es konseitu é importanti pamodi Python ta uza-l na kondisons (`if`, `while`) pa dixidi si un
        blóku di kódiku debe roda ou ka roda. Kuandu bu skrebe `if valor:`, Python ta konverti
        `valor` pa boolean pa trás di senas — nton sabe ki valores é falsy ta djuda-u ivita bugs.


        ## Izemplu


        ```python

        # Valores "falsy" (ta vira False)

        print(bool(0))       # False

        print(bool(0.0))     # False

        print(bool(""))      # False (string vazio)

        print(bool(None))    # False


        # Tudu otu kuza é "truthy" (ta vira True)

        print(bool(1))       # True

        print(bool(-5))      # True

        print(bool("Ola"))   # True

        print(bool(0.001))   # True

        ```
  slug: falsy
  context: intro-python
  provenance: suggested
