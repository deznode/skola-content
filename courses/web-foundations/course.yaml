slug: web-foundations
title: "Fundamentus di Web: HTML i CSS"
level: beginner
category: programming
duration_minutes: 450
instructor: Joaquim Costa
# Draft course — kept out of production until ready. Excluded from default
# `pnpm gen:catalog` discovery and from the catalog-drift-guard hook, so it
# never reaches db/migration / prod. Generate locally with:
#   pnpm gen:catalog --course=web-foundations --out=apps/api/src/main/resources/db/seed/dev
# NOTE: not durable across `/skola:pipeline-publish` — write_course_yaml
# regenerates this file from content.json and drops test_only; re-add after any republish.
test_only: true
translations:
  kea:
    title: "Fundamentus di Web: HTML i CSS"
    description: Aprendi HTML i CSS di zero. Kel kursu ta ensiná-bu kria pajina web ku strutura semantiku, stiliza-s ku kor, fonti i layout (Flexbox i CSS Grid), i pa fin konstrui un pajina di turizmu sobri ilhas di Kabu Verdi.
    prerequisites: Nenhum konhesimentu préviu nesesáriu
    outcomes: |
      Skrebe HTML5 semantiku ku strutura korretu
      Stiliza pajina ku CSS: kor, fonti i selectors
      Domina box model: margin, border, padding i tamanhu
      Konstrui layout ku Flexbox i CSS Grid
      Debuga ku DevTools i konstrui un landing page di Kabu Verdi
