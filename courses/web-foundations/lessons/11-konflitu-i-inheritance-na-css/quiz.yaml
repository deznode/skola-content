# Quiz sidecar (draft source) for lesson m3-11 "Konflitu i inheritance na CSS".
# Publish copies this to
# content/courses/web-foundations/lessons/11-konflitu-i-inheritance-na-css/quiz.yaml;
# positions 0..3 correspond to <Quiz position={N}/> markers in kea.mdx.
# `explain` is the author-written "Pamodi:" why-feedback shown after a pick.
- question:                                    # Q0 → O1, O2 (APPLY: predict winner)
    kea: "Dos regra ta apunta pa mesmu byline: `#topu .author-name` `(1, 1, 0)` i `a.author-name:hover` `(0, 2, 1)`. Kal ki ta ganha?"
  options:
    - text: { kea: "`#topu .author-name` — pamodi ID na kolun `a` ta sobrepasa kualkér class" }
      correct: true
      explain: { kea: "Sertu — konta di skerda: `(1, …)` > `(0, …)`. Un úniku ID ta ganha sobre dos class + un element." }
    - text: { kea: "`a.author-name:hover` — pamodi ten mas selectors (trez kontra dos)" }
      correct: false
      explain: { kea: "Nau — ka ta konta total. Konpara kolun pa kolun di skerda pa direita; ID na kolun `a` ta dicidi primeru." }
    - text: { kea: "Kel ki ta apareci mas tarde na ficheru" }
      correct: false
      explain: { kea: "Ordi di fonti so ta kuebra impati kuandu especificidadi é **igual**. Li es ka é igual — ID ta ganha." }
    - text: { kea: "Nenhun — `:hover` ta dizativa otru" }
      correct: false
      explain: { kea: "Nau — `:hover` é un pseudo-class normal ki ta konta na kolun `b`. Ka ten nada spesial ki ta dizativa otru regra." }
- question:                                    # Q1 → O4 (recall: inherits?)
    kea: "Kal di es propriedadis **ka** ta inheri di `<body>` pa kada `<p>`?"
  options:
    - text: { kea: "`border`" }
      correct: true
      explain: { kea: "Sertu — `border` (i tanbé `margin`, `padding`, `background`) ka ta inheri. So propriedadis di testu ta kaska." }
    - text: { kea: "`color`" }
      correct: false
      explain: { kea: "`color` ta inheri — é un di kes propriedadi di testu ki ta kaska di pai pa fidju." }
    - text: { kea: "`font-family`" }
      correct: false
      explain: { kea: "`font-family` ta inheri — kel é motivu pa nu poi-l na `body` un bez so." }
    - text: { kea: "`line-height`" }
      correct: false
      explain: { kea: "`line-height` ta inheri — tudu family di testu ta kaska." }
- question:                                    # Q2 → O1 (why: !important)
    kea: "Pamodi `!important` ka é solusan korreta pa un konflitu di especificidadi?"
  options:
    - text: { kea: "El ta inora skala i ta kria mas konflitu ki so otru `!important` pode kuebra dipos" }
      correct: true
      explain: { kea: "Sertu — ta funsiona un bez, ma kada sobrescrita dipos ta presiza di otru `!important`. Solusan real é simplifika selector." }
    - text: { kea: "El ta torna pajina mas lenta pa karega" }
      correct: false
      explain: { kea: "Velosidadi ka ten nada a ver — problema é manutensan: `!important` ta luta kontra cascade en bez di trabadja ku el." }
    - text: { kea: "El so ta funsiona na inline style" }
      correct: false
      explain: { kea: "Nau — `!important` ta funsiona na kualkér regra. Problema ka é undi el ta funsiona, é kaos ki el ta kria." }
    - text: { kea: "Browsers modernu ta inora-l" }
      correct: false
      explain: { kea: "Browsers ta respeita-l (kel é problema) — el ta ganha tudu, inkluzivu kuza ki bu kre ki perde." }
- question:                                    # Q3 → O5 (apply: universal + source order)
    kea: "Bu ten `* { color: gray; }` i `body { color: navy; }`. Kal kor ki un `<p>` ta resebe, i pamodi?"
  options:
    - text: { kea: "Navy — `body { color }` ta inheri pa `<p>`, i inheritance ta ganha sobre `*` `(0,0,0)` ki aplika diretu… kuidadu: testa kazu real" }
      correct: false
      explain: { kea: "Kuidadu — `*` ta **aplika diretu** na `<p>` ku especificidadi `(0,0,0)`; un valor inheridu ten especificidadi zero ki perde pa kualkér regra ki kasa diretu. Logu `<p>` ta sai **gray**." }
    - text: { kea: "Gray — `*` ta kasa `<p>` diretu `(0,0,0)`, i un valor inheridu ka ta konpeti ku un regra ki aplika diretu" }
      correct: true
      explain: { kea: "Sertu — regra ki kasa un elementu diretu (mesmu `*`) ta ganha sobre un valor inheridu. Pa kel motivu nu ka ta uza `*` pa stilu di testu — uza `body` + inheritance." }
    - text: { kea: "Gray — pamodi `*` ten especificidadi mas altu ki `body`" }
      correct: false
      explain: { kea: "Konkluzan ta sertu ma motivu nau: `*` é `(0,0,0)`, **mas baxu** ki `body` `(0,0,1)`. El ta ganha li so pamodi aplika-diretu ta bate inheritance, ka pa especificidadi." }
    - text: { kea: "Navy — `body` ten mas especificidadi ki `*`" }
      correct: false
      explain: { kea: "`body` di fatu ten mas especificidadi, ma kel ka ta importa pa `<p>`: `<p>` ka é `<body>`. Pa `<p>`, `*` aplika-diretu ta ganha sobre navy inheridu." }
