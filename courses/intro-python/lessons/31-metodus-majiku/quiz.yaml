- question:
    kea: "Kal é diferensa entri `__str__` i `__repr__`?"
  options:
    - text: { kea: "`__str__` é vizun amigável pa utilizador (`print()`); `__repr__` é vizun teknika pa programador (shell, debug)" }
      correct: true
    - text: { kea: "`__str__` é pa programador; `__repr__` é pa utilizador" }
      correct: false
    - text: { kea: "Es é mesmu kuza" }
      correct: false
    - text: { kea: "`__str__` ta retorna un númeru; `__repr__` un string" }
      correct: false
- question:
    kea: "O ki é metodus majiku (dunder methods) kumo `__str__` ou `__len__`?"
  options:
    - text: { kea: "Funsons spesiál ku `__nomi__` ki Python ta txoma **automátikamenti** na momentus sertus — bu ka txoma-s diretu" }
      correct: true
    - text: { kea: "Metodus ki bu ten ki txoma manualmenti senpri" }
      correct: false
    - text: { kea: "Metodus privadu ki só klasi pode uza" }
      correct: false
    - text: { kea: "Nomis ki bu pode inventa livremente pa bu kódiku" }
      correct: false
- question:
    kea: "Bu tene un klasi ku `__str__` i `__repr__`, i bu faze `print([obj1, obj2])`. Kal é ki Python ta uza pa kada elementu?"
  options:
    - text: { kea: "`__repr__` — un lista ta uza `__repr__` di se elementu, ka `__str__`" }
      correct: true
    - text: { kea: "`__str__` — senpri `__str__` dentu di un lista" }
      correct: false
    - text: { kea: "Os dos na mesmu tempu" }
      correct: false
    - text: { kea: "Nenhun — ta mostra enderésu di memória" }
      correct: false
- question:
    kea: "Pa kuze ki ta sirbi funsan `dir(obj)`?"
  options:
    - text: { kea: "Ta mostra tudu metodu i atributu di un objetu — útil pa deskubri o ki un objetu pode faze" }
      correct: true
    - text: { kea: "Ta apaga tudu atributu di objetu" }
      correct: false
    - text: { kea: "Ta mostra só valor di objetu" }
      correct: false
    - text: { kea: "Ta kria un novu diretóriu na disku" }
      correct: false
