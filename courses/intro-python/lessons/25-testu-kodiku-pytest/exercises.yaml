- slug: testa-e-par
  language: python
  kind: code
  title: { kea: "Funsan ├ę_par i os se testu" }
  prompt:
    kea: "Skrebe un funsan `├ę_par(n: int) -> bool` ki ta da `True` si o n├║meru ├ę par. Dipos skrebe 3 funsan di testu (par, ├şmpar, zero) ku `assert`. Roda ku `pytest`."
  hint:
    kea: "`return n % 2 == 0`. Kada testu ├ę un funsan ku nomi ki kumesa ku `test_`: `def test_par(): assert ├ę_par(4) is True`. Zero ├ę par (`├ę_par(0)` ├ę `True`)."
  starterCode: |
    # par.py
    def ├ę_par(n: int) -> bool:
        ...  # TODO

    # test_par.py
    # TODO: 3 testu ÔÇö par, ├şmpar, zero
  solutionCode: |
    # par.py
    def ├ę_par(n: int) -> bool:
        return n % 2 == 0

    # test_par.py
    def test_par():
        assert ├ę_par(4) is True

    def test_impar():
        assert ├ę_par(7) is False

    def test_zero():
        assert ├ę_par(0) is True
    # Roda ku: pytest -v
- slug: testa-inverte-string
  language: python
  kind: code
  title: { kea: "Testu pa inverte_string" }
  prompt:
    kea: "Skrebe testus pa un funsan `inverte_string(s: str) -> str` ki ta da a string invertidu. Testa ku un string normal, un string vaziu i un string ku un s├│ karater. Dipos implementa a funsan."
  hint:
    kea: "Implementason: `return s[::-1]`. Os testu: `assert inverte_string(\"abc\") == \"cba\"`, `assert inverte_string(\"\") == \"\"`, `assert inverte_string(\"x\") == \"x\"`."
  starterCode: |
    # inverte.py
    def inverte_string(s: str) -> str:
        ...  # TODO

    # test_inverte.py
    # TODO: testu normal, vaziu, un karater
  solutionCode: |
    # inverte.py
    def inverte_string(s: str) -> str:
        return s[::-1]

    # test_inverte.py
    def test_normal():
        assert inverte_string("morabeza") == "azebarom"

    def test_vaziu():
        assert inverte_string("") == ""

    def test_un_karater():
        assert inverte_string("x") == "x"
- slug: tdd-klassifika-nota
  language: python
  kind: code
  title: { kea: "TDD ÔÇö klassifika_nota" }
  prompt:
    kea: "Pratika TDD: primeru skrebe os testu pa `klassifika_nota(nota: float) -> str` (\"Exselenti\" si `>= 16`, \"Bon\" si `>= 12`, \"Sufisienti\" si `>= 10`, \"Insufisienti\" si `< 10`). Dipos implementa a funsan i roda `pytest`."
  hint:
    kea: "Skrebe os `assert` primeru (es ta faya pamodi a funsan inda ka izisti). Dipos implementa ku `if`/`elif` di o m├ís altu pa o m├ís baxu ÔÇö a orden ta importa, kumo na Lisan 9."
  starterCode: |
    # nota.py
    def klassifika_nota(nota: float) -> str:
        ...  # TODO (implementa dipos di skrebe os testu)

    # test_nota.py
    # TODO: testu pa kada kategoria (16+, 12+, 10+, <10)
  solutionCode: |
    # nota.py
    def klassifika_nota(nota: float) -> str:
        if nota >= 16:
            return "Exselenti"
        elif nota >= 12:
            return "Bon"
        elif nota >= 10:
            return "Sufisienti"
        return "Insufisienti"

    # test_nota.py
    def test_exselenti():
        assert klassifika_nota(18) == "Exselenti"

    def test_bon():
        assert klassifika_nota(13) == "Bon"

    def test_sufisienti():
        assert klassifika_nota(10) == "Sufisienti"

    def test_insufisienti():
        assert klassifika_nota(7) == "Insufisienti"
- slug: testa-raises-valueerror
  language: python
  kind: code
  title: { kea: "Testa ki un funsan lansa un eru" }
  prompt:
    kea: "Adisiona un testu ki verifika ki `klassifika_nota(-1)` ta lansa un `ValueError` (pamodi un nota negativu ka faze sentidu). Uza `pytest.raises(ValueError)`. Atualiza a funsan pa lansa o eru."
  hint:
    kea: "Na a funsan, `if nota < 0: raise ValueError(...)`. Na o testu: `with pytest.raises(ValueError): klassifika_nota(-1)`. Ka skese o `import pytest`."
  starterCode: |
    # nota.py ÔÇö atualiza pa rejeita nota negativu
    def klassifika_nota(nota: float) -> str:
        # TODO: raise ValueError si nota < 0
        ...

    # test_nota.py
    import pytest
    # TODO: testa ki klassifika_nota(-1) ta lansa ValueError
  solutionCode: |
    # nota.py
    def klassifika_nota(nota: float) -> str:
        if nota < 0:
            raise ValueError("Nota ka pode ser negativu!")
        if nota >= 16:
            return "Exselenti"
        elif nota >= 12:
            return "Bon"
        elif nota >= 10:
            return "Sufisienti"
        return "Insufisienti"

    # test_nota.py
    import pytest

    def test_nota_negativu_da_eru():
        with pytest.raises(ValueError):
            klassifika_nota(-1)
