# Quiz sidecar (draft source) for lesson m3-25 "Testu di Kódiku ku pytest".
# Draft-canonical per ADR-0026. Publish copies this VERBATIM to
# content/courses/intro-python/lessons/25-testu-kodiku-pytest/quiz.yaml; positions
# 0,1,2,3 correspond to <Quiz position={N}/> markers (FOUR quizzes).
