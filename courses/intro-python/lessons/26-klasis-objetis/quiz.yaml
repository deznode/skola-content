- question:
    kea: "Pa kuze ki ta sirbi metodu `__init__` nun klasi?"
  options:
    - text: { kea: "É konstrutor — ta kore automátikamenti kuandu un objetu novu é kriadu, pa inisializa se atributu" }
      correct: true
    - text: { kea: "Ta apaga objetu di memória" }
      correct: false
    - text: { kea: "Ta imprimi objetu na ekran" }
      correct: false
    - text: { kea: "É primeru funsan ki bu ten ki txoma manualmenti" }
      correct: false
- question:
    kea: "O ki é `self` nun metodu di klasi?"
  options:
    - text: { kea: "Un referénsia pa objetu atuál (\"nha\") — Python ta pasa-l automátikamenti kumo primeru parámetru" }
      correct: true
    - text: { kea: "Nomi di klasi" }
      correct: false
    - text: { kea: "Un variável global partilhadu pa tudu objetu" }
      correct: false
    - text: { kea: "Un palavra opsional ki bu pode tira" }
      correct: false
- question:
    kea: "Kal é diferensa entri un **klasi** i un **objetu**?"
  options:
    - text: { kea: "Klasi é moldi (reseta); objetu é un instánsia real kriadu a partir di klasi (pratu)" }
      correct: true
    - text: { kea: "Es é mesmu kuza ku nomi diferenti" }
      correct: false
    - text: { kea: "Objetu é moldi; klasi é instánsia" }
      correct: false
    - text: { kea: "Un klasi só pode kria un objetu" }
      correct: false
- question:
    kea: "Pamodi é midjór definí tudu atributu dentu di `__init__`?"
  options:
    - text: { kea: "Pa garanti ki kada objetu ten atributu dezdi iníisu — definí-s fora pode kauza `AttributeError`" }
      correct: true
    - text: { kea: "Pamodi `__init__` é úniku lugar unde `self` izisti" }
      correct: false
    - text: { kea: "Pa faze objetu kore más rápidu" }
      correct: false
    - text: { kea: "Ka ten razan — pode ser na kualker lugar" }
      correct: false
