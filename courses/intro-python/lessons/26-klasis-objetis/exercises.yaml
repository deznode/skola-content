- slug: klasi-produtu
  language: python
  kind: code
  title: { kea: "Klasi Produtu" }
  prompt:
    kea: "Kria un klasi `Produtu` ku os atributu `nomi`, `presu` (ECV) i `stoki`. Adisiona os metodu `vende(kantidadi)` (ta reduzi o stoki si tene sufisienti) i `repon(kantidadi)` (ta aumenta o stoki)."
  hint:
    kea: "Inisializa tudu na `__init__(self, nomi, presu, stoki)`. Na `vende`, verifika `if kantidadi <= self.stoki:` antis di faze `self.stoki -= kantidadi`. Ka skese o `self` kumo primeru parûÀmetru di kada metodu."
  starterCode: |
    # produtu.py
    class Produtu:
        def __init__(self, nomi, presu, stoki):
            ...  # TODO: guarda os atributu

        def vende(self, kantidadi):
            ...  # TODO: reduzi o stoki si tene sufisienti

        def repon(self, kantidadi):
            ...  # TODO: aumenta o stoki
  solutionCode: |
    # produtu.py
    class Produtu:
        def __init__(self, nomi, presu, stoki):
            self.nomi = nomi
            self.presu = presu
            self.stoki = stoki

        def vende(self, kantidadi):
            if kantidadi > self.stoki:
                print(f"Stoki insufisienti di {self.nomi}!")
                return
            self.stoki -= kantidadi
            print(f"Vendidu {kantidadi} {self.nomi}. Stoki: {self.stoki}")

        def repon(self, kantidadi):
            self.stoki += kantidadi
            print(f"Reponedu. Stoki di {self.nomi}: {self.stoki}")

    grogu = Produtu("Grogu", 500, 10)
    grogu.vende(3)    # Stoki: 7
    grogu.repon(5)    # Stoki: 12
- slug: klasi-restoranti
  language: python
  kind: code
  title: { kea: "Klasi Restoranti" }
  prompt:
    kea: "Kria un klasi `Restoranti` ku os atributu `nomi`, `sidadi` i `menu` (un disionûÀriu pratuãpresu). Adisiona `adisiona_pratu(nomi, presu)`, `mostra_menu()` i `fazi_pedidu(lista_pratu)` ki ta retorna o total na ECV."
  hint:
    kea: "Inisializa `self.menu = {}` na `__init__`. Na `adisiona_pratu`, `self.menu[nomi] = presu`. Na `fazi_pedidu`, soma `self.menu[p]` pa kada pratu na a lista (uza `.get()` pa pratu ki ka izisti)."
  starterCode: |
    # restoranti.py
    class Restoranti:
        def __init__(self, nomi, sidadi):
            ...  # TODO: nomi, sidadi, menu vaziu

        def adisiona_pratu(self, nomi, presu):
            ...

        def mostra_menu(self):
            ...

        def fazi_pedidu(self, lista_pratu):
            ...  # TODO: retorna o total
  solutionCode: |
    # restoranti.py
    class Restoranti:
        def __init__(self, nomi, sidadi):
            self.nomi = nomi
            self.sidadi = sidadi
            self.menu = {}

        def adisiona_pratu(self, nomi, presu):
            self.menu[nomi] = presu

        def mostra_menu(self):
            print(f"--- {self.nomi} ({self.sidadi}) ---")
            for pratu, presu in self.menu.items():
                print(f"  {pratu}: {presu} ECV")

        def fazi_pedidu(self, lista_pratu):
            return sum(self.menu.get(p, 0) for p in lista_pratu)

    r = Restoranti("Kasa Nha Tû°ni", "Mindelo")
    r.adisiona_pratu("Katxupa", 350)
    r.adisiona_pratu("Grogu", 500)
    print(r.fazi_pedidu(["Katxupa", "Grogu"]))   # 850
- slug: klasi-jogador
  language: python
  kind: code
  title: { kea: "Klasi Jogador" }
  prompt:
    kea: "Kria un klasi `Jogador` ku os atributu `nomi`, `ekipa`, `golus` (kumesa na 0) i `jogus` (kumesa na 0). Adisiona `joga(golus_markadu)` i `media_golus()`. Kria 3 jogador i mostra ken ki tene a midjû°r mûˋdia."
  hint:
    kea: "Na `joga`, `self.jogus += 1` i `self.golus += golus_markadu`. Na `media_golus`, kuidadu ku divizan pa zero: `self.golus / self.jogus if self.jogus else 0`. Pa o midjû°r, `max(jogadoris, key=lambda j: j.media_golus())`."
  starterCode: |
    # jogador.py
    class Jogador:
        def __init__(self, nomi, ekipa):
            ...  # TODO: nomi, ekipa, golus=0, jogus=0

        def joga(self, golus_markadu):
            ...

        def media_golus(self):
            ...
  solutionCode: |
    # jogador.py
    class Jogador:
        def __init__(self, nomi, ekipa):
            self.nomi = nomi
            self.ekipa = ekipa
            self.golus = 0
            self.jogus = 0

        def joga(self, golus_markadu):
            self.jogus += 1
            self.golus += golus_markadu

        def media_golus(self):
            return self.golus / self.jogus if self.jogus else 0

    a = Jogador("Tû°ni", "Sporting"); a.joga(2); a.joga(1)
    b = Jogador("Lela", "Mindelense"); b.joga(3); b.joga(0)
    c = Jogador("Dadi", "Acadûˋmica"); c.joga(1); c.joga(1)

    midjû°r = max([a, b, c], key=lambda j: j.media_golus())
    print(f"Midjû°r mûˋdia: {midjû°r.nomi} ({midjû°r.media_golus():.1f})")
- slug: klasi-biblioteka
  language: python
  kind: code
  title: { kea: "Klasi Biblioteka" }
  prompt:
    kea: "Kria un klasi `Biblioteka` ku un lista di livru (kada livru un disionûÀriu ku `\"tûÙtulu\"`, `\"autor\"`, `\"disponûÙvel\"`). Adisiona `adisiona_livru(tûÙtulu, autor)`, `empresta_livru(tûÙtulu)` i `devolve_livru(tûÙtulu)`."
  hint:
    kea: "Inisializa `self.livrus = []`. Pa `empresta`, atxa o livru pa tûÙtulu i po `\"disponûÙvel\" = False` (si dja sta emprestadu, avisa). `devolve` ta faze o kontrûÀriu. Un loop sobri `self.livrus` ta atxa o sertu."
  starterCode: |
    # biblioteka.py
    class Biblioteka:
        def __init__(self):
            self.livrus = []

        def adisiona_livru(self, tûÙtulu, autor):
            ...

        def empresta_livru(self, tûÙtulu):
            ...

        def devolve_livru(self, tûÙtulu):
            ...
  solutionCode: |
    # biblioteka.py
    class Biblioteka:
        def __init__(self):
            self.livrus = []

        def adisiona_livru(self, tûÙtulu, autor):
            self.livrus.append({"tûÙtulu": tûÙtulu, "autor": autor, "disponûÙvel": True})

        def _atxa(self, tûÙtulu):
            for livru in self.livrus:
                if livru["tûÙtulu"] == tûÙtulu:
                    return livru
            return None

        def empresta_livru(self, tûÙtulu):
            livru = self._atxa(tûÙtulu)
            if livru and livru["disponûÙvel"]:
                livru["disponûÙvel"] = False
                print(f"'{tûÙtulu}' emprestadu.")
            else:
                print(f"'{tûÙtulu}' ka sta disponûÙvel.")

        def devolve_livru(self, tûÙtulu):
            livru = self._atxa(tûÙtulu)
            if livru:
                livru["disponûÙvel"] = True
                print(f"'{tûÙtulu}' devolvedu.")

    b = Biblioteka()
    b.adisiona_livru("Chiquinho", "Baltasar Lopes")
    b.empresta_livru("Chiquinho")   # emprestadu
    b.devolve_livru("Chiquinho")    # devolvedu
- slug: koriji-self-em-falta
  language: python
  kind: debug
  file: konta.py
  title: { kea: "Koriji un self ki sta en falta" }
  prompt:
    kea: "O metodu `deposita` ta da un `NameError: name 'saldu' is not defined`. Falta a referûˋnsia pa o objetu atuûÀl. Koriji-l pa o saldu atualiza pa 150."
  hint:
    kea: "Dentu di un metodu, os atributu di o objetu ten ki ser asesadu ku `self.` ã `self.saldu`, ka `saldu` solu. Uza `self.saldu += montanti`."
  starterCode: |
    # konta.py ã es ta da un NameError. Koriji-l.
    class Konta:
        def __init__(self, saldu):
            self.saldu = saldu

        def deposita(self, montanti):
            saldu = saldu + montanti   # NameError: saldu

    k = Konta(100)
    k.deposita(50)
    print(k.saldu)
  solutionCode: |
    # konta.py ã os atributu di o objetu ta uzadu ku self.
    class Konta:
        def __init__(self, saldu):
            self.saldu = saldu

        def deposita(self, montanti):
            self.saldu += montanti

    k = Konta(100)
    k.deposita(50)
    print(k.saldu)   # 150
