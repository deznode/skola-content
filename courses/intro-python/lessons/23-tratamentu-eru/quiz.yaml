- question:
    kea: "Pa kuze ki ta sirbi bloku `try`/`except`?"
  options:
    - text: { kea: "Pa tenta un kódiku i, si el da un eru, trata-l grasiozamenti en bez di programa para" }
      correct: true
    - text: { kea: "Pa repeti un kódiku até el funsiona" }
      correct: false
    - text: { kea: "Pa konverti un valor di un tipu pa otu" }
      correct: false
    - text: { kea: "Pa definí un funsan nova" }
      correct: false
- question:
    kea: "Na ki orden bu debe po `except`?"
  options:
    - text: { kea: "Más espesífiku primeru (`ValueError`, `ZeroDivisionError`), i `Exception` (catch-all) na fin" }
      correct: true
    - text: { kea: "`Exception` primeru, dipos espesífiku" }
      correct: false
    - text: { kea: "Orden ka ta importa" }
      correct: false
    - text: { kea: "Más kurtu primeru" }
      correct: false
- question:
    kea: "Kal é diferensa entri bloku `else` i `finally` nun try/except?"
  options:
    - text: { kea: "`else` só ta kore si `try` ka teve eru; `finally` ta kore **senpri** (ku eru ou sen eru)" }
      correct: true
    - text: { kea: "`else` ta kore senpri; `finally` só si teve eru" }
      correct: false
    - text: { kea: "Es é mesmu kuza" }
      correct: false
    - text: { kea: "`else` ta kore si teve eru; `finally` si ka teve" }
      correct: false
- question:
    kea: "Pa kuze ki ta sirbi `raise`?"
  options:
    - text: { kea: "Pa **lansa** un eru di propósitu na bu kódiku — p.ex. sinaliza un argumentu inválidu ou un kondisan di negósiu ki ka é satisfeitu" }
      correct: true
    - text: { kea: "Pa kaptura un eru i ignora-l" }
      correct: false
    - text: { kea: "Pa rekomesa programa di inísiu" }
      correct: false
    - text: { kea: "Pa konverti un eru nun avizu" }
      correct: false
