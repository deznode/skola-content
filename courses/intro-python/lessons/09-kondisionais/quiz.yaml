- question:
    kea: "Nun kadeia `if`/`elif`/`else`, kuantu blokus Python ta izekuta?"
  options:
    - text: { kea: "Un só — primeru ku kondisan `True`; dipos el ta sai di kadeia" }
      correct: true
    - text: { kea: "Tudu blokus ku kondisan `True`" }
      correct: false
    - text: { kea: "Tudu blokus, di riba pa baxu, senpri" }
      correct: false
    - text: { kea: "Só bloku `else`, si el izisti" }
      correct: false
- question:
    kea: "O ki ta faze `status = \"adultu\" if idadi >= 18 else \"menor\"`?"
  options:
    - text: { kea: "Ta da `\"adultu\"` pa `status` si `idadi >= 18`, senan `\"menor\"` — é un ternary operator (if nun linha)" }
      correct: true
    - text: { kea: "Un `SyntaxError` — `if` ka pode sta na un linha" }
      correct: false
    - text: { kea: "Ta imprimi `\"adultu\"` ou `\"menor\"` diretu na ekran" }
      correct: false
    - text: { kea: "Ta da senpri `\"adultu\"` pa `status`" }
      correct: false
- question:
    kea: "Nun `match`/`case`, pa kuze ki ta sirbi `case _:`?"
  options:
    - text: { kea: "É kumo `else` — el ta apanha tudu valor ki ka kombina ku otus `case`" }
      correct: true
    - text: { kea: "Ta kombina só ku valor `_` (underscore literál)" }
      correct: false
    - text: { kea: "Ta marka fin di bloku `match`" }
      correct: false
    - text: { kea: "Ta repeti primeru `case`" }
      correct: false
