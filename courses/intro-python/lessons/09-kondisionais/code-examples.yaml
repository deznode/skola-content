# Code-examples sidecar (draft source) for lesson m1-09 "Kondisionais (if/elif/else)".
# Draft-canonical per ADR-0026. Publish copies this to
# content/courses/intro-python/lessons/09-kondisionais/code-examples.yaml;
# position 0 corresponds to <CodeExample position={0} showTabs/> in kea.mdx.
#
# Code examples are NOT localized (single language/code/title triple). `variants`
# (V33) is the grouped tab set — with >=2 entries <CodeExample> renders a tab
# bar. The scalar `code` below is the single-render fallback (the if/else form,
# the safe default). Both variants assign status = "adultu" and print:
#   Bo é adultu.
- title: "Mesmu rezultadu, dos forma di skrebe"
  language: python
  code: |
    idadi = 20
    if idadi >= 18:
        status = "adultu"
    else:
        status = "menor"
    print(f"Bo é {status}.")  # Bo é adultu.
  variants:
    - label: "if / else (forma normal)"
      language: python
      code: |
        idadi = 20
        if idadi >= 18:
            status = "adultu"
        else:
            status = "menor"
        print(f"Bo é {status}.")  # Bo é adultu.
    - label: "Ternary (un linha)"
      language: python
      code: |
        idadi = 20
        status = "adultu" if idadi >= 18 else "menor"
        print(f"Bo é {status}.")  # Bo é adultu.

# position 1 — <CodeExample position={1} showTabs/>: anu bisextu, dos formas.
# Mesmu lójika i mesmu rezultadu; o `if` aninhadu vs a versan nun linha só.
# Scalar `code` fallback = a versan simplifikadu (más limpu).
- title: "Anu bisextu — aninhadu vs un linha"
  language: python
  code: |
    anu = int(input("Inseri un anu: "))
    if (anu % 4 == 0 and anu % 100 != 0) or (anu % 400 == 0):
        print(f"{anu} é anu bisextu! 📅")
    else:
        print(f"{anu} KA é anu bisextu.")
  variants:
    - label: "if aninhadu"
      language: python
      code: |
        anu = int(input("Inseri un anu: "))
        if anu % 4 == 0:
            if anu % 100 == 0:
                if anu % 400 == 0:
                    print(f"{anu} é anu bisextu! 📅")
                else:
                    print(f"{anu} KA é anu bisextu.")
            else:
                print(f"{anu} é anu bisextu! 📅")
        else:
            print(f"{anu} KA é anu bisextu.")
    - label: "and / or (un linha)"
      language: python
      code: |
        anu = int(input("Inseri un anu: "))
        if (anu % 4 == 0 and anu % 100 != 0) or (anu % 400 == 0):
            print(f"{anu} é anu bisextu! 📅")
        else:
            print(f"{anu} KA é anu bisextu.")
