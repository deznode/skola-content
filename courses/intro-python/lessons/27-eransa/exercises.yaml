- slug: ierarkia-di-animal
  language: python
  kind: code
  title: { kea: "Ierarkia di Animál" }
  prompt:
    kea: "Kria un klasi bazi `Animál` ku `nomi` i `son`. Dipos kria klasi filhu `Katxor`, `Gatu` i `Galinha`, kada un ku se própriu metodu `fala()` ki ta imprimi son. Kria un lista ku 5 animál i faze tudu fala."
  hint:
    kea: "Klasi filhu ta erda di `Animál`: `class Katxor(Animál):`. Kada filhu pode definí `fala()` ki uza `self.son`. Un loop sobri lista ta txoma `a.fala()` pa kada un — kada objetu ta uza se versan."
  starterCode: |
    # animais.py
    class Animál:
        def __init__(self, nomi, son):
            self.nomi = nomi
            self.son = son

    class Katxor(Animál):
        def fala(self):
            ...  # TODO: imprimi o son

    # TODO: Gatu, Galinha; lista di 5; tudu fala
  solutionCode: |
    # animais.py
    class Animál:
        def __init__(self, nomi, son):
            self.nomi = nomi
            self.son = son

    class Katxor(Animál):
        def fala(self):
            print(f"{self.nomi}: {self.son}")

    class Gatu(Animál):
        def fala(self):
            print(f"{self.nomi}: {self.son}")

    class Galinha(Animál):
        def fala(self):
            print(f"{self.nomi}: {self.son}")

    animais = [
        Katxor("Bobi", "Au au"),
        Gatu("Mimi", "Miau"),
        Galinha("Pita", "Kó kó ró kó"),
        Katxor("Rex", "Au"),
        Gatu("Felix", "Miau miau"),
    ]
    for a in animais:
        a.fala()
- slug: kontas-espesializadu
  language: python
  kind: code
  title: { kea: "Kontas bankáriu espesializadu" }
  prompt:
    kea: "A partir di un klasi `KontaBankáriu` (ku `titulár` i `saldu`), kria `KontaPoupansa` (ku un taxa di juros ki un metodu `aplika_juros()` ta aplika) i `KontaKorrenti` (ku un `limiti_dezkobertu`). Uza `super().__init__()`."
  hint:
    kea: "Na filhu, txoma `super().__init__(titulár, saldu)` primeru, dipos guarda atributu novu. `aplika_juros` ta faze `self.saldu += self.saldu * self.taxa`. `KontaKorrenti` pode levanta até `saldu + limiti_dezkobertu`."
  starterCode: |
    # kontas.py
    class KontaBankáriu:
        def __init__(self, titulár, saldu=0):
            self.titulár = titulár
            self.saldu = saldu

    class KontaPoupansa(KontaBankáriu):
        def __init__(self, titulár, saldu, taxa):
            ...  # TODO: super() + taxa

        def aplika_juros(self):
            ...

    # TODO: KontaKorrenti ku limiti_dezkobertu
  solutionCode: |
    # kontas.py
    class KontaBankáriu:
        def __init__(self, titulár, saldu=0):
            self.titulár = titulár
            self.saldu = saldu

    class KontaPoupansa(KontaBankáriu):
        def __init__(self, titulár, saldu, taxa):
            super().__init__(titulár, saldu)
            self.taxa = taxa

        def aplika_juros(self):
            self.saldu += self.saldu * self.taxa
            print(f"Juros aplikadu. Saldu: {self.saldu:.0f} ECV")

    class KontaKorrenti(KontaBankáriu):
        def __init__(self, titulár, saldu, limiti_dezkobertu):
            super().__init__(titulár, saldu)
            self.limiti_dezkobertu = limiti_dezkobertu

        def levanta(self, montanti):
            if montanti <= self.saldu + self.limiti_dezkobertu:
                self.saldu -= montanti
                print(f"Levantadu. Saldu: {self.saldu} ECV")
            else:
                print("Limiti di dezkobertu ultrapasadu!")

    p = KontaPoupansa("Tóni", 10000, 0.02)
    p.aplika_juros()   # Saldu: 10200 ECV
