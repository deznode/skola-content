- question:
    kea: "Pa kuze ki ta sirbi `super().__init__(...)` nun klasi filhu?"
  options:
    - text: { kea: "Ta txoma o konstrutor di a klasi pai pa inisializa os atributu erdadu, sen repeti o kódiku" }
      correct: true
    - text: { kea: "Ta kria un novu objetu di a klasi pai" }
      correct: false
    - text: { kea: "Ta apaga os atributu di a klasi pai" }
      correct: false
    - text: { kea: "Ta verifika si a klasi filhu é válidu" }
      correct: false
- question:
    kea: "Pa eransa **simples** bu uza `super().__init__()`. I pa eransa **múltiplu** (vários pai)?"
  options:
    - text: { kea: "Txomada direta a kada pai: `Pai1.__init__(self, ...)` i `Pai2.__init__(self, ...)`" }
      correct: true
    - text: { kea: "Senpri `super().__init__()`, ki ta txoma tudu os pai" }
      correct: false
    - text: { kea: "Ka pode tene eransa múltiplu na Python" }
      correct: false
    - text: { kea: "`super().__init__()` repetidu un bez pa kada pai" }
      correct: false
- question:
    kea: "Pa `class D(B, C)`, undi os dos B i C erda di A, kal é a orden di buska (MRO)?"
  options:
    - text: { kea: "`D → B → C → A → object` — di o filhu pa os pai, di skerda pa direita" }
      correct: true
    - text: { kea: "`D → A → B → C → object`" }
      correct: false
    - text: { kea: "`D → C → B → A → object` — di direita pa skerda" }
      correct: false
    - text: { kea: "A orden é aleatóriu" }
      correct: false
- question:
    kea: "Bu tene `class Táksi(Viatúra)` i `taksi = Táksi()`. O ki ta da `isinstance(taksi, Viatúra)`?"
  options:
    - text: { kea: "`True` — graças a a eransa, un `Táksi` é tanbé un `Viatúra`" }
      correct: true
    - text: { kea: "`False` — `taksi` é un `Táksi`, ka un `Viatúra`" }
      correct: false
    - text: { kea: "Un eru — `isinstance` ka ta funsiona ku eransa" }
      correct: false
    - text: { kea: "`True` só si `Táksi` ka definí `__init__`" }
      correct: false
