- question:
    kea: "Bu tene `class Taxi(Viatúra): pass`. O ki `Taxi` ta erda di `Viatúra`?"
  options:
    - text: { kea: "Tudu atributu i metodu (`__init__`, `liga()`, `deskrebe()`) — mésmu sen kódiku novu" }
      correct: true
    - text: { kea: "Nada — `pass` ta dexa klasi váziu" }
      correct: false
    - text: { kea: "Só metodu, ka atributu" }
      correct: false
    - text: { kea: "Só `__init__`" }
      correct: false
- question:
    kea: "`Taxi` ta sobreskrebe `deskrebe()` i ta txoma `super().deskrebe()`. O ki `taxi.deskrebe()` ta returna?"
  options:
    - text: { kea: "Versan di pai + a parti novu: `Toyota Hilux (2020) — Taxi Lisensa: TX-1234 (Zona: Praia)`" }
      correct: true
    - text: { kea: "Só versan di pai: `Toyota Hilux (2020)`" }
      correct: false
    - text: { kea: "Só a parti novu: `Taxi Lisensa: TX-1234 (Zona: Praia)`" }
      correct: false
    - text: { kea: "Un eru — ka pode txoma `super()` dentu di un metodu sobreskrebedu" }
      correct: false
- question:
    kea: "Pa kuze ki ta sirbi `super().__init__(...)` nun klasi filhu?"
  options:
    - text: { kea: "Ta txoma konstrutor di klasi pai pa inisializa atributu erdadu, sen repeti kódiku" }
      correct: true
    - text: { kea: "Ta kria un novu objetu di klasi pai" }
      correct: false
    - text: { kea: "Ta apaga atributu di klasi pai" }
      correct: false
    - text: { kea: "Ta verifika si klasi filhu é válidu" }
      correct: false
