- slug: refleta-name-main
  language: python
  kind: reflect
  title: { kea: "Refleta sobri `__name__ == \"__main__\"`" }
  prompt:
    kea: "O bloku `if __name__ == \"__main__\":` só ta kore kuandu o ficheru é izekutadu diretu, ka kuandu é importadu. Pensa nun módulu ki bu kreba kria (p.ex. o `conversor.py`). Skrebe o ki bu ta po dentu di kel bloku, i pamodi el ka devia kore na o import."
  notePlaceholder:
    kea: "Módulu: …   ·   O ki ta entra na o bloku __main__: …   ·   Pamodi ka devia kore na import: …"
