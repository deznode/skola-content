- question:
    kea: "Dipos di `from math import sqrt`, kumo bu ta txoma funsan?"
  options:
    - text: { kea: "`sqrt(25)` — diretu, sen prefixu `math.`" }
      correct: true
    - text: { kea: "`math.sqrt(25)` — senpri ku prefixu" }
      correct: false
    - text: { kea: "`import.sqrt(25)`" }
      correct: false
    - text: { kea: "`from.sqrt(25)`" }
      correct: false
- question:
    kea: "Pa kuze ki ta sirbi bloku `if __name__ == \"__main__\":`?"
  options:
    - text: { kea: "Kódiku dentu del só ta kore kuandu ficheru é izekutadu **diretu**, ka kuandu é importadu kumo módulu" }
      correct: true
    - text: { kea: "Ta marka primeru funsan ki Python ta txoma" }
      correct: false
    - text: { kea: "Ta importa tudu módulu nesesáriu" }
      correct: false
    - text: { kea: "Ta da un nomi pa programa prinsipal" }
      correct: false
- question:
    kea: "Bu kre uza un pakotu ki **ka ta** na standard library (p.ex. `requests`). O ki bu ta faze?"
  options:
    - text: { kea: "Instala-l ku `pip install requests`, dipos `import requests` na kódiku" }
      correct: true
    - text: { kea: "`import requests` diretu — tudu pakotu ben ku Python" }
      correct: false
    - text: { kea: "Kopia kódiku di `requests` pa bu ficheru" }
      correct: false
    - text: { kea: "Ka ten manera — só módulu di standard library pode ser uzadu" }
      correct: false
