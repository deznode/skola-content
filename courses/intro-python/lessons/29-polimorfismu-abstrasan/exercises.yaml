- slug: abstrata-veikulu
  language: python
  kind: code
  title: { kea: "Ierarkia di Veíkulu (abstratu)" }
  prompt:
    kea: "Kria un klasi abstratu `Veikulu` ku metodu abstratu `liga()` i `acelera()`. Dipos kria `Karu`, `Motu` i `Barku` ki ta implementa-s di manera diferenti. Testa ku un lista di veíkulu (polimorfismu)."
  hint:
    kea: "`from abc import ABC, abstractmethod`; `class Veikulu(ABC):` ku `@abstractmethod` riba di `liga` i `acelera`. Kada filhu **ten ki** implementa os dos, senan ka pode ser kriadu. Un loop ta txoma `v.liga()` pa kada un."
  starterCode: |
    # veikulu.py
    from abc import ABC, abstractmethod

    class Veikulu(ABC):
        @abstractmethod
        def liga(self): ...

        @abstractmethod
        def acelera(self): ...

    # TODO: Karu, Motu, Barku ki implementa os dos metodu
    # TODO: lista di veíkulu, tudu liga i acelera
  solutionCode: |
    # veikulu.py
    from abc import ABC, abstractmethod

    class Veikulu(ABC):
        @abstractmethod
        def liga(self): ...

        @abstractmethod
        def acelera(self): ...

    class Karu(Veikulu):
        def liga(self): return "Karu ta liga: vrum!"
        def acelera(self): return "Karu ta acelera na strada"

    class Motu(Veikulu):
        def liga(self): return "Motu ta liga: ron ron!"
        def acelera(self): return "Motu ta acelera rápidu"

    class Barku(Veikulu):
        def liga(self): return "Barku ta liga o motor"
        def acelera(self): return "Barku ta navega na mar"

    for v in [Karu(), Motu(), Barku()]:
        print(v.liga(), "—", v.acelera())
- slug: abstrata-notifikasan
  language: python
  kind: code
  title: { kea: "Sistema di notifikasan" }
  prompt:
    kea: "Kria un klasi abstratu `Notifikasan` ku metodu abstratu `manda(mensajen)`. Kria `Email`, `SMS` i `WhatsApp` ki ta manda di manera diferenti. Skrebe un funsan `manda_pa_tudu(notifikadoris, mensajen)` ki ta uza polimorfismu."
  hint:
    kea: "Funsan `manda_pa_tudu` ka ta liga pa tipu — el só ta txoma `n.manda(mensajen)` pa kada `n` na lista. Kada klasi ta formata se própria mensajen."
  starterCode: |
    # notifika.py
    from abc import ABC, abstractmethod

    class Notifikasan(ABC):
        @abstractmethod
        def manda(self, mensajen): ...

    # TODO: Email, SMS, WhatsApp
    # TODO: manda_pa_tudu(notifikadoris, mensajen)
  solutionCode: |
    # notifika.py
    from abc import ABC, abstractmethod

    class Notifikasan(ABC):
        @abstractmethod
        def manda(self, mensajen): ...

    class Email(Notifikasan):
        def manda(self, mensajen):
            print(f"📧 Email: {mensajen}")

    class SMS(Notifikasan):
        def manda(self, mensajen):
            print(f"📱 SMS: {mensajen}")

    class WhatsApp(Notifikasan):
        def manda(self, mensajen):
            print(f"💬 WhatsApp: {mensajen}")

    def manda_pa_tudu(notifikadoris, mensajen):
        for n in notifikadoris:
            n.manda(mensajen)

    manda_pa_tudu([Email(), SMS(), WhatsApp()], "Bu pedidu txiga!")
- slug: abstrata-konversor
  language: python
  kind: code
  title: { kea: "Konversor di moeda (abstratu)" }
  prompt:
    kea: "Kria un klasi abstratu `Konversor` ku metodu abstratu `konverte(montanti)`. Kria `ECV_pa_EUR`, `ECV_pa_USD` i `ECV_pa_BRL` ku taxas diferenti. Skrebe un funsan ki ta mostra konversan di `10000` ECV na tudu moeda."
  hint:
    kea: "Kada filhu ta tene se própria taxa i ta implementa `konverte`. P.ex. `ECV_pa_EUR.konverte(m)` ta da `m / 110.265`. Un loop sobri un lista di konversor ta mostra kada rezultadu — polimorfismu."
  starterCode: |
    # konversor.py
    from abc import ABC, abstractmethod

    class Konversor(ABC):
        @abstractmethod
        def konverte(self, montanti): ...

    # TODO: ECV_pa_EUR, ECV_pa_USD, ECV_pa_BRL ku taxas
    # TODO: mostra konversan di 10000 ECV
  solutionCode: |
    # konversor.py
    from abc import ABC, abstractmethod

    class Konversor(ABC):
        nomi = "?"
        taxa = 1
        @abstractmethod
        def konverte(self, montanti): ...

    class ECV_pa_EUR(Konversor):
        nomi, taxa = "EUR", 110.265
        def konverte(self, montanti): return montanti / self.taxa

    class ECV_pa_USD(Konversor):
        nomi, taxa = "USD", 100.0
        def konverte(self, montanti): return montanti / self.taxa

    class ECV_pa_BRL(Konversor):
        nomi, taxa = "BRL", 18.5
        def konverte(self, montanti): return montanti / self.taxa

    for k in [ECV_pa_EUR(), ECV_pa_USD(), ECV_pa_BRL()]:
        print(f"10000 ECV = {k.konverte(10000):.2f} {k.nomi}")
- slug: abstrata-empregadu
  language: python
  kind: code
  title: { kea: "Folha di pagamentu (abstratu)" }
  prompt:
    kea: "Kria un klasi abstratu `Empregadu` ku metodu abstratu `kalkula_saláriu()`. Kria `Xefi` (saláriu fixu), `Garson` (saláriu + gorjetas) i `FreeLancer` (paga pa ora). Kalkula folha di pagamentu total."
  hint:
    kea: "Kada filhu ta tene atributu ki el meste i ta implementa `kalkula_saláriu`. Pa total, `sum(e.kalkula_saláriu() for e in empregadus)` — kada un ta uza se própria fórmula."
  starterCode: |
    # empregadu.py
    from abc import ABC, abstractmethod

    class Empregadu(ABC):
        def __init__(self, nomi):
            self.nomi = nomi
        @abstractmethod
        def kalkula_saláriu(self): ...

    # TODO: Xefi, Garson, FreeLancer
    # TODO: folha di pagamentu total
  solutionCode: |
    # empregadu.py
    from abc import ABC, abstractmethod

    class Empregadu(ABC):
        def __init__(self, nomi):
            self.nomi = nomi
        @abstractmethod
        def kalkula_saláriu(self): ...

    class Xefi(Empregadu):
        def __init__(self, nomi, fixu):
            super().__init__(nomi)
            self.fixu = fixu
        def kalkula_saláriu(self):
            return self.fixu

    class Garson(Empregadu):
        def __init__(self, nomi, baz, gorjetas):
            super().__init__(nomi)
            self.baz, self.gorjetas = baz, gorjetas
        def kalkula_saláriu(self):
            return self.baz + self.gorjetas

    class FreeLancer(Empregadu):
        def __init__(self, nomi, oras, taxa_ora):
            super().__init__(nomi)
            self.oras, self.taxa_ora = oras, taxa_ora
        def kalkula_saláriu(self):
            return self.oras * self.taxa_ora

    ekipa = [Xefi("Tóni", 120000), Garson("Ana", 40000, 15000), FreeLancer("Dadi", 80, 800)]
    print(f"Folha total: {sum(e.kalkula_saláriu() for e in ekipa):,} ECV")
