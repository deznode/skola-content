- question:
    kea: "O ki ta signifika **polimorfismu** na programasan?"
  options:
    - text: { kea: "Mesmu metodu (mesmu nomi) pode tene komportamentu diferenti dependendu di klasi ki ta txoma-l" }
      correct: true
    - text: { kea: "Un klasi ki ka pode tene atributu" }
      correct: false
    - text: { kea: "Un funsan ki ta retorna senpri mesmu valor" }
      correct: false
    - text: { kea: "Un klasi ku txeu konstrutor" }
      correct: false
- question:
    kea: "O ki ta kontise si bu tenta kria un objetu di un klasi abstratu (`ABC`) diretu?"
  options:
    - text: { kea: "Un `TypeError` — un klasi abstratu ka pode ser instansiadu; el só ta sirbi kumo pai" }
      correct: true
    - text: { kea: "Ta funsiona normal, kumo kualker klasi" }
      correct: false
    - text: { kea: "Ta kria un objetu vaziu" }
      correct: false
    - text: { kea: "Python ta inora metodu abstratu" }
      correct: false
- question:
    kea: "Un funsan `mostra_relatoriu(formas)` só ta txoma `forma.area()`. O ki ta kontise si bu djunta un novu tipu di forma ku un metodu `area()`?"
  options:
    - text: { kea: "Ta funsiona sen mudá funsan — el só ta uza interfasi (`.area()`), ka tipu konkretu" }
      correct: true
    - text: { kea: "Bu ten ki riskrebe funsan pa kada novu tipu" }
      correct: false
    - text: { kea: "Ta da un eru pamodi funsan ka konxe novu tipu" }
      correct: false
    - text: { kea: "Novu tipu ten ki erda di tudu otu" }
      correct: false
- question:
    kea: "Un klasi filhu di un `ABC` ka implementa un di metodu `@abstractmethod`. O ki ta kontise?"
  options:
    - text: { kea: "Ka pode ser instansiadu — Python ta da `TypeError` kuandu bu tenta kria un objetu del" }
      correct: true
    - text: { kea: "Ta funsiona, ma metodu ka ta faze nada" }
      correct: false
    - text: { kea: "Python ta kopia metodu di pai automátikamenti" }
      correct: false
    - text: { kea: "Ka ten problema — metodu abstratu é opsional" }
      correct: false
