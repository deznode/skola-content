- question:
    kea: "Bu skrebe `idadi = input(\"Bu idadi? \")` i utilizador ta skrebe `25`. Ki tipu é `idadi`?"
  options:
    - text: { kea: "`str` — `input()` ta retorna senpri un string, mesmu kuandu utilizador ta skrebe un númeru" }
      correct: true
    - text: { kea: "`int` — Python ta diskubri ki é un númeru" }
      correct: false
    - text: { kea: "`float` — tudu númeru di `input()` é desimal" }
      correct: false
    - text: { kea: "Ta dependi di o ki utilizador skrebe" }
      correct: false
- question:
    kea: "Kal di es nomis di variável é **eradu** na Python?"
  options:
    - text: { kea: "`2nomi` — un nomi ka pode kumesa ku un númeru" }
      correct: true
    - text: { kea: "`nomi_kompletu` — snake_case é koretu" }
      correct: false
    - text: { kea: "`_idadi` — kumesa ku underscore é permitidu" }
      correct: false
    - text: { kea: "`nota1` — letra primeru, númeru dipos é OK" }
      correct: false
- question:
    kea: "O ki ta kontise kuandu bu kore `int(\"Maria\")`?"
  options:
    - text: { kea: "Un `ValueError` — `\"Maria\"` ka pode ser konvertidu pa un interu" }
      correct: true
    - text: { kea: "Ta retorna `0` pa string ki ka é númeru" }
      correct: false
    - text: { kea: "Ta retorna o tamañu di string: `5`" }
      correct: false
    - text: { kea: "Un `TypeError` — `int()` ka ta seita strings" }
      correct: false
