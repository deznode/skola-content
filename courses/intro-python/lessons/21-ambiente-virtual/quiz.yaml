# These 3 questions were AI-drafted from the lesson body for review, NOT
# finalized. A native Kriolu reviewer must approve/rewrite wording before
# publish. languages_enabled = ["kea"] only (no `en` required).
- question:
    kea: "Pa kuze ki ta sirbi un ambiente virtual (`.venv`)?"
  options:
    - text: { kea: "Ta izola pakotu di kada projetu — kada projetu tene se própriu versan, sen interferi ku otus" }
      correct: true
    - text: { kea: "Ta faze kódiku kore más rápidu" }
      correct: false
    - text: { kea: "Ta instala Python na komputador" }
      correct: false
    - text: { kea: "Ta konekta projetu pa internet" }
      correct: false
- question:
    kea: "Kumo bu ta salva i dipos restaura lista di pakotu di un projetu?"
  options:
    - text: { kea: "`pip freeze > requirements.txt` pa salva; `pip install -r requirements.txt` pa restaura" }
      correct: true
    - text: { kea: "`pip save` pa salva; `pip load` pa restaura" }
      correct: false
    - text: { kea: "Kopia pasta `.venv/` pa git" }
      correct: false
    - text: { kea: "`pip list > requirements.txt` pa salva; `pip get` pa restaura" }
      correct: false
- question:
    kea: "Pamodi pasta `.venv/` ka debe bai pa git?"
  options:
    - text: { kea: "El tene miláris di ficheru, é spesífiku pa kada komputador, i pode ser rekriadu di `requirements.txt` — anton ta na `.gitignore`" }
      correct: true
    - text: { kea: "Pamodi el tene kódiku sekretu di projetu" }
      correct: false
    - text: { kea: "Pamodi git ka ta seita pasta ku ponto na nomi" }
      correct: false
    - text: { kea: "El debe bai pa git senpri — é importante partilha-l" }
      correct: false
