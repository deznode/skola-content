# Quiz sidecar (draft source) for lesson m3-21 "Ambiente Virtual i pip".
# Draft-canonical per ADR-0026. Publish copies this VERBATIM to
# content/courses/intro-python/lessons/21-ambiente-virtual/quiz.yaml; positions
# 0,1,2 correspond to <Quiz position={N}/> markers in kea.mdx.
#
