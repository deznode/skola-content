# Exercises sidecar (draft source) for lesson m1-07 "Strings: Metodus i Formatasan".
# Draft-canonical per ADR-0026 (skola-claude-plugins). Publish copies this to
# content/courses/intro-python/lessons/07-strings-metodus/exercises.yaml, where
# scripts/import-content.ts emits it into the `exercises` table; <TentaGosi/>
# renders them in display order. Keep `slug` stable (completed_exercises FK).
#
# The inline "## Tenta Gosi 🏋️" drills (Izersisiu 1/2/3) become interactive
# `code` exercises: `starterCode` is a copyable scaffold; the answer is the
# revealed `solutionCode`. Prompts stay INLINE-only (inline-markdown.tsx — no
# multi-line fenced blocks; the ASCII contact-card art from Izersisiu 3 is
# described in prose, not embedded). Plus one `debug` drill
# (`koriji-string-imutavel` — a broken program shown inline to fix), one
# `explore` + one `reflect`.
#
# Shapes follow L1/L2/L3: `title`/`prompt`/`hint`/`notePlaceholder` localized
# ({kea:...}); `resources` localized; `starterCode`/`solutionCode` plain snippets.
- slug: prosesador-di-nomi
  language: python
  kind: code
  title: { kea: "Prosesador di nomi" }
  prompt:
    kea: "Pidi un nomi kompletu ku `input()`. Dipos mostra-l na maiúskula (`.upper()`), na minúskula (`.lower()`), na formatu título (`.title()`), i mostra kuantas letra el tene (uza `len()` i `.replace(\" \", \"\")` pa tira os spasus)."
  hint:
    kea: "Metodus di string ka ta muda original — es ta retorna un string novu, anton uza-s diretu dentu di un f-string: `print(f\"{nomi.upper()}\")`. Pa konta só letra (sen spasus): `len(nomi.replace(\" \", \"\"))`."
  starterCode: |
    # nomi.py
    nomi = input("Bu nomi kompletu? ")

    # TODO: mostra na maiúskula, minúskula i formatu título
    # TODO: mostra kuantas letra (sen konta os spasus)
  solutionCode: |
    # nomi.py
    nomi = input("Bu nomi kompletu? ")

    print(f"Maiúskula: {nomi.upper()}")
    print(f"Minúskula: {nomi.lower()}")
    print(f"Título:    {nomi.title()}")

    sen_spasu = nomi.replace(" ", "")
    print(f"Letras: {len(sen_spasu)}")
- slug: analizador-di-frazi
  language: python
  kind: code
  title: { kea: "Analizador di frazi" }
  prompt:
    kea: "Pidi un frazi i mostra: kuantas palavra el tene (`.split()` + `len()`), kuantas bez letra `a` ta parese (`.count(\"a\")`), i frazi invertidu (`[::-1]`)."
  hint:
    kea: "`.split()` sen argumentu ta kebra pa spasu i ta da un lista — `len(frazi.split())` é nu di palavra. `frazi.count(\"a\")` ta konta só `a` minúskulu. I `frazi[::-1]` ta inverti string interu."
  starterCode: |
    # frazi.py
    frazi = input("Skrebe un frazi: ")

    # TODO: kuantas palavra (split + len)
    # TODO: kuantas bez a letra "a" ta parese (count)
    # TODO: a frazi invertidu ([::-1])
  solutionCode: |
    # frazi.py
    frazi = input("Skrebe un frazi: ")

    print(f"Palavras: {len(frazi.split())}")
    print(f"Letra 'a': {frazi.count('a')} bez")
    print(f"Invertidu: {frazi[::-1]}")
- slug: formatador-di-kontatu
  language: python
  kind: code
  title: { kea: "Formatador di kontatu" }
  prompt:
    kea: "Pidi nomi, ilha i telefone, i mostra un kartu di kontatu formatadu ku f-strings — kada kampu na se própria linha (`Nomi:`, `Ilha:`, `Tel:`), alinhadu ku `:<` pa fika sertu."
  hint:
    kea: "Uza `:<12` dentu di un f-string pa alinha un valor na 12 karater (`f\"Nomi: {nomi:<12}\"`). Pa telefone, bu pode formata dígitus ku slicing: `f\"+{tel[:3]} {tel[3:6]}-{tel[6:8]}-{tel[8:]}\"`."
  starterCode: |
    # kontatu.py
    nomi = input("Nomi? ")
    ilha = input("Ilha? ")
    tel = input("Telefone (só dígitus, p.ex. 2389912345)? ")

    # TODO: mostra un kartu ku as tres kampu, alinhadu ku f-strings
  solutionCode: |
    # kontatu.py
    nomi = input("Nomi? ")
    ilha = input("Ilha? ")
    tel = input("Telefone (só dígitus, p.ex. 2389912345)? ")

    tel_fmt = f"+{tel[:3]} {tel[3:6]}-{tel[6:8]}-{tel[8:]}"

    print("--- Kontatu ---")
    print(f"Nomi: {nomi:<14}")
    print(f"Ilha: {ilha:<14}")
    print(f"Tel:  {tel_fmt:<14}")
- slug: koriji-string-imutavel
  language: python
  kind: debug
  file: nomi.py
  title: { kea: "Koriji un string imutável" }
  prompt:
    kea: "Es programa ta da un `TypeError` kuandu el tenta muda primeru letra di `nomi`. Strings é **imutável**! Koriji-l pa `nomi` fika `Toni`."
  hint:
    kea: "`nomi[0] = \"T\"` ta da `TypeError: 'str' object does not support item assignment` — un string ka pode ser mudadu na lugar. Kria un string novu: `nomi = \"T\" + nomi[1:]` (o `nomi.capitalize()`)."
  starterCode: |
    # nomi.py — es programa ta da un TypeError. Koriji-l.
    nomi = "toni"
    nomi[0] = "T"
    print(nomi)
  solutionCode: |
    # nomi.py — strings é imutável; kria un string novu
    nomi = "toni"
    nomi = "T" + nomi[1:]
    print(nomi)   # Toni
