- question:
    kea: "O ki ta da `7 // 2`?"
  options:
    - text: { kea: "`3` — `//` é divisan interu, ta tira a parti desimal" }
      correct: true
    - text: { kea: "`3.5` — divisan normal" }
      correct: false
    - text: { kea: "`1` — `//` ta da restu" }
      correct: false
    - text: { kea: "`4` — ta aredonda pa riba" }
      correct: false
- question:
    kea: "O ki ta imprimi `print(2 + 3 * 4)`?"
  options:
    - text: { kea: "`14` — a multiplikasan `*` ta kore antis di a adisan `+` (presedensia)" }
      correct: true
    - text: { kea: "`20` — Python ta kalkula di skerda pa direta: `(2 + 3) * 4`" }
      correct: false
    - text: { kea: "`24` — tudu multiplikadu" }
      correct: false
    - text: { kea: "`9` — só a adisan" }
      correct: false
- question:
    kea: "Ku operador `and`, kuandu é ki rezultadu é `True`?"
  options:
    - text: { kea: "Só kuandu **os dos** kondisons é `True`" }
      correct: true
    - text: { kea: "Kuandu **pelu menus un** kondisan é `True`" }
      correct: false
    - text: { kea: "Senpri — `and` ta da senpri `True`" }
      correct: false
    - text: { kea: "Só kuandu os dos kondisons é `False`" }
      correct: false
- question:
    kea: "O ki ta da `not 5 > 3`?"
  options:
    - text: { kea: "`False` — komparasan ben antis di `not`: `not (5 > 3)` → `not True`" }
      correct: true
    - text: { kea: "Un erru (TypeError) — `not 5` ka pode kompara ku 3" }
      correct: false
    - text: { kea: "`True` — `not` ta kore primeru" }
      correct: false
