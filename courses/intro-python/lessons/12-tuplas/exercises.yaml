# Exercises sidecar (draft source) for lesson m2-12 "Tuplas".
# Draft-canonical per ADR-0026 (skola-claude-plugins). Publish copies this to
# content/courses/intro-python/lessons/12-tuplas/exercises.yaml, where
# scripts/import-content.ts emits it into the `exercises` table; <TentaGosi/>
# renders them in display order. Keep `slug` stable (completed_exercises FK).
#
# The inline "## Tenta Gosi 🏋️" drills (Izersisiu 1/2/3) become interactive
# `code` exercises: `starterCode` is a copyable scaffold; the answer is the
# revealed `solutionCode`. Prompts stay INLINE-only (inline-markdown.tsx — no
# multi-line fenced blocks). Plus one `debug` drill (`koriji-tuple-imutavel` — a
# broken program shown inline to fix), one `explore` + one `reflect`.
#
# Shapes follow L1/L2/L3: `title`/`prompt`/`hint`/`notePlaceholder` localized
# ({kea:...}); `resources` localized; `starterCode`/`solutionCode` plain snippets.
- slug: unpacking-di-perfil
  language: python
  kind: code
  title: { kea: "Unpacking di un perfil" }
  prompt:
    kea: "Kria un tuple `meu_perfil` ku nomi, idadi, ilha i kursu. Uza **unpacking** pa atribui kada valor pa un variável separadu, i imprimi-s ku un f-string."
  hint:
    kea: "Pa unpacking, nu di variável na eskerda ten ki bate ku nu di elementu na tuple: `nomi, idadi, ilha, kursu = meu_perfil`. Dipos po-s nun f-string."
  starterCode: |
    # perfil.py
    meu_perfil = ("Tóni", 23, "Santiago", "Informátika")

    # TODO: unpacking pa nomi, idadi, ilha, kursu
    # TODO: imprimi ku un f-string
  solutionCode: |
    # perfil.py
    meu_perfil = ("Tóni", 23, "Santiago", "Informátika")

    nomi, idadi, ilha, kursu = meu_perfil
    print(f"{nomi}, {idadi} anu, di {ilha}, ta studa {kursu}.")
- slug: star-unpacking-notas
  language: python
  kind: code
  title: { kea: "Star unpacking di notas" }
  prompt:
    kea: "Ku `dados = (\"Amilcar\", \"amilcar@cv.edu\", 88, 75, 92, 85, 79, 96)`, uza **star unpacking** pa separa nomi, email i tudu notas nun lista. Dipos kalkula i mostra média, nota máksimu i mínimu."
  hint:
    kea: "`nomi, email, *notas = dados` — `*notas` ta apanha tudu restu kumo un lista. Dipos `sum(notas) / len(notas)`, `max(notas)` i `min(notas)`."
  starterCode: |
    # notas.py
    dados = ("Amilcar", "amilcar@cv.edu", 88, 75, 92, 85, 79, 96)

    # TODO: nomi, email, *notas = dados
    # TODO: média, máksimu, mínimu
  solutionCode: |
    # notas.py
    dados = ("Amilcar", "amilcar@cv.edu", 88, 75, 92, 85, 79, 96)

    nomi, email, *notas = dados

    print(f"Estudanti: {nomi} ({email})")
    print(f"Notas: {notas}")
    print(f"Média: {sum(notas) / len(notas):.1f}")
    print(f"Máksimu: {max(notas)}, Mínimu: {min(notas)}")
- slug: tuple-di-ilhas
  language: python
  kind: code
  title: { kea: "Tuple di tuples — ilhas" }
  prompt:
    kea: "Kria un tuple di tuples ku informasan di 4 ilha, kada un `(nomi, populasan, area_km2)`. Itera ku unpacking i mostra kada ilha formatadu. Dipos kalkula populasan total i atxa ilha ku más pesoa."
  hint:
    kea: "Itera ku unpacking diretu: `for nomi, pop, area in ilhas:`. Pa total, soma populasan nun loop (`total += pop`). Pa ilha ku más pesoa, kompara kada un nun loop i guarda maior."
  starterCode: |
    # ilhas.py
    ilhas = (
        ("Santiago", 294000, 991),
        ("São Vicente", 81000, 227),
        ("Sal", 39000, 216),
        ("Fogo", 36000, 476),
    )

    # TODO: itera ku unpacking i mostra kada ilha
    # TODO: populasan total i ilha ku más pesoa
  solutionCode: |
    # ilhas.py
    ilhas = (
        ("Santiago", 294000, 991),
        ("São Vicente", 81000, 227),
        ("Sal", 39000, 216),
        ("Fogo", 36000, 476),
    )

    for nomi, pop, area in ilhas:
        print(f"{nomi:<14} {pop:>7} pesoa  {area} km²")

    total = 0
    maior = ilhas[0]
    for ilha in ilhas:
        total += ilha[1]
        if ilha[1] > maior[1]:
            maior = ilha

    print(f"Populasan total: {total}")
    print(f"Más pesoa: {maior[0]} ({maior[1]})")
- slug: koriji-tuple-imutavel
  language: python
  kind: debug
  file: ponto.py
  title: { kea: "Koriji un tuple imutável" }
  prompt:
    kea: "Es programa ta da un `TypeError` kuandu el tenta muda primeru valor di tuple `ponto`. Tuples é **imutável**! Koriji-l pa `ponto` fika `(5, 4)`."
  hint:
    kea: "`ponto[0] = 5` ta da `TypeError: 'tuple' object does not support item assignment`. Un tuple ka pode ser mudadu — kria un tuple novu: `ponto = (5, ponto[1])` (ou `(5, 4)`)."
  starterCode: |
    # ponto.py — es programa ta da un TypeError. Koriji-l.
    ponto = (3, 4)
    ponto[0] = 5
    print(ponto)
  solutionCode: |
    # ponto.py — tuples é imutável; kria un tuple novu
    ponto = (3, 4)
    ponto = (5, ponto[1])
    print(ponto)   # (5, 4)
