- slug: konverte-temperatura
  language: python
  kind: code
  title: { kea: "Konversor di temperatura" }
  prompt:
    kea: "Skrebe un funsan `konverte_temp(temp, di, pa)` ki konverte entri Celsius, Fahrenheit i Kelvin. P.ex. `konverte_temp(100, \"C\", \"F\")` debe retorna `212.0`."
  hint:
    kea: "Konverti primeru pa Celsius kumo \"piví\", dipos di Celsius pa destinu. `C→F`: `c * 9/5 + 32`; `C→K`: `c + 273.15`. Uza `if`/`elif` pa `di` i pa `pa`, i `return` rezultadu."
  starterCode: |
    # temp.py
    def konverte_temp(temp, di, pa):
        # TODO: konverti `temp` di `di` pa `pa` (C, F, K)
        ...

    print(konverte_temp(100, "C", "F"))   # 212.0
  solutionCode: |
    # temp.py
    def konverte_temp(temp, di, pa):
        # 1) pa Celsius
        if di == "C":
            c = temp
        elif di == "F":
            c = (temp - 32) * 5 / 9
        else:  # K
            c = temp - 273.15
        # 2) di Celsius pa destinu
        if pa == "C":
            return round(c, 2)
        elif pa == "F":
            return round(c * 9 / 5 + 32, 2)
        else:  # K
            return round(c + 273.15, 2)

    print(konverte_temp(100, "C", "F"))   # 212.0
    print(konverte_temp(0, "C", "K"))     # 273.15
- slug: verifika-forsa-senha
  language: python
  kind: code
  title: { kea: "Validador di forsa di senha" }
  prompt:
    kea: "Skrebe un funsan `verifika_forsa(senha)` ki retorna `\"fraku\"` (menus di 6 karater), `\"médiu\"` (6+ ku letra i númeru) ou `\"forti\"` (8+ ku maiúskula, minúskula, númeru i karater spesiál)."
  hint:
    kea: "Uza `any(c.isdigit() for c in senha)`, `any(c.isupper() ...)`, `any(c.islower() ...)` i `any(c in \"!@#$%...\" ...)` pa testa. Verifika kazu **forti** primeru, dipos **médiu**, senan **fraku**."
  starterCode: |
    # senha.py
    def verifika_forsa(senha):
        # TODO: retorna "fraku", "médiu" o "forti"
        ...

    print(verifika_forsa("abc"))         # fraku
    print(verifika_forsa("Pr@ia2026!"))  # forti
  solutionCode: |
    # senha.py
    def verifika_forsa(senha):
        ten_num = any(c.isdigit() for c in senha)
        ten_mai = any(c.isupper() for c in senha)
        ten_min = any(c.islower() for c in senha)
        ten_esp = any(c in "!@#$%^&*()_+-=" for c in senha)

        if len(senha) >= 8 and ten_num and ten_mai and ten_min and ten_esp:
            return "forti"
        if len(senha) >= 6 and ten_num and (ten_mai or ten_min):
            return "médiu"
        return "fraku"

    print(verifika_forsa("abc"))         # fraku
    print(verifika_forsa("Pr@ia2026!"))  # forti
- slug: soma-rekursiva
  language: python
  kind: code
  title: { kea: "Soma rekursiva" }
  prompt:
    kea: "Skrebe un funsan **rekursiva** `soma_ate(n)` ki retorna soma di tudu númeru di 1 até n. P.ex. `soma_ate(5)` → `15` (1+2+3+4+5)."
  hint:
    kea: "Pensa na **kazu bazi** primeru: `soma_ate(1)` é `1` (ou `soma_ate(0)` é `0`). Kazu rekursivu: `n + soma_ate(n - 1)`. Sen kazu bazi, Python ta da `RecursionError`."
  starterCode: |
    # soma.py
    def soma_ate(n):
        # TODO: kazu bazi + kazu rekursivu
        ...

    print(soma_ate(5))   # 15
  solutionCode: |
    # soma.py
    def soma_ate(n):
        if n <= 0:          # kazu bazi
            return 0
        return n + soma_ate(n - 1)   # kazu rekursivu

    print(soma_ate(5))    # 15
    print(soma_ate(10))   # 55
- slug: kria-perfil-flexivel
  language: python
  kind: code
  title: { kea: "Perfil flexível ku **kwargs" }
  prompt:
    kea: "Skrebe un funsan `kria_perfil(nomi, **info)` ki resebe un `nomi` obrigatóriu i kuantu info adisionál ki utilizador kre (ilha, idadi, profisan…), i retorna un disionáriu kompletu."
  hint:
    kea: "`**info` ta apanha argumentu nomiadu kumo un disionáriu. Kria un dict ku nomi i dipos djunta restu: `perfil = {\"nomi\": nomi}` i `perfil.update(info)` (ou `{\"nomi\": nomi, **info}`)."
  starterCode: |
    # perfil.py
    def kria_perfil(nomi, **info):
        # TODO: retorna un dict ku o nomi + tudu o info
        ...

    print(kria_perfil("Tóni", ilha="Santiago", idadi=24))
  solutionCode: |
    # perfil.py
    def kria_perfil(nomi, **info):
        return {"nomi": nomi, **info}

    print(kria_perfil("Tóni", ilha="Santiago", idadi=24))
    # {'nomi': 'Tóni', 'ilha': 'Santiago', 'idadi': 24}
- slug: koriji-return-em-falta
  language: python
  kind: debug
  file: dobru.py
  title: { kea: "Koriji un return ki sta en falta" }
  prompt:
    kea: "Funsan `dobru` debe devolve dobru di un númeru, ma `print(rezultadu)` ta mostra `None`. Kódiku ka ta da eru. Diskubri pamodi i koriji-l."
  hint:
    kea: "Un funsan sen `return` ta devolve `None` automátikamenti. Linha `n * 2` ta kalkula valor ma ka ta devolve-l — meste un `return` na frenti."
  starterCode: |
    # dobru.py — pamodi ki "rezultadu" ta sai None? Koriji a funsan.
    def dobru(n):
        n * 2

    rezultadu = dobru(5)
    print(rezultadu)   # ta imprimi None, ka 10
  solutionCode: |
    # dobru.py — sen "return", a funsan ta devolve None
    def dobru(n):
        return n * 2

    rezultadu = dobru(5)
    print(rezultadu)   # 10
