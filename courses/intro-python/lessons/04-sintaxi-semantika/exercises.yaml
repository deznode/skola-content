# Exercises sidecar (draft source) for lesson m1-04 "Sintaxi i Semantika".
# Draft-canonical per ADR-0026 (skola-claude-plugins). Publish copies this to
# content/courses/intro-python/lessons/04-sintaxi-semantika/exercises.yaml, where
# scripts/import-content.ts emits it into the `exercises` table; <TentaGosi/>
# renders them in display order. Keep `slug` stable (completed_exercises FK).
#
# The inline "## Tenta Gosi 🏋️" drills (Izersisiu 1/2/3 — predict/fix syntax
# errors) use the `debug` exercise kind (V20): the BROKEN program is shown INLINE,
# read-only, with its filename in the panel titlebar (`file`), so the learner
# reads the bug before fixing it; the fix is the revealed `solutionCode`. The
# inline panel keeps its own titlebar copy button, so the learner can still copy
# the starter to run it. Prompts stay INLINE-only (the prompt renderer,
# learning-content-core/inline-markdown.tsx, supports inline `code`/**bold**/
# [links] but NOT multi-line fenced blocks). Plus one `explore` + one `reflect`.
#
# Shapes follow L1/L2/L3: `title`/`prompt`/`hint`/`notePlaceholder` are localized
# ({kea:...}); `resources` is localized too ({kea:[{label,url}]});
# `starterCode`/`solutionCode` are plain snippets.
- slug: koriji-case-sensitivity
  language: python
  kind: debug
  file: nomis.py
  title: { kea: "Koriji un eru di case sensitivity" }
  prompt:
    kea: "Es programa ta da un `NameError`. Kopia kódiku inisial, kore-l pa odja o eru, i koriji-l pa el imprimi tudu dos nomi."
  hint:
    kea: "Lé última linha: `name 'Nomi' is not defined`. Python é **case sensitive** — `nomi`, `Nomi` i `NOMI` é tres variáveis diferenti. Só `nomi` i `NOMI` foi kriadu; `Nomi` (N maiúskulu) ka izisti. Skrebe `print(NOMI)` o defini `Nomi` antis."
  starterCode: |
    # nomis.py — es programa ta da un NameError. Koriji-l.
    nomi = "Cesária"
    NOMI = "Maria"
    print(nomi)
    print(Nomi)
  solutionCode: |
    # Python é case sensitive: uza o nomi exatu ki bu kria
    nomi = "Cesária"
    NOMI = "Maria"
    print(nomi)   # Cesária
    print(NOMI)   # Maria
- slug: koriji-tres-erus
  language: python
  kind: debug
  file: ola.py
  title: { kea: "Atxa i koriji 3 erus" }
  prompt:
    kea: "Es programa ten **3 erus**: un di case sensitivity i dos di indentasan. Kore-l pa odja kada eru, i koriji-l pa el imprimi `Ola, Djina!` i `Ben-vindu!`."
  hint:
    kea: "Eru 1: a kondisan ta uza `nomi` (minúskulu), ma a variável foi kriadu kumo `Nomi` — uniformiza pa minúskulu. Eru 2: a primeru `print` ka tene indentasan dipos di `if:`. Eru 3: a sigundu `print` tene indentasan eradu (3 spasus en bez di 4). Lenbra: **4 spasus** pa kada nível."
  starterCode: |
    # ola.py — es programa ten 3 erus. Koriji-l.
    Nomi = "Djina"
    if nomi == "Djina":
    print("Ola, Djina!")
       print("Ben-vindu!")
  solutionCode: |
    # nomi minúskulu uniformi + 4 spasus di indentasan na tudu dos print
    nomi = "Djina"
    if nomi == "Djina":
        print("Ola, Djina!")
        print("Ben-vindu!")
- slug: koriji-kontinuasan-linha
  language: python
  kind: debug
  file: soma.py
  title: { kea: "Koriji a kontinuasan di linha" }
  prompt:
    kea: "Es bloku ta da un `SyntaxError` pamodi el ta kebra a linha dipos di `+` sen `\\`. Koriji-l pa el soma tudu i imprimi `1500`."
  hint:
    kea: "Fora di paréntesis, Python ka ta dexa kebra un linha simplismenti pamodi el termina ku `+`. Po un **backslash** (`\\`) na fin di primeru linha — o nton pói tudu a soma dentu di paréntesis `( ... )`, ki ta permiti kebra sen `\\`."
  starterCode: |
    # soma.py — es bloku ta da un SyntaxError. Koriji-l.
    total = 100 + 200 + 300 +
            400 + 500
    print(total)
  solutionCode: |
    # Opsan 1 — backslash pa kontinua a linha
    total = 100 + 200 + 300 + \
            400 + 500
    print(total)   # 1500

    # Opsan 2 — paréntesis (más limpu, ka meste \)
    total = (100 + 200 + 300 +
             400 + 500)
    print(total)   # 1500
