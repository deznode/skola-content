# ({kea:...}); `resources` localized; `starterCode`/`solutionCode` plain snippets.
- slug: tabua-di-multiplikasan
  language: python
  kind: code
  title: { kea: "Tábua di multiplikasan" }
  prompt:
    kea: "Pidi un númeru i mostra se tábua di multiplikasan kompletu (di 1 a 10) ku un `for` loop. Formata kada linha bonitu, p.ex. `7 x 3 = 21`."
  hint:
    kea: "Konverti input ku `int()`. Uza `for j in range(1, 11):` (1 a 10 — lenbra ki `stop` ka ta entra, anton é `11`). Dentu di loop, un f-string: `print(f\"{num} x {j} = {num * j}\")`."
  starterCode: |
    # tabua.py
    num = int(input("Ki tábua? "))

    # TODO: for j di 1 a 10, imprimi "num x j = num*j"
  solutionCode: |
    # tabua.py
    num = int(input("Ki tábua? "))

    for j in range(1, 11):
        print(f"{num} x {j:>2} = {num * j}")
- slug: atxador-numerus-perfeitu
  language: python
  kind: code
  title: { kea: "Atxador di númerus perfeitu" }
  prompt:
    kea: "Un númeru perfeitu é ki soma di se divizoris (menus el mesmu) é igual a el — p.ex. `6 = 1 + 2 + 3`. Atxa i mostra tudu númerus perfeitu di 1 a 1000 ku loops aninhadu."
  hint:
    kea: "Pa kada `num` di 1 a 1000, soma se divizoris: un loop di dentu `for d in range(1, num):` ki djunta `d` pa `soma` kuandu `num % d == 0`. Si na fin `soma == num`, num é perfeitu."
  starterCode: |
    # perfeitu.py
    for num in range(1, 1001):
        soma = 0
        # TODO: soma os divizoris di num (di 1 a num-1)
        # TODO: si soma == num, imprimi num
  solutionCode: |
    # perfeitu.py
    for num in range(1, 1001):
        soma = 0
        for d in range(1, num):
            if num % d == 0:
                soma += d
        if soma == num:
            print(f"{num} é perfeitu")
    # Saída: 6, 28, 496
- slug: jogu-di-adivinha
  language: python
  kind: code
  title: { kea: "Jogu di adivinha avansadu" }
  prompt:
    kea: "Kria un jogu: komputador ta skodje un númeru aleatóriu di 1 a 100, i utilizador tene un máksimu di 7 tentativa. A kada palpiti mostra \"Más altu!\" o \"Más baxu!\". Si el adivinha, mostra kuantas tentativa el uza; si 7 akaba, mostra númeru sekretu."
  hint:
    kea: "`import random` i `random.randint(1, 100)`. Uza un `for tentativa in range(1, 8):` (7 tentativa). Dentu, kompara palpiti ku sekretu i da dika. Un `break` kuandu el adivinha; un `else:` di `for` ta kore só si 7 akaba sen `break` — perfeitu pa mostra sekretu."
  starterCode: |
    # jogu.py
    import random
    sekretu = random.randint(1, 100)

    # TODO: for tentativa di 1 a 7
    #   - pidi un palpiti
    #   - si sertu: parabén + break
    #   - senan: dika "Más altu/baxu"
    # TODO: for-else — si akaba sen adivinha, mostra o sekretu
  solutionCode: |
    # jogu.py
    import random
    sekretu = random.randint(1, 100)

    for tentativa in range(1, 8):
        palpiti = int(input(f"Tentativa {tentativa}/7 — bu palpiti? "))
        if palpiti == sekretu:
            print(f"Parabén! Bu adivinha na {tentativa} tentativa(s)! 🎉")
            break
        elif palpiti < sekretu:
            print("Más altu!")
        else:
            print("Más baxu!")
    else:
        print(f"Akaba as tentativa! O númeru era {sekretu}.")
- slug: koriji-range-off-by-one
  language: python
  kind: debug
  file: kontajen.py
  title: { kea: "Koriji un off-by-one na range()" }
  prompt:
    kea: "Es loop debe imprimi númerus di **1 a 10**, ma el ta para na **9**. `range` sta ku `stop` eradu. Koriji-l pa el txiga te 10."
  hint:
    kea: "Na `range(start, stop)`, `stop` **ka ta entra** na loop — `range(1, 10)` ta para na 9. Pa inklui 10, `stop` ten ki ser `11`."
  starterCode: |
    # kontajen.py — es ta imprimi 1 a 9, ma nu kre 1 a 10. Koriji-l.
    for i in range(1, 10):
        print(i)
  solutionCode: |
    # kontajen.py — o stop ka ta entra, nton uza 11 pa txiga te 10
    for i in range(1, 11):
        print(i)
