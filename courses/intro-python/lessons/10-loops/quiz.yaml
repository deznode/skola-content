- question:
    kea: "Kal é a diferensa entri `break` i `continue`?"
  options:
    - text: { kea: "`break` ta sai di o loop interu; `continue` ta pula só o restu di a iterasan atual i ta bai pa a prósima" }
      correct: true
    - text: { kea: "`break` ta pula un iterasan; `continue` ta sai di o loop" }
      correct: false
    - text: { kea: "Os dos ta sai di o loop, ma `continue` é más rápidu" }
      correct: false
    - text: { kea: "`break` ta pausa o loop; `continue` ta rekomesa-l di o iníisu" }
      correct: false
