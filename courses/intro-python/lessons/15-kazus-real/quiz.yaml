# Quiz sidecar (draft source) for lesson m2-15 "Kazus Real ku Estruturas di Dadus".
# Draft-canonical per ADR-0026. Publish copies this VERBATIM to
# content/courses/intro-python/lessons/15-kazus-real/quiz.yaml; positions 0,1,2,3,4
# correspond to <Quiz position={N}/> markers in kea.mdx.
#
