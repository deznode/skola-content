- slug: refleta-erus-ki-bu-atxa
  language: python
  kind: reflect
  title: { kea: "Refleta sobri un eru ki bu atxa" }
  prompt:
    kea: "Pensa na un eru ki bu dja atxa na es lisan (o un di es 5: `SyntaxError`, `NameError`, `TypeError`, `IndexError`, `KeyError`). Skrebe ki tipu di eru era i kumo bu ta aplika **Ler → Atxa → Pensa** pa diagnostika-l."
  notePlaceholder:
    kea: "Eru: …   ·   Ler (última linha): …   ·   Atxa (undi): …   ·   Pensa (pamodi): …"
