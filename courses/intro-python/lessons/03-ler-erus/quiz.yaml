- question:
    kea: "Kuandu bu ta ler un traceback, pa unde bu debe kumesa ler pa atxa o ki koreu mal?"
  options:
    - text: { kea: "Pa última linha — la ki ta sta tipu di eru i mensajen" }
      correct: true
    - text: { kea: "Pa primeru linha, `Traceback (most recent call last)`" }
      correct: false
    - text: { kea: "Pa linha di meiu, unde sta nomi di fixeru" }
      correct: false
    - text: { kea: "Ka ten ordi — kada traceback é diferenti" }
      correct: false
- question:
    kea: "Dezdi Python 3.11, pa kuze ki ta sirbi seta `^` (caret) na un traceback?"
  options:
    - text: { kea: "Ta aponta exatamenti pa parti di kódiku ki ta kauza problema" }
      correct: true
    - text: { kea: "Ta mostra kuantu linha di kódiku ten na fixeru" }
      correct: false
    - text: { kea: "Ta indika ki versan di Python sta uzadu" }
      correct: false
    - text: { kea: "Ta marka unde programa kaba di kore ku susesu" }
      correct: false
- question:
    kea: "Bu ta odja `KeyError: 'nota'` kuandu bu ta kore bu programa. O ki ta kauza es eru?"
  options:
    - text: { kea: "Bu ta buska un xavi ki ka ezisti na un disionáriu" }
      correct: true
    - text: { kea: "Bu ta tenta dividi un númeru pa zero" }
      correct: false
    - text: { kea: "Bu ta uza un variável ki inda ka foi kriadu" }
      correct: false
    - text: { kea: "Bu ta asesa un índisi fora di rangu na un lista" }
      correct: false
