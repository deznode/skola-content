- slug: verifika-instalason
  language: bash
  title: { kea: "Instala i verifika versaun" }
  prompt: { kea: "Instala Python na bo komputador i verifika versaun ku `python --version` (o `python3 --version`). Skrebi ki versaun bo instala." }
- slug: kria-venv
  language: bash
  title: { kea: "Kria i ativa un .venv" }
  prompt: { kea: "Kria un pasta novu txamadu `prátika-python`, kria un `.venv` dentru del, i ativa el. Verifika ki `(.venv)` ta aparesi na bo prompt." }
- slug: sobri-mi
  language: python
  title: { kea: "Programa sobri-mi.py" }
  prompt: { kea: "Kria un fixeru `sobri-mi.py` ki ta pergunta 3 kuzas (nomi, idadi, pratu favoritu) ku `input()` i ta mostra un mensajen personalizadu ku `print()`." }
  starterCode: |
    nomi = input("Kel ki é bo nomi? ")
    # pidi idadi i pratu favoritu, i mostra un mensajen personalizadu
