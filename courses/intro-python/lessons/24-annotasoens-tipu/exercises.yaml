- slug: adisiona-type-hints
  language: python
  kind: code
  title: { kea: "Adisiona type hints" }
  prompt:
    kea: "Adisiona type hints na dos funsan na kΟ≥diku inisial. `area_retangulu` ta resebe dos nΟΚmero i ta da un nΟΚmero; `buska_ilha` ta resebe un lista di string i un string, i ta da un string **ou** `None`."
  hint:
    kea: "Sintaxi: `param: tipu` i `-> tipu_retorno`. Pa `area_retangulu(largura: float, altura: float) -> float`. Pa `buska_ilha(nomis: list[str], alvu: str) -> str | None` (el pode retorna `None`)."
  starterCode: |
    # hints.py βÄî adisiona os type hints
    def area_retangulu(largura, altura):
        return largura * altura

    def buska_ilha(nomis, alvu):
        for nomi in nomis:
            if nomi.lower() == alvu.lower():
                return nomi
        return None
  solutionCode: |
    # hints.py
    def area_retangulu(largura: float, altura: float) -> float:
        return largura * altura

    def buska_ilha(nomis: list[str], alvu: str) -> str | None:
        for nomi in nomis:
            if nomi.lower() == alvu.lower():
                return nomi
        return None
- slug: konverti-temperatura-hints
  language: python
  kind: code
  title: { kea: "Konversor di temperatura tipadu" }
  prompt:
    kea: "Skrebe un funsan `konverti_temperatura(valor: float, di: str, pa: str) -> float | None` ki ta konverti entri `\"C\"` (Celsius), `\"F\"` (Fahrenheit) i `\"K\"` (Kelvin). Retorna `None` si un unidadi ka Ο© rekonxedu."
  hint:
    kea: "Konverti primeru pa Celsius, dipos di Celsius pa destinu. Si `di` ou `pa` ka Ο© `\"C\"`, `\"F\"` ou `\"K\"`, retorna `None`. Tipu di retornu `float | None` ta avisa ki pode ser un float ou `None`."
  starterCode: |
    # temp.py
    def konverti_temperatura(valor: float, di: str, pa: str) -> float | None:
        # TODO: pa Celsius, dipos pa destinu; None si unidadi diskonxedu
        ...

    print(konverti_temperatura(100, "C", "F"))   # 212.0
    print(konverti_temperatura(100, "C", "X"))   # None
  solutionCode: |
    # temp.py
    def konverti_temperatura(valor: float, di: str, pa: str) -> float | None:
        if di == "C":
            c = valor
        elif di == "F":
            c = (valor - 32) * 5 / 9
        elif di == "K":
            c = valor - 273.15
        else:
            return None

        if pa == "C":
            return round(c, 2)
        elif pa == "F":
            return round(c * 9 / 5 + 32, 2)
        elif pa == "K":
            return round(c + 273.15, 2)
        return None

    print(konverti_temperatura(100, "C", "F"))   # 212.0
    print(konverti_temperatura(100, "C", "X"))   # None
- slug: estatistikas-tipadu
  language: python
  kind: code
  title: { kea: "EstatΟ≠stikas tipadu" }
  prompt:
    kea: "Kria un funsan `estatistikas(numerus: list[int | float]) -> dict[str, float]` ki ta retorna un disionΟΓriu ku `\"soma\"`, `\"mΟ©dia\"`, `\"mΟ≠nima\"` i `\"mΟΓksima\"`."
  hint:
    kea: "Uza funsons inkorporadu: `sum(numerus)`, `sum(...)/len(...)`, `min(numerus)`, `max(numerus)`. Tipu di retornu `dict[str, float]` ta dize ki xavi Ο© string i valor Ο© float."
  starterCode: |
    # stats.py
    def estatistikas(numerus: list[int | float]) -> dict[str, float]:
        # TODO: retorna {"soma":..., "mΟ©dia":..., "mΟ≠nima":..., "mΟΓksima":...}
        ...

    print(estatistikas([10, 5, 20, 15]))
  solutionCode: |
    # stats.py
    def estatistikas(numerus: list[int | float]) -> dict[str, float]:
        return {
            "soma": sum(numerus),
            "mΟ©dia": sum(numerus) / len(numerus),
            "mΟ≠nima": min(numerus),
            "mΟΓksima": max(numerus),
        }

    print(estatistikas([10, 5, 20, 15]))
    # {'soma': 50, 'mΟ©dia': 12.5, 'mΟ≠nima': 5, 'mΟΓksima': 20}
