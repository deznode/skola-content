- slug: refleta-set-vs-lista
  language: python
  kind: reflect
  title: { kea: "Refleta sobri set versus lista" }
  prompt:
    kea: "Set ta da elementus úniku i un buska `in` super rápidu (O(1)), ma ka ten orden nen índisi. Pensa nun kazu ki bu ta uza set (p.ex. verifika si un utilizador dja vota) i otu undi bu **ka** pode (p.ex. un fila ku orden). Skrebe pamodi."
  notePlaceholder:
