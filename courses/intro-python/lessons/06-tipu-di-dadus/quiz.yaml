- question:
    kea: "O ki é tipu di `10 / 5` na Python?"
  options:
    - text: { kea: "`float` — divisan `/` ta retorna **senpri** float, anton `10 / 5` é `2.0`" }
      correct: true
    - text: { kea: "`int` — dos interu ta da senpri un interu" }
      correct: false
    - text: { kea: "`str` — rezultadu ten ki ser konvertidu" }
      correct: false
    - text: { kea: "Ta dependi: `2` é int, `2.0` é float" }
      correct: false
- question:
    kea: "Bu tene `presu = \"350\"` (un string) i bu kore `presu * 0.15`. O ki ta kontise?"
  options:
    - text: { kea: "Un `TypeError` — ka pode multiplika un string pa un float; konverti ku `float(presu)` primeru" }
      correct: true
    - text: { kea: "Ta da `52.5`, pamodi Python ta konverti automatikamenti" }
      correct: false
    - text: { kea: "Ta repeti string 0.15 bez" }
      correct: false
    - text: { kea: "Un `ValueError` — presu ka é válidu" }
      correct: false
- question:
    kea: "O ki ta da `int(3.9)`?"
  options:
    - text: { kea: "`3` — `int()` ta **trunka** (korta parti desimal), ka ta aredonda" }
      correct: true
    - text: { kea: "`4` — `int()` ta aredonda pa interu más prósimu" }
      correct: false
    - text: { kea: "`3.9` — ka ta muda nada" }
      correct: false
    - text: { kea: "Un eru — `int()` ka ta seita float" }
      correct: false
