- slug: refleta-typeerror
  language: python
  kind: reflect
  title: { kea: "Refleta sobri un TypeError ki bu pode atxa" }
  prompt:
    kea: "Pensa na un programa ki ta mistura textu ku númerus (p.ex. mostra un presu nun mensajen). Skrebe unde un `TypeError` ta pode parese, i kual di dos solusons (konverti ku `str()`/`int()` ou uza un f-string) bu ta skodje i pamodi."
  notePlaceholder:
    kea: "Programa: …   ·   Unde TypeError ta parese: …   ·   Soluson skodjedu (str()/int() ou f-string): …"
