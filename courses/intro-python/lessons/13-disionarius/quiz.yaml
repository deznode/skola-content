- question:
    kea: "Kal é a diferensa entri `d[\"email\"]` i `d.get(\"email\")` kuandu a xavi `\"email\"` **ka izisti**?"
  options:
    - text: { kea: "`d[\"email\"]` ta lansa un `KeyError`; `d.get(\"email\")` ta da `None` (o un valor padron) sen eru" }
      correct: true
    - text: { kea: "Os dos ta da `None`" }
      correct: false
    - text: { kea: "Os dos ta lansa un `KeyError`" }
      correct: false
    - text: { kea: "`d.get(\"email\")` ta kria a xavi automátikamenti" }
      correct: false
- question:
    kea: "Bu kore `kopia = orijinal` (os dos disionáriu) i dipos `kopia[\"nota\"] = 95`. O ki ta kontise ku `orijinal`?"
  options:
    - text: { kea: "`orijinal[\"nota\"]` tanbe ta vira `95` — `=` ta kria un **referénsia** a o mesmu objetu, ka un kópia. Uza `.copy()` pa un kópia independenti" }
      correct: true
    - text: { kea: "`orijinal` ka ta muda — `=` ta kria senpri un kópia" }
      correct: false
    - text: { kea: "Un eru — ka pode kopia un disionáriu ku `=`" }
      correct: false
    - text: { kea: "Só `kopia` ta muda, ma `orijinal` ta da `KeyError`" }
      correct: false
- question:
    kea: "Pa kuze ki ta sirbi o padron `frek[k] = frek.get(k, 0) + 1`?"
  options:
    - text: { kea: "Pa konta frekuénsia — `.get(k, 0)` ta da `0` si a xavi inda ka izisti, dipos ta soma 1" }
      correct: true
    - text: { kea: "Pa apaga a xavi `k` di o disionáriu" }
      correct: false
    - text: { kea: "Pa kopia o disionáriu `frek`" }
      correct: false
    - text: { kea: "Pa verifika si `k` é un xavi válidu" }
      correct: false
- question:
    kea: "O ki ta da `{n: n ** 2 for n in range(1, 4)}`?"
  options:
    - text: { kea: "`{1: 1, 2: 4, 3: 9}` — dict comprehension ku xavi `n` i valor `n ** 2`" }
      correct: true
      explain: { kea: "`{key_expr: value_expr for item in iterável}`: pa kada `n` di 1 a 3, xavi é `n` i valor é `n ** 2`." }
    - text: { kea: "`[1, 4, 9]` — un lista di kuadradus" }
      correct: false
      explain: { kea: "Ku `{}` i `xavi: valor` o rezultadu é un disionáriu, ka un lista." }
    - text: { kea: "`{1, 4, 9}` — un set" }
      correct: false
      explain: { kea: "Ku `:` entri xavi i valor é un dict comprehension; sen `:` sería un set." }
    - text: { kea: "`{1: 1, 2: 4, 3: 9, 4: 16}` — te 4" }
      correct: false
      explain: { kea: "`range(1, 4)` ta para antis di 4, entun só 1, 2, 3." }
- question:
    kea: "Na `for k, v in nota.items():`, o ki kada volta di o loop ta da?"
  options:
    - text: { kea: "Un par — `k` ta risibi a xavi i `v` ta risibi o valor korrespondenti" }
      correct: true
      explain: { kea: "`.items()` ta da kada par `(xavi, valor)`, ki o loop ta separa pa `k` i `v`." }
    - text: { kea: "Só as xavis, un di kada bez" }
      correct: false
      explain: { kea: "Só xavis sería `for k in nota:` o `nota.keys()`; `.items()` ta da xavi i valor." }
    - text: { kea: "Só os valores, un di kada bez" }
      correct: false
      explain: { kea: "Pa só valores uza `.values()`; `.items()` ta da os dos." }
    - text: { kea: "Un lista ku tudu os par di un bez" }
      correct: false
      explain: { kea: "O loop ta prosesa un par di kada volta, ka tudu di un bez." }
