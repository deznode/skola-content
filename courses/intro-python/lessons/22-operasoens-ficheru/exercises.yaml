- slug: skrebe-i-le-ilhas
  language: python
  kind: code
  title: { kea: "Skrebe i lĂŠ un ficheru di ilhas" }
  prompt:
    kea: "Skrebe un lista di 5 ilha nun ficheru `ilhas.txt` (un ilha pa linha). Dipos lĂŠ o ficheru i mostra kada ilha ku se nĂşmeru: `1. Santiago`, `2. SĂŁo Vicente`âŚ"
  hint:
    kea: "Pa skrebe, abri ku modu `\"w\"` i faze `f.write(ilha + \"\\n\")` pa kada un. Pa lĂŠ numerizadu, `with open(\"ilhas.txt\") as f:` i `for i, linha in enumerate(f, 1): print(f\"{i}. {linha.strip()}\")`. Senpri uza `with`."
  starterCode: |
    # ilhas.py
    ilhas = ["Santiago", "SĂŁo Vicente", "Sal", "Fogo", "Brava"]

    # TODO: skrebe kada ilha nun linha di ilhas.txt (modu "w")
    # TODO: lĂŠ o ficheru i mostra ku nĂşmeru (enumerate)
  solutionCode: |
    # ilhas.py
    ilhas = ["Santiago", "SĂŁo Vicente", "Sal", "Fogo", "Brava"]

    with open("ilhas.txt", "w") as f:
        for ilha in ilhas:
            f.write(ilha + "\n")

    with open("ilhas.txt", "r") as f:
        for i, linha in enumerate(f, start=1):
            print(f"{i}. {linha.strip()}")
- slug: diariu-simples
  language: python
  kind: code
  title: { kea: "DiĂĄriu simples (append)" }
  prompt:
    kea: "Kria un \"diĂĄriu\": pidi un nota ku `input()`, adisiona-l a o ficheru `diariu.txt` ku modu `\"a\"`, i dipos mostra tudu as nota ki dja foi skrebedu."
  hint:
    kea: "O modu `\"a\"` (append) ta po na fin sen apaga o ki dja sta la â `\"w\"` apaga tudu! Dipos di skrebe, abri ku `\"r\"` i perkore as linha pa mostra-s."
  starterCode: |
    # diariu.py
    nota = input("Skrebe un nota: ")

    # TODO: adisiona a nota a diariu.txt (modu "a")
    # TODO: mostra tudu as nota
  solutionCode: |
    # diariu.py
    nota = input("Skrebe un nota: ")

    with open("diariu.txt", "a") as f:
        f.write(nota + "\n")

    print("--- Bu diĂĄriu ---")
    with open("diariu.txt", "r") as f:
        for linha in f:
            print(f"  {linha.strip()}")
- slug: kalkula-media-ficheru
  language: python
  kind: code
  title: { kea: "Kalkula mĂŠdia di un ficheru" }
  prompt:
    kea: "LĂŠ un ficheru `notas.txt` (un nĂşmeru pa linha), kalkula a mĂŠdia, i skrebe o rezultadu nun ficheru novu `rezultadu.txt`. Uza `os.path.exists()` pa verifika si o ficheru di notas izisti antis di tenta lĂŠ-l."
  hint:
    kea: "`import os` i `if os.path.exists(\"notas.txt\"):`. LĂŠ as linha, konverti kada un ku `float(linha)`, soma i divide pa a kuantidadi. Dipos abri `rezultadu.txt` ku `\"w\"` pa skrebe a mĂŠdia."
  starterCode: |
    # media.py
    import os

    # TODO: si notas.txt izisti, lĂŠ os nĂşmeru i kalkula a mĂŠdia
    # TODO: skrebe a mĂŠdia na rezultadu.txt; senan, avisa
  solutionCode: |
    # media.py
    import os

    if os.path.exists("notas.txt"):
        with open("notas.txt", "r") as f:
            notas = [float(linha) for linha in f if linha.strip()]
        media = sum(notas) / len(notas)
        with open("rezultadu.txt", "w") as f:
            f.write(f"MĂŠdia: {media:.1f}\n")
        print(f"MĂŠdia {media:.1f} skrebedu na rezultadu.txt")
    else:
        print("O ficheru notas.txt inda ka izisti.")
