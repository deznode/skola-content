# Exercises sidecar (draft source) for lesson m3-22 "Operasons ku Ficheru".
# Draft-canonical per ADR-0026 (skola-claude-plugins). Publish copies this to
# content/courses/intro-python/lessons/22-operasoens-ficheru/exercises.yaml,
# where scripts/import-content.ts emits it into the `exercises` table;
# <TentaGosi/> renders them in display order. Keep `slug` stable.
#
# The inline "## Tenta Gosi 🏋️" drills (Izersisiu 1/2/3) become interactive
# `code` exercises: `starterCode` is a copyable scaffold; the answer is the
# revealed `solutionCode`. Prompts stay INLINE-only (inline-markdown.tsx — no
# multi-line fenced blocks). Plus one `explore` + one `reflect`.
#
# Shapes follow L1/L2/L3: `title`/`prompt`/`hint`/`notePlaceholder` localized
# ({kea:...}); `resources` localized; `starterCode`/`solutionCode` plain snippets.
- slug: skrebe-i-le-ilhas
  language: python
  kind: code
  title: { kea: "Skrebe i lé un ficheru di ilhas" }
  prompt:
    kea: "Skrebe un lista di 5 ilha nun ficheru `ilhas.txt` (un ilha pa linha). Dipos lé ficheru i mostra kada ilha ku se númeru: `1. Santiago`, `2. São Vicente`…"
  hint:
    kea: "Pa skrebe, abri ku modu `\"w\"` i faze `f.write(ilha + \"\\n\")` pa kada un. Pa lé numerizadu, `with open(\"ilhas.txt\") as f:` i `for i, linha in enumerate(f, 1): print(f\"{i}. {linha.strip()}\")`. Senpri uza `with`."
  starterCode: |
    # ilhas.py
    ilhas = ["Santiago", "São Vicente", "Sal", "Fogo", "Brava"]

    # TODO: skrebe kada ilha nun linha di ilhas.txt (modu "w")
    # TODO: lé o ficheru i mostra ku númeru (enumerate)
  solutionCode: |
    # ilhas.py
    ilhas = ["Santiago", "São Vicente", "Sal", "Fogo", "Brava"]

    with open("ilhas.txt", "w") as f:
        for ilha in ilhas:
            f.write(ilha + "\n")

    with open("ilhas.txt", "r") as f:
        for i, linha in enumerate(f, start=1):
            print(f"{i}. {linha.strip()}")
- slug: diariu-simples
  language: python
  kind: code
  title: { kea: "Diáriu simples (append)" }
  prompt:
    kea: "Kria un \"diáriu\": pidi un nota ku `input()`, adisiona-l pa ficheru `diariu.txt` ku modu `\"a\"`, i dipos mostra tudu nota ki dja foi skrebedu."
  hint:
    kea: "Modu `\"a\"` (append) ta po na fin sen apaga o ki dja sta la — `\"w\"` apaga tudu! Dipos di skrebe, abri ku `\"r\"` i perkore linha pa mostra-s."
  starterCode: |
    # diariu.py
    nota = input("Skrebe un nota: ")

    # TODO: adisiona a nota a diariu.txt (modu "a")
    # TODO: mostra tudu as nota
  solutionCode: |
    # diariu.py
    nota = input("Skrebe un nota: ")

    with open("diariu.txt", "a") as f:
        f.write(nota + "\n")

    print("--- Bu diáriu ---")
    with open("diariu.txt", "r") as f:
        for linha in f:
            print(f"  {linha.strip()}")
- slug: kalkula-media-ficheru
  language: python
  kind: code
  title: { kea: "Kalkula média di un ficheru" }
  prompt:
    kea: "Lé un ficheru `notas.txt` (un númeru pa linha), kalkula média, i skrebe rezultadu nun ficheru novu `rezultadu.txt`. Uza `os.path.exists()` pa verifika si ficheru di notas izisti antis di tenta lé-l."
  hint:
    kea: "`import os` i `if os.path.exists(\"notas.txt\"):`. Lé linha, konverti kada un ku `float(linha)`, soma i divide pa kuantidadi. Dipos abri `rezultadu.txt` ku `\"w\"` pa skrebe média."
  starterCode: |
    # media.py
    import os

    # TODO: si notas.txt izisti, lé os númeru i kalkula a média
    # TODO: skrebe a média na rezultadu.txt; senan, avisa
  solutionCode: |
    # media.py
    import os

    if os.path.exists("notas.txt"):
        with open("notas.txt", "r") as f:
            notas = [float(linha) for linha in f if linha.strip()]
        media = sum(notas) / len(notas)
        with open("rezultadu.txt", "w") as f:
            f.write(f"Média: {media:.1f}\n")
        print(f"Média {media:.1f} skrebedu na rezultadu.txt")
    else:
        print("O ficheru notas.txt inda ka izisti.")
