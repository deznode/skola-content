- slug: refleta-with-statement
  language: python
  kind: reflect
  title: { kea: "Refleta sobri `with` statement" }
  prompt:
    kea: "`with open(...) as f:` ta fexa ficheru automátikamenti, mesmu si un eru akontese. Pensa nun programa ki abri un ficheru sen `with` (`f = open(...)`). Skrebe o ki ta pode kontise si un eru akontese antis di `f.close()`, i pamodi `with` é más siguru."
  notePlaceholder:
    kea: "Sen with (risku): …   ·   Ku with (siguru): …   ·   Pamodi: …"
