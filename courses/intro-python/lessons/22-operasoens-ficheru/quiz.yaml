- question:
    kea: "Kal é diferensa entri abri un ficheru ku modu `\"w\"` i ku modu `\"a\"`?"
  options:
    - text: { kea: "`\"w\"` ta **apaga** tudu konteúdu ki tinha i kumesa di novu; `\"a\"` ta **adisiona** na fin sen apaga nada" }
      correct: true
    - text: { kea: "`\"w\"` ta adisiona; `\"a\"` ta apaga" }
      correct: false
    - text: { kea: "Es é igual — dos ta skrebe" }
      correct: false
    - text: { kea: "`\"w\"` é pa lé; `\"a\"` é pa skrebe" }
      correct: false
- question:
    kea: "Pamodi é midjór uza `with open(...) as f:` en bez di `f = open(...)`?"
  options:
    - text: { kea: "`with` ta **fexa** ficheru automátikamenti kuandu bloku akaba — mesmu si un eru akontese" }
      correct: true
    - text: { kea: "`with` é más rápidu pa lé ficheru grandi" }
      correct: false
    - text: { kea: "`with` ta kria ficheru si el ka izisti" }
      correct: false
    - text: { kea: "Ka ten diferensa — es é só stilu" }
      correct: false
- question:
    kea: "Bu tenta abri un ficheru ku modu `\"r\"` ma ficheru ka izisti. O ki ta kontise?"
  options:
    - text: { kea: "Un `FileNotFoundError` — pa lé, ficheru ten ki izisti (verifika ku `os.path.exists()` antis)" }
      correct: true
    - text: { kea: "Python ta kria un ficheru vaziu automátikamenti" }
      correct: false
    - text: { kea: "Ta retorna un string vaziu sen eru" }
      correct: false
    - text: { kea: "Ta abri ficheru na modu `\"w\"` en bez" }
      correct: false
