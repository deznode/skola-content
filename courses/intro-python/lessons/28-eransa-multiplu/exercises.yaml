- slug: eransa-multiplu
  language: python
  kind: code
  title: { kea: "Eransa múltiplu — EstudantiAtleta" }
  prompt:
    kea: "Kria klasi `Estudanti` (ku `nomi`, `kursu`) i `Atleta` (ku `nomi`, `modalidadi`). Dipos kria `EstudantiAtleta` ki erda di os dos. Testa-l i verifika ku `isinstance()`."
  hint:
    kea: "Pa eransa **múltiplu**, na `__init__` di filhu uza txomada **direta** pa kada pai: `Estudanti.__init__(self, nomi, kursu)` i `Atleta.__init__(self, nomi, modalidadi)` (ka `super()`). `isinstance(ea, Estudanti)` ta da `True`."
  starterCode: |
    # estudanti_atleta.py
    class Estudanti:
        def __init__(self, nomi, kursu):
            self.nomi = nomi
            self.kursu = kursu

    class Atleta:
        def __init__(self, nomi, modalidadi):
            self.nomi = nomi
            self.modalidadi = modalidadi

    class EstudantiAtleta(Estudanti, Atleta):
        def __init__(self, nomi, kursu, modalidadi):
            ...  # TODO: txomada direta a kada pai
  solutionCode: |
    # estudanti_atleta.py
    class Estudanti:
        def __init__(self, nomi, kursu):
            self.nomi = nomi
            self.kursu = kursu

    class Atleta:
        def __init__(self, nomi, modalidadi):
            self.nomi = nomi
            self.modalidadi = modalidadi

    class EstudantiAtleta(Estudanti, Atleta):
        def __init__(self, nomi, kursu, modalidadi):
            Estudanti.__init__(self, nomi, kursu)
            Atleta.__init__(self, nomi, modalidadi)

    ea = EstudantiAtleta("Djina", "Informátika", "Atletismu")
    print(ea.kursu, "/", ea.modalidadi)
    print(isinstance(ea, Estudanti))   # True
    print(isinstance(ea, Atleta))      # True
- slug: mro-investigasan
  language: python
  kind: code
  title: { kea: "Investiga MRO" }
  prompt:
    kea: "Kria 4 klasi ku eransa múltiplu (`A`, `B(A)`, `C(A)`, `D(B, C)`), kada un ku un metodu `identifika()`. Uza `D.__mro__` pa preve i verifika orden di buska, i odja kual versan di `identifika()` ki é txomadu."
  hint:
    kea: "MRO di `D(B, C)` é `D → B → C → A → object` — kada klasi antis di ses pai, i `A` (kompartilhadu) dipos di `B` i `C`. Si `D` ka definí `identifika()`, Python ta uza primeru ki el atxa na MRO — versan di `B`. `print(D.__mro__)` ta mostra orden ezata."
  starterCode: |
    # mro.py
    class A:
        def identifika(self):
            return "A"

    class B(A):
        def identifika(self):
            return "B"

    # TODO: C(A), D(B, C); odja D.__mro__ i D().identifika()
  solutionCode: |
    # mro.py
    class A:
        def identifika(self):
            return "A"

    class B(A):
        def identifika(self):
            return "B"

    class C(A):
        def identifika(self):
            return "C"

    class D(B, C):
        pass

    print([k.__name__ for k in D.__mro__])  # ['D', 'B', 'C', 'A', 'object']
    print(D().identifika())                 # B  (primeru na o MRO)
