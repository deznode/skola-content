- question:
    kea: "Kal é diferensa entri `[x*2 for x in range(5)]` i `(x*2 for x in range(5))`?"
  options:
    - text: { kea: "Kolxetis `[]` ta kria un **lista** (tudu na memória); paréntesis `()` ta kria un **generator** (lazy, un valor di kada bez)" }
      correct: true
    - text: { kea: "Es é igual — dos ta kria un lista" }
      correct: false
    - text: { kea: "`()` ta kria un tuple kompletu na memória" }
      correct: false
    - text: { kea: "`[]` é más lentu ki `()`, ma da mesmu objetu" }
      correct: false
- question:
    kea: "Nun funsan, kual é diferensa entri `yield` i `return`?"
  options:
    - text: { kea: "`yield` ta **pauza** funsan i ta lenbra unde el para (pode produz txeu valor); `return` ta **termina** funsan" }
      correct: true
    - text: { kea: "`yield` ta termina funsan; `return` ta pauza-l" }
      correct: false
    - text: { kea: "Es é mesmu kuza" }
      correct: false
    - text: { kea: "`yield` só pode ser uzadu un bez pa funsan" }
      correct: false
- question:
    kea: "Bu itera un generator interu nun `for` loop, dipos bu tenta itera-l di nóvu. O ki ta kontise?"
  options:
    - text: { kea: "Sigundu loop ka ta produz nada — un generator é **un-bez-só**; pa itera di nóvu, kria un novu generator" }
      correct: true
    - text: { kea: "Sigundu loop ta rekomesa di inísiu automátikamenti" }
      correct: false
    - text: { kea: "Python ta da un `StopIteration` na primeru loop" }
      correct: false
    - text: { kea: "Generator ta dobra valor na sigundu pasada" }
      correct: false
