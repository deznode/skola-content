- slug: map-konversor-moeda
  language: python
  kind: code
  title: { kea: "Konversor di moeda ku map()" }
  prompt:
    kea: "Uza `map()` pa konverti un lista di presus na ECV pa Euro (taxa: `1 EUR = 110.265 ECV`). Aredonda pa 2 kaza desimal i konverti o rezultadu pa un lista."
  hint:
    kea: "`list(map(lambda p: round(p / 110.265, 2), presus))`. Lenbra: sen o `list(...)`, `map()` ta da un objetu lazy, ka un lista."
  starterCode: |
    # moeda.py
    presus_ecv = [500, 1200, 3500, 8000, 15000]

    # TODO: map() pa konverti pa EUR, aredondadu a 2 kaza
    presus_eur =
    print(presus_eur)
  solutionCode: |
    # moeda.py
    presus_ecv = [500, 1200, 3500, 8000, 15000]

    presus_eur = list(map(lambda p: round(p / 110.265, 2), presus_ecv))
    print(presus_eur)   # [4.53, 10.88, 31.74, 72.55, 136.04]
- slug: filter-studantis
  language: python
  kind: code
  title: { kea: "Filtra studantis ku filter()" }
  prompt:
    kea: "Dadu un lista di disionáriu `[{\"nomi\": ..., \"nota\": N}, ...]`, uza `filter()` pa kria dos lista: os aprovadu (`nota >= 10`) i os distintu (`nota >= 16`)."
  hint:
    kea: "`list(filter(lambda s: s[\"nota\"] >= 10, studantis))` pa os aprovadu. Repeti ku `>= 16` pa os distintu. Kada filter ta da só os elementu undi a kondisan é `True`."
  starterCode: |
    # studantis.py
    studantis = [
        {"nomi": "Gil", "nota": 8},
        {"nomi": "Edna", "nota": 16},
        {"nomi": "Nilton", "nota": 9},
        {"nomi": "Lara", "nota": 14},
    ]

    # TODO: filter() pa aprovadu (>=10) i distintu (>=16)
  solutionCode: |
    # studantis.py
    studantis = [
        {"nomi": "Gil", "nota": 8},
        {"nomi": "Edna", "nota": 16},
        {"nomi": "Nilton", "nota": 9},
        {"nomi": "Lara", "nota": 14},
    ]

    aprovadu = list(filter(lambda s: s["nota"] >= 10, studantis))
    distintu = list(filter(lambda s: s["nota"] >= 16, studantis))

    print("Aprovadu:", [s["nomi"] for s in aprovadu])
    print("Distintu:", [s["nomi"] for s in distintu])
- slug: map-filter-nomis
  language: python
  kind: code
  title: { kea: "Prosesador di nomis (map + filter)" }
  prompt:
    kea: "Di a lista `[\"maria\", \"JOÃO\", \"ana\", \"PEDRO\"]`, uza `map()` pa normaliza tudu pa formatu título (primeru letra maiúskula). Dipos uza `filter()` pa mante só os nomi ku más di 3 letra."
  hint:
    kea: "Pa normaliza: `map(str.title, nomis)` o `map(lambda n: n.title(), nomis)`. Dipos `filter(lambda n: len(n) > 3, ...)` sobri o rezultadu — ka skese o `list()` na fin."
  starterCode: |
    # nomis.py
    nomis = ["maria", "JOÃO", "ana", "PEDRO"]

    # TODO: map() pa formatu título
    # TODO: filter() pa nomi ku > 3 letra
  solutionCode: |
    # nomis.py
    nomis = ["maria", "JOÃO", "ana", "PEDRO"]

    titulu = map(str.title, nomis)
    longu = list(filter(lambda n: len(n) > 3, titulu))
    print(longu)   # ['Maria', 'João', 'Pedro']
- slug: pipeline-produtus
  language: python
  kind: code
  title: { kea: "Pipeline kompletu (filter + map)" }
  prompt:
    kea: "Di un lista di produtu `[{\"nomi\": ..., \"presu\": N, \"stoku\": N}]`, uza `filter()` pa pega só os ki ta na stoku (`stoku > 0`), dipos `map()` pa aplika 10% di diskontu na o presu di kada un."
  hint:
    kea: "Primeru filtra: `filter(lambda p: p[\"stoku\"] > 0, produtus)`. Dipos map sobri o rezultadu: `map(lambda p: {**p, \"presu\": round(p[\"presu\"] * 0.9)}, ...)`. Po o `filter` dentu di o `map`."
  starterCode: |
    # produtus.py
    produtus = [
        {"nomi": "Banana", "presu": 50, "stoku": 12},
        {"nomi": "Atum", "presu": 350, "stoku": 0},
        {"nomi": "Pan", "presu": 30, "stoku": 40},
    ]

    # TODO: filter stoku > 0, dipos map 10% diskontu
  solutionCode: |
    # produtus.py
    produtus = [
        {"nomi": "Banana", "presu": 50, "stoku": 12},
        {"nomi": "Atum", "presu": 350, "stoku": 0},
        {"nomi": "Pan", "presu": 30, "stoku": 40},
    ]

    em_stoku = filter(lambda p: p["stoku"] > 0, produtus)
    ku_diskontu = list(map(lambda p: {**p, "presu": round(p["presu"] * 0.9)}, em_stoku))

    for p in ku_diskontu:
        print(f"{p['nomi']}: {p['presu']} ECV")
