- question:
    kea: "O ki é un `lambda` na Python?"
  options:
    - text: { kea: "Un funsan anónimu (sen nomi) di un só espresan — `lambda x: x * 2`" }
      correct: true
    - text: { kea: "Un tipu di loop ki ta repeti un espresan" }
      correct: false
    - text: { kea: "Un funsan ki ten ki tene pelu menus 3 linha" }
      correct: false
    - text: { kea: "Un módulu di Python pa matemátika" }
      correct: false
- question:
    kea: "Kal é diferensa entri `map()` i `filter()`?"
  options:
    - text: { kea: "`map()` ta **transforma** kada elementu; `filter()` ta **selesiona** só elementu unde funsan ta da `True`" }
      correct: true
    - text: { kea: "`map()` ta selesiona; `filter()` ta transforma" }
      correct: false
    - text: { kea: "Es é mesmu kuza" }
      correct: false
    - text: { kea: "`map()` só ta funsiona ku númerus; `filter()` só ku strings" }
      correct: false
- question:
    kea: "Bu kore `r = map(lambda x: x * 2, [1, 2, 3])` i `print(r)`. O ki ta parese?"
  options:
    - text: { kea: "Un objetu map (`<map object at ...>`) — `map()` é lazy; uza `list(r)` pa odja `[2, 4, 6]`" }
      correct: true
    - text: { kea: "`[2, 4, 6]` diretu" }
      correct: false
    - text: { kea: "`[1, 2, 3]` — sen mudansa" }
      correct: false
    - text: { kea: "Un `TypeError`" }
      correct: false
- question:
    kea: "Kumo bu ta pasa funsan `dobra` pa `map()`?"
  options:
    - text: { kea: "`map(dobra, lista)` — sen paréntesis; `dobra()` ta txoma-l imediatamenti i ta da un eru" }
      correct: true
    - text: { kea: "`map(dobra(), lista)` — ku paréntesis" }
      correct: false
    - text: { kea: "`map(lista, dobra)` — lista primeru" }
      correct: false
    - text: { kea: "`dobra.map(lista)`" }
      correct: false
