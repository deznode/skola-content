      Kria programas ku Python di zero
      Komprendi variáveis, tipu di dadus, e operadoris
      Uza listas, tuplas, disionárius, e konjuntus
      Skrebi funsoens e trabadja ku ficheru
      Implementa klasis e objetus ku OOP
