translations:
  kea:
    title: Smoke Topic for Spec 019 Publish Parity
    description: "Un kursu di nivel iniciante pa aprendê komo trabadja ku fixerus di tekstu na Python — lê, skrebe, i junta konteúdu — tudu skrita na Kabuverdianu. Kriadu kumu artefatu di smoke-test pa validá parity di publikason na Spec 019."
    prerequisites: "Konhesimentu básiku di Python (variáveis, loops, i funsoens). Nun preciza sabê nada di fixerus ántes."
    outcomes: |
      Uza open() na modu di leitura pa abrí fixerus di tekstu
      Apliká read() i readlines() pa buská konteúdu di fixeru
      Uza instruson with pa fechadu seguru i otomátiku di fixerus
      Trata kodifikason UTF-8 pa karateres diakritkus do Kriolu/Portugês
      Uza modus "w" i "a" koretamente pa skrebe i juntá konteúdu
      Evitá trunkamentu axidental di fixeru kuandu junta linhas
