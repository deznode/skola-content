  prompt:
    kea: "Kria un variĂ¡vel `nomi` di tipu `String?` (pode ser `null`). Uza `?.` pa imprimi si tamanhu (`length`) sen kauza un eru, mesmu si `nomi` Ă© `null`."
  starterCode: |
