    - "`true` i `false`"
    - "`false` i `false`"
  correct: 0
  output: |
    true
    true
  why:
    kea: "`nomi2 = nomi1` ta atribui **mesmu** valor â€” `nomi1` i `nomi2` ta apunta pa mesmu `String` na memĂ³ria. `==` (valor) i `===` (identidadi) Ă© dos `true` li, pamodi Ă© literalmenti mesmu objetu."

- slug: apelidu-ku-let
  language: kotlin
  kind: code
  title: { kea: "Imprimi Detalis SĂ´ Si Ka Ă‰ Null" }
  prompt:
    kea: "Kria un variĂ¡vel `nomi` di tipu `String?` iguĂ¡l a `\"Sara\"`. Uza `?.let { }` pa imprimi dos linha: `\"Nomi: <nomi>\"` i `\"Tamanhu: <tamanhu>\"`. Dipos, muda `nomi` pa `null` i uza `?.let { }` otu bez â€” nada ka meste imprimi."
  hint:
    kea: "`nomi?.let { println(\"Nomi: $it\") ... }` â€” bloku dentu di `let` sĂ´ ta izekuta si `nomi` ka Ă© `null`."
  starterCode: |
    fun main() {
        var nomi: String? = "Sara"

        // TODO: uza nomi?.let { } pa imprimi "Nomi: ..." i "Tamanhu: ..."

        nomi = null
        // TODO: uza nomi?.let { } otu bez â€” nada ka meste imprimi
    }
  solutionCode: |
    fun main() {
        var nomi: String? = "Sara"
        nomi?.let {
            println("Nomi: $it")
            println("Tamanhu: ${it.length}")
        }

        nomi = null
        nomi?.let {
            println("Nomi: $it")
            println("Tamanhu: ${it.length}")
        }
    }
