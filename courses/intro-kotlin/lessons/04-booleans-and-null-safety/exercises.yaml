- slug: apelidu-ku-valor-padron
  language: kotlin
  kind: code
  title: { kea: "Apelidu ku Valor Padron" }
  prompt:
    kea: "Kria un variĂ¡vel `apelidu` di tipu `String?` iguĂ¡l a `null`. Uza `?.` djuntu ku `?:` pa imprimi `apelidu.uppercase()` si el ka Ă© `null`, ou `\"SEN APELIDU\"` si Ă© `null`. Dipos, muda `apelidu` pa `\"Djiku\"` i imprimi otu bez."
  hint:
    kea: "Kombina `?.` (txamada sigura) ku `?:` (operador Elvis) na mesmu ekspresan: `apelidu?.uppercase() ?: \"SEN APELIDU\"`."
  starterCode: |
    fun main() {
        var apelidu: String? = null

        // TODO: imprimi apelidu?.uppercase() ?: "SEN APELIDU"
        // TODO: muda apelidu pa "Djiku" i imprimi otu vez
    }
  solutionCode: |
    fun main() {
        var apelidu: String? = null
        println(apelidu?.uppercase() ?: "SEN APELIDU")   // SEN APELIDU

        apelidu = "Djiku"
        println(apelidu?.uppercase() ?: "SEN APELIDU")   // DJIKU
    }

- slug: preve-igualdadi-vs-identidadi
  language: kotlin
  kind: predict
  title: { kea: "Preve `==` vs `===`" }
  prompt:
    kea: "Antis di kore, preve ki es programa ta imprimi."
  starterCode: |
