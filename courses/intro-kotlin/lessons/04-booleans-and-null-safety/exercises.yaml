  hint:
    kea: "Na Kotlin, valor lĂ³jiku ta skrebe ku primeru letra minĂºskula: `true` i `false`. `True` i `False` (T/F maiĂºskulu) ka ezisti â€” Kotlin ta da `Unresolved reference`. Tanbe, `isBoring` sta uzadu sen ser deklaradu ku `val` â€” kel tanbe ta da `Unresolved reference: isBoring`."
- slug: kumprimenta-di-manera-sigura
