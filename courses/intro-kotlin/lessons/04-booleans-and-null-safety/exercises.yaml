- slug: koriji-true-false
  language: kotlin
  kind: debug
  file: bilheti.kt
  title: { kea: "Koriji valor lĂ³jiku" }
  prompt:
    kea: "Es programa ka ta kompila. Diskubri kuzĂª ki sta eradu i koriji-l."
  starterCode: |
    fun main() {
        val menorDiIdadi = False
        val tenBilheti = True
        isBoring = false
        val podeEntra = !menorDiIdadi && tenBilheti && !isBoring
        println(podeEntra)
    }
  solutionCode: |
    fun main() {
        val menorDiIdadi = false
        val tenBilheti = true
        val isBoring = false
        val podeEntra = !menorDiIdadi && tenBilheti && !isBoring
        println(podeEntra)
