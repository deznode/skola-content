      correct: true
      explain: { kea: "Palavra-txavi `inner` ta guarda un referénsia pa instánsia di klasi paí ki kria-l — é kel referénsia ki habilita o asesu." }
    - text: { kea: "Ten se própriu konstrutor" }
      correct: false
    - text: { kea: "Ser instansiadu" }
      correct: false

- question:
    kea: "Kumo bu ta txoma un metodu di un `object` (singleton) na Kotlin?"
  options:
    - text: { kea: "Diretu pa nomi di object, sen kria instánsia (`GestorDiFrota.metodu()`)" }
      correct: true
      explain: { kea: "`object` ta kria automátikamenti se úniku instánsia — bu ka ta skrebe `GestorDiFrota()` en nenhun lugar, bu ta uza o nomi di klasi diretu." }
    - text: { kea: "Meste kria un instánsia primeru ku `GestorDiFrota()`" }
      correct: false
    - text: { kea: "Sô dentu di `main()`" }
      correct: false

- question:
    kea: "Kual é a diferensa entri un `companion object` i un `object` independenti sima `GestorDiFrota`?"
  options:
    - text: { kea: "`companion object` sta ligadu a un klasi spesífiku i ta asesadu pa nomi di kel klasi; `object` independenti ten se própi nomi i ka pertense a nenhun klasi" }
      correct: true
      explain: { kea: "Un klasi sô pode ten un companion object, asesadu via `NomiKlasi.membru` — sen kria instánsia. Un `object` independenti é un singleton kompletamenti separadu." }
    - text: { kea: "Ka ten diferensa — es dos sintaksi ta faze mesmu kuza" }
      correct: false
