- question:
    kea: "Pamodi un `when` sobri un `enum class` pode ser ezaustivu sen `else`?"
  options:
    - text: { kea: "Konpiladór sabe tudu kes valor posivel di antemão (fixu, konxedu na konpilason)" }
      correct: true
      explain: { kea: "É presizamenti kel — `enum class` ta fitxa a lista di valoris na tempu di konpilason, ntonsi `when` pode kubri tudu kazus sen presiza `else`." }
    - text: { kea: "Pamodi un enum ka pode ten mas ki 3 valor" }
      correct: false
    - text: { kea: "Pamodi `else` é obrigatóriu sô pa `if`, nunka pa `when`" }
      correct: false

- question:
    kea: "Kual é diferensa entri `sealed class` i `abstract class` kuandu bu ta skrebe un `when`?"
  options:
    - text: { kea: "Subklasses di sealed meste sta na mesmu pakoti/módulu, kel restrison ta permiti `when` ezaustivu sen `else`; abstract permiti subklasses na kualker lugar, ntonsi `when` meste `else`" }
      correct: true
      explain: { kea: "`sealed` é sima `abstract` mas ku un restrison a más: kompiladór sô ta permiti `when` omite `else` kuandu el pode garanti ki nada más ta ben aparse." }
    - text: { kea: "`sealed class` ka pode ten metodus, `abstract class` pode" }
      correct: false
    - text: { kea: "Es é mesmu kuza, sô ku nomi diferenti" }
      correct: false

- question:
    kea: "Kuza ki un `inner class` pode faze ki un nested class simplis (sen `inner`) ka pode?"
  options:
