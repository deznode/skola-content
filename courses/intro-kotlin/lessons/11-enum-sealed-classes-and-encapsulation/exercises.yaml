- slug: companion-object-taxa-maxima
  language: kotlin
  kind: code
  title: { kea: "Adisiona un limiti máksimu na companion object di `Veikulu`" }
  prompt:
    kea: "`Veikulu` dja ten un `companion object` ku `TAXA_MINIMA_PERDIA` i `ehPresuValidu`. Adisiona un segundu `const val` xamadu `TAXA_MAXIMA_PERDIA` (valor `15000.0`), i atualiza `ehPresuValidu(presu: Double)` pa verifika ki `presu` sta **entri** `TAXA_MINIMA_PERDIA` i `TAXA_MAXIMA_PERDIA` (inkluzivu)."
  hint:
    kea: "Uza operador lójiku `&&` pa kombina dos komparason: `presu >= TAXA_MINIMA_PERDIA && presu <= TAXA_MAXIMA_PERDIA`."
  starterCode: |
    class Veikulu(val matrikula: String, var presuPerDia: Double) {
        companion object {
            const val TAXA_MINIMA_PERDIA = 500.0

            // TODO: adisiona const val TAXA_MAXIMA_PERDIA = 15000.0
            // TODO: atualiza ehPresuValidu pa verifika dos limiti
            fun ehPresuValidu(presu: Double): Boolean {
                return presu >= TAXA_MINIMA_PERDIA
            }
        }
    }

    fun main() {
        println(Veikulu.ehPresuValidu(300.0))    // false — abaxu di TAXA_MINIMA_PERDIA
        println(Veikulu.ehPresuValidu(800.0))    // true
        println(Veikulu.ehPresuValidu(20000.0))  // false — riba di TAXA_MAXIMA_PERDIA
    }
  solutionCode: |
    class Veikulu(val matrikula: String, var presuPerDia: Double) {
        companion object {
            const val TAXA_MINIMA_PERDIA = 500.0
            const val TAXA_MAXIMA_PERDIA = 15000.0

            fun ehPresuValidu(presu: Double): Boolean {
                return presu >= TAXA_MINIMA_PERDIA && presu <= TAXA_MAXIMA_PERDIA
            }
        }
    }

    fun main() {
        println(Veikulu.ehPresuValidu(300.0))    // false
        println(Veikulu.ehPresuValidu(800.0))    // true
        println(Veikulu.ehPresuValidu(20000.0))  // false
    }
