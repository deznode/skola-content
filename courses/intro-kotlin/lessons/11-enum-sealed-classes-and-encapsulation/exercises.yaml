- slug: preve-autonomia-veikulu
  language: kotlin
  kind: predict
  title: { kea: "Preve a autonomia" }
  prompt: { kea: "Antis di kore, preve o ki `splikaAutonomia(TipuKombustivel.DIESEL)` ta imprimi." }
  starterCode: |
    enum class TipuKombustivel(
        val autonomiaKm: Int
    ) {
        GASOLINA(550),
        DIESEL(700),
        ELETRIKU(320)
    }

    fun splikaAutonomia(tipu: TipuKombustivel): String {
        return when (tipu) {
            TipuKombustivel.GASOLINA -> "Gasolina: ${tipu.autonomiaKm} km"
            TipuKombustivel.DIESEL -> "Diesel: ${tipu.autonomiaKm} km"
            TipuKombustivel.ELETRIKU -> "Elétriku: ${tipu.autonomiaKm} km"
        }
    }

    fun main() {
        println(splikaAutonomia(TipuKombustivel.DIESEL))
    }
  options:
    - '"Gasolina: 550 km"'
    - '"Diesel: 700 km"'
    - '"Elétriku: 320 km"'
    - '"Erru di konpilason — `when` ka é ezaustivu"'
  correct: 1
  output: |
    Diesel: 700 km
  why:
    kea: "`when` sobri un `enum class` é ezaustivu automátikamenti — konpiladór sabe tudu kes 3 valor posivel (`GASOLINA`, `DIESEL`, `ELETRIKU`), ntonsi ka meste `else`. `tipu` li é `DIESEL`, ku `autonomiaKm = 700`."

- slug: kompleta-fazereserva-sealed
  language: kotlin
