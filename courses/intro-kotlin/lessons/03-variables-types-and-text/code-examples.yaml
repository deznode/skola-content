# Code-examples sidecar (draft source) — ADR-0026 / spec 049 FR-006.
# Publish copies it VERBATIM to content/courses/intro-kotlin/lessons/02-variables-types-and-text/code-examples.yaml
#
# Position (0-based, array order) maps to <CodeExample position={n} /> in the lesson MDX:
#   0 = val/var demo
#   1 = tipu detetadu vs tipu explisitu
#   2 = tipus numériku
#   3 = operasons aritmétiku + atalhus
#   4 = template di String
#   5 = metodus di String
- language: kotlin
  title: "val vs var"
  code: |
    fun main() {
        val klubi = "Mindelo FC"   // nunka ta muda
        var golus = 3               // ta muda kada partida

        println("$klubi marka $golus golu")

        golus = 5
        println("$klubi marka $golus golu")
    }
- language: kotlin
  title: "Tipu detetadu vs tipu explisitu"
  code: |
    fun main() {
        val nomi = "Telma"          // tipu detetadu: String
        val idadi: Int = 12         // tipu explisitu: Int

        println(nomi)
        println(idadi)
    }
- language: kotlin
  title: "Tipus numériku"
  code: |
    fun main() {
        val pontus: Int = 10
        val alkansi: Long = 2_147_483_648L
        val media: Double = 7.5
        val altura: Float = 1.75F

        println(pontus)
        println(alkansi)
        println(media)
        println(altura)
    }
- language: kotlin
  title: "Operasons aritmétiku i atalhus"
  code: |
    fun main() {
        val a = 7
        val b = 2

        println(a + b)                // 9
        println(a - b)                // 5
        println(a * b)                // 14
        println(a / b)                // 3  -- divizon interu
        println(a.toDouble() / b)     // 3.5

        var kontador = 0
        kontador += 1                  // igual ki kontador = kontador + 1
        kontador++                     // uza valor primeru, dipos aumenta
        println(kontador)              // 2
    }
- language: kotlin
  title: "Template di String"
  code: |
    fun main() {
        val nomi = "Telma"
        val idadi = 12

        println("Nomi: $nomi, idadi: $idadi anu")
        println("Nomi na maiúskula: ${nomi.uppercase()}")
    }
- language: kotlin
  title: "Metodus di String"
  code: |
    fun main() {
        val nomi = "Kabuverdi"

        println(nomi.uppercase())         // KABUVERDI
        println(nomi.substring(0, 4))     // Kabu
        println(nomi.startsWith("Kab"))   // true
    }
