- slug: modifika-primeru-programa
  language: kotlin
  kind: code
  title: { kea: "Modifika bu Purmeru Programa" }
  prompt:
    kea: "Programa `Ola Mundu!` sta ta imprimi un kumprimentu fixu. Modifika-l pa el kria un variavel `nomi` i imprimi un kumprimentu personalizadu ku un template di `String` (`$nomi`)."
  hint:
    kea: "Kria `val nomi = \"...\"` primeru, dipos uza `$nomi` dentu di `println(...)`."
  starterCode: |
    fun main() {
        println("Ola Mundu!")
    }
  solutionCode: |
    fun main() {
        val nomi = "Zeca"

        println("Ola, $nomi! Nu ta kria djuntu na Kotlin.")
    }
