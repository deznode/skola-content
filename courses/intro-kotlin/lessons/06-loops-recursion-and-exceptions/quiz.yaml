- question:
    kea: "Kual รฉ diferensa entri `a..b` i `a until b`?"
  options:
    - text: { kea: "`a..b` inklui `b`; `a until b` para antis di `b`" }
      correct: true
      explain: { kea: "Es รฉ padran `..` (inkluzivu) vs `until` (eksklusivu) โ€” un diferensa di un nรบmeru sรณ, fรกsil di skese." }
    - text: { kea: "Es dos รฉ igual, sรด sintaksi diferenti" }
      correct: false
    - text: { kea: "`until` ta inklui `b`, `..` ka ta inklui" }
      correct: false
- question:
    kea: "Kuandu bu ta uza `downTo` junto ku `step`, kuze ki `step` pode ser?"
  options:
    - text: { kea: "Sรด valoris pozitivu, mesmu na un range `downTo` (pa baxu)" }
      correct: true
      explain: { kea: "Kotlin ka seta `step` negativu โ€” mesmu kuandu direksan di range รฉ `downTo`, `step` ten ki ser pozitivu." }
    - text: { kea: "Sรด valoris negativu" }
      correct: false
    - text: { kea: "Kualker valor, pozitivu ou negativu" }
      correct: false
- question:
    kea: "O ki ta kontise si un funsan rekursivu ka ten un kazu bazi?"
  options:
    - text: { kea: "Funsan ta txoma se prรณpi pa senpri, te `StackOverflowError`" }
      correct: true
      explain: { kea: "Sen kazu bazi, pilha di txomadas ka ta para di kresi te oja limiti di memรณria." }
    - text: { kea: "Kotlin ta devolve `0` automatikamenti" }
      correct: false
    - text: { kea: "Funsan ta para dipos di un sรด txomada" }
      correct: false
- question:
    kea: "Kual opsan รฉ midjรณr prรกtika kuandu bu ta kaptura exsesons?"
  options:
    - text: { kea: "Kaptura tipu mรกs espesรญfiku ki bu sabe ki pode kontise (ex.: `IllegalArgumentException`)" }
      correct: true
      explain: { kea: "Kaptura espesรญfiku ta djuda bu identifika exatamenti o ki koreu mal, en bez di skonde erus inesperadu." }
    - text: { kea: "Sรฉnpri kaptura `Exception` di forma jeral, pa garanti ki ka ta skapa nada" }
      correct: false
    - text: { kea: "Nunka uza `try`/`catch`, sรด dexa programa para" }
      correct: false
- question:
    kea: "Kuze ki ta kontise si bu skese di skrebe `mangas--` dentu di korpu di es `while`-loop?\n\n```kotlin\nvar mangas = 5\nwhile (mangas > 0) {\n    println(\"Manga: $mangas\")\n}\n```"
  options:
    - text: { kea: "Loop ta kore pa senpri โ€” `mangas` nunka ta muda, kondisan `mangas > 0` nunka ta bira `false`" }
      correct: true
      explain: { kea: "Kel รฉ un **loop infinitu**: nada dentu di korpu di loop ta muda `mangas`, nton kondisan `mangas > 0` ta fika `true` pa senpri i programa nunka ta txiga na `println(\"Kabadu!\")`." }
    - text: { kea: "Kotlin ta deteta i para loop automatikamenti dipos di 5 iterasan" }
      correct: false
    - text: { kea: "Kompiladu ka ta permiti โ€” รฉ un eru di kompilasan" }
      correct: false
- question:
    kea: "Kuze ki `for (numeru in listOf(3, -1, 7, 0, 9)) { if (numeru < 0) continue; if (numeru == 0) break; println(numeru) }` ta imprimi?"
  options:
    - text: { kea: "`3`, `7`" }
      correct: true
      explain: { kea: "`-1` รฉ saltadu ku `continue` (sen imprimi); `0` ta para loop kompletamenti ku `break` โ€” `9` nunka รฉ alkansadu." }
    - text: { kea: "`3`, `-1`, `7`, `0`, `9`" }
      correct: false
    - text: { kea: "`3`, `7`, `9`" }
      correct: false
