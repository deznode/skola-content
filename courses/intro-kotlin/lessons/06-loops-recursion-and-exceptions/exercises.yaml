  output: |
    24
  why:
    kea: "`fatorial(4)` ta expandi asi: `fatorial(4) -> fatorial(3) * 4 -> (fatorial(2) * 3) * 4 -> ((fatorial(1) * 2) * 3) * 4 -> ((1 * 2) * 3) * 4 = 24`. Kada txomada ta spera rezultadu di próksimu, dipos multiplika kaminhu di volta te `fatorial(4)` devolve `24`."
- slug: imprimi-pozitivu-te-zero
  language: kotlin
  kind: code
  title: { kea: "Imprimi pozitivu, para na zero" }
  prompt:
    kea: "Skrebe un funsan `imprimePozitivu(numerus: List<Int>)` ki ta pasa pa kada elementu di `numerus`. Si elementu é negativu, **salta-l** (`continue`) sen imprimi. Si elementu é `0`, **para** loop kompletamenti (`break`). Sinon, imprimi elementu."
  hint:
    kea: "Un `if` pa negativu ku `continue`; un otu `if` pa `0` ku `break`; `println` normal fika pa último, pamodi loop sô txiga la si nenhun di kes dos kondisan kontise."
  starterCode: |
    fun imprimePozitivu(numerus: List<Int>) {
        // TODO: continue pa negativu, break pa 0, println pa restu
    }

    fun main() {
        imprimePozitivu(listOf(3, -1, 7, 0, 9))
    }
  solutionCode: |
    fun imprimePozitivu(numerus: List<Int>) {
        for (numeru in numerus) {
            if (numeru < 0) {
                continue
            }
            if (numeru == 0) {
                break
            }
            println(numeru)
        }
    }

    fun main() {
        imprimePozitivu(listOf(3, -1, 7, 0, 9))
        // 3
        // 7
    }
