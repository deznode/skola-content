# <CodeExample position={n} /> in the lesson MDX selects entries 0-based, in
# this list's order.
#
# position 0 -> ranges (`..` / `until` / `downTo` / `step`), 4 tabbed variants
# position 1 -> nested-loop star-triangle ladder, 3 tabbed variants
- language: kotlin
  title: "Ranges na Kotlin"
  code: |
    fun main() {
        for (i in 0..5) {
            println(i)
        }
    }
  variants:
    - language: kotlin
      label: "`..` inkluzivu"
      code: |
        fun main() {
            for (i in 0..5) {
                println(i)
            }
        }
    - language: kotlin
      label: "`until` eksklusivu"
      code: |
        fun main() {
            for (i in 0 until 5) {
                println(i)
            }
        }
    - language: kotlin
      label: "`downTo` pa baxu"
      code: |
        fun main() {
            for (i in 5 downTo 0) {
                println(i)
            }
        }
    - language: kotlin
      label: "`step` ku pasu"
      code: |
        fun main() {
            for (i in 0..10 step 3) {
                println(i)
            }
        }
- language: kotlin
  title: "Triangulus ku loop aninhadu"
  code: |
    fun main() {
        val altura = 5
        for (i in 1..altura) {
            for (j in 1..i) {
                print("*")
            }
            println()
        }
    }
  variants:
    - language: kotlin
      label: "Bázicu"
      code: |
        fun main() {
            val altura = 5
            for (i in 1..altura) {
                for (j in 1..i) {
                    print("*")
                }
                println()
            }
        }
    - language: kotlin
      label: "Invertidu (downTo)"
      code: |
        fun main() {
            val altura = 5
            for (numeruDiEstrelas in altura downTo 1) {
                for (j in 1..numeruDiEstrelas) {
                    print("*")
                }
                println()
            }
        }
    - language: kotlin
      label: "Isósceles spasadu"
      code: |
        fun main() {
            val altura = 5
            for (i in 1..altura) {
                val spasus = altura - i
                for (j in 1..spasus) {
                    print(" ")
                }
                val estrelas = i * 2 - 1
                for (j in 1..estrelas) {
                    print("*")
                }
                println()
            }
        }
