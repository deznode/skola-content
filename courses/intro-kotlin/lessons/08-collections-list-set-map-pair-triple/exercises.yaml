- slug: itera-i-muda-lista-kompras
  language: kotlin
  kind: code
  title: { kea: "Itera i Muda un List" }
  prompt:
    kea: "Dadu `val kompras = mutableListOf(\"arus\", \"fejon\", \"leti\")`, (1) imprimi kada item ku un for-loop, (2) adisiona \"pon\" ku `add`, (3) imprimi `kompras[0]`."
  hint:
    kea: "`for (item in kompras) { println(item) }` pa itera; `kompras.add(\"pon\")` pa adisiona; `kompras[0]` pa asesa pa índisi."
  starterCode: |
    fun main() {
        val kompras = mutableListOf("arus", "fejon", "leti")
        // TODO: itera kompras ku un for-loop, imprimi kada item
        // TODO: adisiona "pon"
        // TODO: imprimi kompras[0]
    }
  solutionCode: |
    fun main() {
        val kompras = mutableListOf("arus", "fejon", "leti")
        for (item in kompras) {
            println(item)
        }
        kompras.add("pon")
        println(kompras[0])
    }
