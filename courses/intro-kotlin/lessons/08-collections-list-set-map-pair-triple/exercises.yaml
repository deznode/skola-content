- slug: koleksons-tres-senariu
  language: kotlin
  kind: code
  title: { kea: "Skodje Kolesan Sertu" }
  prompt:
    kea: "Skrebe un funsan `main()` ku tris variáveis: (1) un `List` `kompras` ku 4 item pa kumpra (bu pode ripiti item, sima \"arus\" dos bez); (2) un `Set` `ilhasVizitadu` ku 3 ilha úniku; (3) un `Map` `notas` ku 3 par disciplina-nota. Imprimi tudu tris."
  hint:
    kea: "Lembra: `listOf` pa órden i repetisan, `setOf` pa únisidadi, `mapOf` ku `to` pa par txavi-valor."
  starterCode: |
    fun main() {
        // TODO: kria un List `kompras` ku 4 item (pode ripiti)
        // TODO: kria un Set `ilhasVizitadu` ku 3 ilha úniku
        // TODO: kria un Map `notas` ku 3 par disciplina-nota
        // TODO: imprimi tudu tris
    }
  solutionCode: |
    fun main() {
        val kompras = listOf("arus", "fejon", "leti", "arus")
        val ilhasVizitadu = setOf("Sal", "Santiago", "Fogo")
        val notas = mapOf("Matemátika" to 18, "Kriolu" to 16, "Inglés" to 15)

        println(kompras)
        println(ilhasVizitadu)
        println(notas)
    }
