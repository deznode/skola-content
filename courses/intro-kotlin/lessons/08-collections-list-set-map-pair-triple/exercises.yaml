    - "Erru di kompilasan"
  correct: 2
  output: |
    null
  why:
    kea: "`notas[\"Inglés\"]` ta debolve `null` pamodi \"Inglés\" ka sta na map — buska na un `Map` so ta debolve un tipu **nulável** (`Int?`), nunka un erru."
- slug: notas-sen-muda-orijinal
  language: kotlin
  kind: code
  title: { kea: "Adisiona i Tira Sen Muda Map Orijinal" }
  prompt:
    kea: "Dadu `val notas = mapOf(\"Kriolu\" to 16, \"Matemátika\" to 14)`, kria un `Map` novu `ku18` ki ten tudu par di `notas` más `\"Inglés\" to 18` (uza `+`). Dipos, kria un otu `Map` novu `sénMatemátika` a partir di `notas`, i tira txavi `\"Matemátika\"` (uza `-`). Imprimi `notas`, `ku18` i `sénMatemátika` — konfirma ki `notas` ka mudou."
  hint:
    kea: "`notas + (\"Inglés\" to 18)` ta kria un Map novu ku par adisionadu; `notas - \"Matemátika\"` ta kria un Map novu sen kel txavi. Nenhun di kes dos ta muda `notas`."
  starterCode: |
    fun main() {
        val notas = mapOf("Kriolu" to 16, "Matemátika" to 14)

        // TODO: ku18 = notas + ("Inglés" to 18)
        // TODO: sénMatemátika = notas - "Matemátika"
        // TODO: imprimi notas, ku18 i sénMatemátika
    }
  solutionCode: |
    fun main() {
        val notas = mapOf("Kriolu" to 16, "Matemátika" to 14)

        val ku18 = notas + ("Inglés" to 18)
        val sénMatemátika = notas - "Matemátika"

        println(notas)          // {Kriolu=16, Matemátika=14}
        println(ku18)           // {Kriolu=16, Matemátika=14, Inglés=18}
        println(sénMatemátika)  // {Kriolu=16}
    }
- slug: itera-map-di-notas
  language: kotlin
  kind: code
  title: { kea: "Itera un Map ku Destruturason" }
  prompt:
    kea: "Dadu `val notas = mapOf(\"Kriolu\" to 16, \"Inglés\" to 15)`, uza un for-loop ku destruturason (`(materia, nota)`) pa imprimi kada par na forma \"materia: nota\"."
  hint:
    kea: "`for ((materia, nota) in notas) { println(\"$materia: $nota\") }` — destruturason diretu na dos variável dentu di for-loop."
  starterCode: |
    fun main() {
        val notas = mapOf("Kriolu" to 16, "Inglés" to 15)
        // TODO: for ((materia, nota) in notas) { ... }
    }
  solutionCode: |
    fun main() {
        val notas = mapOf("Kriolu" to 16, "Inglés" to 15)
        for ((materia, nota) in notas) {
            println("$materia: $nota")
        }
    }
