- slug: kolesons-tres-senariu
  language: kotlin
  kind: code
  title: { kea: "Skodje Kolesan Sertu" }
  prompt:
    kea: "Skrebe un funsan `main()` ku tris variáveis: (1) un `List` `kompras` ku 4 item pa kumpra (bu pode ripiti item, sima \"arus\" dos bez); (2) un `Set` `ilhasVizitadu` ku 4 ilha **entrada**, ma un delas ripitidu (pa mostra ki únisidadi ta aplika — `size` debe ser 3, ka 4); (3) un `Map` `notas` ku 3 par disciplina-nota. Imprimi tudu tris, i `size` di `ilhasVizitadu`."
  hint:
    kea: "Lembra: `listOf` pa órden i repetisan, `setOf` pa únisidadi (elementu ripitidu ta ignoradu), `mapOf` ku `to` pa par txavi-valor."
  starterCode: |
    fun main() {
        // TODO: kria un List `kompras` ku 4 item (pode ripiti)
        // TODO: kria un Set `ilhasVizitadu` ku 4 ilha entrada, un delas ripitidu
        // TODO: kria un Map `notas` ku 3 par disciplina-nota
        // TODO: imprimi tudu tris, i size di ilhasVizitadu
    }
  solutionCode: |
    fun main() {
        val kompras = listOf("arus", "fejon", "leti", "arus")
        val ilhasVizitadu = setOf("Sal", "Santiago", "Fogo", "Sal")
        val notas = mapOf("Matemátika" to 18, "Kriolu" to 16, "Inglés" to 15)

        println(kompras)
        println(ilhasVizitadu)          // [Sal, Santiago, Fogo] -- "Sal" repetidu ka konta dos bez
        println(ilhasVizitadu.size)     // 3
        println(notas)
    }
