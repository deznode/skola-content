- slug: funsan-area-retangulu
  language: kotlin
  kind: code
  title: { kea: "Funsan Área di Retángulu" }
  prompt:
    kea: "Skrebe un funsan `area(largura: Double, altura: Double): Double` ki ta devolve área di un retángulu (`largura * altura`). Dipos, skrebe un funsan `imprimeArea(largura: Double, altura: Double)` ki ka devolve valor nenhun (`Unit`) — el só ta imprimi `\"Área: <valor>\"`."
  hint:
    kea: "`area` meste `: Double` dipos di se paréntesis (ten tipu di retornu) i un `return`. `imprimeArea` ka meste tipu di retornu — el só ta `println`."
  starterCode: |
    fun area(largura: Double, altura: Double): Double {
        // TODO: devolve largura * altura
    }

    fun imprimeArea(largura: Double, altura: Double) {
        // TODO: imprimi "Área: <valor>" uzandu area()
    }

    fun main() {
        imprimeArea(4.0, 3.0)
    }
  solutionCode: |
    fun area(largura: Double, altura: Double): Double {
        return largura * altura
    }

    fun imprimeArea(largura: Double, altura: Double) {
        println("Área: ${area(largura, altura)}")
    }

    fun main() {
        imprimeArea(4.0, 3.0) // Área: 12.0
    }
