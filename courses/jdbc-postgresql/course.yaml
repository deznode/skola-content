        languages: [kea]
      - slug: connecting
        languages: [kea]
      - slug: crud-operations
        languages: [kea]
      - slug: understanding-resultset
        languages: [kea]
      - slug: transactions
        languages: [kea]
      - slug: troubleshooting-summary
        languages: [kea]
