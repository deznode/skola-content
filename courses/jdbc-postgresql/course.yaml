slug: jdbc-postgresql
title: "Java JDBC ku PostgreSQL: Gia Konpletu pa Prinsipianti"
level: beginner
category: programming
duration_minutes: 210
instructor: Joaquim Costa
translations:
  kea:
    title: "Java JDBC ku PostgreSQL: Gia Konpletu pa Prinsipianti"
    description: Aprendi konekta Java ku PostgreSQL uzandu JDBC. Kel kursu ta ensiná-bu di konexon i JDBC URL, CRUD ku PreparedStatement, ResultSet, i transasons, te rezolve os erru komun — tudu ku ezénplu prátiku.
    prerequisites: Konhesimentu báziku di Java (klasses, métodus, try/catch)
    outcomes: |
      Konekta Java ku PostgreSQL i dekodifika un JDBC URL
      Faze CRUD ku PreparedStatement i placeholders ? pa evita SQL injection
      Perkore ResultSet kumo kursor forward-only i drena rejistus pa un List
      Grupa skritas nun transason atómiku ku commit i rollback
      Diagnostika i rezolve os sinku erru JDBC komun
