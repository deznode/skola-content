# Quiz sidecar (draft source) for lesson m1-01 "Introdusan pa JDBC".
# Publish copies this to content/courses/jdbc-postgresql/lessons/introduction/quiz.yaml.
# <Quiz position={n}/> is 0-based and must line up with this list order.
- question:
    kea: "Kuzé ki é JDBC?"
  options:
    - text: { kea: "Un API padron ki ta liga Java ku kualker bazi di dadus SQL" }
      correct: true
      explain: { kea: "JDBC (Java Database Connectivity) é un **tradutor universal** entri bu kódiku Java i bazi di dadus — el ta funsiona ku kualker bazi SQL." }
    - text: { kea: "Un bazi di dadus ki ta sostitui PostgreSQL" }
      correct: false
      explain: { kea: "Nau — JDBC ka é un bazi di dadus; el é kamada ki ta dexa Java **fala** ku un bazi kumo PostgreSQL." }
    - text: { kea: "Un framework kumo Spring Data ou Hibernate" }
      correct: false
      explain: { kea: "Pelu kontráriu: Spring Data i Hibernate é abstrasons ki ta sinta **riba** di JDBC." }
- question:
    kea: "Pamodi ki ta vale a pena prende JDBC si dja izisti framework kumo Spring Data?"
  options:
    - text: { kea: "Pamodi es framework ta sinta riba di JDBC — intende-l ta djuda-bu debug i da-bu kontrolu" }
      correct: true
      explain: { kea: "JDBC é **fundasan**: Spring Data i Hibernate ta jera JDBC pa baxu. Kel ki bu prende li ta djuda-bu debug es framework i skrebe kódiku rápidu ou sinples kuandu bu meste." }
    - text: { kea: "Pamodi framework é más lentu ki JDBC sénpri" }
      correct: false
      explain: { kea: "Es ka é motivu — framework txeu bez ta otimiza bon. Ganhu é **fundamentu** i kontrolu, ka velosidadi sénpri." }
    - text: { kea: "Pamodi Spring Data ka ta uza bazi di dadus SQL" }
      correct: false
      explain: { kea: "Spring Data ta uza bazi SQL sin — através di JDBC." }
- question:
    kea: "Kal di es tres objetu di JDBC ta funsiona kumo **resposta** — un kursor riba di es fila ki bazi ta devolve?"
  options:
    - text: { kea: "`ResultSet`" }
      correct: true
      explain: { kea: "`ResultSet` é **resposta**: un kursor ki bu ta perkore fila pa fila. `Connection` é txamada telefóniku i `PreparedStatement` é mensajen." }
    - text: { kea: "`Connection`" }
      correct: false
      explain: { kea: "`Connection` é **txamada telefóniku** — el ta abri linha pa bazi, ma ka ta karega es fila di rezultadu." }
    - text: { kea: "`PreparedStatement`" }
      correct: false
      explain: { kea: "`PreparedStatement` é **mensajen** ki ta leva query SQL — resposta ta volta nun `ResultSet`." }
