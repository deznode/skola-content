  title: { kea: "Koriji un vazamentu di konexon" }
  prompt:
    kea: "Es métodu ta funsiona — mas el ta **vaza** rekursus: `Connection`, `PreparedStatement`, i `ResultSet` nunka ta fitxadu. Dipos di txeu txamada, aplikasan ta krax ku `too many connections`. Koriji-l ku **try-with-resources**."
  starterCode: |
    List<Uzuariu> pegaUzuarius() throws SQLException {
        List<Uzuariu> uzuarius = new ArrayList<>();
        Connection conn = DriverManager.getConnection(URL, USER, PASSWORD);
        PreparedStatement pstmt = conn.prepareStatement("SELECT id, nomi_uzuariu FROM uzuarius");
        ResultSet rs = pstmt.executeQuery();
        while (rs.next()) {
            uzuarius.add(new Uzuariu(rs.getInt("id"), rs.getString("nomi_uzuariu")));
        }
        return uzuarius;  // conn, pstmt, rs nunka ta fitxadu!
    }
  solutionCode: |
    List<Uzuariu> pegaUzuarius() throws SQLException {
        List<Uzuariu> uzuarius = new ArrayList<>();
        String sql = "SELECT id, nomi_uzuariu FROM uzuarius";
        try (Connection conn = DriverManager.getConnection(URL, USER, PASSWORD);
             PreparedStatement pstmt = conn.prepareStatement(sql);
             ResultSet rs = pstmt.executeQuery()) {
            while (rs.next()) {
                uzuarius.add(new Uzuariu(rs.getInt("id"), rs.getString("nomi_uzuariu")));
            }
        }
        return uzuarius;
    }
  hint:
    kea: "Po `Connection`, `PreparedStatement`, i `ResultSet` dentu di un sô `try ( … )` — es tudu ta fitxa automatikamenti na fin, mésmu ku exsesan."
