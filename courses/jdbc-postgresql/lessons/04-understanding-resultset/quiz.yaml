# Quiz sidecar (draft source) for lesson m1-04 "ResultSet a Fundu".
# Publish copies this to content/courses/jdbc-postgresql/lessons/understanding-resultset/quiz.yaml.
- question:
    kea: "`ResultSet` é un koleson di dadus na memória, kumo un `List`?"
  options:
    - text: { kea: "Nau — el é un kursor bibu pa riba di konexon" }
      correct: true
      explain: { kea: "`ResultSet` ta ponta pa un fila di kada bez; el ta pidi bazi di dadus pa prósima fila ku `rs.next()` — el ka ta karega tudu na memória." }
    - text: { kea: "Sin — el ta karega tudu fila na memória dratu" }
      correct: false
      explain: { kea: "Es é eru komun: `ResultSet` é un kursor, ka un koleson." }
- question:
    kea: "Kuzé ki `rs.next()` ta devolve kuandu ka ten más fila pa le?"
  options:
    - text: { kea: "`false`" }
      correct: true
      explain: { kea: "`rs.next()` ta move pa prósima fila i ta devolve `false` kuandu kaba — é pamodi `while (rs.next())` ta funsiona." }
    - text: { kea: "`true`" }
      correct: false
    - text: { kea: "`null`" }
      correct: false
- question:
    kea: "Pamodi bu ka debe devolve un `ResultSet` di un métodu?"
  options:
    - text: { kea: "Pamodi `Connection` ta fitxa i kursor ta móre" }
      correct: true
      explain: { kea: "Kuandu métodu kaba, try-with-resources ta fitxa `Connection` — i un `ResultSet` sen konexon ta móre. Kopia dadus pa un `List` primeru." }
    - text: { kea: "Pamodi é más lentu" }
      correct: false
