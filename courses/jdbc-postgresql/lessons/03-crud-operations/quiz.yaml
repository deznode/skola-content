# Quiz sidecar (draft source) for lesson m1-03 "CRUD ku PreparedStatement".
# Publish copies this to content/courses/jdbc-postgresql/lessons/crud-operations/quiz.yaml.
# <Quiz position={n}/> is 0-based and must line up with this list order.
- question:
    kea: "Kal métodu bu ta uza pa kori un `INSERT`, `UPDATE`, ô `DELETE`?"
  options:
    - text: { kea: "`executeUpdate()`" }
      correct: true
      explain: { kea: "**`executeUpdate()`** é pa SQL ki ta modifika dadus — el ta devolve o númeru di linha afetadu." }
    - text: { kea: "`executeQuery()`" }
      correct: false
      explain: { kea: "`executeQuery()` é pa `SELECT` — el ta devolve un `ResultSet`." }
    - text: { kea: "`executeSelect()`" }
      correct: false
- question:
    kea: "Na un `PreparedStatement`, o primeru placeholder `?` ta korresponde ku kal índisi?"
  options:
    - text: { kea: "1" }
      correct: true
      explain: { kea: "Os placeholder di JDBC ta kumesa na **1**, ka na 0 — `pstmt.setString(1, …)` é o primeru `?`." }
    - text: { kea: "0" }
      correct: false
      explain: { kea: "Kuidadu: na JDBC os `?` ta kumesa na 1, ka na 0 komu os array di Java." }
    - text: { kea: "-1" }
      correct: false
- question:
    kea: "Kal métodu ta devolve un `ResultSet` pa un `SELECT`?"
  options:
    - text: { kea: "`executeQuery()`" }
      correct: true
      explain: { kea: "`executeQuery()` ta devolve un `ResultSet` ki bu ta perkore ku `rs.next()`." }
    - text: { kea: "`executeUpdate()`" }
      correct: false
      explain: { kea: "`executeUpdate()` ta devolve un `int` (linha afetadu), ka un `ResultSet`." }
