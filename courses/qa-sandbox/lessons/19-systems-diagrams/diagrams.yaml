    - { id: ingress, col: 1, row: 1, label: "Ingress", sub: "Nginx", kind: edge, icon: route, desc: "Ponta di entrada na kluster. Ta enkaminha kada pididu." }
    - { id: api, col: 2, row: 1, label: "API", sub: "Spring Boot", kind: service, icon: server, desc: "Ta prosesa lójika di négósiu i ta responde." }
    - { id: db, col: 3, row: 0, label: "PostgreSQL", sub: "Bazi di dadus", kind: data, icon: database, desc: "Undi os dadus ta fika gardadu pa sempri." }
    - { id: cache, col: 3, row: 1, label: "Redis", sub: "Cache", kind: data, icon: bolt, desc: "Cache na memória — respostas más rápidu." }
  edges:
