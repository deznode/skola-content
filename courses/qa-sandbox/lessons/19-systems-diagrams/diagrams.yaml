# <SequenceDiagram position={2} />
- type: sequence
  actors:
    - { id: cli, label: "Cliente", icon: monitor }
    - { id: api, label: "API", icon: server }
    - { id: db, label: "DB", icon: database }
  steps:
    - { from: cli, to: api, msg: "GET /notas", title: "Pididu", note: "O cliente ta pidi os notas." }
