- slug: dividi-seguru
  language: python
  kind: code
  title: { kea: "Funsan dividi_seguru" }
  prompt: { kea: "Skrebe un funsan `dividi_seguru(a, b)` ki ta retorna `a / b`. Si `b` é zero, retorna \"Ka pode dividi pa zero\". Si `a` o `b` ka é numeru, retorna \"Argumentus inválidus\"." }
  hint: { kea: "Poi `a / b` déntu di un `try`, dipos kaptura `ZeroDivisionError` i `TypeError` separadu." }
  starterCode: |
    def dividi_seguru(a, b):
        # Bu kódiku li
        pass
  solutionCode: |
    def dividi_seguru(a, b):
        try:
            return a / b
        except ZeroDivisionError:
            return "Ka pode dividi pa zero"
        except TypeError:
            return "Argumentus inválidus"
- slug: validason-idadi
  language: python
  title: { kea: "Validason di idadi ku loop" }
  prompt: { kea: "Kria un programa ki ta pidi idadi ku `input()`. Si ka é numeru, pidi di novu (loop `while` ku try/except). Para só kuandu uzuáriu mete un numeru entri 1 i 120." }
  starterCode: |
    # Pidi idadi ku validason
  solutionCode: |
    while True:
        try:
            idadi = int(input("Mete bu idadi: "))
            if 1 <= idadi <= 120:
                print(f"Obrigadu! Bu tene {idadi} anu.")
                break
            print("Mete un numeru entre 1 i 120.")
        except ValueError:
            print("Izu ka é un numeru. Tenta di novu.")
- slug: exsesun-personalizadu
  language: python
  title: { kea: "Exsesan personalizadu" }
  prompt: { kea: "Kria un exsesan `IdadiInvaliduError` i un funsan `valida_idadi(idadi)` ki ta `raise` el si idadi é negativu o maior ki 150." }
  starterCode: |
    class IdadiInvaliduError(Exception):
        pass

    def valida_idadi(idadi):
        # Bu kódiku li
        pass
  solutionCode: |
    class IdadiInvaliduError(Exception):
        pass

    def valida_idadi(idadi):
        if idadi < 0 or idadi > 150:
            raise IdadiInvaliduError(f"Idadi inválidu: {idadi}")
        return idadi

    try:
        valida_idadi(200)
    except IdadiInvaliduError as e:
        print(f"Erru: {e}")
- slug: le-notas
  language: python
  title: { kea: "Lé notas di un ficheru" }
  prompt: { kea: "Lé un ficheru di notas (un numeru por linha) ku `open()`. Kaptura `FileNotFoundError`, kaptura `ValueError` pa linhas ki ka é numeru, i na `else` mostra média di notas válidu." }
  starterCode: |
    # Lé notas di un ficheru
  solutionCode: |
    total, kontu = 0, 0
    try:
        with open("notas.txt") as f:
            for linha in f:
                try:
                    total += float(linha)
                    kontu += 1
                except ValueError:
                    continue
    except FileNotFoundError:
        print("Ficheru ka ezisti.")
    else:
        media = total / kontu if kontu else 0
        print(f"Média: {media:.2f}")
