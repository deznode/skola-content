slug: qa-sandbox
title: "QA Sandbox — Lesson Rendering Test Course"
level: beginner
category: programming
duration_minutes: 120
instructor: Skola QA
# Local-only test course. Excluded from default `pnpm gen:catalog` discovery and
# from the catalog-drift-guard hook, so it never reaches db/migration / prod.
# Generate locally with:
#   pnpm gen:catalog --course=qa-sandbox --out=apps/api/src/main/resources/db/seed/dev
test_only: true
translations:
  kea:
    title: "QA Sandbox — Testi di Renderizason di Lison"
    description: "Kursu di testi pa esersi TUDU komponenti di @skola/learning-content-core i tudu se variant: prátika, kódigu, strutura, inline/referénsia, i média/callouts — organizadu un módulu pa kada família di komponenti."
    prerequisites: "Nenhun konhesimentu préviu — es é un kursu di testi."
    outcomes: |
      Esersi tudu 21 komponenti registadu i tudu se variant
      Verifika layouts TEXT/VIDEO/MIXED i o microlearn player
      Verifika prátika (TentaGosi/QuizSet/Flashcard/Parsons), kódigu, strutura, inline, i média
  en:
    title: "QA Sandbox — Lesson Rendering Test Course"
    description: "A QA-only course exercising EVERY @skola/learning-content-core component and all its variants — practice, code, structure, inline/reference, and media/callouts — organized one module per component family."
    prerequisites: "None — this is a test course."
    outcomes: |
      Exercise all 21 registered components and every variant
      Verify TEXT/VIDEO/MIXED layouts and the microlearn player
      Verify practice, code-teaching, structure, inline, and media families
modules:
  - slug: lesson-layouts
    title:
      kea: "Layouts di Lison i Tipografia"
      en: "Lesson Layouts & Typography"
    lessons:
      - slug: text-basics
        languages: [kea, en]
        content_type: TEXT
      - slug: video-player
        languages: [kea, en]
        content_type: VIDEO
        video_url: "https://files.vidstack.io/sprite-fight/hls/stream.m3u8"
      - slug: mixed-everything
        languages: [kea]
        content_type: MIXED
        video_url: "https://files.vidstack.io/sprite-fight/720p.mp4"
      - slug: microlearn-everything
        languages: [kea]
        content_type: MIXED
        video_url: "https://www.youtube.com/watch?v=_cMxraX_5RE"
  - slug: practice-assessment
