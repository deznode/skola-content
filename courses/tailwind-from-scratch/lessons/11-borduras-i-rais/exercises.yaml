- slug: aplika-borduras-rais-resort-brava
  language: html
  kind: code
  title: { kea: "Aplika borduras i rais a Resort Brava" }
  prompt: { kea: "Aplika tudu mudansas di riba a `m2-resort-brava/index.html`. Konfirma na browser ki kards son redondu, boton ten kantus suavi, i header ten un linha sutil no fundu." }
  hint: { kea: "Adisiona `rounded-lg border border-slate-100` a seksan di kards, `rounded-md` a boton di hero, i `border-b border-sky-900/30` a header." }
  solutionCode: |
    <header class="sticky top-0 z-10 bg-linear-to-r from-sky-700 to-sky-800 text-white px-6 py-4 shadow-md border-b border-sky-900/30">

    <section id="kuartus" class="space-y-2 bg-white p-6 shadow-sm rounded-lg border border-slate-100">

    <a class="bg-amber-500 text-white px-4 py-2 font-semibold shadow-md rounded-md">Olha kuartus</a>

- slug: eksperimenta-variantis-raiu
  language: html
  kind: reflect
  title: { kea: "Skoji o raiu pa alma di Brava" }
  prompt: { kea: "Eksperimenta variantis di raiu pa kards: `rounded-md`, `rounded-lg`, `rounded-xl`, `rounded-2xl`. Skrebe kal ki senti más adekuadu pa **alma di Brava** — ka ten resposta sertu, é kontestu i gostu." }
  code: |
    <section id="kuartus" class="space-y-2 bg-white p-6 shadow-sm rounded-lg border border-slate-100">
  modelPoints:
    kea:
      - "Kards ku raiu pikinoti (`rounded-md`) ta parsi más formal i profisional."
      - "Raiu grandi (`rounded-2xl`) ta da un sensasan más suavi i amigável."
      - "Ka ten skolha eradu — o importanti é ki tudu kards uza mesmu raiu pa konsisténsia."
  notePlaceholder: { kea: "Skrebe li…" }

- slug: adisiona-avatar-redondu
  language: html
  kind: code
  title: { kea: "Adisiona un avatar redondu" }
  prompt: { kea: "No seksan **Kontaktu**, adisiona un `<img>` di hospedeira ku `size-16 rounded-full border-4 border-white shadow-md`. Uza un imajen di izemplu (ex: `https://i.pravatar.cc/150`). Konfirma ki é un sirkulu ku bordura branku." }
  hint: { kea: "`rounded-full` num elementu kuadradu (`size-16`) ta da un sirkulu perfeitu." }
  solutionCode: |
    <img class="size-16 rounded-full border-4 border-white shadow-md"
         src="https://i.pravatar.cc/150" alt="Hospedeira">
