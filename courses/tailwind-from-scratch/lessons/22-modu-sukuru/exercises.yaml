- slug: aplika-dark-mode-resort-brava
  language: html
  kind: code
  title: { kea: "Aplika dark mode a Resort Brava" }
  prompt: { kea: "Adisiona `@custom-variant dark` na bu blok `<style>`, poi `dark:` variantis na `<body>` i no boton di toggle, i adisiona o script na `<head>`. Konfirma: (a) toggle no header ta funsiona; (b) reload ta mantene a skolha; (c) si bu sistema sta en dark mode, Brava ta komesa en dark sen bu klika nada." }
  hint: { kea: "O `@custom-variant dark (&:where(.dark, .dark *));` ta bai antes di `@theme`, i o script ku `matchMedia` ta bai na `<head>`." }
  starterCode: |
    <style type="text/tailwindcss">
      @theme {
        --color-mar-900: #0b2a3a;
      }
    </style>

    <body class="min-h-screen bg-sol-100 text-slate-900">
      <button id="dark-toggle" class="px-2 py-1 rounded-md bg-mar-800/50 text-white">
        <span class="dark:hidden">🌙</span>
        <span class="hidden dark:inline">☀️</span>
      </button>
      <!-- TODO: adisiona dark: variantis i o script -->
    </body>
  solutionCode: |
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));

      @theme {
        --color-mar-900: #0b2a3a;
      }
    </style>

    <script>
      if (localStorage.theme === 'dark' ||
          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>

    <body class="min-h-screen bg-sol-100 dark:bg-mar-900 text-slate-900 dark:text-slate-100">
      <button id="dark-toggle" class="px-2 py-1 rounded-md bg-mar-800/50 dark:bg-mar-700 text-white">
        <span class="dark:hidden">🌙</span>
        <span class="hidden dark:inline">☀️</span>
      </button>
      <script>
        document.getElementById('dark-toggle').addEventListener('click', () => {
          document.documentElement.classList.toggle('dark');
          localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });
      </script>
    </body>

- slug: dark-variantis-no-footer
