slug: tailwind-from-scratch
title: "Fundamentus di Tailwind CSS v4"
level: beginner
category: programming
duration_minutes: 525
instructor: Joaquim Costa
translations:
  kea:
    title: "Fundamentus di Tailwind CSS v4"
    description: Aprendi Tailwind CSS v4 di zero. Kel kursu ta ensiná-bu utility-first CSS, novidadis di v4 (Oxide engine, `@theme`, CSS-first config), i kumo konstrui interfaci responsivu — kulminandu na un pájina di turizmu real pa Resort Brava, na Kabu Verdi.
    prerequisites: Konhesimentu básiku di HTML i CSS
    outcomes: |
      Skrebe stilu ku utility classes di Tailwind CSS v4
      Konfigura tema ku `@theme` (kores, fontis, breakpoints) diretu na CSS
      Konstrui layout responsivu ku Flexbox, Grid i Container Queries
      Adisiona interatividadi ku variantis (`hover:`, `focus:`, `dark:`) i animasoens
      Prepara projetu pa produsan ku Vite, i konxe alternativas (Webpack, PostCSS)
